<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>게임 준비</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    <style>
        /* [수정] 1. 대기실 테마 :root */
        :root {
            --bg-color: #FFFBEB; /* 따뜻한 크림색 배경 */
            --primary-color: #FF6B6B; /* 활기찬 코랄색 */
            --secondary-color: #4ECDC4; /* 상쾌한 틸(teal)색 */
            --accent-color: #FFD93D; /* 밝은 노란색 */
            --text-color-dark: #574141; /* 어두운 갈색 */
            --text-color-light: #ffffff;
            --danger-color: #F76363;
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2; /* 연한 베이지색 테두리 */
            --panel-shadow: #E4DCCF; /* 패널 그림자 */
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color); /* [수정] */
            color: var(--text-color-dark); /* [수정] */
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }

        /* [수정] 2. 대기실 : 아케이드 버튼 스타일 */
        .menu-btn {
            width: 100%; padding: 16px; font-size: 1.25em; font-weight: 900;
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer;
            transition: all 0.1s ease-out;
            border-bottom: 5px solid; /* 3D 효과를 위한 아래쪽 테두리 */
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        
        .menu-btn.primary {
            background-color: var(--primary-color);
            color: var(--text-color-light);
            border-bottom-color: #C04A4A; /* 기본 색상의 어두운 버전 */
        }
        .menu-btn.secondary {
            background-color: var(--secondary-color);
            color: var(--text-color-light);
            border-bottom-color: #379A93;
        }
        .menu-btn.accent {
            background-color: var(--accent-color);
            color: var(--text-color-dark);
            border-bottom-color: #D1B030;
            text-shadow: none;
        }
         .menu-btn.light {
            background-color: #F8F9FA;
            color: var(--text-color-dark);
            border-bottom-color: #BDBDBD;
        }
        .menu-btn:disabled {
            background-color: #BDBDBD !important;
            color: #757575 !important;
            border-bottom-color: #8D8D8D !important;
            cursor: not-allowed;
            transform: none;
        }

        /* [수정] 3. 레이아웃 및 헤더 (대기실 테마 적용) */
        .game-lobby-container { display: flex; flex-direction: column; width: 100%; height: 100%; margin: 0 auto; background-color: var(--panel-bg); }
        
        .game-lobby-header {
            padding: 15px;
            border-bottom: 3px solid var(--panel-border); /* [수정] */
            background-color: #FFFAE0; /* [수정] 대기실 헤더 배경 */
            color: var(--text-color-dark); /* [수정] */
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title { text-align: center; flex-grow: 1; min-width: 0; }
        .game-lobby-header h1 {
            font-size: 1.4em; margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .game-lobby-header p {
            font-size: 0.8em; opacity: 0.8; margin: 2px 0 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .header-btn {
            font-family: 'GmarketSans', sans-serif;
            background: none; border: none;
            color: var(--text-color-dark); /* [수정] */
            font-size: 1.8em; font-weight: 700;
            cursor: pointer; padding: 0 10px;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }
        .header-btn:active { opacity: 0.7; }
        .header-btn.leave { font-size: 2.5em; width: 50px; text-align: left; }
        .header-btn.invite {
            font-size: 0.9em; /* [수정] 1.0em -> 0.9em */
            font-weight: 900;
            background-color: var(--secondary-color); /* [수정] secondary 색상 */
            color: var(--text-color-light);
            border-radius: 12px;
            padding: 8px 12px; /* [수정] 10px 16px -> 8px 12px */
            border-bottom: 4px solid #379A93; /* [수정] secondary 어두운 버전 */
            box-shadow: none;
            width: auto; /* 고정 폭 제거 */
            white-space: nowrap; /* 줄바꿈 방지 */
        }
        .header-btn.invite:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .header-buttons-wrapper {
            display: flex;
            flex-shrink: 0;
            gap: 8px; /* 버튼 사이 간격 */
        }

        .header-btn.invite:disabled {
            background-color: #BDBDBD !important;
            color: #757575 !important;
            border-bottom-color: #8D8D8D !important;
            cursor: not-allowed;
            transform: none;
        }
           
        
        .game-lobby-main { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        
        /* [수정] 4. 플레이어 목록 (대기실 테마 적용) */
        #player-list-wrapper {
            padding: 15px;
            border-bottom: 3px solid var(--panel-border); /* [수정] */
            background-color: #FFFAE0; /* [수정] */
            flex-shrink: 0;
        }
        #player-list-horizontal { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; }
        #player-list-horizontal::-webkit-scrollbar { height: 5px; }
        #player-list-horizontal::-webkit-scrollbar-thumb { background: #ccc; border-radius: 5px; }
        
       /* [수정] 5. 플레이어 슬롯 (대기실 테마 적용) */
.player-slot-compact { flex-shrink: 0; width: 90px; text-align: center; position: relative; /* [수정] 레벨 배지 및 강퇴 버튼의 기준점 */ }

        /* ✨ [신규] 스포트라이트(별가루) 장착 시 아바타 배경 변경 */
        .player-slot-compact .avatar.effect-spotlight-equipped-bg {
            background-color: #341f4b; /* ✨ 어두운 밤하늘색 */
            transition: background-color 0.5s ease;
        }

        .player-slot-compact .avatar {
            width: 70px; /* ✨ 60px -> 70px */
            height: 70px; /* ✨ 60px -> 70px */
            margin: 0 auto 4px; /* [수정] 8px -> 4px (배지 공간) */
            background-color: var(--panel-bg); /* [수정] */
            border-radius: 12px; /* ✨ 12px (사각형) */
            display: flex; justify-content: center; align-items: center;
            font-size: 3em; /* ✨ 2em -> 3em (이모지 크기) */
            position: relative;
            border: 3px solid var(--text-color-dark); /* [수정] */
            overflow: hidden; /* ✨ '별가루' 효과를 위해 hidden 추가 */
        }
        .player-slot-compact .avatar img { width: 100%; height: 100%; object-fit: contain; /* border-radius: 50% 제거 */ }
        .player-slot-compact.is-host .avatar {
            border-color: var(--accent-color); /* [수정] */
        }
        .player-slot-compact.is-host .nickname {
            color: var(--accent-color);
            text-shadow: 0 0 8px rgba(255, 200, 74, 0.7);
        }
        .player-slot-compact .nickname { 
            font-size: 0.9em; 
            font-weight: 700; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        /* [수정] 6. 채팅창 (대기실 테마 적용) */
        #chat-container {
            flex-grow: 1; display: flex; flex-direction: column;
            padding: 10px; overflow-y: auto;
            background-color: var(--bg-color); /* [수정] */
        }
        .chat-message { display: flex; margin-bottom: 12px; max-width: 85%; align-self: flex-start; }
        .chat-message.my-message { align-self: flex-end; }
        .chat-message .sender-avatar {
            width: 36px; height: 36px; border-radius: 50%; font-size: 1.6em;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; margin-right: 10px;
            background-color: var(--panel-bg); /* [수정] */
            border: 2px solid var(--panel-border); /* [수정] */
            overflow: hidden; /* [추가] */
        }
        .chat-message .sender-avatar img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
        .chat-message.my-message .sender-avatar { display: none; }
        .chat-message .msg-body { display: flex; flex-direction: column; }
        .chat-message .sender {
            font-weight: 700; font-size: 0.9em;
            color: var(--primary-color); /* [수정] */
            margin-bottom: 4px;
        }
        .chat-message.my-message .sender { display: none; }
        .chat-message .content {
            padding: 10px 14px; border-radius: 12px; /* [수정] */
            background-color: var(--panel-bg); /* [수정] */
            border: 2px solid var(--panel-border); /* [수정] */
            display: inline-block; word-break: break-word; text-align: left;
        }
        /* [수정] 내 메시지 (대기실 스타일) */
        .chat-message.my-message .content {
            background-color: var(--accent-color);
            border-color: #D1B030;
            color: var(--text-color-dark);
        }
        .system-message {
            text-align: center; font-size: 0.85em; font-weight: 700;
            color: #9A6A3A; /* [수정] */
            margin: 10px 0;
            background-color: #FFFAE0; /* [수정] */
            padding: 5px; border-radius: 8px;
            border: 2px dashed var(--panel-border); /* [수정] */
        }

        /* [수정] 7. 채팅 푸터 (대기실 테마 적용) */
        .game-lobby-footer {
            padding: 15px; /* [수정] */
            border-top: 3px solid var(--panel-border); /* [수정] */
            display: flex; flex-direction: column;
            flex-shrink: 0;
            background-color: #FFFAE0; /* [수정] */
        }
        #start-game-btn {
            font-size: 1.1em;
            padding: 14px;
        }
        #chat-controls { display: flex; gap: 8px; align-items: center; position: relative;}
        #chat-input {
            flex-grow: 1;
            border: 2px solid var(--text-color-dark); /* [수정] */
            background-color: #fff;
            border-radius: 12px; /* [수정] */
            padding: 12px; /* [수정] */
            font-size: 1em; font-family: 'GmarketSans', sans-serif;
            min-width: 0;
        }
        #chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        /* [수정] 채팅 입력창 (버튼 3개 공간 확보) */
        #chat-input {
            /* 마이크+설정+이모지+전송 버튼 영역 확보 */
            padding-right: 190px; 
        }

        /* [신규] 채팅 설정 톱니바퀴 버튼 */
        #chat-settings-btn {
            font-size: 1.6em; background: none; border: none;
            cursor: pointer; padding: 5px;
            color: var(--text-color-dark);
            transition: color 0.2s, transform 0.2s;
            position: absolute;
            right: 150px; /* 마이크(115px) 좌측 */
            top: 50%; transform: translateY(-50%);
            z-index: 5;
        }
        #chat-settings-btn:active {
             transform: translateY(-50%) scale(0.9);
        }

        /* [수정] 마이크 버튼 위치 (설정 버튼으로 인해 이동) */
        #mic-btn {
             right: 115px; /* 이모지(80px) 좌측 */
        }
        /* --- [신규] TTS 설정 토글 스위치 스타일 --- */
        .toggle-switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .toggle-switch-label {
            font-weight: 700;
            font-size: 0.9em;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px; /* 너비 */
            height: 28px; /* 높이 */
        }
        .toggle-switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px; /* 동그라미 높이 */
            width: 20px; /* 동그라미 너비 */
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:focus + .slider {
            box-shadow: 0 0 1px var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(22px); /* 동그라미 이동 거리 */
        }
        .slider.round {
            border-radius: 34px;
        }
        .slider.round:before {
            border-radius: 50%;
        }
        /* --- [신규] 토글 스위치 끝 --- */
        /* [수정] 채팅 입력창 (마이크/이모지 버튼 공간 확보) */
        #chat-input {
            padding-right: 150px; /* 마이크+이모지+전송 버튼 영역 확보 */
        }
        
        /* [신규] 음성 채팅 마이크 버튼 */
        #mic-btn {
            font-size: 1.6em; background: none; border: none;
            cursor: pointer; padding: 5px;
            color: var(--text-color-dark);
            transition: color 0.2s, transform 0.2s;
            position: absolute;
            right: 115px; /* 이모지(80px) 좌측 */
            top: 50%; transform: translateY(-50%);
            z-index: 5;
        }
        #mic-btn:active {
             transform: translateY(-50%) scale(0.9);
        }
        #mic-btn.recording {
            color: var(--primary-color);
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.1); }
            100% { transform: translateY(-50%) scale(1); }
        }
        /* [수정] 마이크 버튼과 겹치지 않게 이모지 버튼 z-index 수정 */
        #emoji-toggle-btn {
             z-index: 5;
        }
        #send-chat-btn {
            padding: 0 20px; /* [수정] */
            font-size: 1em; /* [수정] */
            font-weight: 700; /* [수정] */
            border-radius: 12px; /* [수정] */
            border: none;
            background-color: var(--primary-color);
            color: white; cursor: pointer;
            width: auto; /* [수정] */
            height: 48px; /* [수정] */
            display:flex; justify-content:center; align-items:center;
            flex-shrink: 0;
            border-bottom: 4px solid #C04A4A; /* [수정] */
        }
        #send-chat-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        #emoji-toggle-btn {
            font-size: 1.6em; background: none; border: none;
            cursor: pointer; padding: 5px;
            color: var(--text-color-dark); /* [수정] */
            position: absolute; /* [추가] */
            right: 80px; /* [추가] 전송 버튼 옆 */
            top: 50%; transform: translateY(-50%);
        }
        #emoji-popover {
            display: none; position: absolute; bottom: calc(100% + 5px); left: 5px;
            background: var(--panel-bg);
            border: 3px solid var(--text-color-dark); /* [수정] */
            border-radius: 12px;
            box-shadow: 4px 4px 0px 0px var(--text-color-dark); /* [수정] */
            padding: 10px; grid-template-columns: repeat(4, 1fr);
            gap: 10px; z-index: 10;
        }
        #emoji-popover.active { display: grid; }
        #emoji-popover button { background: none; border: none; font-size: 1.8em; cursor: pointer; padding: 5px; }
        
/* ✨ [수정] 입장 이펙트 스타일 (지속형) */
        .entry-effect-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 클릭 방지 */
            z-index: 10;
        }
        
        /* 1. 반짝임 (틸(teal) 색상 깜빡임 효과 - 유지) */
        @keyframes teal-pulse-anim {
            0%, 100% {
                /* ✨ border-color 제거 -> box-shadow + inset shadow */
                box-shadow: 0 0 10px 2px var(--secondary-color), inset 0 0 10px 2px var(--secondary-color);
                opacity: 0.6;
            }
            50% {
                box-shadow: 0 0 15px 5px var(--secondary-color), inset 0 0 15px 5px var(--secondary-color);
                opacity: 1;
            }
        }
        .effect-sparkle-persistent {
            /* ✨ [수정] box-shadow 방식으로 변경 (overflow:hidden 호환) */
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            /* border: 3px solid transparent; */ /* 제거 */
            animation: teal-pulse-anim 2.5s ease-in-out infinite; 
            z-index: 10; /* ✨ '반짝임'이 '별가루'보다 위에 오도록 */
        }
        
        /* 2. 스포트라이트 (✨ '별가루 비' 스타일로 변경) */
        @keyframes star-fall {
            0% { 
                transform: translateY(-20px); /* 슬롯 위에서 시작 */
                opacity: 0; 
            }
            10% { opacity: 1; } /* 나타나기 */
            90% { opacity: 1; } /* 떨어지기 */
            100% { 
                transform: translateY(70px); /* 슬롯(60px) 아래로 사라짐 */
                opacity: 0; 
            }
        }
        
        .effect-spotlight-persistent {
            /* 이 클래스 자체는 컨테이너 역할만 함 */
            width: 100%;
            height: 100%;
            border-radius: 12px; /* ✨ 12px (사각형) */
            overflow: hidden; /* ✨ 별가루가 원 밖으로 나가지 않게 */
            z-index: 5; /* ✨ 반짝임보다 아래에 오도록 */
        }

        /* 2-1. 별가루 입자 (::before) - 빠름 */
        .effect-spotlight-persistent::before {
            content: '';
            position: absolute;
            top: 0; /* 상단 고정 */
            left: 50%;
            width: 2px; /* 입자 크기 */
            height: 2px;
            background: #FFF;
            border-radius: 50%;
            
            /* ✨ box-shadow로 여러 개의 별 생성 (가로 60px 범위) */
            box-shadow: 
                -20px 10px #FFF, 15px 25px #FFF, 0px 40px #FFF, 
                -10px 55px #FFF, 25px 5px #FFF, -5px 30px #FFF;
            
            animation: star-fall 1.5s linear infinite;
            animation-delay: -0.5s; /* 즉시 시작 */
        }
        
        /* 2-2. 별가루 입자 (::after) - 느림 (시차) */
        .effect-spotlight-persistent::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 2px;
            background: #FFF;
            border-radius: 50%;
            
            /* ✨ 다른 위치에 별 생성 */
            box-shadow: 
                10px 18px #FFF, -15px 35px #FFF, 5px 50px #FFF, 
                -25px 8px #FFF, 20px 22px #FFF, -8px 42px #FFF;
            
            animation: star-fall 2.5s linear infinite; /* ✨ 1.5s -> 2.5s (더 느리게) */
        }

        /* [신규] 친구 초대 모달 */
        #friend-invite-modal .modal-header {
            padding: 15px 20px;
            background-color: var(--secondary-color);
            color: white;
            border-bottom: 4px solid #379A93;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #friend-invite-modal .modal-header h2 {
            font-size: 1.25em;
            margin: 0;
            color: white;
            text-align: center;
            flex-grow: 1;
        }
        #friend-invite-modal .modal-header .close-btn {
            background: none; border: none; color: white;
            font-size: 2.5em; cursor: pointer;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            padding: 0 10px;
            line-height: 1;
        }
        #friend-invite-modal .modal-body {
            padding: 0;
            max-height: 60vh;
            overflow-y: auto;
        }

        /* [신규] 유저 목록 (친구.html 스타일 재사용) */
        .user-list {
            display: flex;
            flex-direction: column;

            white-space: nowrap; /* [추가] 줄바꿈 방지 */

        @keyframes toast-fade-in {
            from { opacity: 0; transform: translateY(-20px); } /* 위에서 아래로 */
            to { opacity: 1; transform: translateY(0); }

function kakaoInvite() {

    } catch (e) {

}

        try {

    // --- 인앱 콘솔 기능 (DOMContentLoaded 내부 최상단으로 이동) ---
        const consoleModal = document.getElementById('console-modal');
        const consoleOutput = document.getElementById('console-output');
        const openConsoleBtn = document.getElementById('open-console-btn');
        const closeConsoleBtn = document.getElementById('close-console-btn');
        const clearConsoleBtn = document.getElementById('clear-console-btn');

        const originalConsoleLog = console.log;
        const originalConsoleWarn = console.warn;
        const originalConsoleError = console.error;

        function addLogToModal(message, type = 'log') {
             const currentConsoleOutput = document.getElementById('console-output');
            if (!currentConsoleOutput) {
                 originalConsoleError("인앱 콘솔 출력 요소를 찾을 수 없습니다.");
                 return;
             }
            const logEntry = document.createElement('div');
            const now = new Date();
            const timestamp = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            logEntry.style.marginBottom = '5px';
            logEntry.style.borderBottom = '1px solid #444';
            logEntry.style.paddingBottom = '3px';
            logEntry.innerHTML = `<span style="color: #888;">[${timestamp}]</span> `;
            if (type === 'warn') { logEntry.style.color = 'yellow'; logEntry.innerHTML += `<span style="font-weight: bold;">[WARN]</span> `; }
            else if (type === 'error') { logEntry.style.color = 'red'; logEntry.innerHTML += `<span style="font-weight: bold;">[ERROR]</span> `; }
            else { logEntry.style.color = 'white'; }
            if (typeof message === 'object') {
                try { message = JSON.stringify(message, null, 2); } catch (e) { message = '[Object Circular Structure]'; }
                const pre = document.createElement('pre');
                pre.style.margin = '0'; pre.style.display = 'inline'; pre.textContent = message;
                logEntry.appendChild(pre);
            } else {
                const textNode = document.createTextNode(String(message));
                logEntry.appendChild(textNode);
            }
            currentConsoleOutput.appendChild(logEntry);
            currentConsoleOutput.scrollTop = currentConsoleOutput.scrollHeight;
        }

        // ✨👇 여기 바로 아래에 테스트 로그 추가 👇✨
        addLogToModal("!!! 인앱 콘솔 addLogToModal 직접 호출 테스트 !!!", "warn");
        // ✨👆 테스트 로그 추가 끝 👆✨


        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            addLogToModal(args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' '), 'log');
        };
        console.warn = function(...args) {
            originalConsoleWarn.apply(console, args);
            addLogToModal(args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' '), 'warn');
        };
        console.error = function(...args) {
            originalConsoleError.apply(console, args);
            addLogToModal(args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' '), 'error');
        };
        window.onerror = function(message, source, lineno, colno, error) {
            const errorMessage = `Uncaught Error: ${message} at ${source}:${lineno}:${colno}`;
            originalConsoleError(errorMessage, error);
            addLogToModal(errorMessage, 'error');
        };
        window.onunhandledrejection = function(event) {
            const reason = event.reason instanceof Error ? event.reason.stack || event.reason.message : String(event.reason);
            const errorMessage = `Unhandled Promise Rejection: ${reason}`;
            originalConsoleError(errorMessage);
            addLogToModal(errorMessage, 'error');
        };

        // 테스트 로그
        console.log('--- 인앱 콘솔 테스트 로그 (DOMContentLoaded) ---');

        if (clearConsoleBtn) { // clear 버튼 null 체크
             clearConsoleBtn.addEventListener('click', () => {
                 const currentConsoleOutput = document.getElementById('console-output');
                 if(currentConsoleOutput) currentConsoleOutput.innerHTML = '';
             });
        }
        // --- 인앱 콘솔 기능 끝 ---


        // --- 나머지 기존 DOMContentLoaded 코드 시작 ---
        const confirmExitModal = document.getElementById('confirm-exit-modal');

        history.pushState(null, '', location.href);

            const roomId = urlParams.get('roomId');
            const isSoloQuiz = urlParams.get('mode') === 'solo' && roomId === 'solo_quiz_temp';

            if (isSoloQuiz) {
                const game = availableGames.find(g => g.id === 'quiz');
                if (game) { window.location.replace(`${game.file}?roomId=${roomId}&mode=solo`); return; }
            }
            if (!roomId) { alert("잘못된 접근입니다."); window.location.href = '대기실.html'; return; }

            roomRef = roomsRef.child(roomId);
            roomRef.once('value', snapshot => {
                if (!snapshot.exists()) { alert("방을 찾을 수 없습니다."); window.location.href = '대기실.html'; return; }

                const roomData = snapshot.val();
                const game = availableGames.find(g => g.id === roomData.gameType);
                const playerCount = roomData.players ? Object.keys(roomData.players).length : 0;
                const isPlayerAlreadyIn = roomData.players && roomData.players[currentUser.uid];

                if (!isPlayerAlreadyIn && game && playerCount >= game.maxPlayers) { alert("방이 가득 찼습니다."); window.location.href = '대기실.html'; return; }

                isHost = roomData.hostId === currentUser.uid; // isHost 여기서 할당

                // [신규] 방장이 'lobby' 상태의 방으로 복귀한 경우,
                // 방을 'waiting' 상태로 정리합니다.
                if (isHost && roomData.status === 'lobby') {
                    console.log("방장 복귀: 'lobby' 상태를 'waiting'으로 정리합니다.");
                    roomRef.update({
                        status: 'waiting',
                        // 애니팡에서 사용한 초기화 데이터를 여기서도 동일하게 적용
                        gameStarted: false, 
                        readyPlayers: null,
                        rematchRequests: null,
                        attacks: null
                    });
                }

                const myPlayerData = {
                    nickname: myNickname, avatar: myAvatar, bombSkin: myBombSkin, isHost: isHost,
                    entryEffect: myEntryEffect, // ✨ [추가]
                    level: myLevel // ✨ [신규] 레벨 추가
                };

                roomRef.child('players/' + currentUser.uid).set(myPlayerData).then(() => {
                    listenToRoomChanges();
                }).catch(error => {
                    console.error("Error joining room:", error); alert("방 입장에 실패했습니다."); window.location.href = '대기실.html';
                });
            });
        }

                     if (!document.querySelector('.overlay.active')) { // 게임 종료 모달 등이 떠 있지 않을 때만 알림
                        alert("방이 사라졌습니다.");
                     }
                     cleanupAndExit();
                     return;
                 }
                const oldRoomData = currentRoomData;
                currentRoomData = snapshot.val();

                // ✅ 변경 코드 (위 블록 전체 교체)
if (currentRoomData.status === 'playing') {
    const game = availableGames.find(g => g.id === currentRoomData.gameType);
    if (game) {

            if(hostOnDisconnect) hostOnDisconnect.cancel();
            roomRef.onDisconnect().cancel();

            if(playerOnDisconnect) playerOnDisconnect.cancel();

        }

        window.location.href = `${game.file}?roomId=${snapshot.key}`;

}

// 🔹 [신규] 게임 종료 후 복귀 시 'lobby' 상태를 'waiting'으로 초기화
if (currentRoomData.status === 'lobby') {
            if (isHost) {
                console.log("[게임방] 'lobby' 상태 감지. 'waiting'으로 초기화.");
                roomRef.update({
                    status: 'waiting',
            gameStarted: false,

        });
    }
   return;
}

                if (!currentRoomData.players || !currentRoomData.players[currentUser.uid]) {
                     if (!document.querySelector('.overlay.active')) {
                        alert("방에서 퇴장되었습니다.");
                     }
                     cleanupAndExit();
                     return;
                 }

                isHost = currentRoomData.hostId === currentUser.uid; // 데이터 변경 시 isHost 재확인

               // onDisconnect 설정 (Firebase 연결이 복구될 때마다 호출됨)
                setMyOnDisconnectHandler();

            roomRef.child('chat').on('child_added', snapshot => {
                const msg = snapshot.val();
                if (!msg) return;

                renderChatMessage(msg); // 1. 채팅창에 렌더링 (기존 로직)
                
                // 2. ✨ [신규] TTS로 메시지 읽어주기
                if (msg && !msg.isSystem && msg.senderId !== currentUser.uid && synthesis && isTTSOn) {
                    // 시스템 메시지가 아니고, 내가 보낸게 아니고, TTS가 지원되고, ✨새로운 토글(isTTSOn)이 켜져있다면
                    try {
                        // 이전에 읽던게 있으면 중지
                        if (synthesis.speaking) {
                            synthesis.cancel(); 
                        }
                        
                        // --- [수정] '단축어 번역' 함수를 거친 텍스트로 읽기 ---
                        const processedText = preprocessTextForTTS(msg.content);
                        const utterance = new SpeechSynthesisUtterance(processedText);
                        
                        // --- [수정] 저장된 목소리 적용 ---
                        const savedVoiceURI = localStorage.getItem(TTS_VOICE_KEY);
                        if (savedVoiceURI) {
                            // voiceList는 populateVoiceList() 함수에서 이미 채워짐
                            const savedVoice = voiceList.find(v => v.voiceURI === savedVoiceURI);
                            if (savedVoice) {
                                utterance.voice = savedVoice;
                            }
                        }
                        // --- [수정] 끝 ---
                        
                        utterance.lang = 'ko-KR';
                        utterance.rate = 1.1; // 조금 빠르게
                        synthesis.speak(utterance);
                    } catch (e) {
                        console.error("TTS 실행 오류:", e);
                    }
                }
            });
        }

        function handlePlayerChanges(oldPlayers) {
            const currentPlayers = currentRoomData.players || {};
            const oldPlayerIds = Object.keys(oldPlayers);
            const currentPlayerIds = Object.keys(currentPlayers);
            const joined = currentPlayerIds.filter(id => !oldPlayerIds.includes(id));
            const left = oldPlayerIds.filter(id => !currentPlayerIds.includes(id));

            joined.forEach(id => {
                const joinedPlayer = currentPlayers[id]; // ✨ [수정]
                if (id !== currentUser.uid && oldPlayerIds.length > 0) {
                    addSystemMessage(`${joinedPlayer.nickname}님이 입장했습니다.`);
                    playSound('enter-sound');
                    vibrate();
                    // ✨ [신규] 접속한 유저가 친구인지 확인
                    if (myFriendIds[id]) {
                        showToast(`🔔 ${escapeHTML(joinedPlayer.nickname)}님이 접속했어요!`);
                    }
                    // ✨ [제거] 입장 이펙트 재생 (updateUI가 처리)
                    // playEntryEffect(id, joinedPlayer.entryEffect);
                }
            });
            left.forEach(id => {
                const leftPlayerNickname = oldPlayers[id]?.nickname;
                 if (leftPlayerNickname) {
                    addSystemMessage(`${leftPlayerNickname}님이 퇴장했습니다.`);
                    playSound('leave-sound');
                    vibrate();
                 }
            });
       }

        function renderChatMessage(msg) {
            if (!msg) return;
            const msgEl = document.createElement('div');

            if (msg.isSystem) {
                msgEl.className = 'system-message';
                msgEl.textContent = msg.content;
            } else {
                // ✨ 수정: currentRoomData와 players가 존재하는지 먼저 확인
                if (!currentRoomData || !currentRoomData.players) {
                    console.warn("renderChatMessage: currentRoomData.players가 아직 준비되지 않았습니다. 메시지:", msg);
                    return; // players 데이터 없으면 렌더링 중단
                }

                const senderInfo = currentRoomData.players[msg.senderId];
                if (!senderInfo) {
                    console.warn("renderChatMessage: senderInfo를 찾을 수 없습니다. senderId:", msg.senderId);
                    // 알 수 없는 사용자 처리 (선택 사항)
                    // msgEl.innerHTML = `<div><strong>Unknown:</strong> ${escapeHTML(msg.content)}</div>`;
                    return; // senderInfo 없으면 중단
                }

                msgEl.className = 'chat-message';
                if (msg.senderId === currentUser.uid) msgEl.classList.add('my-message');

                const avatarSet = AVATAR_SETS[senderInfo.avatar];
                let avatarHTML = '';
                if (avatarSet) {
                    avatarHTML = `<img src="${avatarSet.front}" alt="avatar">`;
                } else if (senderInfo.avatar && (senderInfo.avatar.startsWith('http') || /\.(png|jpg|jpeg|gif|webp)$/i.test(senderInfo.avatar))) {
                    avatarHTML = `<img src="${senderInfo.avatar}" alt="avatar">`;
                } else {
                    avatarHTML = senderInfo.avatar || '❓'; // 기본값
                }
                msgEl.innerHTML = `
                    <div class="sender-avatar">${avatarHTML}</div>
                    <div class="msg-body">
                        <div class="sender">${escapeHTML(senderInfo.nickname || 'Unknown')}</div>
                        <div class="content">${escapeHTML(msg.content)}</div>
                    </div>`;
            }

            // ✨ chatContainer가 존재하는지 확인 후 추가
            const chatContainer = document.getElementById('chat-container'); // chatContainer 변수 다시 정의 또는 전역/상위 스코프 사용
            if (chatContainer) {
                chatContainer.appendChild(msgEl);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } else {
                console.error("renderChatMessage: chatContainer 요소를 찾을 수 없습니다.");
            }
        }

      // [신규] TTS가 읽기 전에 텍스트를 변환하는 함수 상용구
        function preprocessTextForTTS(text) {
            // 1. ㅋ/ㅎ (웃음소리)는 문장 중간에 있어도 변환
            // (최소 2개 이상 연속될 때만)
            let processedText = text.replace(/ㅋ{2,}/g, '크크크'); // ㅋㅋㅋ -> 크크크
            processedText = processedText.replace(/ㅎ{2,}/g, '흐흐흐'); // ㅎㅎㅎ -> 흐흐흐

            // 2. 단축어는 "메시지 전체"가 일치할 때만 변환 (오작동 방지)
            // (예: "새우ㅇㅇ"가 "새우응응"이 되는 것을 방지)
            if (processedText === 'ㅎㅇ') return '하이';
            if (processedText === 'ㅇㅇ') return '이응이응'; // '이응이응'보다 대화의 뜻(Yes)에 맞게 '응응'으로 변환합니다.
            if (processedText === 'ㄱㄱ') return '고고';
            if (processedText === 'ㄴㄴ') return '노노'; // (자주 쓰이는 것 추가)
            if (processedText === 'ㅈㅅ') return '죄송'; // (자주 쓰이는 것 추가)
            if (processedText === 'ㅋㅋㅋㅋ') return '크크크크'; // (자주 쓰이는 것 추가)
                        if (processedText === 'ㅋㅋㅋㅋㅋ') return '크크크크'; // (자주 쓰이는 것 추가)
                        if (processedText === '온대?') return '잘생긴 오빠 온대?'; // (자주 쓰이는 것 추가)

            // 3. 웃음소리만 변환되었거나, 변환이 필요 없는 텍스트 반환
            return processedText;
        }

        // [신규] TTS 엔진을 "깨우는" (Prime) 함수
        // (iOS/Safari에서 고품질 음성 목록을 불러오기 위한 핵/트릭)
        function primeTTSEngine() {
            if (!synthesis) return;
            
            // .speak()를 한 번 호출해야만
            // 비동기적으로 로드되는 전체 음성 목록이 'onvoiceschanged' 이벤트를 트리거합니다.
            const emptyUtterance = new SpeechSynthesisUtterance('');
            emptyUtterance.lang = 'ko-KR';
            
            // 에러가 나도 무시합니다 (자동재생 정책 등)
            try {
                // (참고) 이 시점에 synthesis.pause(), synthesis.resume()을
                // 호출해야만 목록이 로드되는 구형 안드로이드 기기도 있습니다.
                synthesis.pause();
                synthesis.resume();
                synthesis.speak(emptyUtterance);
            } catch (e) {
                console.warn("TTS 엔진 '깨우기' 실패 (자동재생 정책일 수 있음):", e);
            }
        }

        function sendMessage(content) {
            const message = content.trim();
            if (message && roomRef) { // roomRef null 체크
                roomRef.child('chat').push({
                    senderId: currentUser.uid, senderNickname: myNickname, content: message, timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
        }

        function startGame() {
            if (!isHost || !currentRoomData) return; // currentRoomData null 체크
            const game = availableGames.find(g => g.id === currentRoomData.gameType);
            if (!game) return;

            console.log('[게임방] 게임 시작 - gameType:', game.id);
            const playerIds = Object.keys(currentRoomData.players || {}); // null 체크
            const updates = {};

          if (game.id === 'reversi') {
                // [리버시] 초기화
                const initialBoard = Array(64).fill(null);
                initialBoard[27] = 'white'; initialBoard[28] = 'black';
                initialBoard[35] = 'black'; initialBoard[36] = 'white';

                playerIds.sort(() => Math.random() - 0.5); // 흑/백 랜덤 배정
                
                updates['players/' + playerIds[0] + '/color'] = 'black';
                updates['players/' + playerIds[1] + '/color'] = 'white';
                
                updates.board = initialBoard;
                updates.turn = 'black'; // 흑돌(black)이 선공
                updates.passedTurn = false;
                updates.lastMove = null;

            } else if (game.id === 'memoryGame') {
                // ✨ [채움] 메모리 게임 초기화
                const pairCount = playerIds.length <= 2 ? 8 : 10; // 2명=16장(4x4), 3~4명=20장(5x4)
                const cards = generateCards(pairCount);
                updates.board = cards;
                updates.turn = playerIds[0]; // 방장부터
                updates.scores = {};
                playerIds.forEach(id => { updates.scores[id] = 0; });
                updates.flippedIndices = [];
                updates.matchedPairs = 0;
                updates.lastPlayer = null; // [추가] 연속 턴 처리를 위한 변수

            } else if (game.id === 'indianpoker') {
                // ✨ [채움] 인디언 포커 초기화 (칩 세팅)
                updates.gameState = {};
                playerIds.forEach(id => {
                    updates.gameState[id] = {
                        chips: 30, // 1인당 기본 칩
                        hand: null,
                        bet: 0,
                        status: 'ready' // 'ready', 'betting', 'folded'
                    };
                });
                updates.turn = playerIds[0];
                updates.pot = 0;
                updates.round = 1;
                updates.deck = null; // 덱은 인디언포커.html에서 생성

            } else if (game.id === 'bomber') {
                // ✨ [채움] 봄버맨 초기화 (플레이어 번호 할당)
                // 봄버맨.html에서 이 번호를 보고 시작 위치를 결정합니다.

        function generateCards(pairCount) {
            // 아이콘/이미지 등 (필요에 따라 추가)
            const icons = [
                '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯',
                '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦅'
            ]; // 20종류
            
            const pairs = [];
            for (let i = 0; i < pairCount; i++) {
                const icon = icons[i % icons.length];
                pairs.push(icon, icon); // 아이콘을 2개씩 넣음
            }

            // Fisher-Yates shuffle
            for (let i = pairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
            }
            
            // Firebase에 저장할 카드 객체 배열 생성
            return pairs.map((icon, index) => ({
                id: index,
                icon: icon,
                isFlipped: false,
                isMatched: false
            }));
        }

        async function loadAndShowInviteModal() {
            friendInviteModal.classList.add('active');
            friendInviteListContainer.innerHTML = '<div class="spinner" style="margin: 30px auto;"></div>';

            try {
                // [수정] 1. 친구 목록 가져오기 제거

                // 2. 현재 접속자 목록 가져오기
                const presenceSnap = await presenceRef.once('value');
                if (!presenceSnap.exists()) {
                    friendInviteListContainer.innerHTML = '<p style="text-align:center; padding: 20px;">현재 접속 중인 유저가 없습니다.</p>';
                    return;
                }
                const onlineUserIds = Object.keys(presenceSnap.val());
                
                // 3. 현재 방에 있는 유저 목록
                const playerIdsInRoom = Object.keys(currentRoomData.players || {});

                // 4. [수정] 필터링: (접속중 && 이 방에 없음)
                const targetUids = onlineUserIds.filter(uid => 
                    // myFriendIds[uid] &&  <-- 친구 조건 제거
                    uid !== currentUser.uid &&              // 내가 아니고
                    !playerIdsInRoom.includes(uid)          // 이 방에 없고
                );

                if (targetUids.length === 0) {
                    friendInviteListContainer.innerHTML = '<p style="text-align:center; padding: 20px;">초대할 유저가 없습니다.</p>';
                    return;
                }

                // 5. 프로필 정보 가져오기
                const profilePromises = targetUids.map(uid => usersRef.child(uid).child('profile').once('value'));
                const profileSnapshots = await Promise.all(profilePromises);

                friendInviteListContainer.innerHTML = ''; // 목록 비우기
                profileSnapshots.forEach((snap, index) => {
                    if (snap.exists()) {
                        const profile = snap.val();
                        const uid = targetUids[index];
                        const itemEl = createInviteListItem(uid, profile);
                        friendInviteListContainer.appendChild(itemEl);
                    }
                });

            } catch (error) {
                console.error("초대 목록 로드 실패:", error);
                friendInviteListContainer.innerHTML = '<p style="text-align:center; padding: 20px;">목록을 불러오는 중 오류가 발생했습니다.</p>';
            }
        }

        // 4. 초대 목록 아이템 생성
        function createInviteListItem(uid, profile) {
            const itemEl = document.createElement('div');
            itemEl.className = 'user-list-item';

            const avatarSet = AVATAR_SETS[profile.avatar];
            let avatarHTML = '';
            if (avatarSet) { avatarHTML = `<img src="${avatarSet.front}" alt="av">`; }
            else if (profile.avatar && (profile.avatar.startsWith('http') || profile.avatar.includes('.'))) { avatarHTML = `<img src="${profile.avatar}" alt="av">`; }
            else { avatarHTML = escapeHTML(profile.avatar || '❓'); }

            itemEl.innerHTML = `
                <div class="user-list-avatar">${avatarHTML}</div>
                <div class="user-list-nickname">${escapeHTML(profile.nickname)}</div>
                <div class="user-item-actions">
                    <button class="menu-btn user-action-btn secondary" data-action="invite" data-uid="${uid}" data-nickname="${escapeHTML(profile.nickname)}">초대</button>
                </div>
            `;

            // 5. 초대 버튼에 리스너 추가
            itemEl.querySelector('[data-action="invite"]').addEventListener('click', (e) => {
                const btn = e.currentTarget;
                const targetUid = btn.dataset.uid;

                btn.disabled = true;
                btn.textContent = '초대됨';
                btn.classList.remove('secondary');
                btn.classList.add('light');

                    room_id: roomRef.key,
                    room_name: currentRoomData.roomName,
                    game_name: game ? game.name : '알 수 없는 게임',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };
                
                // Firebase에 초대장 전송
                db.ref(`invitations/${targetUid}`).push(inviteData)
                    .then(() => {
                        showToast(`${targetNickname}님을 초대했습니다.`);
                        friendInviteModal.classList.remove('active'); // <-- [신규] 이 줄을 추가하세요

                        showToast('초대 전송에 실패했습니다.');

                        btn.disabled = false; // 실패 시 버튼 복구
                        btn.textContent = '초대';
                        btn.classList.remove('light');
                        btn.classList.add('secondary');
                    });
            });

            return itemEl;
        }
