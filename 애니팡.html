<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>캔디솝 (4인 대전)</title> <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* ------------------------- */
        /* == 1. 앱 공통 테마 (대기실.html 기반) == */
        /* ------------------------- */
        :root {
            --bg-color: #FFFBEB; /* 따뜻한 크림색 배경 */
            --primary-color: #FF6B6B; /* 활기찬 코랄색 */
            --secondary-color: #4ECDC4; /* 상쾌한 틸(teal)색 */
            --accent-color: #FFD93D; /* 밝은 노란색 */
            --text-color-dark: #574141; /* 어두운 갈색 */
            --text-color-light: #ffffff;
            --danger-color: #F76363; /* [수정] 시간 부족 시 색상 */
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2; /* 연한 베이지색 테두리 */
            --panel-shadow: #E4DCCF; /* 패널 그림자 */
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color); /* [테마] */
            color: var(--text-color-dark); /* [테마] */
            display: flex; flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }

        /* ------------------------- */
        /* == 2. 게임 레이아웃 (멀티용 수정) == */
        /* ------------------------- */
        #game-wrapper { 
            width: 100%; height: 100%; 
            max-width: 450px; 
            display: flex; flex-direction: column; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* [멀티용 수정] 헤더 스타일 변경 (4인 스코어보드) */
        .page-header {
            width: 100%; padding: 10px; flex-shrink: 0;
            background: #FFFAE0;
            border-bottom: 3px solid var(--panel-border);
            display: flex; 
            flex-direction: column; /* [수정] 세로 정렬 */
            gap: 8px;
        }

        #multiplayer-scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2x2 그리드 */
            gap: 8px;
            width: 100%;
        }

        /* [수정] .stat-box는 4인용 점수판 */
        .stat-box {
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 5px;
            text-align: center;
            font-weight: 900;
            transition: all 0.2s ease;
            overflow: hidden; /* [신규] 닉네임 길 때 */
        }
        /* [신규] 내 점수판 강조 */
        .stat-box.my-score {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            transform: scale(1.05);
        }

        .stat-box .label {
            font-size: 0.8em; /* [수정] 닉네임 */
            color: #9A6A3A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }
        .stat-box .value {
            font-size: 1.4em; /* [수정] 점수 */
            color: var(--primary-color);
        }

        /* [신규] 타이머는 중앙에 별도 배치 */
        #timer-container {
            width: 120px;
            text-align: center;
            font-weight: 900;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 5px;
            margin: 0 auto; /* [신규] 중앙 정렬 */
        }
        #timer-container .label {
            font-size: 0.9em;
            color: #9A6A3A;
        }
        #timer-container .value {
            font-size: 1.8em; /* [수정] */
            color: var(--primary-color);
            transition: color 0.3s ease;
        }
        #timer-container .value.danger-time {
            /* [수정] 기존 .stat-box .value.danger-time -> #timer-container .value.danger-time */
            color: var(--danger-color);
            animation: throb 1.2s infinite ease-in-out;
        }
        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }


        /* 게임 메인 컨테이너 (기존과 동일) */
        #game-container {
            width: 100%; flex-grow: 1; 
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
            padding: 10px; 
        }
        #game-board {
            position: relative; 
            background-color: var(--panel-bg); /* [테마] */
            border: 3px solid var(--text-color-dark); /* [테마] */
            box-shadow: 6px 6px 0px 0px var(--panel-shadow); /* [테마] */
            border-radius: 12px;
            display: grid; 
            gap: 2px; /* 타일 간격 */
            padding: 4px; /* 보드 내부 여백 */
            touch-action: none; /* [중요] 드래그를 위해 */
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ------------------------- */
        /* == 3. 타일 스타일 (기존과 동일) == */
        /* ------------------------- */
        .tile {
            background-color: #FFFEF5; 
            border-radius: 10px; 
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5em; /* JS에서 조절 */
            cursor: pointer;
            border: 1px solid var(--panel-border);
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.15), 
                        inset -2px -2px 4px rgba(255, 255, 255, 0.7);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            aspect-ratio: 1 / 1;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.2s ease,
                        box-shadow 0.2s ease;
        }
        .tile:active {
            box-shadow: inset 1px 1px 2px rgba(87, 65, 65, 0.2), 
                        inset -1px -1px 2px rgba(255, 255, 255, 0.7);
            transform: scale(0.95);
        }
        .tile.pop { animation: pop 0.3s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(0.1); opacity: 0; }
        }
        .tile.fall { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tile.new { animation: new-tile 0.3s ease-out; }
        @keyframes new-tile {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .tile.swap { transition: transform 0.2s ease-in-out; z-index: 10; }
        .tile.invalid { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* ------------------------- */
        /* == 4. 모달 (기존과 동일) == */
        /* ------------------------- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; 
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: var(--panel-bg); 
            color: var(--text-color-dark); 
            padding: 0; 
            border-radius: 24px;
            width: 90%; max-width: 400px; 
            box-shadow: 8px 8px 0px 0px var(--text-color-dark);
            overflow: hidden; 
            border: 4px solid var(--text-color-dark);
        }
        .modal-header { 
            background-color: var(--primary-color);
            color: white; 
            padding: 15px; 
            border-bottom: 4px solid #C04A4A; 
        }
        .modal-header h2 { font-size: 1.6em; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .modal-body { padding: 25px; }
        .modal-footer {
            display: flex; gap: 10px;
            padding: 20px;
            border-top: 3px solid var(--panel-border);
            background-color: #FFFAE0;
        }

        /* 스피너/카운트다운 (유지) */
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown-number { font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7); animation: countdown-pop 1s; }
        @keyframes countdown-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 점수판 (멀티용 수정) */
        #final-score {
            font-size: 2.0em; /* [멀티용 수정] 크기 살짝 줄임 */
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 0px; /* [멀티용 수정] */
        }
        /* [멀티용 신규] 순위 리스트 */
        #final-ranking-list {
            text-align: left;
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* ------------------------- */
        /* == 5. 아케이드 버튼 (기존과 동일) == */
        /* ------------------------- */
        .menu-btn { 
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: 900; 
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer; 
            transition: all 0.1s ease-out;
            border-bottom: 5px solid; /* 3D 효과 */
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            margin: 5px 0; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .menu-btn.primary { 
            background-color: var(--primary-color);
            color: white; 
            border-bottom-color: #C04A4A;
        }
        .menu-btn.secondary { 
            background-color: var(--secondary-color);
            color: white; 
            border-bottom-color: #379A93;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div class="page-header" id="multi-header">
            <div id="multiplayer-scoreboard">
                <div class="stat-box"><div class="label">플레이어 1</div><div class="value">0</div></div>
                <div class="stat-box"><div class="label">플레이어 2</div><div class="value">0</div></div>
                <div class="stat-box"><div class="label">플레이어 3</div><div class="value">0</div></div>
                <div class="stat-box"><div class="label">플레이어 4</div><div class="value">0</div></div>
            </div>
            <div id="timer-container">
                <div class="label">시간</div>
                <div class="value" id="timer-value">60</div>
            </div>
        </div>

        <div id="game-container">
            <div id="game-board">
                </div>
        </div>
    </div>

    <div id="loading-overlay" class="overlay active">
        <div class="spinner"></div>
        <p style="color: white; font-size: 1.2em;">방에 접속 중입니다...</p>
    </div>

    <div id="info-overlay" class="overlay"> <div id="countdown-number">3</div>
    </div>

    <div id="game-over-overlay" class="overlay">
         <div class="modal-content">
             <div class="modal-header">
                 <h2>게임 종료!</h2>
             </div>
             <div class="modal-body">
                <p id="final-rank-title" style="font-size: 1.2em; margin-bottom: 15px;">🏆 최종 순위 🏆</p>
                <div id="final-ranking-list">
                   </div>
                <hr style="margin: 15px 0; border: 1px solid var(--panel-border);">
                <p style="font-size: 1.1em; font-weight: 700;">내 점수</p>
                <p id="final-score" style="margin-bottom: 0;">0</p>
             </div>
             <div class="modal-footer">
                 <button id="restart-btn" class="menu-btn secondary">대기실로</button>
                 <a href="대기실.html" class="menu-btn primary">나가기</a>
             </div>
         </div>
    </div>

    <audio id="swap-sound" src="./sounds/move.wav" preload="auto"></audio>
    <audio id="match-sound" src="./봄버맨사운드/사천성맞춤.mp3" preload="auto"></audio>
    <audio id="gameover-sound" src="./봄버맨사운드/패배.mp3" preload="auto"></audio>
    <audio id="combo1-sound" src="./sounds/combo1.mp3" preload="auto"></audio>
    <audio id="combo2-sound" src="./sounds/combo2.mp3" preload="auto"></audio>
    <audio id="combo3-sound" src="./sounds/combo3.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // F12/개발자 도구 허용
            // document.addEventListener('contextmenu', event => event.preventDefault());

            // ------------------------------------
            // 1. DOM 요소 및 기본 설정
            // ------------------------------------

            // DOM
            const gameBoard = document.getElementById('game-board');
            const timerValue = document.getElementById('timer-value'); // [수정] 타이머 위치 변경됨
            const infoOverlay = document.getElementById('info-overlay');
            const countdownNumber = document.getElementById('countdown-number');
            const gameOverOverlay = document.getElementById('game-over-overlay');
            const finalScoreEl = document.getElementById('final-score');
            const restartBtn = document.getElementById('restart-btn');
            const gameContainer = document.getElementById('game-container'); 
            const loadingOverlay = document.getElementById('loading-overlay'); // [멀티용 신규]
            const multiplayerScoreboard = document.getElementById('multiplayer-scoreboard'); // [멀티용 신규]
            const finalRankingList = document.getElementById('final-ranking-list'); // [멀티용 신규]
            const timerDisplay = document.getElementById('timer-container').querySelector('.value'); // [멀티용 신규]

            // 사운드 (기존과 동일)
            const sounds = {
                swap: document.getElementById('swap-sound'),
                match: document.getElementById('match-sound'),
                gameOver: document.getElementById('gameover-sound'),
                combo: [
                    document.getElementById('combo1-sound'),
                    document.getElementById('combo2-sound'),
                    document.getElementById('combo3-sound')
                ]
            };

            // 게임 설정 (기존과 동일)
            const ROWS = 10;
            const COLS = 6;
            const TILE_EMOJIS = ['🍓', '🍊', '🍋', '🍉', '🍇', '🍒']; // 6종류
            const GAME_TIME = 60; // 60초

            // 게임 상태 변수
            let board = []; 
            let tileElements = []; 
            let score = 0;
            let timer = GAME_TIME;
            let timerId = null;
            let isProcessing = true; // [멀티용 수정] 게임 시작 전까지 true
            let currentCombo = 0;
            // let highScore = ... // [멀티용 삭제] 최고기록 불필요

            // 드래그 상태 변수 (기존과 동일)
            let dragStartTile = null;
            let dragStartX = 0;
            let dragStartY = 0;

            // ------------------------------------
            // 2. Firebase (멀티플레이 모드)
            // ------------------------------------
            
            // [멀티용 신규] Firebase 상태 변수
            let db, auth;
            let currentRoomId = null;
            let currentUser = null;
            let playerUid = null;
            let playerRef = null; // 내 플레이어 객체 (nickname, score, isFinished)
            let roomRef = null; // 현재 방 (status)
            let allPlayersRef = null; // 방 안의 모든 플레이어 (점수판 동기화용)
            let playerNicknames = new Map(); // [신규] UID와 닉네임 매핑

            // [멀티용 수정] Firebase 초기화 (주석 해제 및 활성화)
            const firebaseConfig = {
                apiKey: "AIzaSyCmNAKmgF_L3o0QyOGh_oFAq_rMRtUyklw",
                authDomain: "goodluck-7c14b.firebaseapp.com",
                databaseURL: "https://goodluck-7c14b-default-rtdb.firebaseio.com",
                projectId: "goodluck-7c14b",
                storageBucket: "goodluck-7c14b.appspot.com",
                messagingSenderId: "858281658455",
                appId: "1:858281658455:web:9131280a459be983933b12"
            };
            
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                auth = firebase.auth();
            } catch (e) {
                console.error("Firebase 초기화 실패:", e);
                loadingOverlay.innerHTML = "<p style='color: white;'>Firebase 연결 실패!</p>";
                return;
            }

            // [멀티용 수정] 게임 시작 지점: 인증 상태 변경
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    playerUid = user.uid;
                    console.log("Firebase 인증 성공:", playerUid);

                    // URL에서 방 ID 파싱
                    const urlParams = new URLSearchParams(window.location.search);
                    const roomId = urlParams.get('roomId');
                    
                    if (roomId) {
                        joinGameRoom(roomId);
                    } else {
                        console.error("방 ID가 없습니다.");
                        loadingOverlay.innerHTML = "<p style='color: white;'>잘못된 접근입니다. (방 ID 없음)</p>";
                    }
                } else {
                    console.error("Firebase 인증 실패. 로그인이 필요합니다.");
                    // (로그인 페이지로 리디렉션)
                    window.location.href = 'index.html'; // 예시: 로그인 페이지
                }
            });

            // [멀티용 신규] 게임 방 참여 및 리스너 설정
            function joinGameRoom(roomId) {
                currentRoomId = roomId;
                roomRef = db.ref('gameRooms').child(currentRoomId);
                allPlayersRef = roomRef.child('players');
                playerRef = allPlayersRef.child(playerUid);

                const myNickname = currentUser.displayName || `Player${playerUid.substring(0, 4)}`;

                // 1. 내 정보 등록 (점수, 닉네임, 상태) 및 연결 종료 처리
                playerRef.set({
                    nickname: myNickname,
                    score: 0,
                    isFinished: false // 게임 시작 전
                });
                playerRef.onDisconnect().remove();

                // 2. [리스너] 다른 플레이어 정보(점수) 실시간 감시 -> 스코어보드 UI 업데이트
                allPlayersRef.on('value', (snapshot) => {
                    const players = snapshot.val();
                    if (players) {
                        updateScoreboardUI(players);
                    }
                });

                // 3. [리스너] 방 상태 감시 -> 게임 시작/종료 트리거
                roomRef.child('status').on('value', (snapshot) => {
                    const status = snapshot.val();
                    console.log("방 상태 변경:", status);

                    if (status === 'playing' && !timerId && !gameOverOverlay.classList.contains('active')) {
                        // "playing" 신호를 받으면 카운트다운 시작
                        loadingOverlay.classList.remove('active'); // 로딩창 끄기
                        startCountdown();
                    } else if (status === 'finished') {
                        // 방장이 게임 종료를 선언함
                        forceGameOver();
                    }
                });

                // 4. 로딩 완료 (서버 신호 대기)
                loadingOverlay.querySelector('p').textContent = "다른 플레이어를 기다리는 중...";
                // 참고: 실제로는 대기실 앱에서 4명이 다 차면 status를 'playing'으로 변경해야 함
            }

            // [멀티용 신규] 4인용 스코어보드 UI 업데이트
            function updateScoreboardUI(players) {
                multiplayerScoreboard.innerHTML = ''; // 스코어보드 비우기
                playerNicknames.clear(); // 닉네임 맵 초기화

                // players 객체를 순회하며 닉네임 저장 및 UI 생성
                for (const uid in players) {
                    const player = players[uid];
                    const nickname = player.nickname || 'Unknown';
                    const score = player.score || 0;
                    
                    playerNicknames.set(uid, nickname); // UID로 닉네임 저장 (결과창용)

                    const statBox = document.createElement('div');
                    statBox.className = 'stat-box';
                    statBox.dataset.uid = uid;

                    if (uid === playerUid) {
                        statBox.classList.add('my-score'); // 내 점수판 강조
                    }

                    statBox.innerHTML = `
                        <div class="label">${nickname}</div>
                        <div class="value" id="score-value-${uid}">${score.toLocaleString()}</div>
                    `;
                    multiplayerScoreboard.appendChild(statBox);
                }
            }


            // ------------------------------------
            // 3. 게임 초기화 (로직 동일, 호출 시점 변경)
            // ------------------------------------

            function initGame() {
                // 상태 초기화
                score = 0;
                timer = GAME_TIME;
                currentCombo = 0;
                isProcessing = true; // [중요] 카운트다운 중이므로

                // UI 초기화
                timerValue.textContent = GAME_TIME;
                timerDisplay.classList.remove('danger-time');
                gameOverOverlay.classList.remove('active');
                
                // [멀티용 신규] Firebase 점수도 0점으로 초기화
                if (playerRef) {
                    playerRef.child('score').set(0);
                    playerRef.child('isFinished').set(false);
                }

                // 보드 생성
                createBoardData();
                renderBoard();
            }

            // (createBoardData, getRandomEmoji, renderBoard 함수는 솔로 모드와 100% 동일)
            function createBoardData() {
                board = [];
                for (let r = 0; r < ROWS; r++) {
                    const row = [];
                    for (let c = 0; c < COLS; c++) {
                        let newEmoji;
                        do {
                            newEmoji = getRandomEmoji();
                        } while (
                            (c >= 2 && newEmoji === row[c - 1] && newEmoji === row[c - 2]) ||
                            (r >= 2 && newEmoji === board[r - 1][c] && newEmoji === board[r - 2][c])
                        );
                        row.push(newEmoji);
                    }
                    board.push(row);
                }
                const initialMatches = findAllMatches();
                if (initialMatches.size > 0) {
                    console.log("초기 매치 발견! 보드 재생성...");
                    createBoardData(); 
                }
            }
            function getRandomEmoji() {
                return TILE_EMOJIS[Math.floor(Math.random() * TILE_EMOJIS.length)];
            }
            function renderBoard() {
                gameBoard.innerHTML = '';
                tileElements = [];
                const containerW = gameContainer.clientWidth;
                const containerH = gameContainer.clientHeight;
                if (containerW === 0 || containerH === 0) { return; }
                const gap = 2;
                const boardPadding = 4;
                const containerPadding = 10;
                const availableW = containerW - (containerPadding * 2);
                const availableH = containerH - (containerPadding * 2);
                const tileW_calc = (availableW - (boardPadding * 2) - (COLS - 1) * gap) / COLS;
                const tileH_calc = (availableH - (boardPadding * 2) - (ROWS - 1) * gap) / ROWS;
                const tileSize = Math.floor(Math.min(tileW_calc, tileH_calc));
                if (tileSize <= 0) { return; }
                const finalBoardW = (tileSize * COLS) + (COLS - 1) * gap + (boardPadding * 2);
                gameBoard.style.width = `${finalBoardW}px`;
                gameBoard.style.height = 'auto'; 
                gameBoard.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
                const iconSize = tileSize * 0.7; 
                for (let r = 0; r < ROWS; r++) {
                    const rowElements = [];
                    for (let c = 0; c < COLS; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.dataset.row = r;
                        tile.dataset.col = c;
                        tile.textContent = board[r][c];
                        tile.style.fontSize = `${iconSize}px`; 
                        gameBoard.appendChild(tile);
                        rowElements.push(tile);
                        tile.addEventListener('pointerdown', handleDragStart);
                    }
                    tileElements.push(rowElements);
                }
            }


            // ------------------------------------
            // 4. 게임 시작/종료 (멀티용 로직 수정)
            // ------------------------------------

            function startCountdown() {
                if (infoOverlay.classList.contains('active')) return; // 중복 실행 방지

                infoOverlay.classList.add('active');
                let count = 3;
                countdownNumber.textContent = count;

                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownNumber.textContent = count;
                    } else if (count === 0) {
                        countdownNumber.textContent = 'GO!';
                    } else {
                        clearInterval(interval);
                        infoOverlay.classList.remove('active');

                        setTimeout(() => {
                            initGame();  // 보드 생성 및 점수/상태 0으로 초기화
                            startGame(); // 타이머 시작 및 입력 활성화
                        }, 0); // DOM 렌더링 후 즉시 실행
                    }
                }, 1000);
            }

            function startGame() {
                if (tileElements.length === 0) {
                    renderBoard();
                }
                if (tileElements.length === 0) {
                    console.error("보드 렌더링에 최종 실패했습니다.");
                    return; 
                }

                isProcessing = false; // [중요] 이제부터 입력 받음
                timerId = setInterval(() => {
                    timer--;
                    timerValue.textContent = timer;

                    if (timer <= 10) {
                        timerDisplay.classList.add('danger-time');
                    }

                    if (timer <= 0) {
                        gameOver(); // [멀티용 수정] 타이머 0 되면 로컬 게임 오버
                    }
                }, 1000);
            }

            // [멀티용 수정] (로컬) 게임 종료: 내 상태만 Firebase에 알림
            function gameOver() {
                if (isProcessing) return; // 중복 호출 방지
                
                isProcessing = true; 
                clearInterval(timerId);
                timerId = null; // 타이머 ID 초기화
                timerDisplay.classList.remove('danger-time'); 
                timerValue.textContent = '0';
                playSound('gameOver');

                // [멀티용 신규] 나의 상태를 '종료됨'으로 Firebase에 알림
                if (playerRef) {
                    playerRef.child('isFinished').set(true);
                }

                // [멀티용 수정] 모달은 아직 띄우지 않음.
                // 방장(혹은 서버 로직)이 모든 플레이어의 isFinished를 감지하고
                // 방의 status를 'finished'로 바꿔주길 기다림.
                console.log("나의 게임 종료. 서버의 최종 집계 대기 중...");
                loadingOverlay.classList.add('active'); // [신규] 집계 대기 중 로딩 표시
                loadingOverlay.querySelector('p').textContent = "결과 집계 중...";
            }

            // [멀티용 신규] (글로벌) 게임 종료: 방 상태가 'finished'가 되면 호출됨
            function forceGameOver() {
                if (gameOverOverlay.classList.contains('active')) return; // 중복 방지

                // 1. 로컬 타이머/입력 확실히 정리
                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                isProcessing = true; 
                loadingOverlay.classList.remove('active');
                
                // 2. Firebase에서 '최종' 점수 데이터 1회성으로 가져오기
                allPlayersRef.once('value', (snapshot) => {
                    const players = snapshot.val();
                    if (!players) return;

                    // 3. 점수 기준으로 정렬
                    const sortedPlayers = Object.entries(players)
                        .map(([uid, data]) => ({ uid, ...data }))
                        .sort((a, b) => (b.score || 0) - (a.score || 0));

                    // 4. 순위 모달 UI 생성
                    finalRankingList.innerHTML = '';
                    sortedPlayers.forEach((player, index) => {
                        const rank = index + 1;
                        const nickname = player.nickname || 'Unknown';
                        const score = player.score || 0;
                        
                        const p = document.createElement('p');
                        let rankText = `${rank}위: ${nickname} (${score.toLocaleString()}점)`;
                        
                        if (player.uid === playerUid) {
                            rankText = `<strong>${rankText} (YOU)</strong>`;
                            finalScoreEl.textContent = `${score.toLocaleString()} 점`; // 내 최종 점수
                        }
                        p.innerHTML = rankText;
                        finalRankingList.appendChild(p);
                    });

                    // 5. 모달 표시
                    gameOverOverlay.classList.add('active');
                });
            }


            // [멀티용 수정] '다시하기' 버튼은 '대기실로'와 동일하게 동작
            restartBtn.addEventListener('click', () => {
                window.location.href = '대기실.html';
            });

            // ------------------------------------
            // 5. 컨트롤 (드래그 앤 스왑) (기존과 100% 동일)
            // ------------------------------------

            function handleDragStart(e) {
                if (isProcessing) return;
                const tile = e.currentTarget;

                dragStartTile = {
                    row: parseInt(tile.dataset.row, 10),
                    col: parseInt(tile.dataset.col, 10),
                    el: tile
                };

                dragStartX = e.clientX || (e.touches && e.touches[0].clientX);
                dragStartY = e.clientY || (e.touches && e.touches[0].clientY);

                window.addEventListener('pointerup', handleDragEnd, { once: true });
                window.addEventListener('pointercancel', handleDragEnd, { once: true });
            }

            function handleDragEnd(e) {
                if (!dragStartTile) return;

                const dragEndX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const dragEndY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);

                const deltaX = dragEndX - dragStartX;
                const deltaY = dragEndY - dragStartY;
                const threshold = dragStartTile.el.clientWidth / 3; 

                let targetRow = dragStartTile.row;
                let targetCol = dragStartTile.col;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > threshold) {
                    targetCol += (deltaX > 0) ? 1 : -1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > threshold) {
                    targetRow += (deltaY > 0) ? 1 : -1;
                } else {
                    dragStartTile = null;
                    return;
                }

                if (targetRow < 0 || targetRow >= ROWS || targetCol < 0 || targetCol >= COLS) {
                    dragStartTile = null;
                    return;
                }

                attemptSwap(dragStartTile.row, dragStartTile.col, targetRow, targetCol);
                dragStartTile = null;
            }

            // ------------------------------------
            // 6. 게임 로직 (매치, 스왑, 폭포)
            // ------------------------------------
            
            // (attemptSwap, swapData, swapDOMElements, animateSwap, animateInvalidSwap, findAllMatches 함수는 솔로 모드와 100% 동일)
            async function attemptSwap(r1, c1, r2, c2) {
                if (isProcessing) return;
                isProcessing = true; 
                playSound('swap');
                swapData(r1, c1, r2, c2);
                await animateSwap(r1, c1, r2, c2);
                const matches = findAllMatches();
                if (matches.size > 0) {
                    currentCombo = 0; 
                    await processMatchesAndCascade(matches);
                } else {
                    await animateInvalidSwap(r1, c1, r2, c2);
                }
                isProcessing = false;
            }
            function swapData(r1, c1, r2, c2) {
                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }
            function swapDOMElements(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];
                const tempEmoji = tile1.textContent;
                tile1.textContent = tile2.textContent;
                tile2.textContent = tempEmoji;
                tile1.className = 'tile';
                tile2.className = 'tile';
            }
            function animateSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];
                tile1.classList.add('swap');
                tile2.classList.add('swap');
                const rect1 = tile1.getBoundingClientRect();
                const rect2 = tile2.getBoundingClientRect();
                const deltaX = rect1.left - rect2.left;
                const deltaY = rect1.top - rect2.top;
                tile1.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`;
                tile2.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                return new Promise(resolve => {
                    setTimeout(() => {
                        tile1.style.transform = '';
                        tile2.style.transform = '';
                        swapDOMElements(r1, c1, r2, c2); 
                        resolve();
                    }, 200); 
                });
            }
            async function animateInvalidSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1]; 
                const tile2 = tileElements[r2][c2]; 
                tile1.classList.add('invalid');
                tile2.classList.add('invalid');
                await new Promise(resolve => setTimeout(resolve, 400)); 
                swapData(r1, c1, r2, c2);
                await animateSwap(r1, c1, r2, c2);
            }
            function findAllMatches() {
                const matches = new Set();
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS - 2; c++) {
                        if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r}-${c+1}`);
                            matches.add(`${r}-${c+2}`);
                        }
                    }
                }
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS - 2; r++) {
                        if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r+1}-${c}`);
                            matches.add(`${r+2}-${c}`);
                        }
                    }
                }
                return matches;
            }
            
            // (processMatchesAndCascade 로직 동일)
            async function processMatchesAndCascade(matches) {
                if (isProcessing === false) isProcessing = true; 
                currentCombo++;
                // 1. 점수 갱신 및 사운드
                updateScore(matches.size, currentCombo); // [중요] 이 함수가 수정됨
                playComboSound(currentCombo);
                // 2. 애니메이션
                await animatePop(matches);
                // 3. 데이터 제거
                removeMatches(matches);
                // 4. 타일 내리기 (데이터)
                const { droppedTilesMap, maxDrop } = dropTiles();
                // 5. 빈 칸 채우기 (데이터)
                const newTilesMap = fillTopTiles();
                // 6. DOM 렌더링 (낙하/생성)
                await animateDrops(droppedTilesMap, newTilesMap, maxDrop);
                // 7. 연쇄 폭포
                const newMatches = findAllMatches();
                if (newMatches.size > 0) {
                    await new Promise(resolve => setTimeout(resolve, 100)); 
                    await processMatchesAndCascade(newMatches); // 재귀 호출
                } else {
                    currentCombo = 0;
                    if (!checkForPossibleMoves()) {
                        await handleNoMoreMoves();
                    }
                }
            }

            // [멀티용 수정] 점수 갱신 시 Firebase에 전송
            function updateScore(matchCount, combo) {
                const baseScore = matchCount * 10;
                const comboBonus = combo * 20;
                score += baseScore + comboBonus;
                
                // 1. 내 로컬 UI 즉시 업데이트 (my-score 클래스로 찾음)
                const myScoreValueEl = multiplayerScoreboard.querySelector('.my-score .value');
                if (myScoreValueEl) {
                    myScoreValueEl.textContent = score.toLocaleString();
                }

                // 2. [멀티용 신규] Firebase에 내 점수 즉시 업데이트
                if (playerRef) {
                    playerRef.child('score').set(score); 
                }
            }

            // (playSound, playComboSound, animatePop, removeMatches, dropTiles, fillTopTiles, animateDrops 함수는 솔로 모드와 100% 동일)
            function playSound(id) {
                try {
                    const sound = sounds[id];
                    if(sound) {
                        sound.currentTime = 0;
                        sound.play().catch(e => {});
                    }
                } catch(e) {}
            }
            function playComboSound(combo) {
                playSound('match');
                if (combo >= 1) {
                    const comboSound = sounds.combo[Math.min(combo - 1, sounds.combo.length - 1)];
                    if (comboSound) {
                        comboSound.currentTime = 0;
                        comboSound.play().catch(e => {});
                    }
                }
            }
            function animatePop(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (tileElements[r] && tileElements[r][c]) {
                        tileElements[r][c].classList.add('pop');
                    }
                });
                return new Promise(resolve => setTimeout(resolve, 300)); 
            }
            function removeMatches(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (board[r]) {
                        board[r][c] = null; 
                    }
                });
            }
            function dropTiles() {
                const droppedTilesMap = new Map(); 
                let maxDrop = 0;
                for (let c = 0; c < COLS; c++) {
                    let emptyRow = ROWS - 1; 
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] !== null) {
                            if (r !== emptyRow) {
                                board[emptyRow][c] = board[r][c];
                                board[r][c] = null;
                                droppedTilesMap.set(`${emptyRow}-${c}`, r); 
                                maxDrop = Math.max(maxDrop, emptyRow - r);
                            }
                            emptyRow--;
                        }
                    }
                }
                return { droppedTilesMap, maxDrop };
            }
            function fillTopTiles() {
                const newTilesMap = new Map(); 
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] === null) {
                            const newEmoji = getRandomEmoji();
                            board[r][c] = newEmoji;
                            newTilesMap.set(`${r}-${c}`, newEmoji);
                        }
                    }
                }
                return newTilesMap;
            }
            async function animateDrops(droppedTilesMap, newTilesMap, maxDrop) {
                droppedTilesMap.forEach((startRow, endKey) => {
                    const [endRow, col] = endKey.split('-').map(Number);
                    if (!tileElements[startRow] || !tileElements[startRow][col]) { return; }
                    const tile = tileElements[startRow][col]; 
                    tileElements[endRow][col] = tile;
                    tile.dataset.row = endRow;
                    const dropDistance = (endRow - startRow) * tile.clientHeight;
                    tile.className = 'tile fall'; 
                    tile.style.transform = `translateY(${dropDistance}px)`;
                });
                newTilesMap.forEach((emoji, key) => {
                    const [row, col] = key.split('-').map(Number);
                    if (!tileElements[row] || !tileElements[row][col]) {
                         const tile = gameBoard.querySelector(`.tile[data-row="${row}"][data-col="${col}"]`);
                         if (tile) {
                            tile.textContent = emoji;
                            tile.className = 'tile new';
                            tile.style.transform = '';
                         }
                         return;
                    }
                    const tile = tileElements[row][col]; 
                    tile.textContent = emoji;
                    tile.className = 'tile new'; 
                    tile.style.transform = ''; 
                });
                const duration = Math.min(300 + maxDrop * 50, 600);
                await new Promise(resolve => setTimeout(resolve, duration));
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (tileElements[r] && tileElements[r][c]) {
                            tileElements[r][c].className = 'tile';
                            tileElements[r][c].style.transform = '';
                        }
                    }
                }
                tileElements = [];
                const allTileElements = gameBoard.querySelectorAll('.tile');
                for (let r = 0; r < ROWS; r++) {
                    const rowElements = [];
                    for (let c = 0; c < COLS; c++) {
                        const index = r * COLS + c;
                        const el = allTileElements[index];
                        el.dataset.row = r;
                        el.dataset.col = c;
                        el.textContent = board[r][c];
                        rowElements.push(el);
                    }
                    tileElements.push(rowElements);
                }
            }

            // ------------------------------------
            // 7. 셔플 로직 (기존과 100% 동일 - 로컬 보드만 섞음)
            // ------------------------------------
            function checkForPossibleMoves() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (c < COLS - 1) {
                            if (checkMove(r, c, r, c + 1)) return true;
                        }
                        if (r < ROWS - 1) {
                            if (checkMove(r, c, r + 1, c)) return true;
                        }
                    }
                }
                return false; 
            }
            function checkMove(r1, c1, r2, c2) {
                swapData(r1, c1, r2, c2);
                const matches = findAllMatches();
                swapData(r1, c1, r2, c2); // 원위치
                return matches.size > 0;
            }
            async function handleNoMoreMoves() {
                console.log("더 이상 움직일 수 없음! 셔플합니다.");
                isProcessing = true; 
                // (TODO: 셔플 알림 UI)
                shuffleBoard();
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        tileElements[r][c].textContent = board[r][c];
                        tileElements[r][c].className = 'tile new'; 
                    }
                }
                await new Promise(resolve => setTimeout(resolve, 300));
                const matches = findAllMatches();
                if (matches.size > 0) {
                    await processMatchesAndCascade(matches);
                }
                isProcessing = false;
            }
            function shuffleBoard() {
                console.log("보드 데이터 셔플 중...");
                createBoardData(); 
            }

            // ------------------------------------
            // 8. 게임 시작 (삭제)
            // ------------------------------------
            // [멀티용 수정] DOMContentLoaded에서 startCountdown()을 호출하지 않음
            // Firebase의 onAuthStateChanged가 모든 것을 트리거함.
        });
    </script>
</body>
