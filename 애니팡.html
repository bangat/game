<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>

    <style>
        /* ------------------------- */
        /* == 1. м•ұ кіөнҶө н…Ңл§Ҳ == */
        /* ------------------------- */
        :root {
            --bg-color: #FFFBEB;
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD93D;
            --text-color-dark: #574141;
            --text-color-light: #ffffff;
            --danger-color: #F76363;
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2;
            --panel-shadow: #E4DCCF;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color-dark);
            display: flex; flex-direction: column;
            /* [мҲҳм •] л Ҳмқҙм•„мӣғ мӨ‘м•ҷ м •л ¬ */
            justify-content: flex-start; /* [мҲҳм •] center -> flex-start (мғҒлӢЁ м •л ¬) */
            align-items: center;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
            /* [мҲҳм •] bodyмқҳ нҢЁл”©мқ„ #game-wrapperлЎң мқҙлҸҷ */
            /* padding: 10px; */ 
        }

        /* ------------------------- */
        /* == 2. [мҲҳм •] кІҢмһ„ л Ҳмқҙм•„мӣғ (нҶөн•© н”„л Ҳмһ„) == */
        /* ------------------------- */
        #game-wrapper { 
            width: 100%; 
            /* height: 100%; [м ңкұ°] */
            flex-grow: 1; /* [н•өмӢ¬ мҲҳм •] bodyмқҳ лӮЁмқҖ кіөк°„мқ„ лӘЁл‘җ м°Ём§Җ (мӮ¬мІңм„ұ л°©мӢқ) */
            min-height: 0; /* [м¶”к°Җ] flex-growк°Җ 100% лҶ’мқҙмқҳ л¶ҖлӘЁм—җм„ң мҳ¬л°”лҘҙкІҢ мһ‘лҸҷн•ҳкё° мң„н•ң мөңмҶҢ лҶ’мқҙ */
            
            display: flex; flex-direction: column; 
            justify-content: flex-start; /* [мң м§Җ] мғҒлӢЁ м •л ¬ */
            align-items: center; /* [мң м§Җ] мҲҳнҸү мӨ‘м•ҷ м •л ¬ */
            
            /* [мҲҳм •] bodyмқҳ paddingмқ„ wrapperлЎң мқҙлҸҷ л°Ҹ safe-areaмҷҖ кІ°н•© */
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            padding-left: 10px;
            padding-right: 10px;
            
            position: relative; 
        }

        /* [мӢ к·ң] лӘЁл“  кІғмқ„ к°җмӢёлҠ” лӢЁмқј н”„л Ҳмһ„ */
        #game-area-frame {
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            /* [мҲҳм •] ліҙлҚ”мҷҖ мүҗлҸ„мҡ°лҘј мқҙ н”„л Ҳмһ„мңјлЎң мқҙлҸҷ */
            border: 4px solid var(--panel-border); 
            box-shadow: 6px 6px 0px 0px var(--panel-shadow);
            border-radius: 20px;
            width: 100%;
            max-width: 430px;
            /* [мҲҳм •] height: 100% лҢҖмӢ  flex-grow: 1 мӮ¬мҡ© (мӮ¬мІңм„ұкіј лҸҷмқј л°©мӢқ) */
            flex-grow: 1; /* [н•өмӢ¬ мҲҳм •] */
            /* height: 100%; (м ңкұ°) */
            /* max-height: 800px; (м ңкұ°) */
            padding: 10px;
            overflow: hidden; /* лӮҙл¶Җ мҡ”мҶҢк°Җ л‘Ҙк·ј лӘЁм„ңлҰ¬лҘј л„ҳм§Җ м•ҠлҸ„лЎқ */
            
            /* [м¶”к°Җ] flex-growк°Җ 100% лҶ’мқҙмқҳ л¶ҖлӘЁм—җм„ң мҳ¬л°”лҘҙкІҢ мһ‘лҸҷн•ҳкё° мң„н•ң мөңмҶҢ лҶ’мқҙ */
            min-height: 0; 
        }
        
        /* [мӢ к·ң] н”„л Ҳмһ„ лӮҙл¶Җмқҳ мғҲ н—ӨлҚ” (мҠӨмҪ”м–ҙліҙл“ңмҡ©) */
        #game-stats-header {
            flex-shrink: 0;
            padding-bottom: 8px;
            border-bottom: 3px solid var(--panel-border);
        }

        /* [мҲҳм •] мҠӨмҪ”м–ҙліҙл“ң (к°„кІ©/нҸ°нҠё мЎ°м Ҳ) */
        #multiplayer-scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px; /* [мҲҳм •] к°„кІ© м¶•мҶҢ */
            width: 100%;
        }

        /* [мҲҳм •] мҠӨнғҜ л°•мҠӨ (м»ҙнҢ©нҠён•ҳкІҢ) */
        .stat-box {
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 2px 5px; /* [мҲҳм •] нҢЁл”© м¶•мҶҢ */
            text-align: center;
            font-weight: 900;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .stat-box.my-score {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            transform: scale(1.02); /* [мҲҳм •] мҠӨмјҖмқј мӮҙм§қ мӨ„мһ„ */
        }
        .stat-box .label {
            font-size: 0.7em; /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
            color: #9A6A3A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }
        .stat-box .value {
            font-size: 1.2em; /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
            color: var(--primary-color);
        }

        /* [мӢ к·ң] н”„л Ҳмһ„ лӮҙл¶Җмқҳ мғҲ н‘ён„° (нғҖмқҙлЁё/кІҢмқҙм§Җмҡ©) */
        #game-stats-footer {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 8px;
            border-top: 3px solid var(--panel-border);
        }

        /* [мҲҳм •] нғҖмқҙлЁё (н•ҳлӢЁмңјлЎң мқҙлҸҷ, м»ҙнҢ©нҠён•ҳкІҢ) */
        #timer-container {
            flex-shrink: 0; /* нҒ¬кё° кі м • */
            width: 100px; /* [мҲҳм •] л„Ҳл№„ кі м • */
            text-align: center;
            font-weight: 900;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 2px 5px; /* [мҲҳм •] нҢЁл”© м¶•мҶҢ */
            margin: 0; /* [мҲҳм •] мһҗлҸҷ л§Ҳм§„ м ңкұ° */
        }
        #timer-container .label { font-size: 0.8em; color: #9A6A3A; } /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
        #timer-container .value {
            font-size: 1.6em; /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
            color: var(--primary-color);
            transition: color 0.3s ease;
        }
        #timer-container .value.danger-time {
            color: var(--danger-color);
            animation: throb 1.2s infinite ease-in-out;
        }
        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* [мҲҳм •] н”јлІ„ кІҢмқҙм§Җ (н•ҳлӢЁмңјлЎң мқҙлҸҷ, flex-grow) */
        #fever-gauge-container {
            flex-grow: 1; /* [мҲҳм •] лӮЁмқҖ кіөк°„ лӘЁл‘җ м°Ём§Җ */
            width: auto; /* [мҲҳм •] мһҗлҸҷ л„Ҳл№„ */
            max-width: none; /* [мҲҳм •] мөңлҢҖ л„Ҳл№„ м ңкұ° */
            height: 22px;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 20px;
            margin: 0; /* [мҲҳм •] мһҗлҸҷ л§Ҳм§„ м ңкұ° */
            position: relative;
            overflow: hidden;
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.1);
        }
        #fever-gauge-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            border-radius: 20px;
            transition: width 0.3s ease-out;
        }
        #fever-gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9em;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* [мҲҳм •] кІҢмһ„ м»Ён…Ңмқҙл„Ҳ (н”„л Ҳмһ„ лӮҙл¶ҖлЎң мқҙлҸҷ) */
        #game-container {
            width: 100%; 
            flex-grow: 1; /* [мҲҳм •] н•өмӢ¬: лӮЁмқҖ мҲҳм§Ғ кіөк°„ лӘЁл‘җ м°Ём§Җ */
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
            padding: 5px 0; /* [мҲҳм •] ліҙл“ң мғҒн•ҳ м—¬л°ұ 10px -> 5pxлЎң м¶•мҶҢ */
        }
        
        /* [мҲҳм •] кІҢмһ„ ліҙл“ң (мӢңк°Ғм Ғ мҡ”мҶҢ м ңкұ°) */
        #game-board {
            position: relative; 
            background-color: #FFFEF5; /* [мҲҳм •] мӮҙм§қ л°°кІҪмғү м¶”к°Җ */
            /* [мҲҳм •] н”„л Ҳмһ„мңјлЎң мқҙлҸҷ (м ңкұ°) */
            /* box-shadow: 6px 6px 0px 0px var(--panel-shadow); */ 
            /* border: none; */
            border: 2px solid var(--panel-border); /* [мҲҳм •] м–ҮмқҖ лӮҙл¶Җ н…Ңл‘җлҰ¬ */
            border-radius: 12px;
            display: grid; 
            gap: 2px;
            padding: 4px;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
        }

        /* ------------------------- */
        /* == 3. нғҖмқј мҠӨнғҖмқј (мң м§Җ) == */
        /* ------------------------- */
        .tile {
    background-color: #FFFEF5; 
    border-radius: 10px; 
    display: flex; justify-content: center; align-items: center;
    font-size: 2.5em; 
    cursor: pointer;
    border: 1px solid var(--panel-border);
    box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.15), 
                inset -2px -2px 4px rgba(255, 255, 255, 0.7);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                opacity 0.2s ease,
                box-shadow 0.2s ease;
    aspect-ratio: 1 / 1;
    
    /* [м¶”к°Җ] GPU к°ҖмҶҚ нҷңм„ұнҷ” */
    will-change: transform, opacity;
    transform: translateZ(0);
}
.tile:active {
    box-shadow: inset 1px 1px 2px rgba(87, 65, 65, 0.2), 
                inset -1px -1px 2px rgba(255, 255, 255, 0.7);
    transform: scale(0.95) translateZ(0); /* [мҲҳм •] translateZ мң м§Җ */
}

.tile.pop { animation: pop 0.2s ease-out forwards; }
@keyframes pop {
    0% { transform: scale(1) translateZ(0); opacity: 1; }
    50% { transform: scale(1.3) translateZ(0); opacity: 0.5; }
    100% { transform: scale(0.1) translateZ(0); opacity: 0; }
}

.tile.fall {
    transition: transform 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53);
    /* will-changeлҠ” .tileм—җм„ң мғҒмҶҚлҗЁ */
}

.tile.new-tile-anim { animation: new-tile 0.2s ease-out; }
@keyframes new-tile {
    from { transform: scale(0.5) translateZ(0); opacity: 0; }
    to { transform: scale(1) translateZ(0); opacity: 1; }
}

.tile.swap { 
    transition: transform 0.2s ease-in-out; 
    z-index: 10; 
}
.tile.invalid { animation: shake 0.4s ease-in-out; }
@keyframes shake {
    0%, 100% { transform: translateX(0) translateZ(0); }
    25% { transform: translateX(-5px) translateZ(0); }
    50% { transform: translateX(5px) translateZ(0); }
    75% { transform: translateX(-5px) translateZ(0); }
}

        /* ------------------------- */
        /* == 4. лӘЁлӢ¬ (мң м§Җ) == */
        /* ------------------------- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; 
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: var(--panel-bg); 
            color: var(--text-color-dark); 
            padding: 0; 
            border-radius: 24px;
            width: 90%; max-width: 400px; 
            box-shadow: 8px 8px 0px 0px var(--text-color-dark);
            overflow: hidden; 
            border: 4px solid var(--text-color-dark);
        }
        .modal-header { 
            background-color: var(--primary-color);
            color: white; 
            padding: 15px; 
            border-bottom: 4px solid #C04A4A; 
        }
        .modal-header h2 { font-size: 1.6em; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .modal-body { padding: 25px; }
        .modal-footer {
            display: flex; gap: 10px;
            padding: 20px;
            border-top: 3px solid var(--panel-border);
            background-color: #FFFAE0;
        }

        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown-number { font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7); animation: countdown-pop 1s; }
        @keyframes countdown-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #final-score {
            font-size: 2.0em;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 0px;
        }
        #final-ranking-list {
            text-align: left;
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* ------------------------- */
        /* == 5. м•„мјҖмқҙл“ң лІ„нҠј (мң м§Җ) == */
        /* ------------------------- */
        .menu-btn { 
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: 900; 
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer; 
            transition: all 0.1s ease-out;
            border-bottom: 5px solid;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            margin: 5px 0; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .menu-btn.primary { 
            background-color: var(--primary-color);
            color: white; 
            border-bottom-color: #C04A4A;
        }
        .menu-btn.secondary { 
            background-color: var(--secondary-color);
            color: white; 
            border-bottom-color: #379A93;
        }
        
        /* ------------------------- */
        /* == 6. мҪӨліҙ н…ҚмҠӨнҠё/м җмҲҳ (мң м§Җ) == */
        /* ------------------------- */
        .combo-text {
            position: absolute;
            font-size: 2.5em;
            font-weight: 900;
            color: rgb(243, 41, 41);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            z-index: 100;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }
        
        .combo-score {
            position: absolute;
            font-size: 1.8em;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 101;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }

        @keyframes combo-pop {
            0% { transform: scale(0.8); opacity: 1; }
            20% { transform: scale(1.3); }
            40% { transform: scale(1); }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* ------------------------- */
        /* == 7. н”јлІ„ кІҢмқҙм§Җ UI (мҲҳм •лҗЁ) == */
        /* ------------------------- */
        /* #fever-gauge-container мҠӨнғҖмқјмқҖ 2лІҲ м„№м…ҳмңјлЎң мқҙлҸҷ/нҶөн•©лҗЁ */
        
        /* н”јлІ„ лӘЁл“ң нҷңм„ұнҷ” мӢң UI */
        /* [мҲҳм •] кІҢмһ„ ліҙл“ң (кІ©мһҗнҢҗ)мқҳ н…Ңл‘җлҰ¬ нҡЁкіј к°•нҷ” */
        #game-board.fever-active {
            animation: fever-pulse 0.7s infinite alternate;
        }
        @keyframes fever-pulse {
            from { 
                box-shadow: 0 0 10px rgba(200, 200, 200, 0.5); 
                border-color: var(--panel-border); 
            }
            to { 
                /* [мҲҳм •] к·ёлҰјмһҗлҘј лҚ” нҒ¬кі  л¶үкІҢ, н…Ңл‘җлҰ¬лҸ„ м„ лӘ…н•ҳкІҢ */
                box-shadow: 0 0 30px 10px rgba(255, 107, 107, 0.7); 
                border-color: #FF0000; 
            }
        }

        /* [мӢ к·ң] кІҢмһ„ н”„л Ҳмһ„ (нқ°мғү нҢЁл„җ)мқҳ л°°кІҪ к№ңл№Ўмһ„ нҡЁкіј */
        #game-area-frame.fever-active {
            animation: fever-frame-pulse 0.7s infinite alternate;
        }
        @keyframes fever-frame-pulse {
            from { 
                background-color: var(--panel-bg); /* кё°ліё нқ°мғү */
            }
            to { 
                background-color: #FFF6F6; /* л¶үмқҖ кё°мҡҙмқҙ лҸ„лҠ” л°°кІҪмғү */
                border-color: var(--primary-color);
            }
        }

        @keyframes cross-explosion {
    0% { 
        opacity: 0; 
        height: 0; 
    }
    30% { 
        opacity: 1; 
        height: 200%; 
    }
    100% { 
        opacity: 0; 
        height: 200%; 
    }
}

@keyframes center-burst {
    0% { 
        transform: translate(-50%, -50%) scale(0); 
        opacity: 1; 
    }
    50% { 
        transform: translate(-50%, -50%) scale(3); 
        opacity: 0.8; 
    }
    100% { 
        transform: translate(-50%, -50%) scale(5); 
        opacity: 0; 
    }
}

/* кё°мЎҙ @keyframes center-burst лӢӨмқҢм—җ м¶”к°Җ */

@keyframes rainbow-burst {
    0% { 
        transform: translate(-50%, -50%) scale(0) rotate(0deg); 
        opacity: 1; 
    }
    50% { 
        transform: translate(-50%, -50%) scale(1.5) rotate(180deg); 
        opacity: 0.8; 
    }
    100% { 
        transform: translate(-50%, -50%) scale(0) rotate(360deg); 
        opacity: 0; 
    }
}

@keyframes mega-rainbow {
    0% { 
        transform: translate(-50%, -50%) scale(0); 
        opacity: 0; 
    }
    20% { 
        transform: translate(-50%, -50%) scale(1.5);

            row.push(newEmoji);

                // [мҲҳм •] clientHeightлҠ” мқҙлҜё paddingмқ„ нҸ¬н•Ён•©лӢҲлӢӨ. (мқҙмӨ‘ м°Ёк°җ лІ„к·ё мҲҳм •)
                const containerH = gameContainer.clientHeight;
                
                if (containerW <= 0 || containerH <= 0) { 
                    console.warn("м»Ён…Ңмқҙл„Ҳ нҒ¬кё° мҳӨлҘҳ", containerW, containerH);
                    // [мҲҳм •] л ҢлҚ”л§Ғ мһ¬мӢңлҸ„
                    setTimeout(renderBoard, 100);
                    return; 
                }

                // 2. ліҙл“ң нҒ¬кё° кі„мӮ° (мӮ¬мІңм„ұ лЎңм§Ғ)
                const maxBoardW = containerW; // мӮ¬мҡ© к°ҖлҠҘн•ң мөңлҢҖ л„Ҳл№„
                const maxBoardH = containerH; // мӮ¬мҡ© к°ҖлҠҘн•ң мөңлҢҖ лҶ’мқҙ
                let boardSizeW, boardSizeH;
                
                const cellAspectRatio = 1; // нғҖмқј л№„мңЁ (1:1)
                // [н•өмӢ¬] Anipangмқҳ ROWS(8), COLS(6) мӮ¬мҡ©
                const boardAspectRatio = (COLS * cellAspectRatio) / ROWS; // (6*1)/8 = 0.75
                
                // 3. м»Ён…Ңмқҙл„ҲмҷҖ ліҙл“ңмқҳ мў…нҡЎл№„ л№„көҗ
                if ((maxBoardW / boardAspectRatio) <= maxBoardH) {
                    // л„Ҳл№„к°Җ кё°мӨҖмқј л•Ң кі„мӮ°лҗң лҶ’мқҙк°Җ м»Ён…Ңмқҙл„Ҳ лҶ’мқҙліҙлӢӨ мһ‘кұ°лӮҳ к°ҷмқҢ
                    // (лҢҖл¶Җл¶„мқҳ лӘЁл°”мқј м„ёлЎң лӘЁл“ң)
                    boardSizeW = maxBoardW;
                    boardSizeH = maxBoardW / boardAspectRatio;
                } else {
                    // лҶ’мқҙк°Җ кё°мӨҖ (к°ҖлЎң лӘЁл“ң лҳҗлҠ” м •мӮ¬к°Ғнҳ•м—җ к°Җк№Ңмҡҙ нҷ”л©ҙ)
                    boardSizeH = maxBoardH;
                    boardSizeW = maxBoardH * boardAspectRatio;
                }
                // [н•өмӢ¬ мҲҳм •] м„ңлёҢн”Ҫм…Җ мһҳлҰј л°©м§ҖлҘј мң„н•ҙ мөңмў… л„Ҳл№„/лҶ’мқҙлҘј м •мҲҳ(лӮҙлҰј) мІҳлҰ¬
                boardSizeW = Math.floor(boardSizeW);
                boardSizeH = Math.floor(boardSizeH);

                // 4. кІҢмһ„ ліҙл“ң мҠӨнғҖмқј м„Өм •
                gameBoard.style.width = `${boardSizeW}px`;
                gameBoard.style.height = `${boardSizeH}px`; 
                // [н•өмӢ¬] 1fr лӢЁмң„лҘј мӮ¬мҡ©н•ҳм—¬ CSSмқҳ aspect-ratioк°Җ мһ‘лҸҷн•ҳлҸ„лЎқ н•Ё
                gameBoard.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`; 
                gameBoard.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`; 
                
                // 5. нғҖмқј нҒ¬кё° кі„мӮ° (м„ңлёҢн”Ҫм…Җ м ңкұ°)
const boardPadding = parseFloat(window.getComputedStyle(gameBoard).paddingLeft) || 4;
const boardBorder = parseFloat(window.getComputedStyle(gameBoard).borderLeftWidth) || 2;
const gap = parseFloat(window.getComputedStyle(gameBoard).gap) || 2;

// [мҲҳм •] Math.floorлЎң м •мҲҳнҷ”н•ҳм—¬ м„ңлёҢн”Ҫм…Җ л¬ём ң л°©м§Җ
const currentTileSize = Math.floor((boardSizeW - (boardPadding * 2) - (boardBorder * 2) - (COLS - 1) * gap) / COLS);
const iconSize = Math.floor(currentTileSize * 0.7); // м•„мқҙмҪҳ нҒ¬кё°лҸ„ м •мҲҳнҷ”

                // 6. нғҖмқј мғқм„ұ (Anipang кё°мЎҙ лЎңм§Ғ)
                for (let r = 0; r < ROWS; r++) {
                    const rowElements = [];
                    for (let c = 0; c < COLS; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.dataset.row = r;
                        tile.dataset.col = c;
                        tile.textContent = board[r][c];
                        tile.style.fontSize = `${iconSize}px`; // [мҲҳм •] кі„мӮ°лҗң м•„мқҙмҪҳ нҒ¬кё° м Ғмҡ©
                        gameBoard.appendChild(tile);
                        rowElements.push(tile);
                        tile.addEventListener('pointerdown', handleDragStart);
                    }
                    tileElements.push(rowElements);
                }
            }

            // ------------------------------------
            // 4. кІҢмһ„ мӢңмһ‘/мў…лЈҢ (мҲҳм •)
            // ------------------------------------

            function startCountdown() {
                // [мҲҳм •] countdownStarted н”Ңлһҳк·ёлЎң мӨ‘ліө мӢӨн–ү л°©м§Җ
                // if (infoOverlay.classList.contains('active')) return; 
                
                infoOverlay.classList.add('active');
                
                // [мҲҳм •] 'мӮ¬мІңм„ұ/н…ҢнҠёлҰ¬мҠӨ'мІҳлҹј innerHTMLмқ„ көҗмІҙн•ҳм—¬ м№ҙмҡҙнҠёлӢӨмҡҙмқ„ н‘ңмӢңн•©лӢҲлӢӨ.
                // 'waiting' мғҒнғңм—җм„ң мҠӨн”јл„ҲлЎң лҚ®м–ҙмҚјкё° л•Ңл¬ём—җ, countdownNumber мҡ”мҶҢк°Җ лҚ” мқҙмғҒ мЎҙмһ¬н•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.
                infoOverlay.innerHTML = `<div id="countdown-number" style="font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7);">3</div>`;

                     }
                 } else {
                        clearInterval(interval);
                        infoOverlay.classList.remove('active');
                        
                        // [мҲҳм •] л Ҳмқҙм•„мӣғмқҙ кі„мӮ°лҗ  л•Ңк№Ңм§Җ кё°лӢӨлҰҪлӢҲлӢӨ.
                        function runGame() {
                            // renderBoard()к°Җ мқҳмЎҙн•ҳлҠ” gameContainerмқҳ нҒ¬кё°лҘј нҷ•мқён•©лӢҲлӢӨ.
                            // [мҲҳм •] clientHeightлҸ„ 0ліҙлӢӨ нҒ°м§Җ нҷ•мқён•ҳм—¬ л ҢлҚ”л§Ғ мҳӨлҘҳ л°©м§Җ
                            if (gameContainer.clientWidth > 0 && gameContainer.clientHeight > 0) {

                                console.log(`л Ҳмқҙм•„мӣғ лҢҖкё° мӨ‘... W:${gameContainer.clientWidth} H:${gameContainer.clientHeight}`);
                                requestAnimationFrame(runGame);

                        // лӢӨмқҢ м• лӢҲл©”мқҙм…ҳ н”„л Ҳмһ„м—җм„ң кІҢмһ„ мӢңмһ‘ мӢңлҸ„
                        requestAnimationFrame(runGame);
                    }
                }, 1000);
            }

            function startGame() {
                // [мҲҳм •] ліҙл“ң л ҢлҚ”л§Ғмқҙ м•Ҳлҗҗмқ„ кІҪмҡ°лҘј лҢҖл№„
                if (tileElements.length === 0) { 
                    console.log("л ҢлҚ”л§Ғ мһ¬мӢңлҸ„...");
                    renderBoard();

                if (tileElements.length === 0) { 
                    console.error("ліҙл“ң л ҢлҚ”л§Ғ мӢӨнҢЁ. мӢңмһ‘ л¶Ҳк°Җ.");
                    return; 
                }
                
                isProcessing = false;
                timerId = setInterval(() => {
                    timer--;
                    timerValue.textContent = timer;
                    if (timer <= 10) {
                        timerDisplay.classList.add('danger-time');
                    }
         if (timer <= 0) {
            gameOver();
        }
    }, 1000);
    
    // рҹҺ® м№ҳнҠёнӮӨ лҰ¬мҠӨл„Ҳ л“ұлЎқ
    setupCheatKeys();
}

// рҹҺ® м№ҳнҠёнӮӨ мӢңмҠӨн…ң
function setupCheatKeys() {
    // кё°мЎҙ лҰ¬мҠӨл„Ҳ мӨ‘ліө л°©м§Җ
    if (window.cheatKeysEnabled) return;
    window.cheatKeysEnabled = true;
    
    document.addEventListener('keydown', (e) => {
        // кІҢмһ„ мӨ‘мқҙ м•„лӢҲл©ҙ л¬ҙмӢң
        if (!timerId || isProcessing) return;
        
        switch(e.key.toLowerCase()) {
            case 'c': // CнӮӨ: мӢӯмһҗк°Җ нҸӯл°ң н…ҢмҠӨнҠё
                createCrossExplosionTest();
                break;
            case 'r': // RнӮӨ: л Ҳмқёліҙмҡ° нғҖмқј н…ҢмҠӨнҠё
                createRainbowTest();
                break;
            case 'd': // DнӮӨ: лҚ”лё” л Ҳмқёліҙмҡ° н…ҢмҠӨнҠё
                createDoubleRainbowTest();
                break;
            case 'f': // FнӮӨ: н”јлІ„лӘЁл“ң к°•м ң л°ңлҸҷ
                if (!isFeverMode) {
                    feverGauge = MAX_FEVER_GAUGE;
                    updateFeverGaugeUI();
                    startFeverMode();
                }
                break;
            case 's': // SнӮӨ: ліҙл“ң м…”н”Ң
                handleNoMoreMoves();
                break;
            case 't': // TнӮӨ: мӢңк°„ +10мҙҲ
                timer = Math.min(GAME_TIME, timer + 10);
                timerValue.textContent = timer;
                break;
            case 'p': // PнӮӨ: м җмҲҳ +1000м җ
                score += 1000;
                updateScoreUI();
                if (playerRef) playerRef.child('score').set(score);
                break;
        }
    });
    
    console.log('рҹҺ® м№ҳнҠёнӮӨ нҷңм„ұнҷ”!');
    console.log('C: мӢӯмһҗк°Җ нҸӯл°ң | R: л Ҳмқёліҙмҡ° нғҖмқј | D: лҚ”лё” л Ҳмқёліҙмҡ°');
    console.log('F: н”јлІ„лӘЁл“ң | S: м…”н”Ң | T: мӢңк°„+10мҙҲ | P: м җмҲҳ+1000');
}

       // [мҲҳм •] мөңлҢҖ мӢңлҸ„ нҡҹмҲҳ мҰқк°Җ л°Ҹ к°„кІ© лӢЁм¶•

        // checkAttempts ліҖмҲҳ л°Ҹ кҙҖл Ё мғҒмҲҳлҠ” мқҙ н•ЁмҲҳ лӮҙл¶Җм—җм„ңл§Ң мӮ¬мҡ©

        function checkGameOverCondition() {
            // 1. мқҙлҜё кІ°кіјм°Ҫмқҙ л–ҙмңјл©ҙ мӨ‘ліө мӢӨн–ү л°©м§Җ
            if (gameOverOverlay.classList.contains('active')) {
                return;
            }
            
            // 2. allPlayersRefк°Җ м—Ҷмңјл©ҙ (л°©мқҙ н„°мЎҢмңјл©ҙ) к°•м ң мў…лЈҢ
            if (!allPlayersRef) {
                console.warn("[CheckGameOver] allPlayersRefк°Җ м—ҶмҠөлӢҲлӢӨ. к°•м ң мў…лЈҢ.");
                forceGameOver(); // (кІ°кіј: л°©мқҙ мў…лЈҢлҗЁ)
                return;
            }

            checkGameOverAttempts++;
            console.log(`[CheckGameOver] (кіөмҡ©) н”Ңл Ҳмқҙм–ҙ мў…лЈҢ мІҙнҒ¬ (${checkGameOverAttempts}/${MAX_CHECK_ATTEMPTS})`);

            // 3. (мӢ к·ң) нҳёмҠӨнҠё/кІҢмҠӨнҠё кө¬л¶„ м—Ҷмқҙ "мҰүмӢң" allPlayersRefлҘј нҷ•мқё
            allPlayersRef.once('value', (snapshot) => {
                const players = snapshot.val();
                if (!players) {
                    console.warn("[CheckGameOver] players лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ. к°•м ң мў…лЈҢ.");
                    forceGameOver(); // (кІ°кіј: л°©мқҙ мў…лЈҢлҗЁ)
                    return;
                }

                const playerArray = Object.values(players);
                const allFinished = playerArray.length > 0 && playerArray.every(p => p.isFinished === true);

                // 4. (мӢ к·ң) "лӘЁл‘җ мў…лЈҢ"к°Җ нҷ•мқёлҗҳл©ҙ, мҰүмӢң лЎңм»¬м—җм„ң forceGameOver() нҳём¶ң
                if (allFinished) {
                    console.log("[CheckGameOver] лӘЁл“  н”Ңл Ҳмқҙм–ҙ мў…лЈҢ нҷ•мқё! мҰүмӢң кІ°кіј н‘ңмӢң.");
                    
                    // (м„ нғқм Ғ) нҳёмҠӨнҠёк°Җ status: 'finished'лҘј мҸҙм„ң, 
                    // мІҙнҒ¬к°Җ лҠҰлҠ” лӢӨлҘё н”Ңл Ҳмқҙм–ҙм—җкІҢ мӢ нҳёлҘј мӨ„ мҲҳ мһҲмқҢ (м•Ҳм „мһҘм№ҳ)
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver(); // "мҰүмӢң" лЎңм»¬м—җм„ң кІ°кіјм°Ҫ н‘ңмӢң
                    checkGameOverAttempts = 0; // мҙҲкё°нҷ”
                }
                // 5. (мӢ к·ң) м•„м§Ғ "лӘЁл‘җ мў…лЈҢ"к°Җ м•„лӢҲл©ҙ, мһ¬мӢңлҸ„ (м•Ҳм „мһҘм№ҳ)
                else if (checkGameOverAttempts < MAX_CHECK_ATTEMPTS) {
                    console.log(`[CheckGameOver] м•„м§Ғ лӘЁл‘җ мў…лЈҢлҗҳм§Җ м•ҠмқҢ. ${CHECK_INTERVAL}ms нӣ„ мһ¬мӢңлҸ„...`);
                    setTimeout(checkGameOverCondition, CHECK_INTERVAL);
                }
                // 6. (мӢ к·ң) мөңлҢҖ мӢңлҸ„ нҡҹмҲҳ мҙҲкіј (м•Ҳм „мһҘм№ҳ)
                else {
                    console.warn("[CheckGameOver] мөңлҢҖ мІҙнҒ¬ нҡҹмҲҳ мҙҲкіј. к°•м ңлЎң кІ°кіј н‘ңмӢң.");
                    
                    // (м„ нғқм Ғ) нҳёмҠӨнҠёк°Җ к°•м ңлЎң status: 'finished' м„Өм •
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver();
                    checkGameOverAttempts = 0;
                }
            });
        }

            // [мҲҳм •] "кІҢмҠӨнҠё л©Ҳм¶Ө" лІ„к·ё н•ҙкІ° (лҰ¬мҠӨл„Ҳ м •лҰ¬)
            function forceGameOver() {
                if (gameOverOverlay.classList.contains('active')) return;
                gameOverOverlay.classList.add('active'); // мӨ‘ліө л°©м§Җ

                // [лІ„к·ё мҲҳм •] кІҢмһ„мқҙ м •мғҒ мў…лЈҢлҗҳм—ҲмңјлҜҖлЎң, нҳёмҠӨнҠёмқҳ onDisconnect н•ёл“Өлҹ¬ м·ЁмҶҢ
                if (isHost && hostStatusDisconnectRef) {
                    try {
                        hostStatusDisconnectRef.cancel();
                        hostStatusDisconnectRef = null;
                        console.log("кІҢмһ„ м •мғҒ мў…лЈҢ: нҳёмҠӨнҠё onDisconnect н•ёл“Өлҹ¬лҘј м·ЁмҶҢн–ҲмҠөлӢҲлӢӨ.");
                    } catch (e) {
                        console.warn("нҳёмҠӨнҠё onDisconnect н•ёл“Өлҹ¬ м·ЁмҶҢ мӢӨнҢЁ:", e);
                    }
                }

                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                isProcessing = true; 
                loadingOverlay.classList.remove('active');
                
                if (!allPlayersRef) {
                    finalRankingList.innerHTML = '<p style="text-align: center;">л°© м—°кІ°мқҙ лҒҠкІјмҠөлӢҲлӢӨ.</p>';
                    finalScoreEl.textContent = `${score.toLocaleString()} м җ`;
                    return;
                }
                
                allPlayersRef.once('value', (snapshot) => {
                    // [мҲҳм •] мҪңл°ұ н•ЁмҲҳ лӮҙл¶Җм—җм„ң лҰ¬мҠӨл„Ҳ мҰүмӢң лҒ„кё°
                    if (allPlayersRef) {
                        allPlayersRef.off();
                        console.log("кІ°кіј лӘЁлӢ¬ н‘ңмӢң мҷ„лЈҢ. allPlayersRef лҰ¬мҠӨл„ҲлҘј лҒ•лӢҲлӢӨ.");
                    }
                    if (statusRef) {
                        statusRef.off();
                        console.log("statusRef лҰ¬мҠӨл„ҲлҘј лҒ•лӢҲлӢӨ.");
                    }
                    
                    const players = snapshot.val();
                    if (!players) {
                        // [мҲҳм •] playersк°Җ nullмқј л•Ң (л°©мқҙ мӮӯм ңлҗЁ)
                        finalRankingList.innerHTML = '<p style="text-align: center;">л°©мқҙ мў…лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ.</p>';
                        finalScoreEl.textContent = `${score.toLocaleString()} м җ`;
                        return; // [мҲҳм •] nullмқј л•Ң м—¬кё°м„ң л°ҳнҷҳ
                    }

                    const sortedPlayers = Object.entries(players)
                        .map(([uid, data]) => ({ uid, ...data }))
                        .sort((a, b) => (b.score || 0) - (a.score || 0));

                        // [мӢ к·ң] лӮҙ лһӯнӮ№кіј мҠ№/нҢЁ м—¬л¶Җ, мөңмў… м җмҲҳ нҷ•мқё
                    let myFinalRank = -1;
                    let myFinalScore = 0;
                    
                    sortedPlayers.forEach((player, index) => {
                        if (player.uid === playerUid) {
                            myFinalRank = index + 1;
                            myFinalScore = player.score || 0;
                        }
                    });

                    // [мӢ к·ң] 1л“ұ=мҠ№лҰ¬, 2/3/4л“ұ=нҢЁл°° (л¬ҙмҠ№л¶Җ м—ҶмқҢ)
                    const didIWin = (myFinalRank === 1);
                    
                    // [мӢ к·ң] мҠӨнғҜ м—…лҚ°мқҙнҠё н•ЁмҲҳ нҳём¶ң
                    updatePlayerStats(didIWin, myFinalScore);

                    finalRankingList.innerHTML = '';
                    sortedPlayers.forEach((player, index) => {
                        const rank = index + 1;
                        const nickname = player.nickname || 'Unknown';
                        const score = player.score || 0;
                        const p = document.createElement('p');
                        let rankText = `${rank}мң„: ${nickname} (${score.toLocaleString()}м җ)`;
                        if (player.uid === playerUid) {
                            rankText = `<strong>${rankText} (YOU)</strong>`;
                            finalScoreEl.textContent = `${score.toLocaleString()} м җ`;
                        }
                        p.innerHTML = rankText;
                        finalRankingList.appendChild(p);

                        // [лІ„к·ё мҲҳм •] кІҢмҠӨнҠё мһ¬м ‘мҶҚ мӢң лЎңм»¬ score(0м җ)к°Җ м•„лӢҢ,
                        // Firebaseм—җм„ң к°Җм ёмҳЁ player.scoreлҘј мӮ¬мҡ©н•ҙм•ј н•Ё
                        if (player.uid === playerUid) {
                            finalScoreEl.textContent = `${player.score.toLocaleString()} м җ`;
                        }

                        
                    });

                    /// вң… ліҖкІҪ мҪ”л“ң (лІ„к·ё мҲҳм •лҗЁ)
                    // [мӢ к·ң] 'лӢӨмӢңн•ҳкё°' / 'лҢҖкё°мӢӨлЎң' лІ„нҠј лҰ¬мҠӨл„Ҳ (Tetris/ShisenSho л°©мӢқ)
                    // [мҲҳм •] лІ„нҠј лҰ¬мҠӨл„ҲлҠ” н•ң лІҲл§Ң л“ұлЎқ
                    
                    const rematchBtn = document.getElementById('rematch-btn');
                    const lobbyBtn = document.getElementById('lobby-btn');
                    
                    // [н•өмӢ¬ мҲҳм •] л§ӨлІҲ лІ„нҠј мғҒнғңлҘј мҷ„м „нһҲ мҙҲкё°нҷ”
                    rematchBtn.textContent = 'лӢӨмӢңн•ҳкё°';
                    rematchBtn.disabled = false;
                    
                    // [н•өмӢ¬ мҲҳм •] кё°мЎҙ лҰ¬мҠӨл„Ҳ мҷ„м „нһҲ м ңкұ°
                    const newRematchBtn = rematchBtn.cloneNode(true);
                    rematchBtn.parentNode.replaceChild(newRematchBtn, rematchBtn);
                    
                    const newLobbyBtn = lobbyBtn.cloneNode(true);
                    lobbyBtn.parentNode.replaceChild(newLobbyBtn, lobbyBtn);
                    
                    // [н•өмӢ¬ мҲҳм •] мғҲ лІ„нҠјм—җ лҰ¬мҠӨл„Ҳ л“ұлЎқ
                    newLobbyBtn.addEventListener('click', cleanupAndExit);
                    
                    newRematchBtn.addEventListener('click', () => {
                        newRematchBtn.textContent = 'мғҒлҢҖл°© кё°лӢӨлҰ¬лҠ” мӨ‘...';
                        newRematchBtn.disabled = true;
                        if (roomRef && playerUid) {
                            roomRef.child('rematchRequests/' + playerUid).set(true);
                        }
                    });
                    
                    // [мӢ к·ң] 'лӢӨмӢңн•ҳкё°' лҰ¬мҠӨл„Ҳ мӢңмһ‘
                    listenForRematch();
                });
            }

            // [мӢ к·ң] 'лӢӨмӢңн•ҳкё°' мҲҳмӢ  лҰ¬мҠӨл„Ҳ (Tetris/ShisenSho л°©мӢқ)
            function listenForRematch() {
                 if (!roomRef) return;
                 const rematchRef = roomRef.child('rematchRequests');
                 
                 rematchRef.on('value', snapshot => {
                      // [мҲҳм •] кІҢмһ„мҳӨлІ„ лӘЁлӢ¬мқҙ мјңм ёмһҲмқ„ л•Ңл§Ң мһ‘лҸҷ
                      if (!snapshot.exists() || !currentRoomData || !currentRoomData.players || !gameOverOverlay.classList.contains('active')) {
                        return;
                      }

                      const requests = snapshot.val();
                      const requestCount = Object.keys(requests).length;
                      const playerCount = Object.keys(currentRoomData.players).length;

                      // лӘЁл“  н”Ңл Ҳмқҙм–ҙк°Җ лҸҷмқҳн–Ҳкі , лӮҙк°Җ нҳёмҠӨнҠёлқјл©ҙ
                      if (playerCount >= 2 && requestCount === playerCount && isHost) {
                            rematchRef.off(); // лҰ¬мҠӨл„Ҳ м •лҰ¬
                            
                            // [мҲҳм •] 'м• лӢҲнҢЎ' кІҢмһ„ мһ¬мӢңмһ‘мқ„ мң„н•ң мғҒнғңк°’ мҙҲкё°нҷ”
                            roomRef.update({
                                rematchRequests: null,
                                status: 'waiting',      // л°© мғҒнғңлҘј 'лҢҖкё°'лЎң
                                // 'playing' мғҒнғңм—җм„ң мғқм„ұлҗң кІҢмһ„ лҚ°мқҙн„° мҙҲкё°нҷ”
                                gameStarted: false, 
                                // (readyPlayersлҠ” 'waiting' мғҒнғңм—җм„ң лӢӨмӢң мұ„мӣҢм§җ)
                                readyPlayers: null     
                            });
                      }
                 });
            }

            // ------------------------------------
            // 5. [мӢ к·ң] н”јлІ„ мӢңмҠӨн…ң н•ЁмҲҳ
            // ------------------------------------
            
            function updateFeverGaugeUI() {
                const fill = document.getElementById('fever-gauge-fill');
                if (fill) {
                    const percent = Math.min(100, (feverGauge / MAX_FEVER_GAUGE) * 100);
                    fill.style.width = `${percent}%`;
                }
            }

            function startFeverMode() {
                if (isFeverMode) return; // мӨ‘ліө мӢӨн–ү л°©м§Җ
                
                console.log("рҹ”Ҙ н”јлІ„ лӘЁл“ң л°ңлҸҷ!");
                isFeverMode = true;
                feverGauge = 0; // кІҢмқҙм§Җ мҙҲкё°нҷ”
                updateFeverGaugeUI();
                gameBoard.classList.add('fever-active'); // [мҲҳм •] кІҢмһ„ ліҙл“ң мқҙнҺҷнҠё
                gameAreaFrameEl.classList.add('fever-active'); // [мӢ к·ң] кІҢмһ„ н”„л Ҳмһ„ мқҙнҺҷнҠё

                // "FEVER!" н…ҚмҠӨнҠё н‘ңмӢң
                const feverText = document.createElement('div');
                feverText.className = 'combo-text';
                feverText.textContent = 'рҹ”Ҙ FEVER! рҹ”Ҙ';
                feverText.style.top = '50%';
                feverText.style.left = '50%';
                feverText.style.transform = 'translate(-50%, -50%)';
                gameWrapper.appendChild(feverText);
                setTimeout(() => feverText.remove(), 1000); // 1мҙҲ л’Ө м ңкұ°

                // н”јлІ„ мў…лЈҢ нғҖмқҙлЁё
                feverTimerId = setTimeout(endFeverMode, FEVER_DURATION);
            }

            function endFeverMode() {
                console.log("...н”јлІ„ лӘЁл“ң мў…лЈҢ.");
                isFeverMode = false;
                feverTimerId = null;
                gameBoard.classList.remove('fever-active');
                gameAreaFrameEl.classList.remove('fever-active'); // [мӢ к·ң] кІҢмһ„ н”„л Ҳмһ„ мқҙнҺҷнҠё м ңкұ°
                // (н•„мҡ”мӢң) "FEVER END" н…ҚмҠӨнҠё
            }
            // ------------------------------------
            // 5. м»ЁнҠёлЎӨ (л“ңлһҳк·ё) (мҲҳм •)
            // ------------------------------------

            function handleDragStart(e) {
                if (isProcessing) return;
                // [мҲҳм •] "кі мҠӨнҠё н„°м№ҳ" н•ҙкІ°: e.currentTarget лҢҖмӢ  datasetмңјлЎң мўҢн‘ң м°ҫкё°
                const row = parseInt(e.currentTarget.dataset.row, 10);
                const col = parseInt(e.currentTarget.dataset.col, 10);

                // [мҲҳм •] tileElementsм—җм„ң DOM мҡ”мҶҢлҘј лӢӨмӢң м°ёмЎ°
                const tile = tileElements[row][col]; 
                
                if (!tile) {
                    console.error("кі мҠӨнҠё н„°м№ҳ л°©м§Җ: нғҖмқјмқ„ м°ҫмқ„ мҲҳ м—ҶмқҢ", row, col);
                    return;
                }

                dragStartTile = { row: row, col: col, el: tile };
                dragStartX = e.clientX || (e.touches && e.touches[0].clientX);
                dragStartY = e.clientY || (e.touches && e.touches[0].clientY);
                window.addEventListener('pointerup', handleDragEnd, { once: true });
                window.addEventListener('pointercancel', handleDragEnd, { once: true });
            }

            function handleDragEnd(e) {
                if (!dragStartTile) return;
                const dragEndX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const dragEndY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const deltaX = dragEndX - dragStartX;
                const deltaY = dragEndY - dragStartY;
                const threshold = dragStartTile.el.clientWidth / 3; 
                let targetRow = dragStartTile.row;
                let targetCol = dragStartTile.col;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > threshold) {
                    targetCol += (deltaX > 0) ? 1 : -1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > threshold) {
                    targetRow += (deltaY > 0) ? 1 : -1;
                } else {
                    dragStartTile = null; return;
                }
                if (targetRow < 0 || targetRow >= ROWS || targetCol < 0 || targetCol >= COLS) {
                    dragStartTile = null; return;
                }
                attemptSwap(dragStartTile.row, dragStartTile.col, targetRow, targetCol);
                dragStartTile = null;
            }

            // ------------------------------------
            // 6. кІҢмһ„ лЎңм§Ғ (мҲҳм •)
            // ------------------------------------
            
            async function attemptSwap(r1, c1, r2, c2) {
    if (isProcessing) return;
    isProcessing = true;

    playSound('swap');
    
    // л Ҳмқёліҙмҡ° нғҖмқјкіј мқјл°ҳ нғҖмқј көҗнҷҳ к°җм§Җ
    const tile1 = board[r1][c1];
    const tile2 = board[r2][c2];
    
    if (tile1 === RAINBOW_TILE && tile2 !== RAINBOW_TILE) {
        await handleRainbowSwap(r1, c1, tile2);
        isProcessing = false;
        return;
    }
    
    if (tile2 === RAINBOW_TILE && tile1 !== RAINBOW_TILE) {
        await handleRainbowSwap(r2, c2, tile1);
        isProcessing = false;
        return;
    }
    
    // л Ҳмқёліҙмҡ° нғҖмқјлҒјлҰ¬ көҗнҷҳ (ліҙл“ң м „мІҙ м ңкұ°)
    if (tile1 === RAINBOW_TILE && tile2 === RAINBOW_TILE) {
        await handleDoubleRainbow(r1, c1, r2, c2);
        isProcessing = false;
        return;
    }
    
    // мқјл°ҳ мҠӨмҷ‘ лЎңм§Ғ
    swapData(r1, c1, r2, c2);
    await animateSwap(r1, c1, r2, c2);
    
    const matchData = findAllMatches();
    
    if (matchData.matches.size > 0) {
        if (isFeverMode) {
            processMatchesAndCascade(matchData);
            isProcessing = false;
        } else {
            await processMatchesAndCascade(matchData);
            isProcessing = false;
        }
    } else {
        await animateInvalidSwap(r1, c1, r2, c2); 
        isProcessing = false;
    }
}

// л Ҳмқёліҙмҡ° нғҖмқјкіј мқјл°ҳ нғҖмқј көҗнҷҳ (н•ҙлӢ№ мғүмғҒ м „мІҙ м ңкұ°)
async function handleRainbowSwap(rainbowRow, rainbowCol, targetColor) {
    currentCombo++;
    
    const matchingTiles = new Set();
    
    // ліҙл“ңм—җм„ң targetColorмҷҖ к°ҷмқҖ мғүмғҒмқҳ лӘЁл“  нғҖмқј м°ҫкё°
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c] === targetColor) {
                matchingTiles.add(`${r}-${c}`);
            }
        }
    }
    
    // л Ҳмқёліҙмҡ° нғҖмқјлҸ„ м ңкұ°
    matchingTiles.add(`${rainbowRow}-${rainbowCol}`);
    
    const scoreMultiplier = isFeverMode ? 1.5 : 1.0;
    const baseScore = matchingTiles.size * 50;
    const comboBonus = currentCombo * 20;
    const turnScore = Math.round((baseScore + comboBonus + RAINBOW_BONUS) * scoreMultiplier);
    
    score += turnScore;
    
    showRainbowExplosion(rainbowRow, rainbowCol, targetColor);
    showComboText(currentCombo, matchingTiles);
    showComboScore(turnScore);
    
    if (!isFeverMode) {
        const gaugeGain = matchingTiles.size * 1.5;
        feverGauge = Math.min(MAX_FEVER_GAUGE, feverGauge + gaugeGain);
        updateFeverGaugeUI();
        if (feverGauge >= MAX_FEVER_GAUGE) {
            startFeverMode();
        }
    }
    
    updateScoreUI();
    if (playerRef) { playerRef.child('score').set(score); }
    playComboSound(currentCombo);
    
    await animatePop(matchingTiles);
    removeMatches(matchingTiles);
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();
    await animateDrops(droppedTilesMap, newTilesMap);
    
    const newMatchData = findAllMatches();
    if (newMatchData.matches.size > 0) {

async function handleDoubleRainbow(r1, c1, r2, c2) {
    currentCombo++;
    
    const allTiles = new Set();
    
    // ліҙл“ңмқҳ лӘЁл“  нғҖмқј м ңкұ°
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c]) {
                allTiles.add(`${r}-${c}`);
            }
        }
    }
    
    const scoreMultiplier = isFeverMode ? 1.5 : 1.0;
    const baseScore = allTiles.size * 100;
    const turnScore = Math.round((baseScore + RAINBOW_BONUS * 3) * scoreMultiplier);
    
    score += turnScore;

    showComboScore(turnScore);

        updateFeverGaugeUI();
        startFeverMode();
    }
    
    updateScoreUI();
    if (playerRef) { playerRef.child('score').set(score); }
    
    await animatePop(allTiles);
    removeMatches(allTiles);
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();
    await animateDrops(droppedTilesMap, newTilesMap);
    
    currentCombo = 0;
    if (!checkForPossibleMoves()) {

    }

        }
    }
    
    // 3. мӢӯмһҗк°Җ нҸӯл°ң мІҳлҰ¬

          async function processMatchesAndCascade(matchData) {
    const matches = matchData.matches || matchData;
    const crossExplosions = matchData.crossExplosions || [];
    const rainbowTiles = matchData.rainbowTiles || [];
    
    currentCombo++;

    const scoreMultiplier = isFeverMode ? 1.5 : 1.0;

    const baseScore = matches.size * 10;
    const comboBonus = currentCombo * 20;
    const crossBonus = crossExplosions.length * CROSS_EXPLOSION_BONUS;
    const rainbowBonus = rainbowTiles.length * RAINBOW_BONUS;
    
    const turnScore = Math.round((baseScore + comboBonus + crossBonus + rainbowBonus) * scoreMultiplier);
    score += turnScore;
    
    if (crossExplosions.length > 0) {
        showCrossExplosion(crossExplosions);
    }
    
    if (rainbowTiles.length > 0) {
        showRainbowEffect(rainbowTiles);
    }
    
    showComboText(currentCombo, matches);
    showComboScore(turnScore);

    if (!isFeverMode) {
        const gaugeGain = (matches.size * 0.5) + (currentCombo * 1.5) + (rainbowTiles.length * 10);
        feverGauge = Math.min(MAX_FEVER_GAUGE, feverGauge + gaugeGain);
        updateFeverGaugeUI();

        if (feverGauge >= MAX_FEVER_GAUGE) {
            startFeverMode();
        }
    }

    updateScoreUI(); 
    if (playerRef) { playerRef.child('score').set(score); }
    playComboSound(currentCombo);
    
    await animatePop(matches);
    removeMatches(matches);
    
    // л Ҳмқёліҙмҡ° нғҖмқј мғқм„ұ
    rainbowTiles.forEach(({ row, col }) => {
        board[row][col] = RAINBOW_TILE;
    });
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();
    
    await animateDrops(droppedTilesMap, newTilesMap);
    
    const newMatchData = findAllMatches();
    if (newMatchData.matches.size > 0) {
        await new Promise(resolve => setTimeout(resolve, 100)); 
        await processMatchesAndCascade(newMatchData);
    } else {
        currentCombo = 0;
        if (!checkForPossibleMoves()) {
            await handleNoMoreMoves();
        }
    }
}

           function playComboSound(combo) {
    // рҹҺө мһҘмқҢкі„ кё°л°ҳ н”јм№ҳ мӢңмҠӨн…ң
    const semitone = Math.pow(2, 1/12);
    const pitchMap = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16];
    const comboIndex = Math.min(combo - 1, pitchMap.length - 1);
    const semitonesUp = pitchMap[comboIndex];
    const finalRate = Math.pow(semitone, semitonesUp);
    const clampedRate = Math.max(1.0, Math.min(finalRate, 4.0));
    
    // ліјлҘЁ мЎ°м Ҳ (0.6 вҶ’ 0.9)
    const volumeBoost = Math.min(0.6 + (combo * 0.03), 0.9);
    
    try {
        const sound = sounds['match'];
        if(sound) {
            sound.currentTime = 0;
            sound.playbackRate = clampedRate;
            sound.volume = volumeBoost;
            sound.play().catch(e => {});
        }
    } catch(e) {}
    
    // 5мҪӨліҙ мқҙмғҒ м—җмҪ” нҡЁкіј
    if (combo >= 5) {
        setTimeout(() => {
            try {
                const echo = sounds['match'].cloneNode();
                echo.playbackRate = clampedRate * 1.05; // мӮҙм§қ лҚ” лҶ’кІҢ
                echo.volume = 0.25;
                echo.play().catch(e => {});
            } catch(e) {}
        }, 80);
    }
    
    console.log(`рҹҺө ${combo}мҪӨліҙ: +${semitonesUp}л°ҳмқҢ (${clampedRate.toFixed(2)}x, Vol:${volumeBoost.toFixed(2)})`);
}

            function dropTiles() {
                const droppedTilesMap = new Map(); 
                for (let c = 0; c < COLS; c++) {
                    let emptyRow = ROWS - 1; 
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] !== null) {
                            if (r !== emptyRow) {
                                board[emptyRow][c] = board[r][c];
                                board[r][c] = null;
                                droppedTilesMap.set(`${emptyRow}-${c}`, r); // { endKey: startRow }
                            }
                            emptyRow--;
                        }
                    }
                }
                return { droppedTilesMap };
            }
            function fillTopTiles() {
                const newTilesMap = new Map(); 
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] === null) {
                            const newEmoji = getRandomEmoji();
                            board[r][c] = newEmoji;
                            newTilesMap.set(`${r}-${c}`, newEmoji);
                        }

            async function animateDrops(droppedTilesMap, newTilesMap) {
                const fallPromises = [];

                // (лҚ°мқҙн„° `board` л°°м—ҙмқҖ мқҙлҜё мөңмӢ  мғҒнғң)

                const newTileElements = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
                
                // [мҲҳм •] 1a. лӘЁл“  нғҖмқј DOM мҡ”мҶҢлҘј 1D л°°м—ҙлЎң мҲҳм§‘ (мһ¬мӮ¬мҡ© нҒҗ)
                const allOldTiles = [];
                for (let r = 0; r < ROWS; r++) {

                for (let r = 0; r < ROWS; r++) {

                        const tile = allOldTiles.pop(); // DOM мҡ”мҶҢ

                        tile.dataset.row = r; // [мҲҳм •] dataset к°•м ң мқјм№ҳ
                        tile.dataset.col = c; // [мҲҳм •] dataset к°•м ң мқјм№ҳ
                        newTileElements[r][c] = tile; // мғҲ 2D л°°м—ҙм—җ н• лӢ№

                        if (newTilesMap.has(key)) {
                            // 'мғҲлЎң мғқкёҙ нғҖмқј'
                            tile.className = 'tile fall new-tile-anim'; // [мҲҳм •] .new -> .new-tile-anim
                            const startY = -(r + 2) * tileSize;
                            tile.style.transform = `translateY(${startY}px)`;

                        } else if (droppedTilesMap.has(key)) {
                            // 'л–Ём–ҙм§„ нғҖмқј'
                            const startRow = droppedTilesMap.get(key); // лҚ°мқҙн„°к°Җ мһҲлҚҳ 'н–ү'
                            tile.className = 'tile fall';
                            // (r=5, startRow=2) -> 3м№ё мқҙлҸҷ
                            const dropDistance = (r - startRow) * tileSize;
                            // [мҲҳм •] лІ„к·ё л°©м§Җ: л–Ём–ҙм§ҖлҠ” кұ°лҰ¬к°Җ 0мқј мҲҳ м—ҶмқҢ (лЎңм§ҒмғҒ)
                            // startRowк°Җ rкіј к°ҷмңјл©ҙ `droppedTilesMap`м—җ м—Ҷм–ҙм•ј н•Ё.
                            // л§Ңм•Ҫмқҳ кІҪмҡ°лҘј лҢҖл№„н•ҙ 0мқҙ м•„лӢҢ к°’л§Ң transform
                            if (dropDistance !== 0) {
                                tile.style.transform = `translateY(${dropDistance}px)`;
                            } else {
                                // мқҙ нғҖмқјмқҖ мӢӨм ңлЎңлҠ” мӣҖм§Ғмқҙм§Җ м•ҠмқҖ нғҖмқјмһ„
                                tile.className = 'tile';
                                tile.style.transform = '';
                            }
                            
                        } else {
                            // 'к°Җл§ҢнһҲ мһҲлҠ” нғҖмқј'
                            tile.className = 'tile'; // [мҲҳм •] fall нҒҙлһҳмҠӨ м ңкұ°
                            tile.style.transform = ''; // [мҲҳм •] transform мҙҲкё°нҷ”
                        }
                    }
                }
                
                // 2. м „м—ӯ `tileElements` л°°м—ҙ көҗмІҙ (DOM/лҚ°мқҙн„°/л°°м—ҙ л…јлҰ¬м Ғ мӢұнҒ¬ мҷ„лЈҢ)
                tileElements = newTileElements;
                
                // 3. к°•м ң лҰ¬нҺҳмқёнҠё (мӨ‘мҡ”)
                gameBoard.offsetHeight; 

                // 4. [мҲҳм •] лӘЁл“  'fall' нғҖмқјмқ„ н•ң лІҲм—җ мІҳлҰ¬ (лҰ¬н”ҢлЎңмҡ° мөңмҶҢнҷ”)
const fallTiles = [];
for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
        const tile = tileElements[r][c];
        if (tile && tile.classList.contains('fall')) {
            fallTiles.push(tile);
        }
    }
}

// [мҲҳм •] н•ң лІҲмқҳ rAFм—җм„ң лӘЁл“  нғҖмқј transform ліҖкІҪ (л°°м№ҳ мІҳлҰ¬)
if (fallTiles.length > 0) {
    requestAnimationFrame(() => {
        fallTiles.forEach(tile => {
            tile.style.transform = 'translateY(0)';
            fallPromises.push(new Promise(resolve => {
                tile.addEventListener('transitionend', resolve, { once: true });
            }));
        });
    });
}

                // 5. м• лӢҲл©”мқҙм…ҳ мҷ„лЈҢ лҢҖкё° (transition 0.3s + мҳҲл№„ 0.3s)
                const timeoutPromise = new Promise(resolve => setTimeout(resolve, 600)); 
                await Promise.race([Promise.all(fallPromises), timeoutPromise]);

                // 6. DOM мҲңм„ң мһ¬м •л ¬ л°Ҹ мҠӨнғҖмқј мҙҲкё°нҷ” (лІ„лІ…мһ„ н•ҙкІ°)
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (tileElements[r][c]) {
                            const tile = tileElements[r][c];
                            tile.className = 'tile';
                            tile.style.transform = '';
                            gameBoard.appendChild(tile); // DOM мқҙлҸҷ (л№ лҰ„)
                        }
                    }
                }
                
            }

            // ------------------------------------
            // 7. [мӢ к·ң] мҪӨліҙ н…ҚмҠӨнҠё/м җмҲҳ
            // ------------------------------------
            
            function showComboText(combo, matches) {
                if (combo < 2) return; 

                let totalTop = 0;
                let totalLeft = 0;
                let count = 0;
                const boardRect = gameBoard.getBoundingClientRect();

                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (tileElements[r] && tileElements[r][c]) {
                        const rect = tileElements[r][c].getBoundingClientRect();
                        totalTop += (rect.top - boardRect.top) + (rect.height / 2);
                        totalLeft += (rect.left - boardRect.left) + (rect.width / 2);
                        count++;
                    }
                });
                
                if (count === 0) return;
                const avgTop = totalTop / count;
                const avgLeft = totalLeft / count;

                const comboEl = document.createElement('div');
                comboEl.className = 'combo-text';
                comboEl.textContent = `${combo} мҪӨліҙ!`;
                
                const wrapperRect = gameWrapper.getBoundingClientRect();
                comboEl.style.top = `${avgTop + boardRect.top - wrapperRect.top}px`;
                comboEl.style.left = `${avgLeft + boardRect.left - wrapperRect.left}px`;
                comboEl.style.transform = 'translate(-50%, -50%)'; 

                gameWrapper.appendChild(comboEl);

                setTimeout(() => {
                    comboEl.remove();
                }, 800);
            }

            function showComboScore(turnScore) {
                const scoreEl = document.createElement('div');
                scoreEl.className = 'combo-score';
                scoreEl.textContent = `+${turnScore}`;
                
                comboScoreDisplay.innerHTML = ''; 
                comboScoreDisplay.appendChild(scoreEl);

                setTimeout(() => {
                    scoreEl.remove();
                }, 800);
            }

            // [мӢ к·ң] мӢӯмһҗк°Җ нҸӯл°ң мқҙнҺҷнҠё
function showCrossExplosion(crossExplosions) {
    crossExplosions.forEach(({ row, col }) => {
        if (!tileElements[row] || !tileElements[row][col]) return;
        
        const centerTile = tileElements[row][col];
        const rect = centerTile.getBoundingClientRect();
        const boardRect = gameBoard.getBoundingClientRect();
        const wrapperRect = gameWrapper.getBoundingClientRect();
        
        // мӨ‘мӢ¬ мўҢн‘ң кі„мӮ°
        const centerTop = (rect.top - boardRect.top) + (rect.height / 2) + boardRect.top - wrapperRect.top;
        const centerLeft = (rect.left - boardRect.left) + (rect.width / 2) + boardRect.left - wrapperRect.left;
        
        // мӢӯмһҗк°Җ 4л°©н–Ҙ нҸӯл°ң лқјмқё
        const directions = [
            { angle: 0, length: '200%' },    // мҳӨлҘёмӘҪ
            { angle: 90, length: '200%' },   // м•„лһҳ
            { angle: 180, length: '200%' },  // мҷјмӘҪ
            { angle: 270, length: '200%' }   // мң„
        ];
        
        directions.forEach(({ angle, length }) => {
            const line = document.createElement('div');
            line.style.position = 'absolute';
            line.style.top = `${centerTop}px`;
            line.style.left = `${centerLeft}px`;
            line.style.width = '4px';
            line.style.height = length;
            line.style.background = 'linear-gradient(180deg, #FFD700, #FF6B6B, transparent)';
            line.style.transformOrigin = 'top center';
            line.style.transform = `rotate(${angle}deg)`;
            line.style.opacity = '0';
            line.style.pointerEvents = 'none';
            line.style.zIndex = '150';
            line.style.animation = 'cross-explosion 0.5s ease-out forwards';
            line.style.boxShadow = '0 0 10px #FFD700';
            
            gameWrapper.appendChild(line);
            setTimeout(() => line.remove(), 500);
        });
        
        // мӨ‘мӢ¬ нҸӯл°ң мқҙнҺҷнҠё
        const centerBurst = document.createElement('div');
        centerBurst.style.position = 'absolute';
        centerBurst.style.top = `${centerTop}px`;
        centerBurst.style.left = `${centerLeft}px`;
        centerBurst.style.width = '20px';
        centerBurst.style.height = '20px';
        centerBurst.style.borderRadius = '50%';
        centerBurst.style.background = 'radial-gradient(circle, #FFD700, #FF6B6B)';
        centerBurst.style.transform = 'translate(-50%, -50%) scale(0)';
        centerBurst.style.pointerEvents = 'none';
        centerBurst.style.zIndex = '151';
        centerBurst.style.animation = 'center-burst 0.5s ease-out forwards';
        centerBurst.style.boxShadow = '0 0 20px #FFD700';
        
        gameWrapper.appendChild(centerBurst);
        setTimeout(() => centerBurst.remove(), 500);
        
        // "CROSS!" н…ҚмҠӨнҠё
        const crossText = document.createElement('div');
        crossText.className = 'combo-text';
        crossText.textContent = 'рҹ’Ҙ CROSS! рҹ’Ҙ';
        crossText.style.top = `${centerTop}px`;
        crossText.style.left = `${centerLeft}px`;
        crossText.style.transform = 'translate(-50%, -50%)';
        crossText.style.fontSize = '2em';
        crossText.style.color = '#FFD700';
        crossText.style.textShadow = '2px 2px 8px rgba(255,107,107,0.8)';
        
        gameWrapper.appendChild(crossText);
        setTimeout(() => crossText.remove(), 800);
    });
}

            // ------------------------------------
            // 8. м…”н”Ң лЎңм§Ғ (кё°мЎҙкіј лҸҷмқј)
            // ------------------------------------
            function checkForPossibleMoves() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (c < COLS - 1) {
                            if (checkMove(r, c, r, c + 1)) return true;
                        }
                        if (r < ROWS - 1) {
                            if (checkMove(r, c, r + 1, c)) return true;
                        }
                    }
                }
                return false; 
            }
            function checkMove(r1, c1, r2, c2) {
    swapData(r1, c1, r2, c2);
    const matchData = findAllMatches();
    swapData(r1, c1, r2, c2); 
    return matchData.matches.size > 0;
}
            async function handleNoMoreMoves() {
    console.log("лҚ” мқҙмғҒ мӣҖм§Ғмқј мҲҳ м—ҶмқҢ! м…”н”Ңн•©лӢҲлӢӨ.");
    
    const shuffleText = document.createElement('div');
    shuffleText.className = 'combo-text';
    shuffleText.textContent = 'SHUFFLE!';
    shuffleText.style.top = '50%';
    shuffleText.style.left = '50%';
    shuffleText.style.transform = 'translate(-50%, -50%)';
    gameWrapper.appendChild(shuffleText);
    setTimeout(() => shuffleText.remove(), 800);
    
    await new Promise(resolve => setTimeout(resolve, 300));

    shuffleBoard(); 

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if(tileElements[r][c]) {
                tileElements[r][c].textContent = board[r][c];
                tileElements[r][c].className = 'tile new'; 
                tileElements[r][c].dataset.row = r;
                tileElements[r][c].dataset.col = c;
            }
        }
    }
    await new Promise(resolve => setTimeout(resolve, 300));

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if(tileElements[r][c]) {
                tileElements[r][c].className = 'tile';
            }
        }
    }
    
    const matchData = findAllMatches();
    if (matchData.matches.size > 0) {
        await processMatchesAndCascade(matchData);
    }
}

            function shuffleBoard() {
                console.log("ліҙл“ң лҚ°мқҙн„° м…”н”Ң мӨ‘...");
                createBoardData(); 
            }

            // [мӢ к·ң] кІҢмһ„ мҠӨнғҜ м—…лҚ°мқҙнҠё н•ЁмҲҳ (н…ҢнҠёлҰ¬мҠӨ.htmlм—җм„ң к°Җм ёмҷҖ мҲҳм •)
            function updatePlayerStats(didIWin, finalScore) { 
                if (!playerUid || playerUid.startsWith('guest_')) return;
                
                // 'win', 'loss', 'draw' мӨ‘ н•ҳлӮҳ
                const result = (didIWin === null) ? 'draws' : (didIWin ? 'wins' : 'losses');
                
                // [мҲҳм •] 'candysoap' кІҪлЎңлЎң ліҖкІҪ
                const userStatsRef = db.ref('users').child(playerUid).child('gameStats/candysoap');

                userStatsRef.transaction(currentStats => {
                    if (currentStats === null) {
                        currentStats = { wins: 0, losses: 0, draws: 0, plays: 0, highscore: 0 };
                    }
                    currentStats.plays = (currentStats.plays || 0) + 1;
                    currentStats[result] = (currentStats[result] || 0) + 1;
                    // [мҲҳм •] 'score' (м „м—ӯ ліҖмҲҳ) лҢҖмӢ  'finalScore' (л§Өк°ңліҖмҲҳ) мӮ¬мҡ©
                    currentStats.highscore = Math.max(currentStats.highscore || 0, finalScore); 
                    return currentStats;
                });
                
                // кІҪн—ҳм№ҳ л°Ҹ нҸ¬мқёнҠё м§Җкёү (н…ҢнҠёлҰ¬мҠӨмҷҖ лҸҷмқјн•ҳкІҢ)
                let expGained = 50, pointsGained = 50;
                if(didIWin === true) { expGained = 150; pointsGained = 100; } // 1л“ұ
                else if (didIWin === null) { expGained = 75; pointsGained = 75; } // л¬ҙмҠ№л¶Җ (нҳ„мһ¬ м• лӢҲнҢЎм—” м—ҶмқҢ)
                // 2~4л“ұмқҖ кё°ліё м җмҲҳ
                
                const userProfileRef = db.ref('users').child(playerUid).child('profile');
                userProfileRef.child('exp').transaction(exp => (exp || 0) + expGained);
                userProfileRef.child('points').transaction(points => (points || 0) + pointsGained);
            }

            // [мӢ к·ң] 'мӮ¬мІңм„ұ' л°©мӢқмқҳ м•Ҳм „н•ң лӮҳк°Җкё° н•ЁмҲҳ
            function cleanupAndExit() {
                console.log("Cleanup and Exit called");
                isExiting = true; // лӘЁл“  лҰ¬мҠӨл„Ҳ мӨ‘м§Җ н”Ңлһҳк·ё
                
                if (timerId) clearInterval(timerId);
                if (feverTimerId) clearTimeout(feverTimerId);

                // onDisconnect н•ёл“Өлҹ¬ м·ЁмҶҢ мӢңлҸ„
                if (hostStatusDisconnectRef) { try { hostStatusDisconnectRef.cancel(); } catch(e) {} }
                
                let removePromise = Promise.resolve(); 

                if (roomRef && playerUid) {
                    roomRef.off(); // [н•өмӢ¬] мқҙ нҒҙлқјмқҙм–ёнҠёмқҳ 'roomRef.on('value')' лҰ¬мҠӨл„Ҳ мӨ‘м§Җ

                    if (isHost) {
                        console.log("Host removing room...");
                        removePromise = roomRef.remove();
                    } else {
                        console.log("Guest removing self from players...");
                        // [мҲҳм •] 'м• лӢҲнҢЎ'мқҖ players л…ёл“ңл§Ң м ңкұ°
                        removePromise = roomRef.child('players/' + playerUid).remove();
                    }
                }

                removePromise
                    .catch(e => console.error("Firebase remove operation failed:", e))
                    .finally(() => {
                        console.log("Redirecting to лҢҖкё°мӢӨ.html");
                        window.location.replace('лҢҖкё°мӢӨ.html');
                    });
            }

        });
    </script>
