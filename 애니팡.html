<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>애니팡</title> 
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* ------------------------- */
        /* == 1. 앱 공통 테마 == */
        /* ------------------------- */
        :root {
            --bg-color: #FFFBEB;
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD93D;
            --text-color-dark: #574141;
            --text-color-light: #ffffff;
            --danger-color: #F76363;
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2;
            --panel-shadow: #E4DCCF;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color-dark);
            display: flex; flex-direction: column;
            /* [수정] 레이아웃 중앙 정렬 */
            justify-content: flex-start; /* [수정] center -> flex-start (상단 정렬) */
            align-items: center;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
            /* [수정] body의 패딩을 #game-wrapper로 이동 */
            /* padding: 10px; */ 
        }

        /* ------------------------- */
        /* == 2. [수정] 게임 레이아웃 (통합 프레임) == */
        /* ------------------------- */
        #game-wrapper { 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            justify-content: flex-start; /* [수정] center -> flex-start (상단 정렬) */
            align-items: center; /* [수정] 새 프레임을 수평 중앙 정렬 */
            
            /* [수정] body의 padding을 wrapper로 이동 및 safe-area와 결합 */
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            padding-left: 10px;
            padding-right: 10px;
            
            position: relative; 
        }

        /* [신규] 모든 것을 감싸는 단일 프레임 */
        #game-area-frame {
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            /* [수정] 보더와 쉐도우를 이 프레임으로 이동 */
            border: 4px solid var(--panel-border); 
            box-shadow: 6px 6px 0px 0px var(--panel-shadow);
            border-radius: 20px;
            width: 100%;
            max-width: 430px;
            /* [수정] 높이를 제한하여 flex-grow가 작동하도록 함 */
            height: 100%; /* [수정] 95% -> 100%로 변경 */
            /* max-height: 800px; [수정] 최대 높이 제한 제거 */
            padding: 10px;
            overflow: hidden; /* 내부 요소가 둥근 모서리를 넘지 않도록 */
        }
        
        /* [신규] 프레임 내부의 새 헤더 (스코어보드용) */
        #game-stats-header {
            flex-shrink: 0;
            padding-bottom: 8px;
            border-bottom: 3px solid var(--panel-border);
        }

        /* [수정] 스코어보드 (간격/폰트 조절) */
        #multiplayer-scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px; /* [수정] 간격 축소 */
            width: 100%;
        }

        /* [수정] 스탯 박스 (컴팩트하게) */
        .stat-box {
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 2px 5px; /* [수정] 패딩 축소 */
            text-align: center;
            font-weight: 900;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .stat-box.my-score {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            transform: scale(1.02); /* [수정] 스케일 살짝 줄임 */
        }
        .stat-box .label {
            font-size: 0.7em; /* [수정] 폰트 축소 */
            color: #9A6A3A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }
        .stat-box .value {
            font-size: 1.2em; /* [수정] 폰트 축소 */
            color: var(--primary-color);
        }

        /* [신규] 프레임 내부의 새 푸터 (타이머/게이지용) */
        #game-stats-footer {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 8px;
            border-top: 3px solid var(--panel-border);
        }

        /* [수정] 타이머 (하단으로 이동, 컴팩트하게) */
        #timer-container {
            flex-shrink: 0; /* 크기 고정 */
            width: 100px; /* [수정] 너비 고정 */
            text-align: center;
            font-weight: 900;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 2px 5px; /* [수정] 패딩 축소 */
            margin: 0; /* [수정] 자동 마진 제거 */
        }
        #timer-container .label { font-size: 0.8em; color: #9A6A3A; } /* [수정] 폰트 축소 */
        #timer-container .value {
            font-size: 1.6em; /* [수정] 폰트 축소 */
            color: var(--primary-color);
            transition: color 0.3s ease;
        }
        #timer-container .value.danger-time {
            color: var(--danger-color);
            animation: throb 1.2s infinite ease-in-out;
        }
        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* [수정] 피버 게이지 (하단으로 이동, flex-grow) */
        #fever-gauge-container {
            flex-grow: 1; /* [수정] 남은 공간 모두 차지 */
            width: auto; /* [수정] 자동 너비 */
            max-width: none; /* [수정] 최대 너비 제거 */
            height: 22px;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 20px;
            margin: 0; /* [수정] 자동 마진 제거 */
            position: relative;
            overflow: hidden;
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.1);
        }
        #fever-gauge-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            border-radius: 20px;
            transition: width 0.3s ease-out;
        }
        #fever-gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9em;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* [수정] 게임 컨테이너 (프레임 내부로 이동) */
        #game-container {
            width: 100%; 
            flex-grow: 1; /* [수정] 핵심: 남은 수직 공간 모두 차지 */
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
            padding: 5px 0; /* [수정] 보드 상하 여백 10px -> 5px로 축소 */
        }
        
        /* [수정] 게임 보드 (시각적 요소 제거) */
        #game-board {
            position: relative; 
            background-color: #FFFEF5; /* [수정] 살짝 배경색 추가 */
            /* [수정] 프레임으로 이동 (제거) */
            /* box-shadow: 6px 6px 0px 0px var(--panel-shadow); */ 
            /* border: none; */
            border: 2px solid var(--panel-border); /* [수정] 얇은 내부 테두리 */
            border-radius: 12px;
            display: grid; 
            gap: 2px;
            padding: 4px;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
        }

        /* ------------------------- */
        /* == 3. 타일 스타일 (유지) == */
        /* ------------------------- */
        .tile {
            background-color: #FFFEF5; 
            border-radius: 10px; 
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5em; 
            cursor: pointer;
            border: 1px solid var(--panel-border);
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.15), 
                        inset -2px -2px 4px rgba(255, 255, 255, 0.7);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.2s ease,
                        box-shadow 0.2s ease;
        }
        .tile:active {
            box-shadow: inset 1px 1px 2px rgba(87, 65, 65, 0.2), 
                        inset -1px -1px 2px rgba(255, 255, 255, 0.7);
            transform: scale(0.95);
        }
        
        .tile.pop { animation: pop 0.2s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0.1); opacity: 0; }
        }

        .tile.fall {
            transition: transform 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53);
        }
        
        .tile.new-tile-anim { animation: new-tile 0.2s ease-out; }
        @keyframes new-tile {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .tile.swap { transition: transform 0.2s ease-in-out; z-index: 10; }
        .tile.invalid { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* ------------------------- */
        /* == 4. 모달 (유지) == */
        /* ------------------------- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; 
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: var(--panel-bg); 
            color: var(--text-color-dark); 
            padding: 0; 
            border-radius: 24px;
            width: 90%; max-width: 400px; 
            box-shadow: 8px 8px 0px 0px var(--text-color-dark);
            overflow: hidden; 
            border: 4px solid var(--text-color-dark);
        }
        .modal-header { 
            background-color: var(--primary-color);
            color: white; 
            padding: 15px; 
            border-bottom: 4px solid #C04A4A; 
        }
        .modal-header h2 { font-size: 1.6em; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .modal-body { padding: 25px; }
        .modal-footer {
            display: flex; gap: 10px;
            padding: 20px;
            border-top: 3px solid var(--panel-border);
            background-color: #FFFAE0;
        }

        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown-number { font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7); animation: countdown-pop 1s; }
        @keyframes countdown-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #final-score {
            font-size: 2.0em;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 0px;
        }
        #final-ranking-list {
            text-align: left;
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* ------------------------- */
        /* == 5. 아케이드 버튼 (유지) == */
        /* ------------------------- */
        .menu-btn { 
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: 900; 
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer; 
            transition: all 0.1s ease-out;
            border-bottom: 5px solid;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            margin: 5px 0; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .menu-btn.primary { 
            background-color: var(--primary-color);
            color: white; 
            border-bottom-color: #C04A4A;
        }
        .menu-btn.secondary { 
            background-color: var(--secondary-color);
            color: white; 
            border-bottom-color: #379A93;
        }
        
        /* ------------------------- */
        /* == 6. 콤보 텍스트/점수 (유지) == */
        /* ------------------------- */
        .combo-text {
            position: absolute;
            font-size: 2.5em;
            font-weight: 900;
            color: rgb(243, 41, 41);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            z-index: 100;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }
        
        .combo-score {
            position: absolute;
            font-size: 1.8em;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 101;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }

        @keyframes combo-pop {
            0% { transform: scale(0.8); opacity: 1; }
            20% { transform: scale(1.3); }
            40% { transform: scale(1); }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* ------------------------- */
        /* == 7. 피버 게이지 UI (수정됨) == */
        /* ------------------------- */
        /* #fever-gauge-container 스타일은 2번 섹션으로 이동/통합됨 */
        
        /* 피버 모드 활성화 시 UI */
        /* [수정] 게임 보드 (격자판)의 테두리 효과 강화 */
        #game-board.fever-active {
            animation: fever-pulse 0.7s infinite alternate;
        }
        @keyframes fever-pulse {
            from { 
                box-shadow: 0 0 10px rgba(200, 200, 200, 0.5); 
                border-color: var(--panel-border); 
            }
            to { 
                /* [수정] 그림자를 더 크고 붉게, 테두리도 선명하게 */
                box-shadow: 0 0 30px 10px rgba(255, 107, 107, 0.7); 
                border-color: #FF0000; 
            }
        }

        /* [신규] 게임 프레임 (흰색 패널)의 배경 깜빡임 효과 */
        #game-area-frame.fever-active {
            animation: fever-frame-pulse 0.7s infinite alternate;
        }
        @keyframes fever-frame-pulse {
            from { 
                background-color: var(--panel-bg); /* 기본 흰색 */
            }
            to { 
                background-color: #FFF6F6; /* 붉은 기운이 도는 배경색 */
                border-color: var(--primary-color);
            }
        }
    </style>
</head>
<body>
    <div id="game-wrapper">

        <div id="game-area-frame">

            <div id="game-stats-header">
                <div id="multiplayer-scoreboard">
                    <div class="stat-box"><div class="label">플레이어 1</div><div class="value">0</div></div>
                    <div class="stat-box"><div class="label">플레이어 2</div><div class="value">0</div></div>
                    <div class="stat-box"><div class="label">플레이어 3</div><div class="value">0</div></div>
                    <div class="stat-box"><div class="label">플레이어 4</div><div class="value">0</div></div>
                </div>
            </div>

            <div id="game-container">
                <div id="combo-score-display" style="position: absolute; top: 10px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 101;"></div>
                <div id="game-board">
                    </div>
            </div>

            <div id="game-stats-footer">
                <div id="fever-gauge-container">
                    <div id="fever-gauge-fill"></div>
                    <span id="fever-gauge-text">FEVER</span>
                </div>
                <div id="timer-container">
                    <div class="label">시간</div>
                    <div class="value" id="timer-value">60</div>
                </div>
            </div>

        </div> </div> <div id="loading-overlay" class="overlay active">
        <div class="spinner"></div>
        <p style="color: white; font-size: 1.2em;">방에 접속 중입니다...</p>
    </div>

    <div id="info-overlay" class="overlay"> <div id="countdown-number">3</div>
    </div>

    <div id="game-over-overlay" class="overlay">
         <div class="modal-content">
             <div class="modal-header">
                 <h2>게임 종료!</h2>
             </div>
             <div class="modal-body">
                <p id="final-rank-title" style="font-size: 1.2em; margin-bottom: 15px;">🏆 최종 순위 🏆</p>
                <div id="final-ranking-list">
                   </div>
                <hr style="margin: 15px 0; border: 1px solid var(--panel-border);">
                <p style="font-size: 1.1em; font-weight: 700;">내 점수</p>
                <p id="final-score" style="margin-bottom: 0;">0</p>
             </div>
             <div class="modal-footer">
                 <button id="rematch-btn" class="menu-btn primary">다시하기</button>
                 <button id="lobby-btn" class="menu-btn secondary">대기실로</button>
             </div>
         </div>
    </div>

    <audio id="swap-sound" src="./sounds/move.wav" preload="auto"></audio>
    <audio id="match-sound" src="./봄버맨사운드/사천성맞춤.mp3" preload="auto"></audio>
    <audio id="gameover-sound" src="./봄버맨사운드/패배.mp3" preload="auto"></audio>
    <audio id="combo1-sound" src="./sounds/combo1.mp3" preload="auto"></audio>
    <audio id="combo2-sound" src="./sounds/combo2.mp3" preload="auto"></audio>
    <audio id="combo3-sound" src="./sounds/combo3.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // ------------------------------------
            // 1. DOM 요소 및 기본 설정
            // ------------------------------------

            const gameBoard = document.getElementById('game-board');
            const timerValue = document.getElementById('timer-value');
            const infoOverlay = document.getElementById('info-overlay');
            const countdownNumber = document.getElementById('countdown-number');
            const gameOverOverlay = document.getElementById('game-over-overlay');
            const finalScoreEl = document.getElementById('final-score');
            const restartBtn = document.getElementById('restart-btn');
            const gameContainer = document.getElementById('game-container'); 
            const loadingOverlay = document.getElementById('loading-overlay');
            const multiplayerScoreboard = document.getElementById('multiplayer-scoreboard');
            const finalRankingList = document.getElementById('final-ranking-list');
            const timerDisplay = document.getElementById('timer-container').querySelector('.value');
            const gameWrapper = document.getElementById('game-wrapper'); 
            const gameAreaFrameEl = document.getElementById('game-area-frame'); // [신규] 전체 프레임 참조
            const comboScoreDisplay = document.getElementById('combo-score-display'); 

            const sounds = {
                swap: document.getElementById('swap-sound'),
                match: document.getElementById('match-sound'),
                gameOver: document.getElementById('gameover-sound'),
                combo: [
                    document.getElementById('combo1-sound'),
                    document.getElementById('combo2-sound'),
                    document.getElementById('combo3-sound')
                ]
            };

            // [수정] 타일 수 (8x6 = 48개)
            const ROWS = 8;
            const COLS = 6;
            // [수정] 이모지 (5개 동물)
            const TILE_EMOJIS = ['🐄', '🐯', '🐳', '🐷', '🦒']; 
            const GAME_TIME = 60; // [수정] 5초 -> 60초 (원래대로)

            let board = []; 
            let tileElements = []; 
            let score = 0;
            let timer = GAME_TIME;
            let timerId = null;
            let isProcessing = true;
            let currentCombo = 0;

            let dragStartTile = null;
            let dragStartX = 0;
            let dragStartY = 0;
            // --- ✨ [신규] 피버 시스템 변수 ---
            let feverGauge = 0;
            const MAX_FEVER_GAUGE = 100; // (게이지 최대치, 100으로 설정)
            let isFeverMode = false;
            const FEVER_DURATION = 7000; // (피버 지속 시간, 5초 = 5000ms)
            let feverTimerId = null;
            // --- 피버 시스템 끝 ---

            // ------------------------------------
            // 2. Firebase (멀티플레이)
            // ------------------------------------
            
            let db, auth;
            let currentRoomId = null;
            let currentUser = null;
            let playerUid = null;
            let playerRef = null;
            let roomRef = null;
            let allPlayersRef = null;

            function createBoardData() {
                board = [];
                for (let r = 0; r < ROWS; r++) { // ROWS = 8
                    const row = [];
                    for (let c = 0; c < COLS; c++) { // COLS = 6
                        let newEmoji;
                        do {
                            newEmoji = getRandomEmoji();
                        } while (
                            (c >= 2 && newEmoji === row[c - 1] && newEmoji === row[c - 2]) ||
                            (r >= 2 && newEmoji === board[r - 1][c] && newEmoji === board[r - 2][c])
                        );
                        row.push(newEmoji);
                    }
                    board.push(row);
                }
                const initialMatches = findAllMatches();
                if (initialMatches.size > 0) {
                    createBoardData(); 
                }
            }
            function getRandomEmoji() {
                return TILE_EMOJIS[Math.floor(Math.random() * TILE_EMOJIS.length)];
            }

            // [수정] "타일 안맞음" 버그 해결 (JS 로직은 수정 없이 그대로 작동)
            function renderBoard() {
                gameBoard.innerHTML = '';
                tileElements = [];
                
                // [중요] 레이아웃 변경으로 인해, #game-container의 패딩을 JS에서 읽어야 함
                const gameContainerStyles = window.getComputedStyle(gameContainer);
                const containerPaddingTop = parseFloat(gameContainerStyles.paddingTop) || 0;
                const containerPaddingBottom = parseFloat(gameContainerStyles.paddingBottom) || 0;
                
                const containerW = gameContainer.clientWidth;
                // [수정] 사용 가능한 높이는 컨테이너 높이에서 상하 패딩을 뺀 값
                const containerH = gameContainer.clientHeight - containerPaddingTop - containerPaddingBottom; 
                
                if (containerW <= 0 || containerH <= 0) { 
                    console.warn("컨테이너 크기 오류", containerW, containerH);
                    // [수정] 렌더링 재시도
                    setTimeout(renderBoard, 100);
                    return; 
                }

                // [수정] 계산에 필요한 모든 CSS 값
                const gap = 2; // grid-gap
                const boardPadding = 4; // #game-board padding
                const boardBorder = 2; // [수정] #game-board border (4->2)
                
                // [수정] 컨테이너 자체 패딩(10)은 이제 JS 계산에 불필요함
                // const containerPadding = 10; 
                
                const availableW = containerW; // [수정] game-container의 패딩은 0 (좌우)
                const availableH = containerH; // [수정] game-container의 패딩은 0 (상하, 위에서 뺌)

                const tileW_calc = (availableW - (boardPadding * 2) - (boardBorder * 2) - (COLS - 1) * gap) / COLS;
                const tileH_calc = (availableH - (boardPadding * 2) - (boardBorder * 2) - (ROWS - 1) * gap) / ROWS;

                const tileSize = Math.floor(Math.min(tileW_calc, tileH_calc));
                
                if (tileSize <= 0) { 
                    console.warn("타일 크기 계산 오류", tileSize);
                    return; 
                }
                
                const finalBoardW = (tileSize * COLS) + (COLS - 1) * gap + (boardPadding * 2) + (boardBorder * 2);
                const finalBoardH = (tileSize * ROWS) + (ROWS - 1) * gap + (boardPadding * 2) + (boardBorder * 2);

                gameBoard.style.width = `${finalBoardW}px`;
                gameBoard.style.height = `${finalBoardH}px`; 
                gameBoard.style.gridTemplateColumns = `repeat(${COLS}, ${tileSize}px)`; 
                gameBoard.style.gridTemplateRows = `repeat(${ROWS}, ${tileSize}px)`; 
                
                const iconSize = tileSize * 0.7; // 폰트 크기

                for (let r = 0; r < ROWS; r++) {
                    const rowElements = [];
                    for (let c = 0; c < COLS; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.dataset.row = r;
                        tile.dataset.col = c;
                        tile.textContent = board[r][c];
                        tile.style.fontSize = `${iconSize}px`; 
                        gameBoard.appendChild(tile);
                        rowElements.push(tile);
                        tile.addEventListener('pointerdown', handleDragStart);
                    }
                    tileElements.push(rowElements);
                }
            }

            function startCountdown() {
                // [수정] countdownStarted 플래그로 중복 실행 방지

                // 'waiting' 상태에서 스피너로 덮어썼기 때문에, countdownNumber 요소가 더 이상 존재하지 않습니다.

                         countdownNumberEl.style.animation = 'none';
                         countdownNumberEl.offsetHeight;

                     }
                 } else {
                        clearInterval(interval);
                        infoOverlay.classList.remove('active');
                        
                        // [수정] 레이아웃이 계산될 때까지 기다립니다.
                        function runGame() {
                            // renderBoard()가 의존하는 gameContainer의 크기를 확인합니다.
                            // [수정] clientHeight도 0보다 큰지 확인하여 렌더링 오류 방지
                            if (gameContainer.clientWidth > 0 && gameContainer.clientHeight > 0) {

                                initGame();
                                startGame();
                            } else {
                                // 아직 0이면 다음 프레임에 다시 시도

                        }
                        
                        // 다음 애니메이션 프레임에서 게임 시작 시도
                        requestAnimationFrame(runGame);
                    }
                }, 1000);
            }

            function startGame() {
                // [수정] 보드 렌더링이 안됐을 경우를 대비
                if (tileElements.length === 0) { 
                    console.log("렌더링 재시도...");

       // [수정] 최대 시도 횟수 증가 및 간격 단축
// [수정] (Tetris/ShisenSho 방식 적용)
        // checkAttempts 변수 및 관련 상수는 이 함수 내부에서만 사용
        let checkGameOverAttempts = 0;
        const MAX_CHECK_ATTEMPTS = 20; // 10초 (500ms * 20)
        const CHECK_INTERVAL = 500;

        // [수정] 함수 이름을 변경하고 (checkAllPlayersFinished -> checkGameOverCondition)
        // 호스트/게스트 공용 함수로 변경
        function checkGameOverCondition() {
            // 1. 이미 결과창이 떴으면 중복 실행 방지
            if (gameOverOverlay.classList.contains('active')) {
                return;
            }
            
            // 2. allPlayersRef가 없으면 (방이 터졌으면) 강제 종료
            if (!allPlayersRef) {
                console.warn("[CheckGameOver] allPlayersRef가 없습니다. 강제 종료.");
                forceGameOver(); // (결과: 방이 종료됨)
                return;
            }

            checkGameOverAttempts++;
            console.log(`[CheckGameOver] (공용) 플레이어 종료 체크 (${checkGameOverAttempts}/${MAX_CHECK_ATTEMPTS})`);

            // 3. (신규) 호스트/게스트 구분 없이 "즉시" allPlayersRef를 확인
            allPlayersRef.once('value', (snapshot) => {
                const players = snapshot.val();
                if (!players) {
                    console.warn("[CheckGameOver] players 데이터가 없습니다. 강제 종료.");
                    forceGameOver(); // (결과: 방이 종료됨)
                    return;
                }

                const playerArray = Object.values(players);
                const allFinished = playerArray.length > 0 && playerArray.every(p => p.isFinished === true);

                // 4. (신규) "모두 종료"가 확인되면, 즉시 로컬에서 forceGameOver() 호출
                if (allFinished) {
                    console.log("[CheckGameOver] 모든 플레이어 종료 확인! 즉시 결과 표시.");
                    
                    // (선택적) 호스트가 status: 'finished'를 쏴서, 
                    // 체크가 늦는 다른 플레이어에게 신호를 줄 수 있음 (안전장치)
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver(); // "즉시" 로컬에서 결과창 표시
                    checkGameOverAttempts = 0; // 초기화
                }
                // 5. (신규) 아직 "모두 종료"가 아니면, 재시도 (안전장치)
                else if (checkGameOverAttempts < MAX_CHECK_ATTEMPTS) {
                    console.log(`[CheckGameOver] 아직 모두 종료되지 않음. ${CHECK_INTERVAL}ms 후 재시도...`);
                    setTimeout(checkGameOverCondition, CHECK_INTERVAL);
                }
                // 6. (신규) 최대 시도 횟수 초과 (안전장치)
                else {
                    console.warn("[CheckGameOver] 최대 체크 횟수 초과. 강제로 결과 표시.");
                    
                    // (선택적) 호스트가 강제로 status: 'finished' 설정
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver();
                    checkGameOverAttempts = 0;
                }
            });
        }

            // [수정] "게스트 멈춤" 버그 해결 (리스너 정리)
            function forceGameOver() {
                if (gameOverOverlay.classList.contains('active')) return;
                gameOverOverlay.classList.add('active'); // 중복 방지

                // [버그 수정] 게임이 정상 종료되었으므로, 호스트의 onDisconnect 핸들러 취소
                if (isHost && hostStatusDisconnectRef) {
                    try {
                        hostStatusDisconnectRef.cancel();
                        hostStatusDisconnectRef = null;
                        console.log("게임 정상 종료: 호스트 onDisconnect 핸들러를 취소했습니다.");
                    } catch (e) {
                        console.warn("호스트 onDisconnect 핸들러 취소 실패:", e);
                    }
                }

                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                isProcessing = true; 
                loadingOverlay.classList.remove('active');
                
                if (!allPlayersRef) {
                    finalRankingList.innerHTML = '<p style="text-align: center;">방 연결이 끊겼습니다.</p>';
                    finalScoreEl.textContent = `${score.toLocaleString()} 점`;
                    return;
                }
                
                allPlayersRef.once('value', (snapshot) => {
                    // [수정] 콜백 함수 내부에서 리스너 즉시 끄기
                    if (allPlayersRef) {
                        allPlayersRef.off();
                        console.log("결과 모달 표시 완료. allPlayersRef 리스너를 끕니다.");
                    }
                    if (statusRef) {
                        statusRef.off();
                        console.log("statusRef 리스너를 끕니다.");
                    }
                    
                    const players = snapshot.val();
                    if (!players) {
                        // [수정] players가 null일 때 (방이 삭제됨)
                        finalRankingList.innerHTML = '<p style="text-align: center;">방이 종료되었습니다.</p>';
                        finalScoreEl.textContent = `${score.toLocaleString()} 점`;
                        return; // [수정] null일 때 여기서 반환
                    }

                    const sortedPlayers = Object.entries(players)
                        .map(([uid, data]) => ({ uid, ...data }))
                        .sort((a, b) => (b.score || 0) - (a.score || 0));

                        // [신규] 내 랭킹과 승/패 여부, 최종 점수 확인
                    let myFinalRank = -1;
                    let myFinalScore = 0;
                    
                    sortedPlayers.forEach((player, index) => {
                        if (player.uid === playerUid) {
                            myFinalRank = index + 1;
                            myFinalScore = player.score || 0;
                        }
                    });

                    // [신규] 1등=승리, 2/3/4등=패배 (무승부 없음)
                    const didIWin = (myFinalRank === 1);
                    
                    // [신규] 스탯 업데이트 함수 호출
                    updatePlayerStats(didIWin, myFinalScore);

                    finalRankingList.innerHTML = '';
                    sortedPlayers.forEach((player, index) => {
                        const rank = index + 1;
                        const nickname = player.nickname || 'Unknown';
                        const score = player.score || 0;
                        const p = document.createElement('p');
                        let rankText = `${rank}위: ${nickname} (${score.toLocaleString()}점)`;
                        if (player.uid === playerUid) {
                            rankText = `<strong>${rankText} (YOU)</strong>`;
                            finalScoreEl.textContent = `${score.toLocaleString()} 점`;
                        }
                        p.innerHTML = rankText;
                        finalRankingList.appendChild(p);

                        // [버그 수정] 게스트 재접속 시 로컬 score(0점)가 아닌,
                        // Firebase에서 가져온 player.score를 사용해야 함
                        if (player.uid === playerUid) {
                            finalScoreEl.textContent = `${player.score.toLocaleString()} 점`;
                        }

                        
                    });

                    // [신규] '다시하기' / '대기실로' 버튼 리스너 (Tetris/ShisenSho 방식)
                    // [수정] 버튼 리스너는 한 번만 등록
                    const rematchBtn = document.getElementById('rematch-btn');
                    const lobbyBtn = document.getElementById('lobby-btn');
    
                    if (lobbyBtn.dataset.listener !== 'true') {
                        lobbyBtn.addEventListener('click', cleanupAndExit);
                        lobbyBtn.dataset.listener = 'true';
                    }
                    
                    if (rematchBtn.dataset.listener !== 'true') {
                        rematchBtn.addEventListener('click', () => {
                            rematchBtn.textContent = '상대방 기다리는 중...';
                            rematchBtn.disabled = true;
                            if (roomRef && playerUid) {
                                roomRef.child('rematchRequests/' + playerUid).set(true);
                            }
                        });
                        rematchBtn.dataset.listener = 'true';
                    }
                    
                    // [신규] '다시하기' 리스너 시작
                    listenForRematch();
                });
            }

            // [신규] '다시하기' 수신 리스너 (Tetris/ShisenSho 방식)
            function listenForRematch() {
                 if (!roomRef) return;
                 const rematchRef = roomRef.child('rematchRequests');
                 
                 rematchRef.on('value', snapshot => {
                      // [수정] 게임오버 모달이 켜져있을 때만 작동
                      if (!snapshot.exists() || !currentRoomData || !currentRoomData.players || !gameOverOverlay.classList.contains('active')) {
                        return;
                      }

                      const requests = snapshot.val();
                      const requestCount = Object.keys(requests).length;
                      const playerCount = Object.keys(currentRoomData.players).length;

                      // 모든 플레이어가 동의했고, 내가 호스트라면
                      if (playerCount >= 2 && requestCount === playerCount && isHost) {
                            rematchRef.off(); // 리스너 정리
                            
                            // [수정] '애니팡' 게임 재시작을 위한 상태값 초기화
                            roomRef.update({
                                rematchRequests: null,
                                status: 'waiting',      // 방 상태를 '대기'로
                                // 'playing' 상태에서 생성된 게임 데이터 초기화
                                gameStarted: false, 
                                // (readyPlayers는 'waiting' 상태에서 다시 채워짐)
                                readyPlayers: null     
                            });
                      }
                 });
            }

            // ------------------------------------

            }
            // ------------------------------------
            // 5. 컨트롤 (드래그) (수정)
            // ------------------------------------

            function handleDragStart(e) {
                if (isProcessing) return;
                // [수정] "고스트 터치" 해결: e.currentTarget 대신 dataset으로 좌표 찾기
                const row = parseInt(e.currentTarget.dataset.row, 10);
                const col = parseInt(e.currentTarget.dataset.col, 10);

                // [수정] tileElements에서 DOM 요소를 다시 참조
                const tile = tileElements[row][col]; 
                
                if (!tile) {
                    console.error("고스트 터치 방지: 타일을 찾을 수 없음", row, col);
                    return;
                }

                dragStartTile = { row: row, col: col, el: tile };
                dragStartX = e.clientX || (e.touches && e.touches[0].clientX);
                dragStartY = e.clientY || (e.touches && e.touches[0].clientY);
                window.addEventListener('pointerup', handleDragEnd, { once: true });
                window.addEventListener('pointercancel', handleDragEnd, { once: true });
            }

            function handleDragEnd(e) {
                if (!dragStartTile) return;
                const dragEndX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const dragEndY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const deltaX = dragEndX - dragStartX;
                const deltaY = dragEndY - dragStartY;
                const threshold = dragStartTile.el.clientWidth / 3; 
                let targetRow = dragStartTile.row;
                let targetCol = dragStartTile.col;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > threshold) {
                    targetCol += (deltaX > 0) ? 1 : -1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > threshold) {
                    targetRow += (deltaY > 0) ? 1 : -1;
                } else {
                    dragStartTile = null; return;
                }
                if (targetRow < 0 || targetRow >= ROWS || targetCol < 0 || targetCol >= COLS) {
                    dragStartTile = null; return;
                }
                attemptSwap(dragStartTile.row, dragStartTile.col, targetRow, targetCol);
                dragStartTile = null;
            }

            // ------------------------------------
            // 6. 게임 로직 (수정)
            // ------------------------------------
            
            async function attemptSwap(r1, c1, r2, c2) {
                if (isProcessing) return;
                isProcessing = true; // [수정] 입력 잠금

                playSound('swap');
                swapData(r1, c1, r2, c2); // 1. 데이터 스왑
                await animateSwap(r1, c1, r2, c2); // 2. DOM 스왑 (애니메이션 대기)
                
                const matches = findAllMatches();
                
                if (matches.size > 0) {
                    // --- 매칭 성공 ---
                    if (isFeverMode) {
                        // [신규] 피버 모드: 백그라운드에서 처리하고 즉시 입력 잠금 해제
                        processMatchesAndCascade(matches);
                        isProcessing = false;
                    } else {
                        // [기존] 일반 모드: 연쇄 폭발이 끝날 때까지 대기
                        await processMatchesAndCascade(matches);
                        isProcessing = false;
                    }
                } else {
                    // --- 매칭 실패 ---
                    // (피버 모드용으로 수정된 animateInvalidSwap 함수가 호출됨)
                    await animateInvalidSwap(r1, c1, r2, c2); 
                    isProcessing = false;
                }
            }
            function swapData(r1, c1, r2, c2) {
                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }
            // [수정] "고스트 터치" 해결의 핵심 함수
            function swapDOMElements(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];

                // 1. DOM 텍스트 스왑
                const tempEmoji = tile1.textContent;
                tile1.textContent = tile2.textContent;
                tile2.textContent = tempEmoji;
                
                // 2. DOM dataset 스왑 (매우 중요)
                // tile1.dataset.row = r1; tile1.dataset.col = c1;
                // tile2.dataset.row = r2; tile2.dataset.col = c2;
                // (이전 코드 버그) 위처럼 하면 안됨. r1,c1과 r2,c2를 스왑해야 함
                tile1.dataset.row = r2; tile1.dataset.col = c2;
                tile2.dataset.row = r1; tile2.dataset.col = c1;

                // 3. JS 배열 스왑 (매우 중요)
                tileElements[r1][c1] = tile2;
                tileElements[r2][c2] = tile1;
            }
            function animateSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];
                tile1.classList.add('swap');
                tile2.classList.add('swap');
                const rect1 = tile1.getBoundingClientRect();
                const rect2 = tile2.getBoundingClientRect();
                const deltaX = rect1.left - rect2.left;
                const deltaY = rect1.top - rect2.top;
                tile1.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`;
                tile2.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                return new Promise(resolve => {
                    setTimeout(() => {
                        tile1.style.transform = '';
                        tile2.style.transform = '';
                        tile1.classList.remove('swap');
                        tile2.classList.remove('swap');
                        swapDOMElements(r1, c1, r2, c2); // DOM, dataset, JS배열 동기화
                        resolve();
                    }, 200); 
                });
            }
            async function animateInvalidSwap(r1, c1, r2, c2) {
                // [신규] 피버 모드가 "아닐" 때만 흔들림(shake) 애니메이션 실행
                if (!isFeverMode) {
                    const tile1 = tileElements[r2][c2]; 
                    const tile2 = tileElements[r1][c1]; 
                    tile1.classList.add('invalid');
                    tile2.classList.add('invalid');
                    await new Promise(resolve => setTimeout(resolve, 400)); // 400ms 대기
                    tile1.classList.remove('invalid');
                    tile2.classList.remove('invalid');
                }
                
                swapData(r1, c1, r2, c2); // 데이터 원위치
                await animateSwap(r2, c2, r1, c1); // DOM 원위치 (빠른 복귀)
            }
            function findAllMatches() {
                const matches = new Set();
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS - 2; c++) {
                        if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r}-${c+1}`);
                            matches.add(`${r}-${c+2}`);
                        }
                    }
                }
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS - 2; r++) {
                        if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r+1}-${c}`);
                            matches.add(`${r+2}-${c}`);
                        }
                    }
                }
                return matches;
            }
            
            async function processMatchesAndCascade(matches) {
                // if (isProcessing === false) isProcessing = true; // [삭제] 상태 관리 중복 제거
                currentCombo++;

                // --- ✨ [신규] 피버 점수 적용 ---
                const scoreMultiplier = isFeverMode ? 1.5 : 1.0;
                // --- 피버 점수 끝 ---

                const baseScore = matches.size * 10;
                const comboBonus = currentCombo * 20;
                const turnScore = Math.round((baseScore + comboBonus) * scoreMultiplier); // [수정] scoreMultiplier 곱하기 및 반올림
                score += turnScore;
                
                showComboText(currentCombo, matches);
                showComboScore(turnScore); // 1.5배 적용된 점수 표시

                // --- ✨ [신규] 피버 게이지 획득 ---
                if (!isFeverMode) { // 피버 모드가 아닐 때만 게이지 획득
                    // 콤보가 높을수록, 많이 터뜨릴수록 게이지 많이 참
                    const gaugeGain = (matches.size * 0.5) + (currentCombo * 1.5); 
                    feverGauge = Math.min(MAX_FEVER_GAUGE, feverGauge + gaugeGain);
                    updateFeverGaugeUI();

                    // 게이지가 찼는지 확인
                    if (feverGauge >= MAX_FEVER_GAUGE) {
                        startFeverMode();
                    }
                }
                // --- 피버 게이지 끝 ---

                updateScoreUI(); 
                if (playerRef) { playerRef.child('score').set(score); }
                playComboSound(currentCombo);
                
                await animatePop(matches);
                removeMatches(matches);
                const { droppedTilesMap } = dropTiles();
                const newTilesMap = fillTopTiles();
                
                // [수정] "고스트 터치" "버벅임" 해결
                await animateDrops(droppedTilesMap, newTilesMap);
                
                const newMatches = findAllMatches();
                if (newMatches.size > 0) {
                    await new Promise(resolve => setTimeout(resolve, 100)); 
                    await processMatchesAndCascade(newMatches);
                } else {
                    currentCombo = 0;
                    if (!checkForPossibleMoves()) {
                        await handleNoMoreMoves();
                    }
                }
            }

            function updateScoreUI() {
                const myScoreValueEl = multiplayerScoreboard.querySelector('.my-score .value');
                if (myScoreValueEl) {
                    myScoreValueEl.textContent = score.toLocaleString();
                }
            }

            function playSound(id) {
                try {
                    const sound = sounds[id];
                    if(sound) {
                        sound.currentTime = 0;
                        sound.play().catch(e => {});
                    }
                } catch(e) {}
            }
            function playComboSound(combo) {
                playSound('match');
                if (combo >= 1) {
                    const comboSound = sounds.combo[Math.min(combo - 1, sounds.combo.length - 1)];
                    if (comboSound) {
                        comboSound.currentTime = 0;
                        comboSound.play().catch(e => {});
                    }
                }
            }
            function animatePop(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (tileElements[r] && tileElements[r][c]) {
                        tileElements[r][c].classList.add('pop');
                    }
                });
                return new Promise(resolve => setTimeout(resolve, 200)); 
            }
            function removeMatches(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (board[r]) {
                        board[r][c] = null; 
                    }
                });
            }
            function dropTiles() {
                const droppedTilesMap = new Map(); 
                for (let c = 0; c < COLS; c++) {
                    let emptyRow = ROWS - 1; 
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] !== null) {
                            if (r !== emptyRow) {
                                board[emptyRow][c] = board[r][c];
                                board[r][c] = null;
                                droppedTilesMap.set(`${emptyRow}-${c}`, r); // { endKey: startRow }
                            }
                            emptyRow--;
                        }
                    }
                }
                return { droppedTilesMap };
            }
            function fillTopTiles() {
                const newTilesMap = new Map(); 
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] === null) {
                            const newEmoji = getRandomEmoji();
                            board[r][c] = newEmoji;
                            newTilesMap.set(`${r}-${c}`, newEmoji);
                        }
                    }
                }
                return newTilesMap;
            }
          
          // [수정] "고스트 터치" "입력 오류" "버벅임" 모두 해결한 최종 함수 (v2)
            async function animateDrops(droppedTilesMap, newTilesMap) {
                const fallPromises = [];
                // [버그 수정] tileElements[0][0]이 null일 수 있으므로 안전하게 크기 계산
                const firstTile = gameBoard.querySelector('.tile') || {};
                const tileSize = (firstTile.clientHeight || 50) + 2; // 2는 갭(gap)

                // 1. DOM/데이터/배열 업데이트
                // (데이터 `board` 배열은 이미 최신 상태)
                // `tileElements` 배열을 `board` 데이터 기준으로 재정렬
                
                const newTileElements = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
                
                // [수정] 1a. 모든 타일 DOM 요소를 1D 배열로 수집 (재사용 큐)
                const allOldTiles = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (tileElements[r][c]) {
                            allOldTiles.push(tileElements[r][c]);
                        }
                    }
                }

                // 1b. `board` 데이터 기준으로 `tileElements` 배열을 '완전히 새로' 만듦
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const key = `${r}-${c}`;
                        const tileData = board[r][c];
                        
                        // [수정] 재사용 큐에서 타일을 하나 꺼냄
                        const tile = allOldTiles.pop(); // DOM 요소
                        if (!tile) {
                             console.error("Tile reuse queue empty! This should not happen.");
                             continue; 
                        }

                        tile.textContent = tileData; // [수정] 데이터(이모지) 강제 일치
                        tile.dataset.row = r; // [수정] dataset 강제 일치
                        tile.dataset.col = c; // [수정] dataset 강제 일치
                        newTileElements[r][c] = tile; // 새 2D 배열에 할당

                        if (newTilesMap.has(key)) {
                            // '새로 생긴 타일'
                            tile.className = 'tile fall new-tile-anim'; // [수정] .new -> .new-tile-anim
                            const startY = -(r + 2) * tileSize;
                            tile.style.transform = `translateY(${startY}px)`;

                        } else if (droppedTilesMap.has(key)) {
                            // '떨어진 타일'
                            const startRow = droppedTilesMap.get(key); // 데이터가 있던 '행'
                            tile.className = 'tile fall';
                            // (r=5, startRow=2) -> 3칸 이동
                            const dropDistance = (r - startRow) * tileSize;
                            // [수정] 버그 방지: 떨어지는 거리가 0일 수 없음 (로직상)
                            // startRow가 r과 같으면 `droppedTilesMap`에 없어야 함.
                            // 만약의 경우를 대비해 0이 아닌 값만 transform
                            if (dropDistance !== 0) {
                                tile.style.transform = `translateY(${dropDistance}px)`;
                            } else {
                                // 이 타일은 실제로는 움직이지 않은 타일임
                                tile.className = 'tile';
                                tile.style.transform = '';
                            }
                            
                        } else {
                            // '가만히 있는 타일'
                            tile.className = 'tile'; // [수정] fall 클래스 제거
                            tile.style.transform = ''; // [수정] transform 초기화
                        }
                    }
                }
                
                // 2. 전역 `tileElements` 배열 교체 (DOM/데이터/배열 논리적 싱크 완료)
                tileElements = newTileElements;
                
                // 3. 강제 리페인트 (중요)
                gameBoard.offsetHeight; 

                // 4. 모든 'fall' 타일 최종 위치(translateY(0))로 애니메이션 시작
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const tile = tileElements[r][c];
                        if (tile && tile.classList.contains('fall')) {
                            requestAnimationFrame(() => { // [수정] rAF로 감싸기
                                tile.style.transform = 'translateY(0)';
                                fallPromises.push(new Promise(resolve => {
                                    tile.addEventListener('transitionend', resolve, { once: true });
                                }));
                            });
                        }
                    }
                }

                // 5. 애니메이션 완료 대기 (transition 0.3s + 예비 0.3s)
                const timeoutPromise = new Promise(resolve => setTimeout(resolve, 600)); 
                await Promise.race([Promise.all(fallPromises), timeoutPromise]);

                // 6. DOM 순서 재정렬 및 스타일 초기화 (버벅임 해결)
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (tileElements[r][c]) {
                            const tile = tileElements[r][c];
                            tile.className = 'tile';
                            tile.style.transform = '';
                            gameBoard.appendChild(tile); // DOM 이동 (빠름)
                        }
                    }
                }
                
            }

            // ------------------------------------
            // 7. [신규] 콤보 텍스트/점수
            // ------------------------------------
            
            function showComboText(combo, matches) {
                if (combo < 2) return; 

                let totalTop = 0;
                let totalLeft = 0;
                let count = 0;
                const boardRect = gameBoard.getBoundingClientRect();

                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (tileElements[r] && tileElements[r][c]) {
                        const rect = tileElements[r][c].getBoundingClientRect();
                        totalTop += (rect.top - boardRect.top) + (rect.height / 2);
                        totalLeft += (rect.left - boardRect.left) + (rect.width / 2);
                        count++;
                    }
                });
                
                if (count === 0) return;
                const avgTop = totalTop / count;
                const avgLeft = totalLeft / count;

                const comboEl = document.createElement('div');
                comboEl.className = 'combo-text';
                comboEl.textContent = `${combo} 콤보!`;
                
                const wrapperRect = gameWrapper.getBoundingClientRect();
                comboEl.style.top = `${avgTop + boardRect.top - wrapperRect.top}px`;
                comboEl.style.left = `${avgLeft + boardRect.left - wrapperRect.left}px`;
                comboEl.style.transform = 'translate(-50%, -50%)'; 

                gameWrapper.appendChild(comboEl);

                setTimeout(() => {
                    comboEl.remove();
                }, 800);
            }

            function showComboScore(turnScore) {
                const scoreEl = document.createElement('div');
                scoreEl.className = 'combo-score';
                scoreEl.textContent = `+${turnScore}`;
                
                comboScoreDisplay.innerHTML = ''; 
                comboScoreDisplay.appendChild(scoreEl);

                setTimeout(() => {
                    scoreEl.remove();
                }, 800);
            }

            // ------------------------------------
            // 8. 셔플 로직 (기존과 동일)
            // ------------------------------------
            function checkForPossibleMoves() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (c < COLS - 1) {
                            if (checkMove(r, c, r, c + 1)) return true;
                        }
                        if (r < ROWS - 1) {
                            if (checkMove(r, c, r + 1, c)) return true;
                        }
                    }
                }
                return false; 
            }
            function checkMove(r1, c1, r2, c2) {
                swapData(r1, c1, r2, c2);
                const matches = findAllMatches();
                swapData(r1, c1, r2, c2); 
                return matches.size > 0;
            }
            async function handleNoMoreMoves() {
                console.log("더 이상 움직일 수 없음! 셔플합니다.");
                // isProcessing = true; // [삭제] 상태 관리 중복 제거
                
                const shuffleText = document.createElement('div');
                shuffleText.className = 'combo-text';
                shuffleText.textContent = 'SHUFFLE!';
                shuffleText.style.top = '50%';
                shuffleText.style.left = '50%';
                shuffleText.style.transform = 'translate(-50%, -50%)';
                gameWrapper.appendChild(shuffleText);
                setTimeout(() => shuffleText.remove(), 800);
                
                await new Promise(resolve => setTimeout(resolve, 300));

                shuffleBoard(); 

                // [수정] 셔플 후 DOM/배열 완벽 동기화
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if(tileElements[r][c]) {
                            tileElements[r][c].textContent = board[r][c];
                            tileElements[r][c].className = 'tile new'; 
                            tileElements[r][c].dataset.row = r; // dataset 동기화
                            tileElements[r][c].dataset.col = c;
                        }
                    }
                }
                await new Promise(resolve => setTimeout(resolve, 300));

                // 스타일 초기화
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if(tileElements[r][c]) {
                            tileElements[r][c].className = 'tile';
                        }
                    }
                }
                
                const matches = findAllMatches();
                if (matches.size > 0) {
                    await processMatchesAndCascade(matches);
                }
                
                // isProcessing = false; // [삭제] 모든 로직이 끝난 후 'attemptSwap' 함수가 처리하도록 변경
            }
            function shuffleBoard() {
                console.log("보드 데이터 셔플 중...");
                createBoardData(); 
            }

            // [신규] 게임 스탯 업데이트 함수 (테트리스.html에서 가져와 수정)
            function updatePlayerStats(didIWin, finalScore) { 
                if (!playerUid || playerUid.startsWith('guest_')) return;
                
                // 'win', 'loss', 'draw' 중 하나
                const result = (didIWin === null) ? 'draws' : (didIWin ? 'wins' : 'losses');
                
                // [수정] 'candysoap' 경로로 변경
                const userStatsRef = db.ref('users').child(playerUid).child('gameStats/candysoap');

                userStatsRef.transaction(currentStats => {
                    if (currentStats === null) {
                        currentStats = { wins: 0, losses: 0, draws: 0, plays: 0, highscore: 0 };
                    }
                    currentStats.plays = (currentStats.plays || 0) + 1;
                    currentStats[result] = (currentStats[result] || 0) + 1;
                    // [수정] 'score' (전역 변수) 대신 'finalScore' (매개변수) 사용
                    currentStats.highscore = Math.max(currentStats.highscore || 0, finalScore); 
                    return currentStats;
                });
                
                // 경험치 및 포인트 지급 (테트리스와 동일하게)
                let expGained = 50, pointsGained = 50;
                if(didIWin === true) { expGained = 150; pointsGained = 100; } // 1등
                else if (didIWin === null) { expGained = 75; pointsGained = 75; } // 무승부 (현재 애니팡엔 없음)
                // 2~4등은 기본 점수
                
                const userProfileRef = db.ref('users').child(playerUid).child('profile');
                userProfileRef.child('exp').transaction(exp => (exp || 0) + expGained);
                userProfileRef.child('points').transaction(points => (points || 0) + pointsGained);
            }

            // [신규] '사천성' 방식의 안전한 나가기 함수
            function cleanupAndExit() {
                console.log("Cleanup and Exit called");
                isExiting = true; // 모든 리스너 중지 플래그
                
                if (timerId) clearInterval(timerId);
                if (feverTimerId) clearTimeout(feverTimerId);

                // onDisconnect 핸들러 취소 시도
                if (hostStatusDisconnectRef) { try { hostStatusDisconnectRef.cancel(); } catch(e) {} }
                
                let removePromise = Promise.resolve(); 

                if (roomRef && playerUid) {
                    roomRef.off(); // [핵심] 이 클라이언트의 'roomRef.on('value')' 리스너 중지

                    if (isHost) {
                        console.log("Host removing room...");
                        removePromise = roomRef.remove();
                    } else {
                        console.log("Guest removing self from players...");
                        // [수정] '애니팡'은 players 노드만 제거
                        removePromise = roomRef.child('players/' + playerUid).remove();
                    }
                }

                removePromise
                    .catch(e => console.error("Firebase remove operation failed:", e))
                    .finally(() => {
                        console.log("Redirecting to 대기실.html");
                        window.location.replace('대기실.html');
                    });
            }

        });
    </script>
