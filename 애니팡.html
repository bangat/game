    <style>
        /* ------------------------- */
        /* == 1. м•ұ кіөнҶө н…Ңл§Ҳ == */
        /* ------------------------- */
        :root {
            --bg-color: #FFFBEB;
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD93D;
            --text-color-dark: #574141;
            --text-color-light: #ffffff;
            --danger-color: #F76363;
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2;
            --panel-shadow: #E4DCCF;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color-dark);
            display: flex; flex-direction: column;
            /* [мҲҳм •] л Ҳмқҙм•„мӣғ мӨ‘м•ҷ м •л ¬ */
            justify-content: flex-start; /* [мҲҳм •] center -> flex-start (мғҒлӢЁ м •л ¬) */
            align-items: center;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
            /* [мҲҳм •] bodyмқҳ нҢЁл”©мқ„ #game-wrapperлЎң мқҙлҸҷ */
            /* padding: 10px; */ 
        }

        /* ------------------------- */
        /* == 2. [мҲҳм •] кІҢмһ„ л Ҳмқҙм•„мӣғ (нҶөн•© н”„л Ҳмһ„) == */
        /* ------------------------- */
        #game-wrapper { 
            width: 100%; 
            /* height: 100%; [м ңкұ°] */
            flex-grow: 1; /* [н•өмӢ¬ мҲҳм •] bodyмқҳ лӮЁмқҖ кіөк°„мқ„ лӘЁл‘җ м°Ём§Җ (мӮ¬мІңм„ұ л°©мӢқ) */
            min-height: 0; /* [м¶”к°Җ] flex-growк°Җ 100% лҶ’мқҙмқҳ л¶ҖлӘЁм—җм„ң мҳ¬л°”лҘҙкІҢ мһ‘лҸҷн•ҳкё° мң„н•ң мөңмҶҢ лҶ’мқҙ */
            
            display: flex; flex-direction: column; 
            justify-content: flex-start; /* [мң м§Җ] мғҒлӢЁ м •л ¬ */
            align-items: center; /* [мң м§Җ] мҲҳнҸү мӨ‘м•ҷ м •л ¬ */
            
            /* [мҲҳм •] bodyмқҳ paddingмқ„ wrapperлЎң мқҙлҸҷ л°Ҹ safe-areaмҷҖ кІ°н•© */
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            padding-left: 10px;
            padding-right: 10px;
            
            position: relative; 
        }

        /* [мӢ к·ң] лӘЁл“  кІғмқ„ к°җмӢёлҠ” лӢЁмқј н”„л Ҳмһ„ */
        #game-area-frame {
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            /* [мҲҳм •] ліҙлҚ”мҷҖ мүҗлҸ„мҡ°лҘј мқҙ н”„л Ҳмһ„мңјлЎң мқҙлҸҷ */
            border: 4px solid var(--panel-border); 
            box-shadow: 6px 6px 0px 0px var(--panel-shadow);
            border-radius: 20px;
            width: 100%;
            max-width: 430px;
            /* [мҲҳм •] height: 100% лҢҖмӢ  flex-grow: 1 мӮ¬мҡ© (мӮ¬мІңм„ұкіј лҸҷмқј л°©мӢқ) */
            flex-grow: 1; /* [н•өмӢ¬ мҲҳм •] */
            /* height: 100%; (м ңкұ°) */
            /* max-height: 800px; (м ңкұ°) */
            padding: 10px;
            overflow: hidden; /* лӮҙл¶Җ мҡ”мҶҢк°Җ л‘Ҙк·ј лӘЁм„ңлҰ¬лҘј л„ҳм§Җ м•ҠлҸ„лЎқ */
            
            /* [м¶”к°Җ] flex-growк°Җ 100% лҶ’мқҙмқҳ л¶ҖлӘЁм—җм„ң мҳ¬л°”лҘҙкІҢ мһ‘лҸҷн•ҳкё° мң„н•ң мөңмҶҢ лҶ’мқҙ */
            min-height: 0; 
        }
        
        /* [мӢ к·ң] н”„л Ҳмһ„ лӮҙл¶Җмқҳ мғҲ н—ӨлҚ” (мҠӨмҪ”м–ҙліҙл“ңмҡ©) */
        #game-stats-header {
            flex-shrink: 0;
            padding-bottom: 8px;
            border-bottom: 3px solid var(--panel-border);
        }

        /* [мҲҳм •] мҠӨмҪ”м–ҙліҙл“ң (к°„кІ©/нҸ°нҠё мЎ°м Ҳ) */
        #multiplayer-scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px; /* [мҲҳм •] к°„кІ© м¶•мҶҢ */
            width: 100%;
        }

        /* [мҲҳм •] мҠӨнғҜ л°•мҠӨ (м»ҙнҢ©нҠён•ҳкІҢ) */
        .stat-box {
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 2px 5px; /* [мҲҳм •] нҢЁл”© м¶•мҶҢ */
            text-align: center;
            font-weight: 900;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .stat-box.my-score {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            transform: scale(1.02); /* [мҲҳм •] мҠӨмјҖмқј мӮҙм§қ мӨ„мһ„ */
        }
        .stat-box .label {
            font-size: 0.7em; /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
            color: #9A6A3A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }
        .stat-box .value {
            font-size: 1.2em; /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
            color: var(--primary-color);
        }

        /* [мӢ к·ң] н”„л Ҳмһ„ лӮҙл¶Җмқҳ мғҲ н‘ён„° (нғҖмқҙлЁё/кІҢмқҙм§Җмҡ©) */
        #game-stats-footer {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 8px;
            border-top: 3px solid var(--panel-border);
        }

        /* [мҲҳм •] нғҖмқҙлЁё (н•ҳлӢЁмңјлЎң мқҙлҸҷ, м»ҙнҢ©нҠён•ҳкІҢ) */
        #timer-container {
            flex-shrink: 0; /* нҒ¬кё° кі м • */
            width: 100px; /* [мҲҳм •] л„Ҳл№„ кі м • */
            text-align: center;
            font-weight: 900;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 2px 5px; /* [мҲҳм •] нҢЁл”© м¶•мҶҢ */
            margin: 0; /* [мҲҳм •] мһҗлҸҷ л§Ҳм§„ м ңкұ° */
        }
        #timer-container .label { font-size: 0.8em; color: #9A6A3A; } /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
        #timer-container .value {
            font-size: 1.6em; /* [мҲҳм •] нҸ°нҠё м¶•мҶҢ */
            color: var(--primary-color);
            transition: color 0.3s ease;
        }
        #timer-container .value.danger-time {
            color: var(--danger-color);
            animation: throb 1.2s infinite ease-in-out;
        }
        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* [мҲҳм •] н”јлІ„ кІҢмқҙм§Җ (н•ҳлӢЁмңјлЎң мқҙлҸҷ, flex-grow) */
        #fever-gauge-container {
            flex-grow: 1; /* [мҲҳм •] лӮЁмқҖ кіөк°„ лӘЁл‘җ м°Ём§Җ */
            width: auto; /* [мҲҳм •] мһҗлҸҷ л„Ҳл№„ */
            max-width: none; /* [мҲҳм •] мөңлҢҖ л„Ҳл№„ м ңкұ° */
            height: 22px;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 20px;
            margin: 0; /* [мҲҳм •] мһҗлҸҷ л§Ҳм§„ м ңкұ° */
            position: relative;
            overflow: hidden;
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.1);
        }
        #fever-gauge-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            border-radius: 20px;
            transition: width 0.3s ease-out;
        }
        #fever-gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9em;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* [мҲҳм •] кІҢмһ„ м»Ён…Ңмқҙл„Ҳ (н”„л Ҳмһ„ лӮҙл¶ҖлЎң мқҙлҸҷ) */
        #game-container {
            width: 100%; 
            flex-grow: 1; /* [мҲҳм •] н•өмӢ¬: лӮЁмқҖ мҲҳм§Ғ кіөк°„ лӘЁл‘җ м°Ём§Җ */
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
            padding: 5px 0; /* [мҲҳм •] ліҙл“ң мғҒн•ҳ м—¬л°ұ 10px -> 5pxлЎң м¶•мҶҢ */
        }
        
        /* [мҲҳм •] кІҢмһ„ ліҙл“ң (мӢңк°Ғм Ғ мҡ”мҶҢ м ңкұ°) */
        #game-board {
    position: relative; 
    background-color: #FFFEF5;
    border: 2px solid var(--panel-border);
    border-radius: 12px;
    display: grid; 
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 2px;
    padding: 4px;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}

        /* ------------------------- */
        /* == 3. нғҖмқј мҠӨнғҖмқј (мң м§Җ) == */
        /* ------------------------- */
        .tile {
    background-color: #FFFEF5; 
    border-radius: 10px; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    cursor: pointer;
    border: 1px solid var(--panel-border);
    box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.15), 
                inset -2px -2px 4px rgba(255, 255, 255, 0.7);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                opacity 0.2s ease,
                box-shadow 0.2s ease;
    flex-shrink: 0;
    
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
}

.tile:active {
    box-shadow: inset 1px 1px 2px rgba(87, 65, 65, 0.2), 
                inset -1px -1px 2px rgba(255, 255, 255, 0.7);
    transform: scale(0.95) translateZ(0); /* [мҲҳм •] translateZ мң м§Җ */
}

.tile.pop { animation: pop 0.2s ease-out forwards; }
@keyframes pop {
    0% { transform: scale(1) translateZ(0); opacity: 1; }
    50% { transform: scale(1.3) translateZ(0); opacity: 0.5; }
    100% { transform: scale(0.1) translateZ(0); opacity: 0; }
}

.tile.fall {
    /* [н•өмӢ¬ мҲҳм •] 
       1. мӢңк°„: 0.3мҙҲ -> 0.5мҙҲ (лҚ” кёёкІҢ)
       2. кіЎм„ : 'EaseOutBack' (лӘ©н‘ң м§Җм җмқ„ мӮҙм§қ м§ҖлӮҳміӨлӢӨк°Җ нҠ•кІЁ лҸҢм•„мҳӨлҠ” л°”мҡҙмҠӨ нҡЁкіј)
    */
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}

.tile.new-tile-anim { animation: new-tile 0.2s ease-out; }
@keyframes new-tile {
    from { transform: scale(0.5) translateZ(0); opacity: 0; }
    to { transform: scale(1) translateZ(0); opacity: 1; }
}

.tile.swap { 
    transition: transform 0.2s ease-in-out; 
    z-index: 10; 
}
.tile.invalid { animation: shake 0.4s ease-in-out; }
@keyframes shake {
    0%, 100% { transform: translateX(0) translateZ(0); }
    25% { transform: translateX(-5px) translateZ(0); }
    50% { transform: translateX(5px) translateZ(0); }
    75% { transform: translateX(-5px) translateZ(0); }
}

        /* ------------------------- */
        /* == 4. лӘЁлӢ¬ (мң м§Җ) == */
        /* ------------------------- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; 
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: var(--panel-bg); 
            color: var(--text-color-dark); 
            padding: 0; 
            border-radius: 24px;
            width: 90%; max-width: 400px; 
            box-shadow: 8px 8px 0px 0px var(--text-color-dark);
            overflow: hidden; 
            border: 4px solid var(--text-color-dark);
        }
        .modal-header { 
            background-color: var(--primary-color);
            color: white; 
            padding: 15px; 
            border-bottom: 4px solid #C04A4A; 
        }
        .modal-header h2 { font-size: 1.6em; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .modal-body { padding: 25px; }
        .modal-footer {
            display: flex; gap: 10px;
            padding: 20px;
            border-top: 3px solid var(--panel-border);
            background-color: #FFFAE0;
        }

        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown-number { font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7); animation: countdown-pop 1s; }
        @keyframes countdown-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #final-score {
            font-size: 2.0em;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 0px;
        }
        #final-ranking-list {
            text-align: left;
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* ------------------------- */
        /* == 5. м•„мјҖмқҙл“ң лІ„нҠј (мң м§Җ) == */
        /* ------------------------- */
        .menu-btn { 
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: 900; 
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer; 
            transition: all 0.1s ease-out;
            border-bottom: 5px solid;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            margin: 5px 0; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .menu-btn.primary { 
            background-color: var(--primary-color);
            color: white; 
            border-bottom-color: #C04A4A;
        }
        .menu-btn.secondary { 
            background-color: var(--secondary-color);
            color: white; 
            border-bottom-color: #379A93;
        }
        
        /* ------------------------- */
        /* == 6. мҪӨліҙ н…ҚмҠӨнҠё/м җмҲҳ (мң м§Җ) == */
        /* ------------------------- */
        .combo-text {
            position: absolute;
            font-size: 2.5em;
            font-weight: 900;
            color: rgb(243, 41, 41);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            z-index: 100;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }
        
        .combo-score {
            position: absolute;
            font-size: 1.8em;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 101;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }

        @keyframes combo-pop {
            0% { transform: scale(0.8); opacity: 1; }
            20% { transform: scale(1.3); }
            40% { transform: scale(1); }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* ------------------------- */
        /* == 7. н”јлІ„ кІҢмқҙм§Җ UI (мҲҳм •лҗЁ) == */
        /* ------------------------- */
        /* #fever-gauge-container мҠӨнғҖмқјмқҖ 2лІҲ м„№м…ҳмңјлЎң мқҙлҸҷ/нҶөн•©лҗЁ */
        
        /* н”јлІ„ лӘЁл“ң нҷңм„ұнҷ” мӢң UI */
        /* [мҲҳм •] кІҢмһ„ ліҙл“ң (кІ©мһҗнҢҗ)мқҳ н…Ңл‘җлҰ¬ нҡЁкіј к°•нҷ” */
        #game-board.fever-active {
            animation: fever-pulse 0.7s infinite alternate;
        }
        @keyframes fever-pulse {
            from { 
                box-shadow: 0 0 10px rgba(200, 200, 200, 0.5); 
                border-color: var(--panel-border); 
            }
            to { 
                /* [мҲҳм •] к·ёлҰјмһҗлҘј лҚ” нҒ¬кі  л¶үкІҢ, н…Ңл‘җлҰ¬лҸ„ м„ лӘ…н•ҳкІҢ */
                box-shadow: 0 0 30px 10px rgba(255, 107, 107, 0.7); 
                border-color: #FF0000; 
            }
        }

        /* [мӢ к·ң] кІҢмһ„ н”„л Ҳмһ„ (нқ°мғү нҢЁл„җ)мқҳ л°°кІҪ к№ңл№Ўмһ„ нҡЁкіј */
        #game-area-frame.fever-active {
            animation: fever-frame-pulse 0.7s infinite alternate;
        }
        @keyframes fever-frame-pulse {
            from { 
                background-color: var(--panel-bg); /* кё°ліё нқ°мғү */
            }
            to {

            do {

                (r >= 2 && newEmoji === board[r - 1][c] && newEmoji === board[r - 2][c])

            row.push(newEmoji);

// рҹҺ® м№ҳнҠёнӮӨ мӢңмҠӨн…ң
function setupCheatKeys() {
    // кё°мЎҙ лҰ¬мҠӨл„Ҳ мӨ‘ліө л°©м§Җ
    if (window.cheatKeysEnabled) return;
    window.cheatKeysEnabled = true;
    
    document.addEventListener('keydown', (e) => {
        // кІҢмһ„ мӨ‘мқҙ м•„лӢҲл©ҙ л¬ҙмӢң
        if (!timerId || isProcessing) return;
        
        switch(e.key.toLowerCase()) {
            case 'c': // CнӮӨ: мӢӯмһҗк°Җ нҸӯл°ң н…ҢмҠӨнҠё
                createCrossExplosionTest();
                break;
            case 'r': // RнӮӨ: л Ҳмқёліҙмҡ° нғҖмқј н…ҢмҠӨнҠё
                createRainbowTest();
                break;
            case 'd': // DнӮӨ: лҚ”лё” л Ҳмқёліҙмҡ° н…ҢмҠӨнҠё
                createDoubleRainbowTest();
                break;
            case 'f': // FнӮӨ: н”јлІ„лӘЁл“ң к°•м ң л°ңлҸҷ
                if (!isFeverMode) {
                    feverGauge = MAX_FEVER_GAUGE;
                    updateFeverGaugeUI();
                    startFeverMode();
                }
                break;
            case 's': // SнӮӨ: ліҙл“ң м…”н”Ң
                handleNoMoreMoves();
                break;
            case 't': // TнӮӨ: мӢңк°„ +10мҙҲ
                timer = Math.min(GAME_TIME, timer + 10);
                timerValue.textContent = timer;
                break;
                case 'b': // BнӮӨ: лі„ нҢЎмқҙ нҸӯл°ң н…ҢмҠӨнҠё
                createStarPangiTest(); // [мӢ к·ң]
                break;
            case 'p': // PнӮӨ: м җмҲҳ +1000м җ
                score += 1000;
                updateScoreUI();
                if (playerRef) playerRef.child('score').set(score);
                break;
                case 'e': // EнӮӨ: кІҢмһ„ к°•м ң мў…лЈҢ (End)
                    console.log('рҹҺ® м№ҳнҠёнӮӨ: кІҢмһ„ к°•м ң мў…лЈҢ (E)');
                    gameOver(); // кІҢмһ„ мў…лЈҢ н•ЁмҲҳ нҳём¶ң
                    break;
        }
    });
    
    console.log('рҹҺ® м№ҳнҠёнӮӨ нҷңм„ұнҷ”!');
    console.log('C: мӢӯмһҗк°Җ | R: л Ҳмқёліҙмҡ° | D: лҚ”лё” л Ҳмқёліҙмҡ° | B: лі„ нҢЎмқҙ'); // [мҲҳм •]
    console.log('F: н”јлІ„лӘЁл“ң | S: м…”н”Ң | T: мӢңк°„+10мҙҲ | P: м җмҲҳ+1000');
}

        function gameOver() {
            if (isProcessing) return; // мӨ‘ліө мӢӨн–ү л°©м§Җ
            isProcessing = true; 
            stopSound('bgm'); // [мӢ к·ң] BGM м •м§Җ
            clearInterval(timerId);
            timerId = null;
        
            if (feverTimerId) {
                clearTimeout(feverTimerId);
                feverTimerId = null;
                isFeverMode = false;
                gameBoard.classList.remove('fever-active');
            }
            timerDisplay.classList.remove('danger-time'); 
            timerValue.textContent = '0';
            // playSound('gameOver'); // [м ңкұ°] (мӮ¬мҡҙл“ң мһ¬мғқмқ„ forceGameOver н•ЁмҲҳлЎң мқҙлҸҷ)
            
            // [мҲҳм •] (Tetris/ShisenSho л°©мӢқ м Ғмҡ©)
            // 1. лЁјм Җ ліёмқёмқҳ isFinishedлҘј trueлЎң м„Өм •
            if (playerRef) {
                playerRef.child('isFinished').set(true).then(() => {
                    console.log(`[${isHost ? 'Host' : 'Guest'}] isFinished = true м„Өм • мҷ„лЈҢ.`);
                    
                    // 2. (мӢ к·ң) нҳёмҠӨнҠё/кІҢмҠӨнҠё кө¬л¶„ м—Ҷмқҙ "мҰүмӢң" кіөмҡ© мІҙнҒ¬ н•ЁмҲҳ нҳём¶ң
                    //    (Firebase м „нҢҢ мӢңк°„мқ„ кі л Өн•ҙ 500ms л”ңл Ҳмқҙ)
                    setTimeout(checkGameOverCondition, 500); 

                }).catch(err => {
                    // [мӢ к·ң] set мӢӨнҢЁ мӢңм—җлҸ„ 500ms нӣ„ мІҙнҒ¬ мӢңлҸ„ (л°©м–ҙ мҪ”л“ң)
                    console.error("isFinished м„Өм • мӢӨнҢЁ:", err);
                    setTimeout(checkGameOverCondition, 500);
                });
            } else {
                // playerRefк°Җ м—ҶлҠ” л№„м •мғҒм Ғ мғҒнҷ©
                setTimeout(checkGameOverCondition, 500);
            }
            
            // 3. кІ°кіј м§‘кі„мӨ‘ UI н‘ңмӢң
            loadingOverlay.classList.add('active');
            loadingOverlay.querySelector('p').textContent = "кІ°кіј м§‘кі„ мӨ‘...";
        }



       // [мҲҳм •] мөңлҢҖ мӢңлҸ„ нҡҹмҲҳ мҰқк°Җ л°Ҹ к°„кІ© лӢЁм¶•
// [мҲҳм •] (Tetris/ShisenSho л°©мӢқ м Ғмҡ©)
        // checkAttempts ліҖмҲҳ л°Ҹ кҙҖл Ё мғҒмҲҳлҠ” мқҙ н•ЁмҲҳ лӮҙл¶Җм—җм„ңл§Ң мӮ¬мҡ©
        let checkGameOverAttempts = 0;
        const MAX_CHECK_ATTEMPTS = 20; // 10мҙҲ (500ms * 20)
        const CHECK_INTERVAL = 500;

        // [мҲҳм •] н•ЁмҲҳ мқҙлҰ„мқ„ ліҖкІҪн•ҳкі  (checkAllPlayersFinished -> checkGameOverCondition)
        // нҳёмҠӨнҠё/кІҢмҠӨнҠё кіөмҡ© н•ЁмҲҳлЎң ліҖкІҪ
        function checkGameOverCondition() {
            // 1. мқҙлҜё кІ°кіјм°Ҫмқҙ л–ҙмңјл©ҙ мӨ‘ліө мӢӨн–ү л°©м§Җ
            if (gameOverOverlay.classList.contains('active')) {
                return;
            }
            
            // 2. allPlayersRefк°Җ м—Ҷмңјл©ҙ (л°©мқҙ н„°мЎҢмңјл©ҙ) к°•м ң мў…лЈҢ
            if (!allPlayersRef) {
                console.warn("[CheckGameOver] allPlayersRefк°Җ м—ҶмҠөлӢҲлӢӨ. к°•м ң мў…лЈҢ.");
                forceGameOver(); // (кІ°кіј: л°©мқҙ мў…лЈҢлҗЁ)
                return;
            }

            checkGameOverAttempts++;
            console.log(`[CheckGameOver] (кіөмҡ©) н”Ңл Ҳмқҙм–ҙ мў…лЈҢ мІҙнҒ¬ (${checkGameOverAttempts}/${MAX_CHECK_ATTEMPTS})`);

            // 3. (мӢ к·ң) нҳёмҠӨнҠё/кІҢмҠӨнҠё кө¬л¶„ м—Ҷмқҙ "мҰүмӢң" allPlayersRefлҘј нҷ•мқё
            allPlayersRef.once('value', (snapshot) => {
                const players = snapshot.val();
                if (!players) {
                    console.warn("[CheckGameOver] players лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ. к°•м ң мў…лЈҢ.");
                    forceGameOver(); // (кІ°кіј: л°©мқҙ мў…лЈҢлҗЁ)
                    return;
                }

                const playerArray = Object.values(players);
                const allFinished = playerArray.length > 0 && playerArray.every(p => p.isFinished === true);

                // 4. (мӢ к·ң) "лӘЁл‘җ мў…лЈҢ"к°Җ нҷ•мқёлҗҳл©ҙ, мҰүмӢң лЎңм»¬м—җм„ң forceGameOver() нҳём¶ң
                if (allFinished) {
                    console.log("[CheckGameOver] лӘЁл“  н”Ңл Ҳмқҙм–ҙ мў…лЈҢ нҷ•мқё! мҰүмӢң кІ°кіј н‘ңмӢң.");
                    
                    // (м„ нғқм Ғ) нҳёмҠӨнҠёк°Җ status: 'finished'лҘј мҸҙм„ң, 
                    // мІҙнҒ¬к°Җ лҠҰлҠ” лӢӨлҘё н”Ңл Ҳмқҙм–ҙм—җкІҢ мӢ нҳёлҘј мӨ„ мҲҳ мһҲмқҢ (м•Ҳм „мһҘм№ҳ)
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver(); // "мҰүмӢң" лЎңм»¬м—җм„ң кІ°кіјм°Ҫ н‘ңмӢң
                    checkGameOverAttempts = 0; // мҙҲкё°нҷ”
                }
                // 5. (мӢ к·ң) м•„м§Ғ "лӘЁл‘җ мў…лЈҢ"к°Җ м•„лӢҲл©ҙ, мһ¬мӢңлҸ„ (м•Ҳм „мһҘм№ҳ)
                else if (checkGameOverAttempts < MAX_CHECK_ATTEMPTS) {
                    console.log(`[CheckGameOver] м•„м§Ғ лӘЁл‘җ мў…лЈҢлҗҳм§Җ м•ҠмқҢ. ${CHECK_INTERVAL}ms нӣ„ мһ¬мӢңлҸ„...`);
                    setTimeout(checkGameOverCondition, CHECK_INTERVAL);
                }
                // 6. (мӢ к·ң) мөңлҢҖ мӢңлҸ„ нҡҹмҲҳ мҙҲкіј (м•Ҳм „мһҘм№ҳ)
                else {
                    console.warn("[CheckGameOver] мөңлҢҖ мІҙнҒ¬ нҡҹмҲҳ мҙҲкіј. к°•м ңлЎң кІ°кіј н‘ңмӢң.");
                    
                    // (м„ нғқм Ғ) нҳёмҠӨнҠёк°Җ к°•м ңлЎң status: 'finished' м„Өм •
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver();
                    checkGameOverAttempts = 0;
                }
            });
        }

       // [мҲҳм •] "кІҢмҠӨнҠё л©Ҳм¶Ө" лІ„к·ё н•ҙкІ° (лҰ¬мҠӨл„Ҳ м •лҰ¬)
function forceGameOver() {
    if (gameOverOverlay.classList.contains('active')) return;

    gameOverOverlay.classList.add('active'); // мӨ‘ліө л°©м§Җ

    // [мӢ к·ң] 2. мұ„нҢ… мһ…л Ҙ лӘЁлӢ¬ лЎңм§Ғ
    // (мұ„нҢ… м „мҶЎ н•ЁмҲҳ)
    function sendRematchChat() {
        const message = rematchChatInput.value.trim();
        
        // [### лІ„к·ё мҲҳм • ###]
        // rematchPlayerListм—җм„ң лӮҙ лӢүл„Өмһ„мқ„ м°ҫм•„м„ң sendMessageм—җ м „лӢ¬н•ҙм•ј н•©лӢҲлӢӨ.
        if (message && rematchPlayerList && rematchPlayerList[playerUid]) {
            const myNickname = rematchPlayerList[playerUid].nickname;
            sendMessage(message, myNickname); // мҲҳм •лҗң н•ЁмҲҳ нҳём¶ң
        } else if (message) {
            // мҳҲмҷё мІҳлҰ¬: лӢүл„Өмһ„мқ„ лӘ»м°ҫмңјл©ҙ м „мҶЎ мӢӨнҢЁ
            console.error("sendRematchChat: лӢүл„Өмһ„мқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙ м „мҶЎм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.", rematchPlayerList, playerUid);
            showToast("мұ„нҢ… м „мҶЎм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. (м •ліҙ м—ҶмқҢ)");
        }
        // [### мҲҳм • лҒқ ###]
        
        rematchChatInput.value = '';

            if (!isTTSOn) synthesis.cancel(); // лҒ„л©ҙ нҳ„мһ¬ TTS мӨ‘м§Җ

    // --- (мқҙн•ҳлҠ” кё°мЎҙ forceGameOver лЎңм§Ғ) ---
    stopSound('bgm'); 

    if (isHost && hostStatusDisconnectRef) {

    if (!allPlayersRef) {

        return;
    }
    
    allPlayersRef.once('value', (snapshot) => {
        if (allPlayersRef) {
            allPlayersRef.off();
            console.log("кІ°кіј лӘЁлӢ¬ н‘ңмӢң мҷ„лЈҢ. allPlayersRef лҰ¬мҠӨл„ҲлҘј лҒ•лӢҲлӢӨ.");
        }
        if (statusRef) {

        rematchPlayerList = players; 

        // 2. мқҙм ң н”Ңл Ҳмқҙм–ҙ лӘ©лЎқмқҙ нҷ•м •лҗҳм—ҲмңјлӢҲ, мұ„нҢ… лӮҙм—ӯмқ„ лЎңл“ңн•©лӢҲлӢӨ.

}

            // [мӢ к·ң] 'лӢӨмӢңн•ҳкё°' мҲҳмӢ  лҰ¬мҠӨл„Ҳ (Tetris/ShisenSho л°©мӢқ)
            
            // [мҲҳм •] л©”лӘЁлҰ¬ лҲ„мҲҳ л°©м§ҖлҘј мң„н•ҙ лҰ¬мҠӨл„Ҳ м°ёмЎ°лҘј мҷёл¶ҖлЎң мқҙлҸҷ
            let rematchRef = null; 
            let amIReadyForRematch = false; // [мӢ к·ң] 'мӨҖл№„мҷ„лЈҢ' мғҒнғң м¶”м Ғ
            
            function listenForRematch() {
                 if (!roomRef) return;

                 // [мҲҳм •] кё°мЎҙ лҰ¬мҠӨл„Ҳк°Җ мһҲлӢӨл©ҙ м ңкұ° (л©”лӘЁлҰ¬ лҲ„мҲҳ л°©м§Җ)
                 if (rematchRef) {
                    rematchRef.off();
                 }
                 rematchRef = roomRef.child('rematchRequests');
                 
                 rematchRef.on('value', snapshot => {
                      const requests = snapshot.val() || {}; // [мҲҳм •] nullмқј кІҪмҡ° л№Ҳ к°қмІҙ
                      amIReadyForRematch = requests.hasOwnProperty(playerUid); // [мӢ к·ң] лЎңм»¬ мғҒнғң м—…лҚ°мқҙнҠё

                      // [мӢ к·ң] нҳ„мһ¬ л°©м—җ лӮЁм•„мһҲлҠ” н”Ңл Ҳмқҙм–ҙ лӘ©лЎқ (мӨ‘мҡ”)
                      const playersInRoom = Object.keys(currentRoomData.players || {});
                      
                      // [мӢ к·ң] 'лӢӨмӢңн•ҳкё°' мғҒнғң лӘ©лЎқ UI м—…лҚ°мқҙнҠё
                      const allStatusSpans = document.querySelectorAll('#rematch-status-list .status-text');
                      
                      allStatusSpans.forEach(span => {
                          const uid = span.dataset.uid;
                          
                          if (!playersInRoom.includes(uid)) {
                              // [мӢ к·ң] 1. л°©м—җ м—ҶлҠ” мң м Җ (лӮҳк°„ мӮ¬лһҢ)
                              span.textContent = 'нҮҙмһҘ';
                              span.classList.remove('ready');
                              span.style.color = 'var(--danger-color)'; // л№Ёк°„мғү
                              span.style.textShadow = 'none';

                          } else if (requests.hasOwnProperty(uid)) {
                              // 2. л°©м—җ мһҲкі , мӨҖл№„ мҷ„лЈҢн•ң мң м Җ
                              span.textContent = 'мӨҖл№„мҷ„лЈҢ!';
                              span.classList.add('ready');
                              span.style.color = '#28a745'; // мҙҲлЎқмғү (мӣҗлһҳлҢҖлЎң)
                              span.style.textShadow = '0 0 5px rgba(40, 167, 69, 0.5)';
                          
                          } else {
                              // 3. л°©м—җ мһҲм§Җл§Ң, м•„м§Ғ мӨҖл№„ м•Ҳ н•ң мң м Җ
                              span.textContent = ''; // 'лҢҖкё°мӨ‘' (м•„л¬ҙкІғлҸ„ н‘ңмӢң м•Ҳ н•Ё)
                              span.classList.remove('ready');
                              span.style.color = '#ccc'; // (мӣҗлһҳлҢҖлЎң)
                              span.style.textShadow = 'none';
                          }
                      });
                      
                      // [мӢ к·ң] лӮҙ лІ„нҠј мғҒнғң м—…лҚ°мқҙнҠё (мһ¬м ‘мҶҚ мӢң лҳҗлҠ” лҰ¬м…Ӣ мӢң)
                      const myRematchBtn = document.getElementById('rematch-btn');
                      if (myRematchBtn) { // лІ„нҠјмқҙ мЎҙмһ¬н•  л•Ңл§Ң
                          if (amIReadyForRematch) { // [мҲҳм •]
                              myRematchBtn.disabled = false; // [мҲҳм •] н•ӯмғҒ нҷңм„ұнҷ”
                              myRematchBtn.textContent = 'мӨҖл№„мҷ„лЈҢ! вң“';
                          } else {
                              myRematchBtn.disabled = false;
                              myRematchBtn.textContent = 'лӢӨмӢңн•ҳкё°';
                          }
                      }
                      
                      // [мҲҳм •] лӘЁлӢ¬мқҙ лӢ«нҳҖмһҲкұ°лӮҳ лҚ°мқҙн„°к°Җ м—Ҷмңјл©ҙ лҰ¬мҠӨл„Ҳ лЎңм§Ғ мӨ‘м§Җ
                      if (!snapshot.exists() || !currentRoomData || !currentRoomData.players || !gameOverOverlay.classList.contains('active')) {
                        return;
                      }

                      // (кё°мЎҙ лЎңм§Ғ) лӘЁл“  н”Ңл Ҳмқҙм–ҙк°Җ лҸҷмқҳн–ҲлҠ”м§Җ мІҙнҒ¬
                      const requestCount = Object.keys(requests).length;
                      
                      // [мҲҳм •] м „мІҙ н”Ңл Ҳмқҙм–ҙ мҲҳ -> "л°©м—җ лӮЁм•„мһҲлҠ”" н”Ңл Ҳмқҙм–ҙ мҲҳ
                      const playerCountInRoom = playersInRoom.length;

                      // [мҲҳм •] "л°©м—җ лӮЁм•„мһҲлҠ”" лӘЁл“  н”Ңл Ҳмқҙм–ҙк°Җ лҸҷмқҳн–Ҳкі , лӮҙк°Җ нҳёмҠӨнҠёлқјл©ҙ
                      if (playerCountInRoom >= 2 && requestCount === playerCountInRoom && isHost) {
                            if (rematchRef) rematchRef.off(); // [мҲҳм •] лҰ¬мҠӨл„Ҳ м •лҰ¬
                            rematchRef = null;
                            
                            // [мҲҳм •] 'м• лӢҲнҢЎ' кІҢмһ„ мһ¬мӢңмһ‘мқ„ мң„н•ң мғҒнғңк°’ мҙҲкё°нҷ”
                            roomRef.update({
                                rematchRequests: null,
                                status: 'waiting',      // л°© мғҒнғңлҘј 'лҢҖкё°'лЎң
                                // 'playing' мғҒнғңм—җм„ң мғқм„ұлҗң кІҢмһ„ лҚ°мқҙн„° мҙҲкё°нҷ”
                                gameStarted: false, 
                                // (readyPlayersлҠ” 'waiting' мғҒнғңм—җм„ң лӢӨмӢң мұ„мӣҢм§җ)
                                readyPlayers: null     
                            });
                      }
                 });
            }

            // ------------------------------------
            // 5. [мӢ к·ң] н”јлІ„ мӢңмҠӨн…ң н•ЁмҲҳ
            // ------------------------------------
            
            function updateFeverGaugeUI() {
                const fill = document.getElementById('fever-gauge-fill');
                if (fill) {
                    const percent = Math.min(100, (feverGauge / MAX_FEVER_GAUGE) * 100);
                    fill.style.width = `${percent}%`;
                }
            }

            function startFeverMode() {
                // [мҲҳм •] н”јлІ„ лӘЁл“ң лҢҖмӢ  'нҢЎмқҙ' мғқм„ұ лЎңм§ҒмңјлЎң ліҖкІҪ
                // if (isProcessing) return; // [м ңкұ°] мқҙ лқјмқёмқҙ нҢЎмқҙ мғқм„ұмқ„ л§үкі  мһҲм—ҲмқҢ
                
                console.log("рҹ’Ј 'нҢЎмқҙ' кІҢмқҙм§Җ мҷ„лЈҢ! нҢЎмқҙлҘј мғқм„ұн•©лӢҲлӢӨ.");
                playSound('bomb-create-sound'); // [мӢ к·ң] нҢЎмқҙ мғқм„ұ нҡЁкіјмқҢ
                feverGauge = 0; // кІҢмқҙм§Җ мҙҲкё°нҷ”
                updateFeverGaugeUI();

                // 1. ліҙл“ңм—җм„ң л№„м–ҙмһҲм§Җ м•ҠмқҖ лһңлҚӨн•ң нғҖмқј м°ҫкё°
                const availableTiles = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        // л Ҳмқёліҙмҡ°лӮҳ нҢЎмқҙк°Җ м•„лӢҢ мқјл°ҳ нғҖмқјл§Ң лҢҖмғҒмңјлЎң н•Ё
                        if (board[r][c] && board[r][c] !== RAINBOW_TILE && board[r][c] !== 'рҹ’Ј') {
                            availableTiles.push({ r, c });
                        }
                    }
                }

                if (availableTiles.length === 0) return; // мғқм„ұн•  кіі м—ҶмқҢ

                // 2. лһңлҚӨ нғҖмқј н•ҳлӮҳлҘј 'нҢЎмқҙ'лЎң ліҖкІҪ
                const target = availableTiles[Math.floor(Math.random() * availableTiles.length)];
                board[target.r][target.c] = 'рҹ’Ј'; // нҢЎмқҙ мқҙлӘЁм§Җ (лҚ°мқҙн„° ліҖкІҪ)
                
                const tileElement = tileElements[target.r][target.c];
                setTileAppearance(tileElement, 'рҹ’Ј'); // [мҲҳм •]
                tileElement.classList.add('new-tile-anim'); // мғқм„ұ м• лӢҲл©”мқҙм…ҳ

                // 3. "нҢЎмқҙ мғқм„ұ!" н…ҚмҠӨнҠё н‘ңмӢң
                const pangiText = document.createElement('div');
                pangiText.className = 'combo-text'; // [мҲҳм •] feverText -> pangiText
                pangiText.textContent = 'рҹ’Ј нҢЎмқҙ мғқм„ұ! рҹ’Ј'; // [мҲҳм •] н…ҚмҠӨнҠё ліҖкІҪ
                pangiText.style.top = '50%';
                pangiText.style.left = '50%';
                pangiText.style.transform = 'translate(-50%, -50%)';
                gameWrapper.appendChild(pangiText); // [мҲҳм •] feverText -> pangiText
                setTimeout(() => pangiText.remove(), 1000); // [мҲҳм •] feverText -> pangiText

            }

            // [мӢ к·ң] 15мҪӨліҙ лӢ¬м„ұ мӢң "м§„м§ң" н”јлІ„ лӘЁл“ңлҘј л°ңлҸҷмӢңнӮӨлҠ” н•ЁмҲҳ
            function triggerActualFeverMode() {
                if (isFeverMode) return; // мӨ‘ліө л°©м§Җ

                console.log("рҹ”Ҙ 15мҪӨліҙ лӢ¬м„ұ! н”јлІ„ лӘЁл“ң л°ңлҸҷ!");
                isFeverMode = true;
                gameBoard.classList.add('fever-active');
                gameAreaFrameEl.classList.add('fever-active');
                gameContainer.classList.add('fever-active'); // [мӢ к·ң] кІҢмһ„ м»Ён…Ңмқҙл„Ҳ(л’·л°°кІҪ) нҷңм„ұнҷ”

                // "FEVER!" н…ҚмҠӨнҠё н‘ңмӢң
                const feverText = document.createElement('div');
                feverText.className = 'combo-text';
                feverText.textContent = 'рҹ”Ҙ FEVER! рҹ”Ҙ';
                feverText.style.top = '50%';
                feverText.style.left = '50%';
                feverText.style.transform = 'translate(-50%, -50%)';
                gameWrapper.appendChild(feverText);
                setTimeout(() => feverText.remove(), 1000); // 1мҙҲ л’Ө м ңкұ°

                // [мӨ‘мҡ”] 5мҙҲ л’Өм—җ н”јлІ„ мў…лЈҢ
                if (feverTimerId) clearTimeout(feverTimerId); // нҳ№мӢң лӘЁлҘј нғҖмқҙлЁё м ңкұ°
                feverTimerId = setTimeout(endFeverMode, FEVER_DURATION);
            }


            function endFeverMode() {
                console.log("...н”јлІ„ лӘЁл“ң мў…лЈҢ.");
                isFeverMode = false;
                feverTimerId = null;
                gameBoard.classList.remove('fever-active');
                gameAreaFrameEl.classList.remove('fever-active'); // [мӢ к·ң] кІҢмһ„ н”„л Ҳмһ„ мқҙнҺҷнҠё м ңкұ°
                gameContainer.classList.remove('fever-active'); // [мӢ к·ң] кІҢмһ„ м»Ён…Ңмқҙл„Ҳ(л’·л°°кІҪ) л№„нҷңм„ұнҷ”
                // (н•„мҡ”мӢң) "FEVER END" н…ҚмҠӨнҠё
            }
            // ------------------------------------
            // 5. м»ЁнҠёлЎӨ (л“ңлһҳк·ё) (мҲҳм •)
            // ------------------------------------

            function handleDragStart(e) {
                if (isProcessing) return;
                unlockAudioOnFirstTap();
                stopHintTimer(); // [мӢ к·ң] нһҢнҠё нғҖмқҙлЁё мҰүмӢң мӨ‘м§Җ
                // [мҲҳм •] "кі мҠӨнҠё н„°м№ҳ" н•ҙкІ°: e.currentTarget лҢҖмӢ  datasetмңјлЎң мўҢн‘ң м°ҫкё°
                const row = parseInt(e.currentTarget.dataset.row, 10);
                const col = parseInt(e.currentTarget.dataset.col, 10);

                // [мҲҳм •] tileElementsм—җм„ң DOM мҡ”мҶҢлҘј лӢӨмӢң м°ёмЎ°
                const tile = tileElements[row][col]; 
                
                if (!tile) {
                    console.error("кі мҠӨнҠё н„°м№ҳ л°©м§Җ: нғҖмқјмқ„ м°ҫмқ„ мҲҳ м—ҶмқҢ", row, col);
                    return;
                }

                dragStartTile = { row: row, col: col, el: tile };
                dragStartX = e.clientX || (e.touches && e.touches[0].clientX);
                dragStartY = e.clientY || (e.touches && e.touches[0].clientY);
                window.addEventListener('pointerup', handleDragEnd, { once: true });
                window.addEventListener('pointercancel', handleDragEnd, { once: true });
            }

            function handleDragEnd(e) {
                if (!dragStartTile) return;
                const dragEndX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const dragEndY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const deltaX = dragEndX - dragStartX;
                const deltaY = dragEndY - dragStartY;
                const threshold = dragStartTile.el.clientWidth / 3; 
                let targetRow = dragStartTile.row;
                let targetCol = dragStartTile.col;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > threshold) {
                    targetCol += (deltaX > 0) ? 1 : -1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > threshold) {
                    targetRow += (deltaY > 0) ? 1 : -1;
                } else {
                    dragStartTile = null; return;
                }
                if (targetRow < 0 || targetRow >= ROWS || targetCol < 0 || targetCol >= COLS) {
                    dragStartTile = null; return;
                }
                attemptSwap(dragStartTile.row, dragStartTile.col, targetRow, targetCol);
                dragStartTile = null;
            }

            // ------------------------------------
            // 6. кІҢмһ„ лЎңм§Ғ (мҲҳм •)
            // ------------------------------------
            
         async function attemptSwap(r1, c1, r2, c2) {
    if (isProcessing) return;
    isProcessing = true;

    playSound('swap'); // [мҲҳм •] н•ңкёҖ 'мҠӨмҷ‘' -> мҳҒм–ҙ 'swap' (нҢҢмқј мӣҗл¬ё кё°мӨҖ)
    
    // [мӢ к·ң] рҹ§ұ л°©н•ҙ нғҖмқј (м–јмқҢ) мҠӨмҷ‘ л°©м§Җ
    if (board[r1][c1] === JUNK_TILE || board[r2][c2] === JUNK_TILE) {
        // [лІ„к·ё мҲҳм •] animateInvalidSwapмқ„ нҳём¶ңн•ҳл©ҙ лҚ°мқҙн„°(board)к°Җ кј¬мһ„.
        // лҚ°мқҙн„°/DOM мҠӨмҷ‘ м—Ҷмқҙ 'нқ”л“ӨлҰј' м• лӢҲл©”мқҙм…ҳл§Ң мӢӨн–үн•©лӢҲлӢӨ.
        if (!isFeverMode) { // н”јлІ„ лӘЁл“ңк°Җ м•„лӢҗ л•Ңл§Ң нқ”л“ӨлҰј
            const tile1 = tileElements[r1][c1]; 
            const tile2 = tileElements[r2][c2]; 
            tile1.classList.add('invalid');
            tile2.classList.add('invalid');
            await new Promise(resolve => setTimeout(resolve, 400)); // 400ms лҢҖкё°
            tile1.classList.remove('invalid');
            tile2.classList.remove('invalid');
        }
        
        startHintTimer(); // [м¶”к°Җ] нһҢнҠё нғҖмқҙлЁё лӢӨмӢң мӢңмһ‘
        isProcessing = false;
        return;
    }
    // [мӢ к·ң] 1. нҠ№мҲҳ нғҖмқј мҠӨмҷ‘мқ„ лӘЁл‘җ м—¬кё°м„ң лЁјм Җ нҷ•мқё
    const tile1 = board[r1][c1];
    const tile2 = board[r2][c2];
    
    // 1a. рҹ’Ј нҢЎмқҙ(нҸӯнғ„) + нҢЎмқҙ(нҸӯнғ„) мҠӨмҷ‘ [рҹ”Ҙ мӢ к·ң лЎңм§Ғ]
    if (tile1 === 'рҹ’Ј' && tile2 === 'рҹ’Ј') {
        await handleDoublePangiExplosion(r1, c1, r2, c2);
        isProcessing = false;
        return;
    }
    
    // 1b. вӯҗпёҸ лі„ нҢЎмқҙ + лі„ нҢЎмқҙ мҠӨмҷ‘ [рҹ”Ҙ мӢ к·ң лЎңм§Ғ]
    if (tile1 === 'star' && tile2 === 'star') {
        await handleDoubleStarPangiExplosion(r1, c1, r2, c2);
        isProcessing = false;
        return;
    }
    
    // 1c. нҢЎмқҙ(нҸӯнғ„) мҠӨмҷ‘ (мқјл°ҳ нғҖмқјкіјмқҳ мҠӨмҷ‘, кё°мЎҙ лЎңм§Ғ)
    if (tile1 === 'рҹ’Ј') {
        await handlePangiExplosion(r1, c1);
        isProcessing = false;
        return;
    }
    if (tile2 === 'рҹ’Ј') {
        await handlePangiExplosion(r2, c2);
        isProcessing = false;
        return;
    }

    // 1d. лі„ нҢЎмқҙ мҠӨмҷ‘ (мқјл°ҳ нғҖмқјкіјмқҳ мҠӨмҷ‘, кё°мЎҙ лЎңм§Ғ)
    if (tile1 === 'star') {
        await handleStarPangiExplosion(r1, c1);
        isProcessing = false;
        return;
    }
    if (tile2 === 'star') {
        await handleStarPangiExplosion(r2, c2);
        isProcessing = false;
        return;
    }
    
    // 1e. л Ҳмқёліҙмҡ° + мқјл°ҳ мҠӨмҷ‘ (кё°мЎҙ лЎңм§Ғ)
    if (tile1 === RAINBOW_TILE && tile2 !== RAINBOW_TILE) {
        await handleRainbowSwap(r1, c1, tile2);
        isProcessing = false;
        return;
    }
    if (tile2 === RAINBOW_TILE && tile1 !== RAINBOW_TILE) {
        await handleRainbowSwap(r2, c2, tile1);
        isProcessing = false;
        return;
    }
    
    // 1f. л Ҳмқёліҙмҡ° + л Ҳмқёліҙмҡ° мҠӨмҷ‘ (кё°мЎҙ лЎңм§Ғ)
    if (tile1 === RAINBOW_TILE && tile2 === RAINBOW_TILE) {
        await handleDoubleRainbow(r1, c1, r2, c2);
        isProcessing = false;
        return;
    }
    
// 2. мқјл°ҳ мҠӨмҷ‘ лЎңм§Ғ
    swapData(r1, c1, r2, c2);
    await animateSwap(r1, c1, r2, c2);
    // [мӢ к·ң] рҹҺҜ нҚјнҺҷнҠё н”Ңл Ҳмқҙ м№ҙмҡҙнҠё мҰқк°Җ
    perfectPlayCount++;
    console.log(`нҚјнҺҷнҠё н”Ңл Ҳмқҙ м№ҙмҡҙнҠё: ${perfectPlayCount}/${PERFECT_PLAY_COUNT}`);
    if (perfectPlayCount >= PERFECT_PLAY_COUNT) {
        console.log("рҹҺҜ PERPECT PLAY! +", PERFECT_PLAY_BONUS);
        score += PERFECT_PLAY_BONUS;
        playSound('bomb-create-sound'); // [мҡ”мІӯ] 'нҢЎмқҙ мғқм„ұ' мӮ¬мҡҙл“ң мһ¬нҷңмҡ©
        showPerfectPlayText(PERFECT_PLAY_BONUS);
        perfectPlayCount = 0; // ліҙл„ҲмҠӨ л°ӣкі  мҙҲкё°нҷ”
    }
    // [мӢ к·ң] рҹ§  л©ҖнӢ°-л§Өм№ҳ ліҙл„ҲмҠӨ
    // (л°©н•ҙ нғҖмқј нҢҗм • 'м „м—җ' л©ҖнӢ°-л§Өм№ҳ ліҙл„ҲмҠӨлҘј лЁјм Җ кІҖмӮ¬)
    if (checkMultiMatch(r1, c1, r2, c2)) {
        console.log("рҹ§  MULTI-MATCH! +", MULTI_MATCH_BONUS);
        score += MULTI_MATCH_BONUS;
        playSound('rainbow-sound'); // [мҡ”мІӯ] 'л¬ҙм§Җк°ң' мӮ¬мҡҙл“ң мһ¬нҷңмҡ©
        showMultiMatchText(r1, c1, MULTI_MATCH_BONUS); // мғҲ н…ҚмҠӨнҠё н•ЁмҲҳ
    }
    // [мӢ к·ң] рҹ§ұ л°©н•ҙ нғҖмқј (кіөкІ© нҢҗм •)
    // (findAllMatchesліҙлӢӨ лЁјм Җ, мҠӨмҷ‘ м§Ғнӣ„мқҳ ліҙл“ңлҘј кІҖмӮ¬н•ҙм•ј н•Ё)
    const attackCount = checkPlayerAttack(r1, c1, r2, c2);
    if (attackCount > 0) {
        sendJunkAttack(attackCount); // мғҒлҢҖм—җкІҢ кіөкІ© м „мҶЎ
    }
    const matchData = findAllMatches();
            
    if (matchData.matches.size > 0) {
        // [вҡЎ н•ҳмқҙлёҢлҰ¬л“ң мҪӨліҙ мҲҳм •]
                if (comboTimerId) {
                    // 2мҙҲ нғҖмқҙлЁё нҷңм„ұ мӨ‘ -> мҠӨн”јл“ң мҪӨліҙ м„ұкіө
                    clearTimeout(comboTimerId);
                    comboTimerId = null;
                    // мҪӨліҙлҠ” мң м§Җлҗ©лӢҲлӢӨ. (1лІҲм—җм„ң м¶”к°Җн•ң processMatchesAndCascadeмқҳ currentCombo++к°Җ 1 мҳ¬л ӨмӨҢ)
                    console.log(`вҡЎ SPEED COMBO! (нҳ„мһ¬ ${currentCombo}x)`);
                } else {
                    // 2мҙҲ нғҖмқҙлЁё л§ҢлЈҢ -> мғҲ мҪӨліҙ мӢңмһ‘
                    currentCombo = 0; // 0мңјлЎң лҰ¬м…Ӣ (processMatchesAndCascadeк°Җ 1лЎң л§Ңл“Ұ)
                }
        if (isFeverMode) {
            // н”јлІ„ лӘЁл“ң
            console.log("рҹ”Ҙ н”јлІ„ лӘЁл“ң: мҪӨліҙ мҰүмӢң н•ҙм ң!");
            runCascade(matchData);
            isProcessing = false;
        } else {
            // мқјл°ҳ лӘЁл“ң
            await runCascade(matchData);
            isProcessing = false;
        }
    } else {
        // л§Өм№ӯ мӢӨнҢЁ
        // [мӢ к·ң] рҹҺҜ нҚјнҺҷнҠё н”Ңл Ҳмқҙ мҙҲкё°нҷ”
        if (perfectPlayCount > 0) {
            console.log("рҹҺҜ нҚјнҺҷнҠё н”Ңл Ҳмқҙ мӢӨнҢЁ. м№ҙмҡҙнҠё 0мңјлЎң мҙҲкё°нҷ”.");
            perfectPlayCount = 0;
        }
        await animateInvalidSwap(r1, c1, r2, c2); 
        isProcessing = false;
    }
}

// [мӢ к·ң] нҳёмҠӨнҠёк°Җ "лҢҖкё°мӢӨлЎң"лҘј лҲ„лҘј л•Ң мӢӨн–үлҗҳлҠ” н•ЁмҲҳ
async function hostReturnToGameLobby(playersData, gameType) {
    if (!isHost || !playersData || !gameType || !playerUid || !roomRef) {
        console.error("hostReturnToGameLobby: н•„мҲҳ лҚ°мқҙн„° лҲ„лқҪ");
        cleanupAndExit();
        return;
    }

    console.log("л°©мһҘмқҙ кІҢмһ„л°©.htmlлЎң ліөк·Җн•©лӢҲлӢӨ. лӘЁл“  мқёмӣҗмқҙ н•Ёк»ҳ мқҙлҸҷн•©лӢҲлӢӨ...");
    isExiting = true;
    stopSound('bgm');
    if (timerId) clearInterval(timerId);
    if (feverTimerId) clearTimeout(feverTimerId);

    try {
        // 1. л°© мғҒнғңлҘј 'lobby'лЎң ліҖкІҪ (кІҢмһ„л°©.htmlм—җм„ң мһҗлҸҷ м •лҰ¬)
        await roomRef.update({
            status: 'lobby',
            // кІҢмһ„ кҙҖл Ё лҚ°мқҙн„° мҙҲкё°нҷ”
            gameStarted: false,
            readyPlayers: null,
            rematchRequests: null,
            attacks: null
        });

        console.log("л°© мғҒнғңлҘј 'lobby'лЎң ліҖкІҪ мҷ„лЈҢ. кІҢмһ„л°©.htmlлЎң мқҙлҸҷ.");
        
        // [### 1. onDisconnect н•ёл“Өлҹ¬ мҲҳлҸҷ м·ЁмҶҢ (н•өмӢ¬) ###]
        if (isHost && hostStatusDisconnectRef) {
            try {
                hostStatusDisconnectRef.cancel();
                hostStatusDisconnectRef = null;
                console.log("Host onDisconnect.cancel() нҳём¶ңлҗЁ.");
            } catch (e) { console.warn("Host onDisconnect.cancel() мӢӨнҢЁ:", e); }
        }

        // [### 2. лҰ¬мҠӨл„Ҳ лҒ„кё° ###]
        // [мҲҳм •] м •нҷ•н•ң лҰ¬мҠӨл„Ҳ м°ёмЎ°лЎң лҒ„кё°
        if (roomRef) roomRef.off('value', roomValueListener); 
        if (chatListenerRef) chatListenerRef.off();
        if (rematchRef) rematchRef.off(); // 'лӢӨмӢңн•ҳкё°' лҰ¬мҠӨл„ҲлҸ„ мў…лЈҢ

        // [### 3. URL лІ„к·ё мҲҳм • (newRoomId -> roomRef.key) ###]
        // рҹҡЁ hostCleanupAndCreateNewRoom н•ЁмҲҳм—җм„ң newRoomIdлҘј м°ёмЎ°н•ҳлҚҳ лІ„к·ё мҲҳм •
        window.location.replace(`кІҢмһ„л°©.html?roomId=${roomRef.key}`);

    } catch (error) {
        console.error("л°© мғҒнғң ліҖкІҪ мӢӨнҢЁ:", error);
        cleanupAndExit(); // мӢӨнҢЁ мӢң мқјл°ҳ лӮҳк°Җкё°
    }
}

// [мӢ к·ң] кІҢмҠӨнҠёк°Җ "лҢҖкё°мӢӨлЎң"лҘј лҲ„лҘј л•Ң мӢӨн–үлҗҳлҠ” н•ЁмҲҳ
async function guestHandleReturn(playersData) { // [мҲҳм •] async м¶”к°Җ
    if (!playersData || !roomRef || !playerUid) {
        console.error("guestHandleReturn: н•„мҲҳ лҚ°мқҙн„° лҲ„лқҪ");
        cleanupAndExit(); // Fallback
        return;
    }

    const totalPlayers = Object.keys(playersData).length;

   if (totalPlayers === 2) {
        // 2лӘ… л°©: кІҢмҠӨнҠёлҸ„ кІҢмһ„л°©.htmlлЎң мқҙлҸҷ (л°©мһҘкіј н•Ёк»ҳ)
        console.log("2лӘ… л°©: кІҢмҠӨнҠёлҸ„ кІҢмһ„л°©.htmlлЎң мқҙлҸҷн•©лӢҲлӢӨ. (HostлҸ„ мқҙлҸҷн•ҳлҸ„лЎқ status: 'lobby' м„Өм •)");

        try {
            // [мӢ к·ң] л°©мһҘлҸ„ мқҙлҸҷмӢңнӮӨкё° мң„н•ҙ status: 'lobby'лЎң ліҖкІҪ
            await roomRef.update({
                status: 'lobby',
                gameStarted: false,
                readyPlayers: null,
                rematchRequests: null,
                attacks: null
            });
        } catch (error) {
            console.error("2лӘ… л°©(Guest) 'lobby' мғҒнғң ліҖкІҪ мӢӨнҢЁ:", error);
        }

        isExiting = true;
        stopSound('bgm');
        if (timerId) clearInterval(timerId);
        if (feverTimerId) clearTimeout(feverTimerId);
        
        // [### 1. onDisconnect н•ёл“Өлҹ¬ мҲҳлҸҷ м·ЁмҶҢ (н•өмӢ¬) ###]
        if (playerRef) { // (playerRefлҠ” м „м—ӯм—җ м„ м–ёлҗҳм–ҙ мһҲмқҢ)
            try {
                playerRef.onDisconnect().cancel();
                console.log("Guest (2p) onDisconnect.cancel() нҳём¶ңлҗЁ.");
            } catch (e) { console.warn("Guest (2p) onDisconnect.cancel() мӢӨнҢЁ:", e); }
        }

        // [### 2. лҰ¬мҠӨл„Ҳ лҒ„кё° ###]
        if (roomRef) roomRef.off('value', roomValueListener);
        if (chatListenerRef) chatListenerRef.off();
        if (rematchRef) rematchRef.off(); // 'лӢӨмӢңн•ҳкё°' лҰ¬мҠӨл„ҲлҸ„ мў…лЈҢ
        
        // [### 3. кІҢмһ„л°©.htmlлЎң мқҙлҸҷ ###]
        window.location.replace(`кІҢмһ„л°©.html?roomId=${roomRef.key}`);
    
    } else {
        // 3~4лӘ… л°©: кІҢмҠӨнҠё ліёмқёл§Ң лҰ¬мҠӨл„Ҳ м •лҰ¬ нӣ„ "кІҢмһ„л°©.html"лЎң лӮҳк°җ
        console.log(`${totalPlayers}лӘ… л°©: кІҢмҠӨнҠёл§Ң кІҢмһ„л°©.htmlлЎң лӮҳк°‘лӢҲлӢӨ. (лӮҳлЁём§Җ мқёмӣҗ мң м§Җ)`);
        
        isExiting = true; 
        stopSound('bgm'); 
        if (timerId) clearInterval(timerId);
        if (feverTimerId) clearTimeout(feverTimerId);
        
        // [мҲҳм •] playerRefк°Җ мһҲлҠ”м§Җ нҷ•мқё
        if (playerRef) {
            const playerOnDisconnect = playerRef.onDisconnect();
            if (playerOnDisconnect) { 
                try { playerOnDisconnect.cancel(); } catch(e) { console.warn("Player onDisconnect cancel failed:", e); } 
            }
        }

        let removePromise = Promise.resolve(); 

        if (roomRef && playerUid) {
            // [мҲҳм •] лҰ¬мҠӨл„Ҳ м •лҰ¬
            if (roomRef) roomRef.off('value', roomValueListener);
            if (chatListenerRef) chatListenerRef.off();
            if (rematchRef) rematchRef.off();

            // 'players' лӘ©лЎқм—җм„ң ліёмқёл§Ң м ңкұ°
            console.log("Guest (3-4p) removing self from players...");
            removePromise = roomRef.child('players/' + playerUid).remove();
        }

        // Firebaseм—җм„ң м ңкұ°к°Җ мҷ„лЈҢлҗҳл©ҙ лҰ¬л””л үм…ҳ
        removePromise
            .catch(e => console.error("Firebase 'players' л…ёл“ң м ңкұ° мӢӨнҢЁ:", e))
            .finally(() => {
                // лҢҖкё°мӢӨ.htmlмқҙ м•„лӢҢ кІҢмһ„л°©.htmlлЎң лҰ¬л””л үм…ҳ
                console.log(`Redirecting to кІҢмһ„л°©.html?roomId=${currentRoomId}`); 
                window.location.replace(`кІҢмһ„л°©.html?roomId=${currentRoomId}`);
            });

    for (let r = 0; r < ROWS; r++) {

// л Ҳмқёліҙмҡ° нғҖмқј мӮ¬мҡ© мӢң мғүмғҒ м ңкұ° нҡЁкіј
function showRainbowExplosion(rainbowRow, rainbowCol, targetColor) {
    const tile = tileElements[rainbowRow][rainbowCol];
    if (!tile) return;
    
    const rect = tile.getBoundingClientRect();
    const boardRect = gameBoard.getBoundingClientRect();
    const wrapperRect = gameWrapper.getBoundingClientRect();
    
    const centerTop = (rect.top - boardRect.top) + (rect.height / 2) + boardRect.top - wrapperRect.top;
    const centerLeft = (rect.left - boardRect.left) + (rect.width / 2) + boardRect.left - wrapperRect.left;
    
    // л¬ҙм§Җк°ңм—җм„ң нҚјм ёлӮҳк°ҖлҠ” нҡЁкіј
    for (let i = 0; i < 20; i++) {
        setTimeout(() => {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.top = `${centerTop}px`;
            particle.style.left = `${centerLeft}px`;
            particle.style.fontSize = '2em';
            particle.textContent = targetColor;
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '150';
            
            const angle = (Math.PI * 2 * i) / 20;
            const distance = 200;
            const targetX = Math.cos(angle) * distance;
            const targetY = Math.sin(angle) * distance;
            
            particle.style.animation = `particle-explode-${i} 0.8s ease-out forwards`;
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes particle-explode-${i} {
                    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
                    100% { transform: translate(calc(-50% + ${targetX}px), calc(-50% + ${targetY}px)) scale(0); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
            
            gameWrapper.appendChild(particle);
            setTimeout(() => {
                particle.remove();
                style.remove();
            }, 800);
        }, i * 20);
    }
}

async function handleDoublePangiExplosion(r1, c1, r2, c2) {
    // [вҡЎ н•ҳмқҙлёҢлҰ¬л“ң мҪӨліҙ мҲҳм •]
    if (comboTimerId) {
        // 2мҙҲ нғҖмқҙлЁё нҷңм„ұ мӨ‘ -> мҠӨн”јл“ң мҪӨліҙ м„ұкіө
        clearTimeout(comboTimerId);
        comboTimerId = null;
        console.log(`вҡЎ SPEED COMBO! (нҳ„мһ¬ ${currentCombo}x)`);
    } else {
        // 2мҙҲ нғҖмқҙлЁё л§ҢлЈҢ -> мғҲ мҪӨліҙ мӢңмһ‘
        currentCombo = 0; // 0мңјлЎң лҰ¬м…Ӣ (м•„лһҳ currentCombo++к°Җ 1лЎң л§Ңл“Ұ)
    }
    currentCombo++; // [мӨ‘мҡ”] нҠ№мҲҳ нғҖмқј л°ңлҸҷ мӢң мҪӨліҙ 1 мҰқк°Җ
    playExplosionVFX();
    playSound('bomb-explode-sound'); // нҢЎмқҙ нҸӯл°ң нҡЁкіјмқҢ

    const matchingTiles = new Set();
    
    // 1. мҠӨмҷ‘лҗң л‘җ нҢЎмқҙмқҳ 2x2 мҳҒм—ӯ кі„мӮ° (r_min, r_max, c_min, c_max)
    const r_min = Math.min(r1, r2);
    const r_max = Math.max(r1, r2);
    const c_min = Math.min(c1, c2);
    const c_max = Math.max(c1, c2);

    // 2. к°ҖлЎң 2мӨ„ лӘЁл‘җ м¶”к°Җ (r_min н–ү, r_max н–ү)
    for (let c = 0; c < COLS; c++) {
        if (board[r_min][c]) matchingTiles.add(`${r_min}-${c}`);
        if (board[r_max][c]) matchingTiles.add(`${r_max}-${c}`);
    }

    // 3. м„ёлЎң 2мӨ„ лӘЁл‘җ м¶”к°Җ (c_min м—ҙ, c_max м—ҙ)
    for (let r = 0; r < ROWS; r++) {
        if (board[r][c_min]) matchingTiles.add(`${r}-${c_min}`);
        if (board[r][c_max]) matchingTiles.add(`${r}-${c_max}`);
    }
    
    // 4. [мӢ к·ң] ліҙл„ҲмҠӨ м җмҲҳ кі„мӮ°
    const DOUBLE_PANGI_BONUS = 3000;
    const scoreMultiplier = 1.0;
    const baseScore = matchingTiles.size * 50;
    const comboBonus = currentCombo * 20;
    const turnScore = Math.round((baseScore + comboBonus + DOUBLE_PANGI_BONUS) * scoreMultiplier);
    
    score += turnScore;
    
    showCrossExplosion([{ row: r1, col: c1 }, { row: r2, col: c2 }]); // мқҙнҺҷнҠё мһ¬нҷңмҡ©
    showComboText(currentCombo, matchingTiles);
    showComboScore(turnScore);
    
    updateScoreUI();
    if (playerRef) { playerRef.child('score').set(score); }
    playComboSound(currentCombo);
    
    await animatePop(matchingTiles);
    removeMatches(matchingTiles);
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();

    // 5. нӣ„мІҳлҰ¬ лЎңм§Ғ (н”јлІ„/мқјл°ҳ лӘЁл“ң л¶„кё°)
    if (isFeverMode) {
        animateDrops(droppedTilesMap, newTilesMap);
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) { runCascade(newMatchData); }
        else {
            const gracePeriod = getComboGracePeriod(currentCombo);
            if (comboTimerId) clearTimeout(comboTimerId);
            comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod); 
            startHintTimer(); 
            if (!checkForPossibleMoves()) { handleNoMoreMoves(); }
        }
    } else {
        await animateDrops(droppedTilesMap, newTilesMap);
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) {
            await new Promise(resolve => setTimeout(resolve, 100));
            await runCascade(newMatchData);
        } else {
            const gracePeriod = getComboGracePeriod(currentCombo);
            if (comboTimerId) clearTimeout(comboTimerId);
            comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod); 
            startHintTimer(); 
            if (!checkForPossibleMoves()) { await handleNoMoreMoves(); }
        }
    }
}

            function swapData(r1, c1, r2, c2) {
                const temp = board[r1][c1];

            }
            // [мҲҳм •] "кі мҠӨнҠё н„°м№ҳ" н•ҙкІ°мқҳ н•өмӢ¬ н•ЁмҲҳ
            // [мҲҳм •] "кі мҠӨнҠё н„°м№ҳ" л°Ҹ "мһҳлӘ»лҗң мҠӨмҷ‘" лІ„к·ё мөңмў… мҲҳм •
            function swapDOMElements(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1]; // (мҳҲ: El_A)
                const tile2 = tileElements[r2][c2]; // (мҳҲ: El_B)

                // 1. [н•өмӢ¬ мҲҳм •] л‘җ нғҖмқјмқҳ "лҸҷл¬ј нҒҙлһҳмҠӨ"лҘј м§Ғм ‘ көҗнҷҳн•©лӢҲлӢӨ.
                // setTileAppearanceлҘј мӮ¬мҡ©н•ҳл©ҙ м•Ҳ лҗ©лӢҲлӢӨ.
                
                // (1-1) tile1(El_A)м—җм„ң лӘЁл“  лҸҷл¬ј нҒҙлһҳмҠӨлҘј м°ҫм•„ tile2(El_B)м—җ мӨҚлӢҲлӢӨ.
                const tile1Classes = [];
                tile1.classList.forEach(c => {
                    // [лІ„к·ё мҲҳм •] 'star', JUNK_TILE(junk) нҒҙлһҳмҠӨлҸ„ көҗнҷҳ лҢҖмғҒм—җ нҸ¬н•Ё
                    if (TILE_EMOJIS.includes(c) || c === 'rainbow' || c === 'bomb' || c === 'star' || c === JUNK_TILE) {
                        tile1Classes.push(c);
                    }
                });
                
                // (1-2) tile2(El_B)м—җм„ң лӘЁл“  лҸҷл¬ј нҒҙлһҳмҠӨлҘј м°ҫм•„ tile1(El_A)м—җ мӨҚлӢҲлӢӨ.
                const tile2Classes = [];
                tile2.classList.forEach(c => {
                    // [лІ„к·ё мҲҳм •] 'star', JUNK_TILE(junk) нҒҙлһҳмҠӨлҸ„ көҗнҷҳ лҢҖмғҒм—җ нҸ¬н•Ё
                    if (TILE_EMOJIS.includes(c) || c === 'rainbow' || c === 'bomb' || c === 'star' || c === JUNK_TILE) {
                        tile2Classes.push(c);
                    }
                });

                // (1-3) нҒҙлһҳмҠӨ лҰ¬мҠӨнҠёлҘј м„ңлЎң көҗмІҙн•©лӢҲлӢӨ.
                tile1.classList.remove(...tile1Classes);
                tile1.classList.add(...tile2Classes);
                
                tile2.classList.remove(...tile2Classes);
                tile2.classList.add(...tile1Classes);

                // 2. [н•өмӢ¬ мҲҳм •] DOM dataset мҠӨмҷ‘ (мқҙм „ мҲҳм •м•Ҳ мң м§Җ)
                // tile1(El_A)мқҖ (r2,c2)лЎң мқҙлҸҷн–ҲмңјлҜҖлЎң datasetмқ„ (r2,c2)лЎң м„Өм •
                tile1.dataset.row = r2;
                tile1.dataset.col = c2;
                // tile2(El_B)лҠ” (r1,c1)лЎң мқҙлҸҷн–ҲмңјлҜҖлЎң datasetмқ„ (r1,c1)лЎң м„Өм •
                tile2.dataset.row = r1;
                tile2.dataset.col = c1;

                // 3. JS л°°м—ҙ мҠӨмҷ‘ (нғҖмқј м°ёмЎ° мҠӨмҷ‘)
                tileElements[r1][c1] = tile2;
                tileElements[r2][c2] = tile1;
            }
            function animateSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];
                tile1.classList.add('swap');
                tile2.classList.add('swap');
                const rect1 = tile1.getBoundingClientRect();
                const rect2 = tile2.getBoundingClientRect();
                const deltaX = rect1.left - rect2.left;
                const deltaY = rect1.top - rect2.top;
                tile1.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`;
                tile2.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                return new Promise(resolve => {
                    setTimeout(() => {
                        tile1.style.transform = '';
                        tile2.style.transform = '';
                        tile1.classList.remove('swap');
                        tile2.classList.remove('swap');
                        swapDOMElements(r1, c1, r2, c2); // DOM, dataset, JSл°°м—ҙ лҸҷкё°нҷ”
                        resolve();
                    }, 200); 
                });
            }

         function findAllMatches() {

    for (let r = 0; r < ROWS; r++) {
        let matchStart = 0;

                continue;
            }
            const matchLength = c - matchStart;
            if (matchLength >= 3) {
                for (let i = matchStart; i < c; i++) {
                    hMatchCoords.add(`${r}-${i}`); // [мҲҳм •] hMatchCoordsм—җ м ҖмһҘ
                }

            matchStart = c;

            }

    for (let c = 0; c < COLS; c++) {

           if (board[r][c] && board[r][c] === board[matchStart][c] && board[matchStart][c] !== RAINBOW_TILE && board[matchStart][c] !== JUNK_TILE) {

            const matchLength = r - matchStart;
            if (matchLength >= 3) {
                for (let i = matchStart; i < r; i++) {

           function playComboSound(combo) {

    const semitone = Math.pow(2, 1/12);

    const comboIndex = Math.min(combo - 1, pitchMap.length - 1);
    const semitonesUp = pitchMap[comboIndex];
    const finalRate = Math.pow(semitone, semitonesUp);
    const clampedRate = Math.max(1.0, Math.min(finalRate, 4.0));
    
    // ліјлҘЁ мЎ°м Ҳ (0.6 вҶ’ 0.9)
    const volumeBoost = Math.min(0.6 + (combo * 0.03), 0.9);
    
    try {
        const sound = sounds['match'];
        if(sound) {
            sound.currentTime = 0;
            sound.playbackRate = clampedRate;
            sound.volume = volumeBoost;
            sound.play().catch(e => {});
        }
    } catch(e) {}
    
   
    console.log(`рҹҺө ${combo}мҪӨліҙ: +${semitonesUp}л°ҳмқҢ (${clampedRate.toFixed(2)}x, Vol:${volumeBoost.toFixed(2)})`);
}

                            // [мҲҳм •] лІ„к·ё л°©м§Җ: л–Ём–ҙм§ҖлҠ” кұ°лҰ¬к°Җ 0мқј мҲҳ м—ҶмқҢ (лЎңм§ҒмғҒ)
                            // startRowк°Җ rкіј к°ҷмңјл©ҙ `droppedTilesMap`м—җ м—Ҷм–ҙм•ј н•Ё.
                            // л§Ңм•Ҫмқҳ кІҪмҡ°лҘј лҢҖл№„н•ҙ 0мқҙ м•„лӢҢ к°’л§Ң transform
                            if (dropDistance !== 0) {

                tileElements = newTileElements;

                gameBoard.offsetHeight;

const fallTiles = [];
for (let r = 0; r < ROWS; r++) {

// [н•өмӢ¬ мҲҳм •] н•ң лІҲмқҳ rAFм—җм„ң лӘЁл“  нғҖмқј transform ліҖкІҪ (л°°м№ҳ мІҳлҰ¬ + iOS мөңм Ғнҷ”)
if (fallTiles.length > 0) {
    // iOSм—җм„ңлҠ” н•ң н”„л Ҳмһ„м—җ л„Ҳл¬ҙ л§ҺмқҖ DOM ліҖкІҪмқҙ мһҲмңјл©ҙ лІ„лІ…мһ„
    // нғҖмқјмқ„ мҶҢк·ңлӘЁ л°°м№ҳлЎң лӮҳлҲ м„ң мІҳлҰ¬
    const batchSize = 12; // iOSм—җ мөңм Ғнҷ”лҗң л°°м№ҳ нҒ¬кё°
    let batchIndex = 0;
    
    const processBatch = () => {
        const start = batchIndex * batchSize;
        const end = Math.min(start + batchSize, fallTiles.length);
        
        for (let i = start; i < end; i++) {
            const tile = fallTiles[i];
            tile.style.transform = 'translateY(0)';
            fallPromises.push(new Promise(resolve => {
                tile.addEventListener('transitionend', resolve, { once: true });
            }));
        }
        
        batchIndex++;
        if (end < fallTiles.length) {
            requestAnimationFrame(processBatch);
        }
    };
    
    requestAnimationFrame(processBatch);
}

                // 5. м• лӢҲл©”мқҙм…ҳ мҷ„лЈҢ лҢҖкё° (transition 0.3s + мҳҲл№„ 0.3s)
                const timeoutPromise = new Promise(resolve => setTimeout(resolve, 600));

            function findA_PossibleMove() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        // к°ҖлЎңлЎң мқём ‘н•ң м§қ кІҖмӮ¬ (мҳӨлҘёмӘҪ)
                        if (c < COLS - 1) {
                            if (checkMove(r, c, r, c + 1)) {
                                return [tileElements[r][c], tileElements[r][c + 1]];
                            }
                        }
                        // м„ёлЎңлЎң мқём ‘н•ң м§қ кІҖмӮ¬ (м•„лһҳмӘҪ)
                        if (r < ROWS - 1) {
                            if (checkMove(r, c, r + 1, c)) {
                                return [tileElements[r][c], tileElements[r + 1][c]];
                            }
                        }
                    }
                }

            function addJunkTilesToBoard(count) {

            function checkPlayerAttack(r1, c1, r2, c2) {
                let attackCount = 0;
                // мҠӨмҷ‘н•ң л‘җ мң„м№ҳ (r1,c1), (r2,c2)л§Ң кІҖмӮ¬
                const coordsToTest = [[r1, c1], [r2, c2]];
                const checkedTiles = new Set(); // мӨ‘ліө кІҖмӮ¬ л°©м§Җ

                coordsToTest.forEach(([r, c]) => {
                    const tile = board[r][c];
                    if (!tile || !TILE_EMOJIS.includes(tile) || checkedTiles.has(`${r}-${c}`)) return;

                    // к°ҖлЎң кІҖмӮ¬
                    let hCount = 1;
                    let cLeft = c - 1;
                    while (cLeft >= 0 && board[r][cLeft] === tile) { hCount++; checkedTiles.add(`${r}-${cLeft--}`); }
                    let cRight = c + 1;
                    while (cRight < COLS && board[r][cRight] === tile) { hCount++; checkedTiles.add(`${r}-${cRight++}`); }
                    
                    if (hCount === 5) attackCount += 3;
                    else if (hCount === 4) attackCount += 1;

                    // м„ёлЎң кІҖмӮ¬
                    let vCount = 1;
                    let rUp = r - 1;
                    while (rUp >= 0 && board[rUp][c] === tile) { vCount++; checkedTiles.add(`${rUp--}-${c}`); }
                    let rDown = r + 1;
                    while (rDown < ROWS && board[rDown][c] === tile) { vCount++; checkedTiles.add(`${rDown++}-${c}`); }
                    
                    if (vCount === 5) attackCount += 3;
                    else if (vCount === 4) attackCount += 1;
                });

return attackCount;
            }

            function checkMultiMatch(r1, c1, r2, c2) {

                const match1 = isTileCreatingMatch(r1, c1);
                const match2 = isTileCreatingMatch(r2, c2);
                
                // л‘җ нғҖмқј лӘЁл‘җ 3л§Өм№ҳ мқҙмғҒмқ„ л§Ңл“Өм—ҲлӢӨл©ҙ 'л©ҖнӢ°-л§Өм№ҳ'
                return match1 && match2;
            }
            
            // checkMultiMatchмқҳ н—¬нҚј: нҠ№м • нғҖмқјмқҙ 3л§Өм№ҳ мқҙмғҒмқ„ л§Ңл“ңлҠ”м§Җ нҷ•мқё
            function isTileCreatingMatch(r, c) {
                const tile = board[r][c];
                if (!tile || !TILE_EMOJIS.includes(tile)) return false;

                // к°ҖлЎң кІҖмӮ¬
                let hCount = 1;
                let cLeft = c - 1;
                while (cLeft >= 0 && board[r][cLeft] === tile) { hCount++; cLeft--; }
                let cRight = c + 1;
                while (cRight < COLS && board[r][cRight] === tile) { hCount++; cRight++; }
                if (hCount >= 3) return true;

                // м„ёлЎң кІҖмӮ¬
                let vCount = 1;
                let rUp = r - 1;
                while (rUp >= 0 && board[rUp][c] === tile) { vCount++; rUp--; }
                let rDown = r + 1;
                while (rDown < ROWS && board[rDown][c] === tile) { vCount++; rDown++; }
                if (vCount >= 3) return true;
                
                return false;
            }

            // [мӢ к·ң] нҶ мҠӨнҠё м•ҢлҰј (мҙҲлҢҖ/мӘҪм§Җ/м№ңкө¬) лҰ¬мҠӨл„Ҳ м„Өм • н•ЁмҲҳ
            let globalListenersAttached = false; // мӨ‘ліө мӢӨн–ү л°©м§Җ н”Ңлһҳк·ё
            function setupGlobalNotificationListeners(userId) {
                if (globalListenersAttached || !userId || !db) return;
                globalListenersAttached = true;
                
                console.log("[м•ҢлҰј] м „м—ӯ м•ҢлҰј лҰ¬мҠӨл„Ҳ м„Өм • (ID:", userId, ")");
                
                // м§ҖкёҲ мқҙ мҲңк°„ мқҙнӣ„мқҳ лҚ°мқҙн„°л§Ң л°ӣлҸ„лЎқ м„Өм • (нҺҳмқҙм§Җ лЎңл“ң мӢң кіјкұ° м•ҢлҰј л°©м§Җ)
                const now = Date.now(); // [лІ„к·ё мҲҳм •] TIMESTAMP -> Date.now()

                // 1. л°© мҙҲлҢҖ м•ҢлҰј
                const invitesRef = db.ref(`invitations/${userId}`);
                invitesRef.on('child_added', snapshot => {
                    const invite = snapshot.val();
                    if (invite && invite.from_name) {
                        showToast(`рҹ”” [л°© мҙҲлҢҖ] ${escapeHTML(invite.from_name)}лӢҳмқҙ '${escapeHTML(invite.game_name)}' л°©м—җ мҙҲлҢҖн–ҲмҠөлӢҲлӢӨ.`);
                        playSound('swap'); // к°„лӢЁн•ң м•ҢлҰјмқҢ
                    }
                    snapshot.ref.remove(); // м•ҢлҰј нҷ•мқё нӣ„ мҰүмӢң м ңкұ°
                });

                // 2. м№ңкө¬ мҡ”мІӯ м•ҢлҰј
                const friendReqRef = db.ref(`friend_requests/${userId}`); // [мҲҳм •] кІҪлЎң ліҖкІҪ
                friendReqRef.on('child_added', snapshot => {
                    const req = snapshot.val();
                    if (req && req.from_name) {
                         showToast(`рҹ’Ң [м№ңкө¬ мҡ”мІӯ] ${escapeHTML(req.from_name)}лӢҳмқҙ м№ңкө¬лҘј мӢ мІӯн–ҲмҠөлӢҲлӢӨ.`);
                         playSound('swap');
                    }
                    snapshot.ref.remove(); // м•ҢлҰј нҷ•мқё нӣ„ мҰүмӢң м ңкұ°
                });

                // 3. мӘҪм§Җ(к·“мҶҚл§җ) м•ҢлҰј
                const whisperRef = db.ref(`user_inboxes/${userId}`); // [мҲҳм •] кІҪлЎң ліҖкІҪ
                whisperRef.on('child_added', async (snapshot) => { // [мҲҳм •] async м¶”к°Җ
                    const msg = snapshot.val();
                    const senderUid = snapshot.key; // [мҲҳм •] нӮӨк°Җ UIDмһ„

                    // [мҲҳм •] лҚ°мқҙн„° кө¬мЎ° ліҖкІҪ (lastMessage)
                    if (msg && msg.lastMessage && senderUid) { 
                        try {
                            // [мӢ к·ң] ліҙлӮё мӮ¬лһҢмқҳ н”„лЎңн•„мқ„ к°Җм ёмҳҙ
                            const profileSnap = await db.ref(`users/${senderUid}/profile`).once('value');
                            if (profileSnap.exists()) {
                                const nickname = profileSnap.val().nickname || '...';
                                showToast(`рҹ’¬ [мӘҪм§Җ] ${escapeHTML(nickname)}: ${escapeHTML(msg.lastMessage)}`);
                                playSound('swap');
                            }
                        } catch (e) {
                            console.error("мӘҪм§Җ м•ҢлҰј лӢүл„Өмһ„ лЎңл“ң мӢӨнҢЁ:", e);
                        }
                    }
                    snapshot.ref.remove(); // м•ҢлҰј нҷ•мқё нӣ„ мҰүмӢң м ңкұ°
                });
            }
        }); // DOMContentLoaded End
    </script>

        <div class="modal-body" style="padding: 10px;">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="rematch-chat-input" placeholder="мұ„нҢ… мһ…л Ҙ..." style="flex-grow: 1; border: 2px solid var(--text-color-dark); border-radius: 12px; padding: 12px; font-size: 1em; font-family: var(--font-main); min-width: 0;">
                <button id="rematch-chat-stt-btn" class="menu-btn secondary" style="width: 50px; padding: 0; font-size: 1.2em; flex-shrink: 0; border-bottom-width: 4px;">рҹҺҷпёҸ</button>
                <button id="rematch-chat-send-btn" class="menu-btn primary" style="width: 70px; padding: 0; flex-shrink: 0; border-bottom-width: 4px;">м „мҶЎ</button>
            </div>
        </div>
    </div>
</div>
