<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>캔디솝 (4인 대전)</title> 
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* ------------------------- */
        /* == 1. 앱 공통 테마 == */
        /* ------------------------- */
        :root {
            --bg-color: #FFFBEB;
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD93D;
            --text-color-dark: #574141;
            --text-color-light: #ffffff;
            --danger-color: #F76363;
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2;
            --panel-shadow: #E4DCCF;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color-dark);
            display: flex; flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }

        /* ------------------------- */
        /* == 2. 게임 레이아웃 (멀티용) == */
        /* ------------------------- */
        #game-wrapper { 
            width: 100%; height: 100%; 
            max-width: 450px; 
            display: flex; flex-direction: column; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            position: relative; 
        }

        .page-header {
            width: 100%; padding: 10px; flex-shrink: 0;
            background: #FFFAE0;
            border-bottom: 3px solid var(--panel-border);
            display: flex; 
            flex-direction: column;
            gap: 8px;
            position: relative; 
            z-index: 10; 
        }

        #multiplayer-scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
        }

        .stat-box {
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 5px;
            text-align: center;
            font-weight: 900;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .stat-box.my-score {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            transform: scale(1.05);
        }
        .stat-box .label {
            font-size: 0.8em;
            color: #9A6A3A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }
        .stat-box .value {
            font-size: 1.4em;
            color: var(--primary-color);
        }

        #timer-container {
            width: 120px;
            text-align: center;
            font-weight: 900;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 5px;
            margin: 0 auto;
        }
        #timer-container .label { font-size: 0.9em; color: #9A6A3A; }
        #timer-container .value {
            font-size: 1.8em;
            color: var(--primary-color);
            transition: color 0.3s ease;
        }
        #timer-container .value.danger-time {
            color: var(--danger-color);
            animation: throb 1.2s infinite ease-in-out;
        }
        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #game-container {
            width: 100%; flex-grow: 1; 
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
            padding: 10px; 
        }
        #game-board {
            position: relative; 
            background-color: var(--panel-bg);
            border: none; /* [수정] 테두리 제거 */
            box-shadow: 6px 6px 0px 0px var(--panel-shadow);
            border-radius: 12px;
            display: grid; 
            gap: 2px;
            padding: 4px;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
        }

        /* ------------------------- */
        /* == 3. 타일 스타일 (수정) == */
        /* ------------------------- */
        .tile {
            background-color: #FFFEF5; 
            border-radius: 10px; 
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5em; 
            cursor: pointer;
            border: 1px solid var(--panel-border);
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.15), 
                        inset -2px -2px 4px rgba(255, 255, 255, 0.7);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            /* aspect-ratio: 1 / 1; */ /* [수정] JS에서 gridTemplateRows를 설정하므로 제거 */
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.2s ease,
                        box-shadow 0.2s ease;
        }
        .tile:active {
            box-shadow: inset 1px 1px 2px rgba(87, 65, 65, 0.2), 
                        inset -1px -1px 2px rgba(255, 255, 255, 0.7);
            transform: scale(0.95);
        }
        
        .tile.pop { animation: pop 0.2s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0.1); opacity: 0; }
        }

        /* [수정] fall 트랜지션 (가속도) */
        .tile.fall {
            transition: transform 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53);
        }
        
        .tile.new-tile-anim { animation: new-tile 0.2s ease-out; } /* [수정] .new -> .new-tile-anim */
        @keyframes new-tile {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .tile.swap { transition: transform 0.2s ease-in-out; z-index: 10; }
        .tile.invalid { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* ------------------------- */
        /* == 4. 모달 (기존과 동일) == */
        /* ------------------------- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; 
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: var(--panel-bg); 
            color: var(--text-color-dark); 
            padding: 0; 
            border-radius: 24px;
            width: 90%; max-width: 400px; 
            box-shadow: 8px 8px 0px 0px var(--text-color-dark);
            overflow: hidden; 
            border: 4px solid var(--text-color-dark);
        }
        .modal-header { 
            background-color: var(--primary-color);
            color: white; 
            padding: 15px; 
            border-bottom: 4px solid #C04A4A; 
        }
        .modal-header h2 { font-size: 1.6em; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .modal-body { padding: 25px; }
        .modal-footer {
            display: flex; gap: 10px;
            padding: 20px;
            border-top: 3px solid var(--panel-border);
            background-color: #FFFAE0;
        }

        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown-number { font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7); animation: countdown-pop 1s; }
        @keyframes countdown-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #final-score {
            font-size: 2.0em;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 0px;
        }
        #final-ranking-list {
            text-align: left;
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* ------------------------- */
        /* == 5. 아케이드 버튼 == */
        /* ------------------------- */
        .menu-btn { 
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: 900; 
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer; 
            transition: all 0.1s ease-out;
            border-bottom: 5px solid;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            margin: 5px 0; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .menu-btn.primary { 
            background-color: var(--primary-color);
            color: white; 
            border-bottom-color: #C04A4A;
        }
        .menu-btn.secondary { 
            background-color: var(--secondary-color);
            color: white; 
            border-bottom-color: #379A93;
        }
        
        /* ------------------------- */
        /* == 6. [신규] 콤보 텍스트/점수 == */
        /* ------------------------- */
        .combo-text {
            position: absolute;
            font-size: 2.5em;
            font-weight: 900;
            color: white;
            /* -webkit-text-stroke: 2px var(--primary-color); */ /* [수정] 이 줄을 주석 처리하거나 삭제합니다. */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            z-index: 100;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }
        
        .combo-score {
            position: absolute;
            font-size: 1.8em;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 101;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }

        @keyframes combo-pop {
            0% { transform: scale(0.8); opacity: 1; }
            20% { transform: scale(1.3); }
            40% { transform: scale(1); }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

    </style>
</head>
<body>
    <div id="game-wrapper">
        <div class="page-header" id="multi-header">
            <div id="multiplayer-scoreboard">
                <div class="stat-box"><div class="label">플레이어 1</div><div class="value">0</div></div>
                <div class="stat-box"><div class="label">플레이어 2</div><div class="value">0</div></div>
                <div class="stat-box"><div class="label">플레이어 3</div><div class="value">0</div></div>
                <div class="stat-box"><div class="label">플레이어 4</div><div class="value">0</div></div>
            </div>
            <div id="timer-container">
                <div class="label">시간</div>
                <div class="value" id="timer-value">60</div>
            </div>
    
        </div>

        <div id="game-container">
            <div id="combo-score-display" style="position: absolute; top: 10px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 101;"></div>
            <div id="game-board">
                </div>
        </div>
    </div>

    <div id="loading-overlay" class="overlay active">
        <div class="spinner"></div>
        <p style="color: white; font-size: 1.2em;">방에 접속 중입니다...</p>
    </div>

    <div id="info-overlay" class="overlay"> <div id="countdown-number">3</div>
    </div>

    <div id="game-over-overlay" class="overlay">
         <div class="modal-content">
             <div class="modal-header">
                 <h2>게임 종료!</h2>
             </div>
             <div class="modal-body">
                <p id="final-rank-title" style="font-size: 1.2em; margin-bottom: 15px;">🏆 최종 순위 🏆</p>
                <div id="final-ranking-list">
                   </div>
                <hr style="margin: 15px 0; border: 1px solid var(--panel-border);">
                <p style="font-size: 1.1em; font-weight: 700;">내 점수</p>
                <p id="final-score" style="margin-bottom: 0;">0</p>
             </div>
             <div class="modal-footer">
                 <button id="restart-btn" class="menu-btn secondary">대기실로</button>
                 <a href="대기실.html" class="menu-btn primary">나가기</a>
             </div>
         </div>
    </div>

    <audio id="swap-sound" src="./sounds/move.wav" preload="auto"></audio>
    <audio id="match-sound" src="./봄버맨사운드/사천성맞춤.mp3" preload="auto"></audio>
    <audio id="gameover-sound" src="./봄버맨사운드/패배.mp3" preload="auto"></audio>
    <audio id="combo1-sound" src="./sounds/combo1.mp3" preload="auto"></audio>
    <audio id="combo2-sound" src="./sounds/combo2.mp3" preload="auto"></audio>
    <audio id="combo3-sound" src="./sounds/combo3.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // ------------------------------------
            // 1. DOM 요소 및 기본 설정
            // ------------------------------------

            const gameBoard = document.getElementById('game-board');
            const timerValue = document.getElementById('timer-value');
            const infoOverlay = document.getElementById('info-overlay');
            const countdownNumber = document.getElementById('countdown-number');
            const gameOverOverlay = document.getElementById('game-over-overlay');
            const finalScoreEl = document.getElementById('final-score');
            const restartBtn = document.getElementById('restart-btn');
            const gameContainer = document.getElementById('game-container'); 
            const loadingOverlay = document.getElementById('loading-overlay');
            const multiplayerScoreboard = document.getElementById('multiplayer-scoreboard');
            const finalRankingList = document.getElementById('final-ranking-list');
            const timerDisplay = document.getElementById('timer-container').querySelector('.value');
            const gameWrapper = document.getElementById('game-wrapper'); 
            const comboScoreDisplay = document.getElementById('combo-score-display'); 

            const sounds = {
                swap: document.getElementById('swap-sound'),
                match: document.getElementById('match-sound'),
                gameOver: document.getElementById('gameover-sound'),
                combo: [
                    document.getElementById('combo1-sound'),
                    document.getElementById('combo2-sound'),
                    document.getElementById('combo3-sound')
                ]
            };

            // [수정] 타일 수 (8x6 = 48개)
            const ROWS = 8;
            const COLS = 6;
            // [수정] 이모지 (5개 동물)
            const TILE_EMOJIS = ['🐄', '🐯', '🐳', '🐷', '🦒']; 
            const GAME_TIME = 60;

            let board = []; 
            let tileElements = []; 
            let score = 0;
            let timer = GAME_TIME;
            let timerId = null;
            let isProcessing = true;
            let currentCombo = 0;

            let dragStartTile = null;
            let dragStartX = 0;
            let dragStartY = 0;

            // ------------------------------------
            // 2. Firebase (멀티플레이)
            // ------------------------------------
            
            let db, auth;
            let currentRoomId = null;
            let currentUser = null;
            let playerUid = null;
            let playerRef = null;
            let roomRef = null;
            let allPlayersRef = null;
            let statusRef = null; // [신규] status 리스너 전용 참조
            let isHost = false; 

            const firebaseConfig = {
                apiKey: "AIzaSyCmNAKmgF_L3o0QyOGh_oFAq_rMRtUyklw",
                authDomain: "goodluck-7c14b.firebaseapp.com",
                databaseURL: "https://goodluck-7c14b-default-rtdb.firebaseio.com",
                projectId: "goodluck-7c14b",
                storageBucket: "goodluck-7c14b.appspot.com",
                messagingSenderId: "858281658455",
                appId: "1:858281658455:web:9131280a459be983933b12"
            };
            
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                auth = firebase.auth();
            } catch (e) {
                loadingOverlay.innerHTML = "<p style='color: white;'>Firebase 연결 실패!</p>";
                return;
            }

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    playerUid = user.uid;
                    const urlParams = new URLSearchParams(window.location.search);
                    const roomId = urlParams.get('roomId');
                    
                   if (roomId) {
                        // [수정] "rooms" 경로 사용
                        roomRef = db.ref('rooms').child(roomId); 
                        roomRef.child('hostId').once('value', (snapshot) => {
                            isHost = (snapshot.val() === playerUid);
                            console.log("방장 여부:", isHost);
                            joinGameRoom(roomId);
                        });
                    } else {
                        loadingOverlay.innerHTML = "<p style='color: white;'>잘못된 접근입니다. (방 ID 없음)</p>";
                    }
                } else {
                    window.location.href = 'index.html';
                }
            });

            // [수정] "게스트 멈춤" 버그 해결을 위한 리스너 분리
            function joinGameRoom(roomId) {
                currentRoomId = roomId;
                allPlayersRef = roomRef.child('players');
                playerRef = allPlayersRef.child(playerUid);
                statusRef = roomRef.child('status'); // [신규] status 리스너 분리

                const myNickname = currentUser.displayName || `Player${playerUid.substring(0, 4)}`;

                playerRef.set({
                    nickname: myNickname,
                    score: 0,
                    isFinished: false
                });
                playerRef.onDisconnect().remove();

                // 리스너 1: 모든 플레이어의 점수/상태 감시
                allPlayersRef.on('value', (snapshot) => {
                    const players = snapshot.val();
                    if (players) {
                        updateScoreboardUI(players);
                        
                        // [수정] 게스트 멈춤 버그를 해결하기 위해 'isFinished' 감시 로직을
                        // 'gameOver()' -> 'checkAllPlayersFinished()' 함수로 이동시킴.
                    }
                });

                // 리스너 2: 방의 'status' 감시
                statusRef.on('value', (snapshot) => {
                    const status = snapshot.val();
                    console.log("방 상태 변경:", status);

                    if (status === 'playing' && !timerId && !gameOverOverlay.classList.contains('active')) {
                        loadingOverlay.classList.remove('active');
                        startCountdown();
                    } else if (status === 'finished') {
                        // [수정] 호스트/게스트 모두 이 함수를 호출하여 리스너를 정리함
                        forceGameOver();
                    } else if (status === null && !gameOverOverlay.classList.contains('active')) {
                        console.warn("방 상태가 'null'입니다. 호스트가 방을 삭제한 것 같습니다.");
                        forceGameOver();
                    }
                });

                loadingOverlay.querySelector('p').textContent = "다른 플레이어를 기다리는 중...";
            }

            function updateScoreboardUI(players) {
                multiplayerScoreboard.innerHTML = '';
                // playerNicknames.clear(); // [삭제] 닉네임 맵 불필요

                for (const uid in players) {
                    const player = players[uid];
                    const nickname = player.nickname || 'Unknown';
                    const score = player.score || 0;
                    
                    // playerNicknames.set(uid, nickname); // [삭제]

                    const statBox = document.createElement('div');
                    statBox.className = 'stat-box';
                    statBox.dataset.uid = uid;

                    if (uid === playerUid) {
                        statBox.classList.add('my-score');
                    }

                    statBox.innerHTML = `
                        <div class="label">${nickname}</div>
                        <div class="value" id="score-value-${uid}">${score.toLocaleString()}</div>
                    `;
                    multiplayerScoreboard.appendChild(statBox);
                }
            }

            // ------------------------------------
            // 3. 게임 초기화
            // ------------------------------------

            function initGame() {
                score = 0;
                timer = GAME_TIME;
                currentCombo = 0;
                isProcessing = true; 

                timerValue.textContent = GAME_TIME;
                timerDisplay.classList.remove('danger-time');
                gameOverOverlay.classList.remove('active');
                
                if (playerRef) {
                    playerRef.child('score').set(0);
                    playerRef.child('isFinished').set(false);
                }

                createBoardData();
                renderBoard();
            }

            function createBoardData() {
                board = [];
                for (let r = 0; r < ROWS; r++) { // ROWS = 8
                    const row = [];
                    for (let c = 0; c < COLS; c++) { // COLS = 6
                        let newEmoji;
                        do {
                            newEmoji = getRandomEmoji();
                        } while (
                            (c >= 2 && newEmoji === row[c - 1] && newEmoji === row[c - 2]) ||
                            (r >= 2 && newEmoji === board[r - 1][c] && newEmoji === board[r - 2][c])
                        );
                        row.push(newEmoji);
                    }
                    board.push(row);
                }
                const initialMatches = findAllMatches();
                if (initialMatches.size > 0) {
                    createBoardData(); 
                }
            }
            function getRandomEmoji() {
                return TILE_EMOJIS[Math.floor(Math.random() * TILE_EMOJIS.length)];
            }

            // [수정] "타일 안맞음" 버그 해결
            function renderBoard() {
                gameBoard.innerHTML = '';
                tileElements = [];
                const containerW = gameContainer.clientWidth;
                const containerH = gameContainer.clientHeight;
                if (containerW === 0 || containerH === 0) { return; }

                // [수정] 계산에 필요한 모든 CSS 값
                const gap = 2; // grid-gap
                const boardPadding = 4; // #game-board padding
                const containerPadding = 10; // #game-container padding
                const boardBorder = 0; // [신규] #game-board border
                
                const availableW = containerW - (containerPadding * 2);
                const availableH = containerH - (containerPadding * 2);

                // [수정] "타일 안맞음" 버그 해결 (boardBorder * 2 확인)
                const tileW_calc = (availableW - (boardPadding * 2) - (boardBorder * 2) - (COLS - 1) * gap) / COLS;
                const tileH_calc = (availableH - (boardPadding * 2) - (boardBorder * 2) - (ROWS - 1) * gap) / ROWS;

                const tileSize = Math.floor(Math.min(tileW_calc, tileH_calc));
                
                if (tileSize <= 0) { return; }
                
                // [수정] 계산된 타일 크기에 맞는 최종 보드 너비/높이
                const finalBoardW = (tileSize * COLS) + (COLS - 1) * gap + (boardPadding * 2) + (boardBorder * 2);
                const finalBoardH = (tileSize * ROWS) + (ROWS - 1) * gap + (boardPadding * 2) + (boardBorder * 2);

                gameBoard.style.width = `${finalBoardW}px`;
                gameBoard.style.height = `${finalBoardH}px`; // [수정] auto -> 명시적 높이
                gameBoard.style.gridTemplateColumns = `repeat(${COLS}, ${tileSize}px)`; // [수정] 1fr -> 50px (계산된 값)
                gameBoard.style.gridTemplateRows = `repeat(${ROWS}, ${tileSize}px)`; // [신규] 명시적 높이
                
                const iconSize = tileSize * 0.7; // 폰트 크기

                for (let r = 0; r < ROWS; r++) {
                    const rowElements = [];
                    for (let c = 0; c < COLS; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.dataset.row = r;
                        tile.dataset.col = c;
                        tile.textContent = board[r][c];
                        tile.style.fontSize = `${iconSize}px`; 
                        gameBoard.appendChild(tile);
                        rowElements.push(tile);
                        tile.addEventListener('pointerdown', handleDragStart);
                    }
                    tileElements.push(rowElements);
                }
            }

            // ------------------------------------
            // 4. 게임 시작/종료 (수정)
            // ------------------------------------

            function startCountdown() {
                if (infoOverlay.classList.contains('active')) return;
                infoOverlay.classList.add('active');
                let count = 3;
                countdownNumber.textContent = count;
                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownNumber.textContent = count;
                    } else if (count === 0) {
                        countdownNumber.textContent = 'GO!';
                    } else {
                        clearInterval(interval);
                        infoOverlay.classList.remove('active');
                        setTimeout(() => {
                            initGame(); 
                            startGame();
                        }, 0);
                    }
                }, 1000);
            }

            function startGame() {
                if (tileElements.length === 0) { renderBoard(); }
                if (tileElements.length === 0) { return; }
                isProcessing = false;
                timerId = setInterval(() => {
                    timer--;
                    timerValue.textContent = timer;
                    if (timer <= 10) {
                        timerDisplay.classList.add('danger-time');
                    }
                    if (timer <= 0) {
                        gameOver();
                    }
                }, 1000);
            }

            function gameOver() {
                if (isProcessing) return;
                isProcessing = true; 
                clearInterval(timerId);
                timerId = null;
                timerDisplay.classList.remove('danger-time'); 
                timerValue.textContent = '0';
                playSound('gameOver');
                if (playerRef) {
                    playerRef.child('isFinished').set(true).then(() => {
                        // [수정] isFinished.set()이 완료된 후, 호스트만 모두 종료했는지 체크
                        if (isHost) {
                            // 1초 후 체크 (게스트의 set(true)가 반영될 시간을 줌)
                            setTimeout(checkAllPlayersFinished, 1000);
                        }
                    });
                }
                loadingOverlay.classList.add('active');
                loadingOverlay.querySelector('p').textContent = "결과 집계 중...";
            }

            // [신규] 게스트 멈춤 버그 수정을 위한 호스트용 함수
            function checkAllPlayersFinished() {
                if (!isHost || !allPlayersRef) return;

                allPlayersRef.once('value', (snapshot) => {
                    const players = snapshot.val();
                    if (!players) return;

                    const playerArray = Object.values(players);
                    // [수정] 모든 플레이어가 'isFinished: true'인지 확인
                    if (playerArray.length > 0 && playerArray.every(p => p.isFinished === true)) {
                        // [수정] 'playing' 상태일 때만 'finished'로 변경 (중복 방지)
                        statusRef.once('value', (statusSnap) => {
                            if (statusSnap.val() === 'playing') {
                                console.log("Host (Delayed Check): 모든 플레이어 종료 확인. 'finished'로 변경.");
                                statusRef.set('finished');
                            }
                        });
                    } else {
                        console.log("Host (Delayed Check): 아직 모든 플레이어가 종료되지 않음. 2초 후 재시도.");
                        // 2초 후 다시 시도 (네트워크 지연, 플레이어 이탈 등)
                        setTimeout(checkAllPlayersFinished, 2000);
                    }
                });
            }

            // [수정] "게스트 멈춤" 버그 해결 (리스너 정리)
            function forceGameOver() {
                if (gameOverOverlay.classList.contains('active')) return;
                gameOverOverlay.classList.add('active'); // 중복 방지

                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                isProcessing = true; 
                loadingOverlay.classList.remove('active');
                
                if (!allPlayersRef) {
                    finalRankingList.innerHTML = '<p style="text-align: center;">방 연결이 끊겼습니다.</p>';
                    finalScoreEl.textContent = `${score.toLocaleString()} 점`;
                    return;
                }
                
                allPlayersRef.once('value', (snapshot) => {
                    // [수정] 콜백 함수 내부에서 리스너 즉시 끄기
                    if (allPlayersRef) {
                        allPlayersRef.off();
                        console.log("결과 모달 표시 완료. allPlayersRef 리스너를 끕니다.");
                    }
                    if (statusRef) {
                        statusRef.off();
                        console.log("statusRef 리스너를 끕니다.");
                    }
                    
                    const players = snapshot.val();
                    if (!players) {
                        // [수정] players가 null일 때 (방이 삭제됨)
                        finalRankingList.innerHTML = '<p style="text-align: center;">방이 종료되었습니다.</p>';
                        finalScoreEl.textContent = `${score.toLocaleString()} 점`;
                        return; // [수정] null일 때 여기서 반환
                    }

                    const sortedPlayers = Object.entries(players)
                        .map(([uid, data]) => ({ uid, ...data }))
                        .sort((a, b) => (b.score || 0) - (a.score || 0));

                    finalRankingList.innerHTML = '';
                    sortedPlayers.forEach((player, index) => {
                        const rank = index + 1;
                        const nickname = player.nickname || 'Unknown';
                        const score = player.score || 0;
                        const p = document.createElement('p');
                        let rankText = `${rank}위: ${nickname} (${score.toLocaleString()}점)`;
                        if (player.uid === playerUid) {
                            rankText = `<strong>${rankText} (YOU)</strong>`;
                            finalScoreEl.textContent = `${score.toLocaleString()} 점`;
                        }
                        p.innerHTML = rankText;
                        finalRankingList.appendChild(p);

            }

            restartBtn.addEventListener('click', () => {
                window.location.href = '대기실.html';
            });

            // ------------------------------------
            // 5. 컨트롤 (드래그) (수정)
            // ------------------------------------

            function handleDragStart(e) {
                if (isProcessing) return;
                // [수정] "고스트 터치" 해결: e.currentTarget 대신 dataset으로 좌표 찾기
                const row = parseInt(e.currentTarget.dataset.row, 10);
                const col = parseInt(e.currentTarget.dataset.col, 10);

                // [수정] tileElements에서 DOM 요소를 다시 참조
                const tile = tileElements[row][col]; 
                
                if (!tile) {
                    console.error("고스트 터치 방지: 타일을 찾을 수 없음", row, col);
                    return;
                }

                dragStartTile = { row: row, col: col, el: tile };
                dragStartX = e.clientX || (e.touches && e.touches[0].clientX);
                dragStartY = e.clientY || (e.touches && e.touches[0].clientY);
                window.addEventListener('pointerup', handleDragEnd, { once: true });
                window.addEventListener('pointercancel', handleDragEnd, { once: true });
            }

            function handleDragEnd(e) {
                if (!dragStartTile) return;
                const dragEndX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const dragEndY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const deltaX = dragEndX - dragStartX;
                const deltaY = dragEndY - dragStartY;
                const threshold = dragStartTile.el.clientWidth / 3; 
                let targetRow = dragStartTile.row;
                let targetCol = dragStartTile.col;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > threshold) {
                    targetCol += (deltaX > 0) ? 1 : -1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > threshold) {
                    targetRow += (deltaY > 0) ? 1 : -1;
                } else {
                    dragStartTile = null; return;
                }
                if (targetRow < 0 || targetRow >= ROWS || targetCol < 0 || targetCol >= COLS) {
                    dragStartTile = null; return;
                }
                attemptSwap(dragStartTile.row, dragStartTile.col, targetRow, targetCol);
                dragStartTile = null;
            }

            // ------------------------------------
            // 6. 게임 로직 (수정)
            // ------------------------------------
            
            async function attemptSwap(r1, c1, r2, c2) {
                if (isProcessing) return;
                isProcessing = true; 
                playSound('swap');
                swapData(r1, c1, r2, c2); // 1. 데이터 스왑
                await animateSwap(r1, c1, r2, c2); // 2. DOM 스왑 (이때 tileElements와 dataset도 같이 스왑됨)
                const matches = findAllMatches();
                if (matches.size > 0) {
                    currentCombo = 0; 
                    await processMatchesAndCascade(matches);
                } else {
                    // [수정] 매치 실패 시, 데이터와 DOM을 '다시' 원위치
                    await animateInvalidSwap(r1, c1, r2, c2); 
                }
                isProcessing = false;
            }
            function swapData(r1, c1, r2, c2) {
                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }
            // [수정] "고스트 터치" 해결의 핵심 함수
            function swapDOMElements(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];

                // 1. DOM 텍스트 스왑
                const tempEmoji = tile1.textContent;
                tile1.textContent = tile2.textContent;
                tile2.textContent = tempEmoji;
                
                // 2. DOM dataset 스왑 (매우 중요)
                // tile1.dataset.row = r1; tile1.dataset.col = c1;
                // tile2.dataset.row = r2; tile2.dataset.col = c2;
                // (이전 코드 버그) 위처럼 하면 안됨. r1,c1과 r2,c2를 스왑해야 함
                tile1.dataset.row = r2; tile1.dataset.col = c2;
                tile2.dataset.row = r1; tile2.dataset.col = c1;

                // 3. JS 배열 스왑 (매우 중요)
                tileElements[r1][c1] = tile2;
                tileElements[r2][c2] = tile1;
            }
            function animateSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];
                tile1.classList.add('swap');
                tile2.classList.add('swap');
                const rect1 = tile1.getBoundingClientRect();
                const rect2 = tile2.getBoundingClientRect();
                const deltaX = rect1.left - rect2.left;
                const deltaY = rect1.top - rect2.top;
                tile1.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`;
                tile2.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                return new Promise(resolve => {
                    setTimeout(() => {
                        tile1.style.transform = '';
                        tile2.style.transform = '';
                        tile1.classList.remove('swap');
                        tile2.classList.remove('swap');
                        swapDOMElements(r1, c1, r2, c2); // DOM, dataset, JS배열 동기화
                        resolve();
                    }, 200); 
                });
            }
            async function animateInvalidSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r2][c2]; // [수정] 스왑된 위치
                const tile2 = tileElements[r1][c1]; // [수정] 스왑된 위치
                tile1.classList.add('invalid');
                tile2.classList.add('invalid');
                await new Promise(resolve => setTimeout(resolve, 400)); 
                tile1.classList.remove('invalid');
                tile2.classList.remove('invalid');
                swapData(r1, c1, r2, c2); // 데이터 원위치
                await animateSwap(r2, c2, r1, c1); // DOM 원위치
            }
            function findAllMatches() {
                const matches = new Set();
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS - 2; c++) {
                        if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r}-${c+1}`);
                            matches.add(`${r}-${c+2}`);
                        }
                    }
                }
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS - 2; r++) {
                        if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r+1}-${c}`);
                            matches.add(`${r+2}-${c}`);
                        }
                    }
                }
                return matches;
            }
            
            async function processMatchesAndCascade(matches) {
                // if (isProcessing === false) isProcessing = true; // [삭제] 상태 관리 중복 제거
                currentCombo++;

                const baseScore = matches.size * 10;
                const comboBonus = currentCombo * 20;
                const turnScore = baseScore + comboBonus;
                score += turnScore;
                
                showComboText(currentCombo, matches);
                showComboScore(turnScore);

                updateScoreUI(); 
                if (playerRef) { playerRef.child('score').set(score); }
                playComboSound(currentCombo);
                
                await animatePop(matches);
                removeMatches(matches);
                const { droppedTilesMap } = dropTiles();
                const newTilesMap = fillTopTiles();
                
                // [수정] "고스트 터치" "버벅임" 해결
                await animateDrops(droppedTilesMap, newTilesMap);
                
                const newMatches = findAllMatches();
                if (newMatches.size > 0) {
                    await new Promise(resolve => setTimeout(resolve, 100)); 
                    await processMatchesAndCascade(newMatches);
                } else {
                    currentCombo = 0;
                    if (!checkForPossibleMoves()) {
                        await handleNoMoreMoves();
                    }
                }
            }

            function updateScoreUI() {
                const myScoreValueEl = multiplayerScoreboard.querySelector('.my-score .value');
                if (myScoreValueEl) {
                    myScoreValueEl.textContent = score.toLocaleString();
                }
            }

            function playSound(id) {
                try {
                    const sound = sounds[id];
                    if(sound) {
                        sound.currentTime = 0;
                        sound.play().catch(e => {});
                    }
                } catch(e) {}
            }
            function playComboSound(combo) {
                playSound('match');
                if (combo >= 1) {
                    const comboSound = sounds.combo[Math.min(combo - 1, sounds.combo.length - 1)];
                    if (comboSound) {
                        comboSound.currentTime = 0;
                        comboSound.play().catch(e => {});
                    }
                }
            }
            function animatePop(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (tileElements[r] && tileElements[r][c]) {
                        tileElements[r][c].classList.add('pop');
                    }
                });
                return new Promise(resolve => setTimeout(resolve, 200)); 
            }
            function removeMatches(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (board[r]) {
                        board[r][c] = null; 
                    }
                });
            }
            function dropTiles() {
                const droppedTilesMap = new Map(); 
                for (let c = 0; c < COLS; c++) {
                    let emptyRow = ROWS - 1; 
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] !== null) {
                            if (r !== emptyRow) {
                                board[emptyRow][c] = board[r][c];
                                board[r][c] = null;
                                droppedTilesMap.set(`${emptyRow}-${c}`, r); // { endKey: startRow }
                            }
                            emptyRow--;
                        }
                    }
                }
                return { droppedTilesMap };
            }
            function fillTopTiles() {
                const newTilesMap = new Map(); 
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] === null) {
                            const newEmoji = getRandomEmoji();
                            board[r][c] = newEmoji;
                            newTilesMap.set(`${r}-${c}`, newEmoji);
                        }
                    }
                }
                return newTilesMap;
            }
          
          // [수정] "고스트 터치" "입력 오류" "버벅임" 모두 해결한 최종 함수 (v2)
            async function animateDrops(droppedTilesMap, newTilesMap) {
                const fallPromises = [];
                // [버그 수정] tileElements[0][0]이 null일 수 있으므로 안전하게 크기 계산
                const firstTile = gameBoard.querySelector('.tile') || {};
                const tileSize = (firstTile.clientHeight || 50) + 2; // 2는 갭(gap)

                // 1. DOM/데이터/배열 업데이트
                // (데이터 `board` 배열은 이미 최신 상태)
                // `tileElements` 배열을 `board` 데이터 기준으로 재정렬
                
                const newTileElements = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
                
                // [수정] 1a. 모든 타일 DOM 요소를 1D 배열로 수집 (재사용 큐)
                const allOldTiles = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (tileElements[r][c]) {
                            allOldTiles.push(tileElements[r][c]);
                        }
                    }
                }

                // 1b. `board` 데이터 기준으로 `tileElements` 배열을 '완전히 새로' 만듦
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const key = `${r}-${c}`;
                        const tileData = board[r][c];
                        
                        // [수정] 재사용 큐에서 타일을 하나 꺼냄
                        const tile = allOldTiles.pop(); // DOM 요소
                        if (!tile) {
                             console.error("Tile reuse queue empty! This should not happen.");
                             continue; 
                        }

                        tile.textContent = tileData; // [수정] 데이터(이모지) 강제 일치
                        tile.dataset.row = r; // [수정] dataset 강제 일치
                        tile.dataset.col = c; // [수정] dataset 강제 일치
                        newTileElements[r][c] = tile; // 새 2D 배열에 할당

                        if (newTilesMap.has(key)) {
                            // '새로 생긴 타일'
                            tile.className = 'tile fall new-tile-anim'; // [수정] .new -> .new-tile-anim
                            const startY = -(r + 2) * tileSize;
                            tile.style.transform = `translateY(${startY}px)`;

                        } else if (droppedTilesMap.has(key)) {
                            // '떨어진 타일'
                            const startRow = droppedTilesMap.get(key); // 데이터가 있던 '행'
                            tile.className = 'tile fall';
                            // (r=5, startRow=2) -> 3칸 이동
                            const dropDistance = (r - startRow) * tileSize;
                            // [수정] 버그 방지: 떨어지는 거리가 0일 수 없음 (로직상)
                            // startRow가 r과 같으면 `droppedTilesMap`에 없어야 함.
                            // 만약의 경우를 대비해 0이 아닌 값만 transform
                            if (dropDistance !== 0) {
                                tile.style.transform = `translateY(${dropDistance}px)`;
                            } else {
                                // 이 타일은 실제로는 움직이지 않은 타일임
                                tile.className = 'tile';
                                tile.style.transform = '';
                            }
                            
                        } else {
                            // '가만히 있는 타일'
                            tile.className = 'tile'; // [수정] fall 클래스 제거
                            tile.style.transform = ''; // [수정] transform 초기화
                        }
                    }
                }
                
                // 2. 전역 `tileElements` 배열 교체 (DOM/데이터/배열 논리적 싱크 완료)
                tileElements = newTileElements;
                
                // 3. 강제 리페인트 (중요)
                gameBoard.offsetHeight; 

                // 4. 모든 'fall' 타일 최종 위치(translateY(0))로 애니메이션 시작
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const tile = tileElements[r][c];
                        if (tile && tile.classList.contains('fall')) {
                            requestAnimationFrame(() => { // [수정] rAF로 감싸기
                                tile.style.transform = 'translateY(0)';
                                fallPromises.push(new Promise(resolve => {
                                    tile.addEventListener('transitionend', resolve, { once: true });
                                }));
                            });
                        }
                    }
                }

                // 5. 애니메이션 완료 대기 (transition 0.3s + 예비 0.3s)
                const timeoutPromise = new Promise(resolve => setTimeout(resolve, 600)); 
                await Promise.race([Promise.all(fallPromises), timeoutPromise]);

                // 6. DOM 순서 재정렬 및 스타일 초기화 (버벅임 해결)
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (tileElements[r][c]) {
                            const tile = tileElements[r][c];
                            tile.className = 'tile';
                            tile.style.transform = '';
                            gameBoard.appendChild(tile); // DOM 이동 (빠름)
                        }
                    }
                }
                
            }

            // ------------------------------------
            // 7. [신규] 콤보 텍스트/점수
            // ------------------------------------
            
            function showComboText(combo, matches) {
                if (combo < 2) return; 

                let totalTop = 0;
                let totalLeft = 0;
                let count = 0;
                const boardRect = gameBoard.getBoundingClientRect();

                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (tileElements[r] && tileElements[r][c]) {
                        const rect = tileElements[r][c].getBoundingClientRect();
                        totalTop += (rect.top - boardRect.top) + (rect.height / 2);
                        totalLeft += (rect.left - boardRect.left) + (rect.width / 2);
                        count++;
                    }
                });
                
                if (count === 0) return;
                const avgTop = totalTop / count;
                const avgLeft = totalLeft / count;

                const comboEl = document.createElement('div');
                comboEl.className = 'combo-text';
                comboEl.textContent = `${combo} 콤보!`;
                
                const wrapperRect = gameWrapper.getBoundingClientRect();
                comboEl.style.top = `${avgTop + boardRect.top - wrapperRect.top}px`;
                comboEl.style.left = `${avgLeft + boardRect.left - wrapperRect.left}px`;
                comboEl.style.transform = 'translate(-50%, -50%)'; 

                gameWrapper.appendChild(comboEl);

                setTimeout(() => {
                    comboEl.remove();
                }, 800);
            }

            function showComboScore(turnScore) {
                const scoreEl = document.createElement('div');
                scoreEl.className = 'combo-score';
                scoreEl.textContent = `+${turnScore}`;
                
                comboScoreDisplay.innerHTML = ''; 
                comboScoreDisplay.appendChild(scoreEl);

                setTimeout(() => {
                    scoreEl.remove();
                }, 800);
            }

            // ------------------------------------
            // 8. 셔플 로직 (기존과 동일)
            // ------------------------------------
            function checkForPossibleMoves() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (c < COLS - 1) {
                            if (checkMove(r, c, r, c + 1)) return true;
                        }
                        if (r < ROWS - 1) {
                            if (checkMove(r, c, r + 1, c)) return true;
                        }
                    }
                }
                return false; 
            }
            function checkMove(r1, c1, r2, c2) {
                swapData(r1, c1, r2, c2);
                const matches = findAllMatches();
                swapData(r1, c1, r2, c2); 
                return matches.size > 0;
            }
            async function handleNoMoreMoves() {
                console.log("더 이상 움직일 수 없음! 셔플합니다.");
                // isProcessing = true; // [삭제] 상태 관리 중복 제거
                
                const shuffleText = document.createElement('div');
                shuffleText.className = 'combo-text';
                shuffleText.textContent = 'SHUFFLE!';
                shuffleText.style.top = '50%';
                shuffleText.style.left = '50%';
                shuffleText.style.transform = 'translate(-50%, -50%)';
                gameWrapper.appendChild(shuffleText);
                setTimeout(() => shuffleText.remove(), 800);
                
                await new Promise(resolve => setTimeout(resolve, 300));

                shuffleBoard(); 

                // [수정] 셔플 후 DOM/배열 완벽 동기화
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if(tileElements[r][c]) {
                            tileElements[r][c].textContent = board[r][c];
                            tileElements[r][c].className = 'tile new'; 
                            tileElements[r][c].dataset.row = r; // dataset 동기화
                            tileElements[r][c].dataset.col = c;
                        }
                    }
                }
                await new Promise(resolve => setTimeout(resolve, 300));

                // 스타일 초기화
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if(tileElements[r][c]) {
                            tileElements[r][c].className = 'tile';
                        }
                    }
                }
                
                const matches = findAllMatches();
                if (matches.size > 0) {
                    await processMatchesAndCascade(matches);
                }
                
                // isProcessing = false; // [삭제] 모든 로직이 끝난 후 'attemptSwap' 함수가 처리하도록 변경
            }
            function shuffleBoard() {
                console.log("보드 데이터 셔플 중...");
                createBoardData(); 
            }
        });
    </script>
</body>
