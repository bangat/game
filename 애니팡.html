    <link rel="preload" as="image" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f9ca.svg">
    <style>
        /* ------------------------- */
        /* == 1. 앱 공통 테마 == */
        /* ------------------------- */
        :root {
            --bg-color: #FFFBEB;
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD93D;
            --text-color-dark: #574141;
            --text-color-light: #ffffff;
            --danger-color: #F76363;
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2;
            --panel-shadow: #E4DCCF;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color-dark);
            display: flex; flex-direction: column;
            /* [수정] 레이아웃 중앙 정렬 */
            justify-content: flex-start; /* [수정] center -> flex-start (상단 정렬) */
            align-items: center;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
            /* [수정] body의 패딩을 #game-wrapper로 이동 */
            /* padding: 10px; */ 
        }

        /* ------------------------- */
        /* == 2. [수정] 게임 레이아웃 (통합 프레임) == */
        /* ------------------------- */
        #game-wrapper { 
            width: 100%; 
            /* height: 100%; [제거] */
            flex-grow: 1; /* [핵심 수정] body의 남은 공간을 모두 차지 (사천성 방식) */
            min-height: 0; /* [추가] flex-grow가 100% 높이의 부모에서 올바르게 작동하기 위한 최소 높이 */
            
            display: flex; flex-direction: column; 
            justify-content: flex-start; /* [유지] 상단 정렬 */
            align-items: center; /* [유지] 수평 중앙 정렬 */
            
            /* [수정] body의 padding을 wrapper로 이동 및 safe-area와 결합 */
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            padding-left: 10px;
            padding-right: 10px;
            
            position: relative; 
        }

        /* [신규] 모든 것을 감싸는 단일 프레임 */
        #game-area-frame {
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            /* [수정] 보더와 쉐도우를 이 프레임으로 이동 */
            border: 4px solid var(--panel-border); 
            box-shadow: 6px 6px 0px 0px var(--panel-shadow);
            border-radius: 20px;
            width: 100%;
            max-width: 430px;
            /* [수정] height: 100% 대신 flex-grow: 1 사용 (사천성과 동일 방식) */
            flex-grow: 1; /* [핵심 수정] */
            /* height: 100%; (제거) */
            /* max-height: 800px; (제거) */
            padding: 10px;
            overflow: hidden; /* 내부 요소가 둥근 모서리를 넘지 않도록 */
            
            /* [추가] flex-grow가 100% 높이의 부모에서 올바르게 작동하기 위한 최소 높이 */
            min-height: 0; 
        }
        
        /* [신규] 프레임 내부의 새 헤더 (스코어보드용) */
        #game-stats-header {
            flex-shrink: 0;
            padding-bottom: 8px;
            border-bottom: 3px solid var(--panel-border);
        }

        /* [수정] 스코어보드 (6인 지원 컴팩트 모드) */
        #multiplayer-scoreboard {
            display: grid;
            /* [핵심] 2열 -> 3열로 변경하여 한 줄에 3명씩 표시 (총 2줄 유지) */
            grid-template-columns: repeat(3, 1fr); 
            gap: 3px; /* [수정] 간격을 5px -> 3px로 더 좁힘 */
            width: 100%;
        }

        /* [수정] 스탯 박스 (6인용 초소형 모드) */
        .stat-box {
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 8px; /* 10px -> 8px */
            padding: 1px 2px; /* 패딩 최소화 */
            text-align: center;
            font-weight: 900;
            transition: all 0.2s ease;
            overflow: hidden;
            display: flex; /* [추가] 이름과 점수를 한 줄로 배치 시도 (공간 부족 시 자동 줄바꿈) */
            flex-direction: column;
            justify-content: center;
        }
        .stat-box.my-score {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.6);
            z-index: 1; /* 내 점수가 다른 박스보다 위에 오도록 */
            transform: scale(1.05); /* 강조 효과 유지 */
        }
        .stat-box .label {
            font-size: 0.65em; /* [수정] 0.7em -> 0.65em */
            color: #9A6A3A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0;
            line-height: 1.2;
        }
        .stat-box .value {
            font-size: 1.0em; /* [수정] 1.2em -> 1.0em */
            color: var(--primary-color);
            line-height: 1.2;
        }

        /* [신규] 프레임 내부의 새 푸터 (타이머/게이지용) */
        #game-stats-footer {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 8px;
            border-top: 3px solid var(--panel-border);
        }

        /* [수정] 타이머 (하단으로 이동, 컴팩트하게) */
        #timer-container {
            flex-shrink: 0; /* 크기 고정 */
            width: 100px; /* [수정] 너비 고정 */
            text-align: center;
            font-weight: 900;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            padding: 2px 5px; /* [수정] 패딩 축소 */
            margin: 0; /* [수정] 자동 마진 제거 */
        }
        #timer-container .label { font-size: 0.8em; color: #9A6A3A; } /* [수정] 폰트 축소 */
        #timer-container .value {
            font-size: 1.6em; /* [수정] 폰트 축소 */
            color: var(--primary-color);
            transition: color 0.3s ease;
        }
        #timer-container .value.danger-time {
            color: var(--danger-color);
            animation: throb 1.2s infinite ease-in-out;
        }
        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* [수정] 피버 게이지 (하단으로 이동, flex-grow) */
        #fever-gauge-container {
            flex-grow: 1; /* [수정] 남은 공간 모두 차지 */
            width: auto; /* [수정] 자동 너비 */
            max-width: none; /* [수정] 최대 너비 제거 */
            height: 22px;
            background-color: #fff;
            border: 2px solid var(--panel-border);
            border-radius: 20px;
            margin: 0; /* [수정] 자동 마진 제거 */
            position: relative;
            overflow: hidden;
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.1);
        }
        #fever-gauge-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            border-radius: 20px;
            transition: width 0.3s ease-out;
        }
        #fever-gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9em;
            font-weight: 900;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* [수정] 게임 컨테이너 (프레임 내부로 이동) */
        #game-container {
            width: 100%; 
            flex-grow: 1; /* [수정] 핵심: 남은 수직 공간 모두 차지 */
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
            padding: 5px 0; /* [수정] 보드 상하 여백 10px -> 5px로 축소 */
        }
        
        /* [수정] 게임 보드 (시각적 요소 제거) */
        #game-board {
    position: relative; 
    background-color: #FFFEF5;
    border: 2px solid var(--panel-border);
    border-radius: 12px;
    display: grid; 
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 2px;
    padding: 4px;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}

/* ------------------------- */
        /* == 2.5. [신규] 비밀 미션 UI == */
        /* ------------------------- */
        #mission-display {
            flex-shrink: 0;
            width: 100%;
            background-color: #FFFAE0; /* 연한 노란색 배경 (결과창 채팅과 유사) */
            border: 2px solid var(--panel-border);
            border-radius: 10px;
            margin: 8px 0 0; /* 헤더와 8px 간격 */
            padding: 4px 8px;
            text-align: center;
            position: relative; /* 'Success' 오버레이의 기준점 */
            overflow: hidden; /* 오버레이가 둥근 모서리를 넘지 않도록 */
        }
        #mission-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.3s ease;
        }
        #mission-label {
            font-size: 0.7em;
            font-weight: 900;
            color: var(--text-color-light);
            background-color: var(--danger-color); /* 빨간색 라벨 */
            padding: 2px 5px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        #mission-description {
            font-size: 0.9em;
            font-weight: 700;
            color: var(--text-color-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 긴 미션 텍스트는 ... 처리 */
        }
        #mission-success-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--secondary-color); /* 틸(teal)색 */
            color: white;
            font-size: 1.4em; /* 폰트 크기 */
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            
            /* [핵심] 평소에는 숨겨져 있음 */
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* 바운스 효과 */
            z-index: 2;
        }
        #mission-display.cleared #mission-success-overlay {
            transform: translateY(0);
            opacity: 1;
        }
        /* 미션 클리어 시, 뒤의 텍스트는 숨김 */
        #mission-display.cleared #mission-text {
            opacity: 0;
        }

        /* ------------------------- */
        /* == 3. 타일 스타일 (유지) == */
        /* ------------------------- */
        .tile {
    background-color: #FFFEF5; 
    border-radius: 10px; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    cursor: pointer;
    border: 1px solid var(--panel-border);
    box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.15), 
                inset -2px -2px 4px rgba(255, 255, 255, 0.7);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                opacity 0.2s ease,
                box-shadow 0.2s ease;
    flex-shrink: 0;
    
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
}

.tile:active {
    box-shadow: inset 1px 1px 2px rgba(87, 65, 65, 0.2), 
                inset -1px -1px 2px rgba(255, 255, 255, 0.7);
    transform: scale(0.95) translateZ(0); /* [수정] translateZ 유지 */
}

.tile.pop { animation: pop 0.2s ease-out forwards; }
@keyframes pop {
    0% { transform: scale(1) translateZ(0); opacity: 1; }
    50% { transform: scale(1.3) translateZ(0); opacity: 0.5; }
    100% { transform: scale(0.1) translateZ(0); opacity: 0; }
}

.tile.fall {
    /* [핵심 수정] 
       1. 시간: 0.3초 -> 0.5초 (더 길게)
       2. 곡선: 'EaseOutBack' (목표 지점을 살짝 지나쳤다가 튕겨 돌아오는 바운스 효과)
    */
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}

.tile.new-tile-anim { animation: new-tile 0.2s ease-out; }
@keyframes new-tile {
    from { transform: scale(0.5) translateZ(0); opacity: 0; }
    to { transform: scale(1) translateZ(0); opacity: 1; }
}

.tile.swap { 
    transition: transform 0.2s ease-in-out; 
    z-index: 10; 
}
.tile.invalid { animation: shake 0.4s ease-in-out; }
@keyframes shake {
    0%, 100% { transform: translateX(0) translateZ(0); }
    25% { transform: translateX(-5px) translateZ(0); }
    50% { transform: translateX(5px) translateZ(0); }
    75% { transform: translateX(-5px) translateZ(0); }
}

        /* ------------------------- */
        /* == 4. 모달 (유지) == */
        /* ------------------------- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; 
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: var(--panel-bg); 
            color: var(--text-color-dark); 
            padding: 0; 
            border-radius: 24px;
            width: 90%; max-width: 400px; 
            box-shadow: 8px 8px 0px 0px var(--text-color-dark);
            overflow: hidden; 
            border: 4px solid var(--text-color-dark);
        }
        .modal-header { 
            background-color: var(--primary-color);
            color: white; 
            padding: 15px; 
            border-bottom: 4px solid #C04A4A; 
        }
        .modal-header h2 { font-size: 1.6em; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .modal-body { padding: 25px; }
        .modal-footer {
            display: flex; gap: 10px;
            padding: 20px;
            border-top: 3px solid var(--panel-border);
            background-color: #FFFAE0;
        }

        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown-number { font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7); animation: countdown-pop 1s; }
        @keyframes countdown-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #final-score {
            font-size: 2.0em;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 0px;
        }
        #final-ranking-list {
            text-align: left;
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* ------------------------- */
        /* == 5. 아케이드 버튼 (유지) == */
        /* ------------------------- */
        .menu-btn { 
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: 900; 
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer; 
            transition: all 0.1s ease-out;
            border-bottom: 5px solid;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            margin: 5px 0; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .menu-btn.primary { 
            background-color: var(--primary-color);
            color: white; 
            border-bottom-color: #C04A4A;
        }
        .menu-btn.secondary { 
            background-color: var(--secondary-color);
            color: white; 
            border-bottom-color: #379A93;
        }
        
        /* ------------------------- */
        /* == 6. 콤보 텍스트/점수 (유지) == */
        /* ------------------------- */
        .combo-text {
            position: absolute;
            font-size: 2.5em;
            font-weight: 900;
            color: rgb(243, 41, 41);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            z-index: 100;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }
        
        .combo-score {
            position: absolute;
            font-size: 1.8em;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 101;
            pointer-events: none;
            animation: combo-pop 0.8s ease-out forwards;
        }

        @keyframes combo-pop {
            0% { transform: scale(0.8); opacity: 1; }
            20% { transform: scale(1.3); }
            40% { transform: scale(1); }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* ------------------------- */
        /* == 7. 피버 게이지 UI (수정됨) == */
        /* ------------------------- */
        /* #fever-gauge-container 스타일은 2번 섹션으로 이동/통합됨 */
        
        /* 피버 모드 활성화 시 UI */
        /* [수정] 게임 보드 (격자판)의 테두리 효과 강화 */
        #game-board.fever-active {
            animation: fever-pulse 0.7s infinite alternate;
        }
        @keyframes fever-pulse {
            from { 
                box-shadow: 0 0 10px rgba(200, 200, 200, 0.5); 
                border-color: var(--panel-border); 
            }
            to { 
                /* [수정] 그림자를 더 크고 붉게, 테두리도 선명하게 */
                box-shadow: 0 0 30px 10px rgba(255, 107, 107, 0.7); 
                border-color: #FF0000; 
            }
        }

        /* [신규] 게임 프레임 (흰색 패널)의 배경 깜빡임 효과 */
        #game-area-frame.fever-active {
            animation: fever-frame-pulse 0.7s infinite alternate;
        }
        @keyframes fever-frame-pulse {
            from { 
                background-color: var(--panel-bg); /* 기본 흰색 */
            }
            to { 
                background-color: #FFF6F6; /* 붉은 기운이 도는 배경색 */
                border-color: var(--primary-color);
            }
        }

        @keyframes laser-beam {
    0% {
        height: 0;
        width: 2px; /* 얇게 시작 */
        opacity: 0;
        box-shadow: 0 0 5px 2px #FFD700;
    }
    30% {
        height: 200%; /* 최대 길이 도달 */
        width: 8px; /* 최대 두께 */
        opacity: 1;

        #toast-container {

            left: 50%;

            z-index: 1000;

            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none; /* 클릭 방지 */

            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.5s, transform 0.5s;
            animation: toast-fade-in 0.5s forwards, toast-fade-out 0.5s 2.5s forwards;
            white-space: nowrap; /* 줄바꿈 방지 */
        }
        @keyframes toast-fade-in {
            from { opacity: 0; transform: translateY(-20px); } /* 위에서 아래로 */
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toast-fade-out {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }

/* [🚀 수정] 라스트 스퍼트 (눈 피로 감소 버전) */
        @keyframes emergency-flash {
            0%, 100% { 
                border-color: var(--panel-border); 
                box-shadow: none; 
            }
            50% { 
                /* 눈이 아픈 쌩 빨강(#FF0000) 대신, 부드러운 코랄색(#FF6B6B) 사용 */
                border-color: #FF6B6B; 
                /* 그림자도 더 은은하게 퍼지도록 수정 (opacity 0.5 -> 0.3) */
                box-shadow: 0 0 15px 2px rgba(255, 107, 107, 0.3) inset; 
            }
        }
        #game-area-frame.last-spurt {
            /* 0.5s(빠름) -> 1.2s(느림)으로 변경하여 눈 편안하게 */
            animation: emergency-flash 1.2s infinite ease-in-out;

            transition: border-width 0.3s;

        .projectile-anim {
            position: fixed;
            font-size: 3.0em;
            z-index: 9999;
            pointer-events: none;
            /* 부드러운 가속도 이동 */
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s ease-in; 
            will-change: transform;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        @keyframes target-shake-hit {
            0% { transform: translateX(0) scale(1); background-color: #fff; }

            40% { transform: translateX(5px) rotate(5deg) scale(1.1); background-color: #FF8C8C; }
            60% { transform: translateX(-5px) rotate(-5deg) scale(1.1); background-color: #FFD1D1; }
            80% { transform: translateX(5px) rotate(5deg) scale(1); background-color: #fff; }
            100% { transform: translateX(0) scale(1); background-color: #fff; }
        }
        
        .stat-box.hit-effect {
            animation: target-shake-hit 0.5s ease-in-out;

        }

          function createBoardData() {
    board = [];
    for (let r = 0; r < ROWS; r++) {
        const row = [];
        for (let c = 0; c < COLS; c++) {
            let newEmoji;
            do {
                newEmoji = getRandomEmoji();
            } while (
                (c >= 2 && newEmoji === row[c - 1] && newEmoji === row[c - 2]) ||
                (r >= 2 && newEmoji === board[r - 1][c] && newEmoji === board[r - 2][c])
            );
            row.push(newEmoji);
        }
        board.push(row);
    }
    const initialMatchData = findAllMatches();
    if (initialMatchData.matches.size > 0) {
        createBoardData(); 
    }
}

            function setTileAppearance(tile, emoji) {

                    return; 
                }
                
                isProcessing = false;
              timerId = setInterval(() => {
                    timer--;
                    timerValue.textContent = timer;
                    
                    // [🚀 신규] 라스트 스퍼트 발동 (10초 남았을 때)
                    if (timer <= 10 && !isLastSpurt) {
                        isLastSpurt = true;
                        gameAreaFrameEl.classList.add('last-spurt'); // 빨간 테두리 깜빡임 효과
                        showToast("🚀 라스트 스퍼트! 점수 2배!");
                        
                        // BGM 속도를 1.2배로 빠르게 (긴장감 UP)
                        const bgm = document.getElementById('bgm-sound');
                        if (bgm) bgm.playbackRate = 1.2;
                    }

                    if (timer <= 10) {
                        timerDisplay.classList.add('danger-time');
                    }
                    if (timer <= 0) {
                        gameOver();
                    }
                }, 1000);
    
    // 🎮 치트키 리스너 등록
    setupCheatKeys();
    startHintTimer(); // [신규] 게임 시작과 동시에 힌트 타이머 시작
}

// 🎮 치트키 시스템
function setupCheatKeys() {
    // 기존 리스너 중복 방지
    if (window.cheatKeysEnabled) return;
    window.cheatKeysEnabled = true;
    
    document.addEventListener('keydown', (e) => {
        // 게임 중이 아니면 무시
        if (!timerId || isProcessing) return;
        
        switch(e.key.toLowerCase()) {
            case 'c': // C키: 십자가 폭발 테스트
                createCrossExplosionTest();
                break;
            case 'r': // R키: 레인보우 타일 테스트
                createRainbowTest();
                break;
            case 'd': // D키: 더블 레인보우 테스트
                createDoubleRainbowTest();
                break;
            case 'f': // F키: 피버모드 강제 발동
                if (!isFeverMode) {
                    feverGauge = MAX_FEVER_GAUGE;
                    updateFeverGaugeUI();
                    startFeverMode();
                }
                break;
            case 's': // S키: 보드 셔플
                handleNoMoreMoves();
                break;
            case 't': // T키: 시간 +10초
                timer = Math.min(GAME_TIME, timer + 10);
                timerValue.textContent = timer;
                break;
                case 'b': // B키: 별 팡이 폭발 테스트
                createStarPangiTest(); // [신규]
                break;
            case 'p': // P키: 점수 +1000점
                score += 1000;
                updateScoreUI();
                if (playerRef) playerRef.child('score').set(score);
                break;
                case 'e': // E키: 게임 강제 종료 (End)
                    console.log('🎮 치트키: 게임 강제 종료 (E)');
                    gameOver(); // 게임 종료 함수 호출
                    break;
        }
    });
    
    console.log('🎮 치트키 활성화!');
    console.log('C: 십자가 | R: 레인보우 | D: 더블 레인보우 | B: 별 팡이'); // [수정]
    console.log('F: 피버모드 | S: 셔플 | T: 시간+10초 | P: 점수+1000');
}

            // [수정] (Tetris/ShisenSho 방식 적용)
            // 1. 먼저 본인의 isFinished를 true로 설정
            if (playerRef) {
                // [수정] isFinished와 함께 보너스가 적용된 최종 score를 한 번에 씀
                playerRef.update({ 
                    isFinished: true,

                }).then(() => {
                    console.log(`[${isHost ? 'Host' : 'Guest'}] isFinished=true, score=${score} 설정 완료.`);
                    
                    // 2. (신규) 호스트/게스트 구분 없이 "즉시" 공용 체크 함수 호출
                    //    (Firebase 전파 시간을 고려해 500ms 딜레이)
                    setTimeout(checkGameOverCondition, 500); 

                }).catch(err => {
                    // [신규] set 실패 시에도 500ms 후 체크 시도 (방어 코드)
                    console.error("isFinished 설정 실패:", err);
                    setTimeout(checkGameOverCondition, 500);
                });
            } else {
                // playerRef가 없는 비정상적 상황
                setTimeout(checkGameOverCondition, 500);
            }
            
            // 3. 결과 집계중 UI 표시
            loadingOverlay.classList.add('active');

       // [수정] 최대 시도 횟수 증가 및 간격 단축
// [수정] (Tetris/ShisenSho 방식 적용)
        // checkAttempts 변수 및 관련 상수는 이 함수 내부에서만 사용
        let checkGameOverAttempts = 0;
        const MAX_CHECK_ATTEMPTS = 20; // 10초 (500ms * 20)
        const CHECK_INTERVAL = 500;

        // [수정] 함수 이름을 변경하고 (checkAllPlayersFinished -> checkGameOverCondition)
        // 호스트/게스트 공용 함수로 변경
        function checkGameOverCondition() {
            // 1. 이미 결과창이 떴으면 중복 실행 방지
            if (gameOverOverlay.classList.contains('active')) {
                return;
            }
            
            // 2. allPlayersRef가 없으면 (방이 터졌으면) 강제 종료
            if (!allPlayersRef) {
                console.warn("[CheckGameOver] allPlayersRef가 없습니다. 강제 종료.");
                forceGameOver(); // (결과: 방이 종료됨)
                return;
            }

            checkGameOverAttempts++;
            console.log(`[CheckGameOver] (공용) 플레이어 종료 체크 (${checkGameOverAttempts}/${MAX_CHECK_ATTEMPTS})`);

            // 3. (신규) 호스트/게스트 구분 없이 "즉시" allPlayersRef를 확인
            allPlayersRef.once('value', (snapshot) => {
                const players = snapshot.val();
                if (!players) {
                    console.warn("[CheckGameOver] players 데이터가 없습니다. 강제 종료.");
                    forceGameOver(); // (결과: 방이 종료됨)
                    return;
                }

                const playerArray = Object.values(players);
                const allFinished = playerArray.length > 0 && playerArray.every(p => p.isFinished === true);

                // 4. (신규) "모두 종료"가 확인되면, 즉시 로컬에서 forceGameOver() 호출
                if (allFinished) {
                    console.log("[CheckGameOver] 모든 플레이어 종료 확인! 즉시 결과 표시.");
                    
                    // (선택적) 호스트가 status: 'finished'를 쏴서, 
                    // 체크가 늦는 다른 플레이어에게 신호를 줄 수 있음 (안전장치)
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver(); // "즉시" 로컬에서 결과창 표시
                    checkGameOverAttempts = 0; // 초기화
                }
                // 5. (신규) 아직 "모두 종료"가 아니면, 재시도 (안전장치)
                else if (checkGameOverAttempts < MAX_CHECK_ATTEMPTS) {
                    console.log(`[CheckGameOver] 아직 모두 종료되지 않음. ${CHECK_INTERVAL}ms 후 재시도...`);
                    setTimeout(checkGameOverCondition, CHECK_INTERVAL);
                }
                // 6. (신규) 최대 시도 횟수 초과 (안전장치)
                else {
                    console.warn("[CheckGameOver] 최대 체크 횟수 초과. 강제로 결과 표시.");
                    
                    // (선택적) 호스트가 강제로 status: 'finished' 설정
                    if (isHost) {
                        statusRef.set('finished');
                    }
                    
                    forceGameOver();
                    checkGameOverAttempts = 0;
                }
            });
        }

       // [수정] "게스트 멈춤" 버그 해결 (리스너 정리)
function forceGameOver() {
    if (gameOverOverlay.classList.contains('active')) return;

    gameOverOverlay.classList.add('active'); // 중복 방지

    // [신규] 2. 채팅 입력 모달 로직
    // (채팅 전송 함수)
    function sendRematchChat() {
        const message = rematchChatInput.value.trim();
        
        // [### 버그 수정 ###]
        // rematchPlayerList에서 내 닉네임을 찾아서 sendMessage에 전달해야 합니다.
        if (message && rematchPlayerList && rematchPlayerList[playerUid]) {
            const myNickname = rematchPlayerList[playerUid].nickname;
            sendMessage(message, myNickname); // 수정된 함수 호출
        } else if (message) {
            // 예외 처리: 닉네임을 못찾으면 전송 실패
            console.error("sendRematchChat: 닉네임을 찾을 수 없어 전송에 실패했습니다.", rematchPlayerList, playerUid);
            showToast("채팅 전송에 실패했습니다. (정보 없음)");
        }
        // [### 수정 끝 ###]
        
        rematchChatInput.value = '';
        rematchChatInputModal.classList.remove('active'); // 전송 후 모달 닫기
    }
    
    // [### 수정 ###] 모달 내부 플로팅 버튼에 이벤트 리스너 연결
    rematchChatOpenBtn.onclick = () => { 
        rematchChatInputModal.classList.add('active');
        rematchChatInput.focus();
    };
    
    // (전송 버튼)
    rematchChatSendBtn.onclick = sendRematchChat;
    // (엔터키)
    rematchChatInput.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.isComposing) {
            e.preventDefault();
            sendRematchChat();
        }
    };
    // (바탕 클릭 시 닫기)
    rematchChatInputModal.onclick = (e) => {
        if (e.target === rematchChatInputModal) {
            rematchChatInputModal.classList.remove('active');
        }
    };

    // [신규] 3. STT(마이크) 버튼 로직 (입력 모달 안의 버튼)
    if (recognition && rematchChatSttBtn) {
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            rematchChatInput.value = text; // [수정] 입력창에 텍스트 삽입
            rematchChatSttBtn.classList.remove('recording');
            rematchChatSttBtn.disabled = false;
            rematchChatInput.focus();
        };
        recognition.onend = () => {
            rematchChatSttBtn.classList.remove('recording');
            rematchChatSttBtn.disabled = false;
        };
        recognition.onerror = (event) => {
            console.error('STT 에러:', event.error);
            rematchChatSttBtn.classList.remove('recording');
            rematchChatSttBtn.disabled = false;
        };
        rematchChatSttBtn.onclick = (e) => {
            e.stopPropagation();
            if (rematchChatSttBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                    rematchChatSttBtn.classList.add('recording');
                    rematchChatSttBtn.disabled = true;
                } catch(e) { console.error("STT 시작 에러", e); }
            }
        };
    } else if (rematchChatSttBtn) {
        rematchChatSttBtn.style.display = 'none';
    }

    // [신규] 4. TTS(음성듣기) 토글 버튼 로직
    const rematchTtsBtn = document.getElementById('rematch-tts-btn');
    if (rematchTtsBtn) {
        rematchTtsBtn.textContent = isTTSOn ? '🔊' : '🔇'; // 현재 상태 아이콘
        rematchTtsBtn.onclick = (e) => {
            e.stopPropagation();
            isTTSOn = !isTTSOn; // 전역 상태 토글
            localStorage.setItem(TTS_ENABLED_KEY, isTTSOn); // 상태 저장
            rematchTtsBtn.textContent = isTTSOn ? '🔊' : '🔇'; // 아이콘 변경
            showToast(isTTSOn ? '채팅 음성 듣기 ON' : '채팅 음성 듣기 OFF');
            if (!isTTSOn) synthesis.cancel(); // 끄면 현재 TTS 중지
        };
    }

    // --- (이하는 기존 forceGameOver 로직) ---
    stopSound('bgm'); 
    
    // [핵심 수정] 결과창 상태에서는 연결이 불안정해도 강퇴되지 않도록 보호
    if (playerRef) {
        playerRef.onDisconnect().cancel(); 
        console.log("결과창 진입: 자동 퇴장 감지 기능 일시 정지");
    }

    if (isHost && hostStatusDisconnectRef) {
        try {
            hostStatusDisconnectRef.cancel();
            hostStatusDisconnectRef = null;
            console.log("게임 정상 종료: 호스트 onDisconnect 핸들러를 취소했습니다.");
        } catch (e) {
            console.warn("호스트 onDisconnect 핸들러 취소 실패:", e);
        }
    }

    if (timerId) {
        clearInterval(timerId);
        timerId = null;
    }
    isProcessing = true;

            function handleDragStart(e) {
                if (isProcessing) return;
                unlockAudioOnFirstTap();
                stopHintTimer(); // [신규] 힌트 타이머 즉시 중지
                // [수정] "고스트 터치" 해결: e.currentTarget 대신 dataset으로 좌표 찾기
                const row = parseInt(e.currentTarget.dataset.row, 10);
                const col = parseInt(e.currentTarget.dataset.col, 10);

                // [수정] tileElements에서 DOM 요소를 다시 참조
                const tile = tileElements[row][col]; 
                
                if (!tile) {
                    console.error("고스트 터치 방지: 타일을 찾을 수 없음", row, col);
                    return;
                }

                dragStartTile = { row: row, col: col, el: tile };
                dragStartX = e.clientX || (e.touches && e.touches[0].clientX);
                dragStartY = e.clientY || (e.touches && e.touches[0].clientY);
                window.addEventListener('pointerup', handleDragEnd, { once: true });
                window.addEventListener('pointercancel', handleDragEnd, { once: true });
            }

            function handleDragEnd(e) {
                if (!dragStartTile) return;
                const dragEndX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const dragEndY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const deltaX = dragEndX - dragStartX;
                const deltaY = dragEndY - dragStartY;
                const threshold = dragStartTile.el.clientWidth / 3; 
                let targetRow = dragStartTile.row;
                let targetCol = dragStartTile.col;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > threshold) {
                    targetCol += (deltaX > 0) ? 1 : -1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > threshold) {
                    targetRow += (deltaY > 0) ? 1 : -1;
                } else {
                    dragStartTile = null; return;
                }
                if (targetRow < 0 || targetRow >= ROWS || targetCol < 0 || targetCol >= COLS) {
                    dragStartTile = null; return;
                }
                attemptSwap(dragStartTile.row, dragStartTile.col, targetRow, targetCol);
                dragStartTile = null;
            }

            // ------------------------------------
            // 6. 게임 로직 (수정)

            // -----------------------
            
            // [신규] ⭐️ + 💣 별팡+폭탄 조합 처리 함수
async function handleStarBombCombination(r1_star, c1_star, r2_bomb, c2_bomb) {
    // [⚡ 하이브리드 콤보 수정]
    if (comboTimerId) {
        clearTimeout(comboTimerId);
        comboTimerId = null;
        console.log(`⚡ SPEED COMBO! (현재 ${currentCombo}x)`);
    } else {
        currentCombo = 0;
    }
    currentCombo++;
    playExplosionVFX(); // 강력한 폭발 이펙트
    playSound('bomb-explode-sound'); // 폭발음
    playSound('victory'); // 강력한 효과음 추가

    const matchingTiles = new Set();
    const STAR_BOMB_BONUS = 4000; // 보너스 4000점

    // 1. 별팡(star)의 5x5 폭발 범위 추가 (r1_star, c1_star 기준)
    for (let r = r1_star - 2; r <= r1_star + 2; r++) {
        for (let c = c1_star - 2; c <= c1_star + 2; c++) {
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c]) {
                matchingTiles.add(`${r}-${c}`);
            }
        }
    }

    // 2. 폭탄(bomb)의 십자+바닥 폭발 범위 추가 (r2_bomb, c2_bomb 기준)
    const bottomRow = ROWS - 1;
    // (2-1) 폭탄 자신
    matchingTiles.add(`${r2_bomb}-${c2_bomb}`);
    // (2-2) 십자 (가로/세로)
    for (let c = 0; c < COLS; c++) {
        if (board[r2_bomb][c]) matchingTiles.add(`${r2_bomb}-${c}`);
    }
    for (let r = 0; r < ROWS; r++) {
        if (board[r][c2_bomb]) matchingTiles.add(`${r}-${c2_bomb}`);
    }
    // (2-3) 맨 아랫줄
    for (let c = 0; c < COLS; c++) {
        if (board[bottomRow][c]) matchingTiles.add(`${bottomRow}-${c}`);
    }

    // 3. 점수 계산
    const scoreMultiplier = 1.0;
    const baseScore = matchingTiles.size * 50;
    const comboBonus = currentCombo * 20;
    const turnScore = Math.round((baseScore + comboBonus + STAR_BOMB_BONUS) * scoreMultiplier);
    
    score += turnScore;
    
    // 4. 이펙트 표시 (두 위치에서 동시에)
    showStarExplosionVFX(r1_star, c1_star);
    showCrossExplosion([{ row: r2_bomb, col: c2_bomb }, { row: bottomRow, col: c2_bomb }]);
    showComboText(currentCombo, matchingTiles);
    showComboScore(turnScore);
    
    updateScoreUI();
    if (playerRef) { playerRef.child('score').set(score); }
    playComboSound(currentCombo);
    
    // 5. 타일 제거 및 리필
    await animatePop(matchingTiles);
    removeMatches(matchingTiles);
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();

    // 6. 후처리 (피버/일반 모드 분기)
    if (isFeverMode) {
        animateDrops(droppedTilesMap, newTilesMap);
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) { runCascade(newMatchData); }
        else {
            const gracePeriod = getComboGracePeriod(currentCombo);
            if (comboTimerId) clearTimeout(comboTimerId);
            comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod); 
            startHintTimer(); 
            if (!checkForPossibleMoves()) { handleNoMoreMoves(); }
        }
    } else {
        await animateDrops(droppedTilesMap, newTilesMap);
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) {
            await new Promise(resolve => setTimeout(resolve, 100));
            await runCascade(newMatchData);
        } else {
            const gracePeriod = getComboGracePeriod(currentCombo);
            if (comboTimerId) clearTimeout(comboTimerId);
            comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod); 
            startHintTimer(); 
            if (!checkForPossibleMoves()) { await handleNoMoreMoves(); }
        }
    }
}

// [신규] 공격 투사체 애니메이션 발사! 🚀
        function showProjectileAttack(attackCount) {
            // 1. 공격 대상: 나를 제외한 모든 플레이어의 점수판
            const targets = Array.from(document.querySelectorAll('.stat-box:not(.my-score)'));
            if (targets.length === 0) return;

            // 2. 공격 강도에 따른 이모지 선택
            // 3개 이상(5매치/콤보)이면 로켓, 그 외엔 얼음
            const emoji = attackCount >= 3 ? '🚀' : '🧊'; 
            
            // 3. 발사 시작점: 화면 중앙 (또는 게임 보드 중앙)
            const wrapperRect = gameWrapper.getBoundingClientRect();
            const startX = wrapperRect.width / 2;
            const startY = wrapperRect.height / 2;

            // 4. 각 대상에게 투사체 발사
            targets.forEach((target, index) => {
                // 약간의 시간차 발사 (다다다닥!)
                setTimeout(() => {
                    const rect = target.getBoundingClientRect();
                    // 목표 지점 (점수판의 중심)
                    const targetX = rect.left + rect.width / 2;
                    const targetY = rect.top + rect.height / 2;

                    // 투사체 생성
                    const projectile = document.createElement('div');
                    projectile.className = 'projectile-anim';
                    projectile.textContent = emoji;
                    projectile.style.left = `${startX}px`;
                    projectile.style.top = `${startY}px`;
                    // 초기 위치 보정 (중심점 맞추기)
                    projectile.style.transform = 'translate(-50%, -50%) scale(0.5)';
                    
                    document.body.appendChild(projectile);

                    // 애니메이션 실행 (다음 프레임에 적용해야 transition 작동)
                    requestAnimationFrame(() => {
                        const deltaX = targetX - startX;
                        const deltaY = targetY - startY;
                        
                        // 날아가면서 커지고 회전함
                        projectile.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px)) scale(1.2) rotate(360deg)`;
                    });

                    // 도착 후 처리 (0.5초 뒤)
                    setTimeout(() => {
                        projectile.remove(); // 투사체 제거
                        
                        // 타겟 흔들림 효과 적용
                        target.classList.remove('hit-effect'); // 리셋
                        void target.offsetWidth; // 강제 리플로우 (애니메이션 재시작용)
                        target.classList.add('hit-effect');
                        
                        // 타격음 재생 (작게)
                        playSound('bomb-explode-sound'); 
                    }, 500); // CSS transition 시간과 일치

                }, index * 100); // 타겟별 0.1초 간격
            });
        }

         async function attemptSwap(r1, c1, r2, c2) {
    if (isProcessing) return;
    isProcessing = true;

    playSound('swap'); // [수정] 한글 '스왑' -> 영어 'swap' (파일 원문 기준)
    
    // [신규] 🧱 방해 타일 (얼음) 스왑 방지
    if (board[r1][c1] === JUNK_TILE || board[r2][c2] === JUNK_TILE) {
        // [버그 수정] animateInvalidSwap을 호출하면 데이터(board)가 꼬임.
        // 데이터/DOM 스왑 없이 '흔들림' 애니메이션만 실행합니다.
        if (!isFeverMode) { // 피버 모드가 아닐 때만 흔들림
            const tile1 = tileElements[r1][c1]; 
            const tile2 = tileElements[r2][c2]; 
            tile1.classList.add('invalid');
            tile2.classList.add('invalid');
            await new Promise(resolve => setTimeout(resolve, 400)); // 400ms 대기
            tile1.classList.remove('invalid');
            tile2.classList.remove('invalid');
        }
        
        startHintTimer(); // [추가] 힌트 타이머 다시 시작
        isProcessing = false;
        return;
    }
    // [신규] 1. 특수 타일 스왑을 모두 여기서 먼저 확인
    const tile1 = board[r1][c1];
    const tile2 = board[r2][c2];
    
    // 1a. 💣 팡이(폭탄) + 팡이(폭탄) 스왑 [🔥 신규 로직]
    if (tile1 === '💣' && tile2 === '💣') {
        await handleDoublePangiExplosion(r1, c1, r2, c2);
        isProcessing = false;
        return;
    }
    
    // 1b. ⭐️ 별 팡이 + 별 팡이 스왑 [🔥 신규 로직]
    if (tile1 === 'star' && tile2 === 'star') {
        await handleDoubleStarPangiExplosion(r1, c1, r2, c2);
        isProcessing = false;
        return;
    }

    
    
    // [신규] 1c. ⭐️ 별 팡이 + 💣 폭탄 스왑
    if ((tile1 === 'star' && tile2 === '💣')) {
        // (r1, c1)이 별, (r2, c2)가 폭탄
        await handleStarBombCombination(r1, c1, r2, c2);
        isProcessing = false;
        return;
    }

showPerfectPlayText(PERFECT_PLAY_BONUS);

// [신규] 호스트가 "대기실로"를 누를 때 실행되는 함수
async function hostReturnToGameLobby(playersData, gameType) {
    if (!isHost || !playersData || !gameType || !playerUid || !roomRef) {
        console.error("hostReturnToGameLobby: 필수 데이터 누락");
        cleanupAndExit();
        return;
    }

    console.log("방장이 게임방.html로 복귀합니다. 모든 인원이 함께 이동합니다...");
    isExiting = true;
    stopSound('bgm');
    if (timerId) clearInterval(timerId);
    if (feverTimerId) clearTimeout(feverTimerId);

    try {
        // 1. 방 상태를 'lobby'로 변경 (게임방.html에서 자동 정리)
        await roomRef.update({
            status: 'lobby',
            // 게임 관련 데이터 초기화
            gameStarted: false,
            readyPlayers: null,
            rematchRequests: null,
            attacks: null
        });

        console.log("방 상태를 'lobby'로 변경 완료. 게임방.html로 이동.");
        
        // [### 1. onDisconnect 핸들러 수동 취소 (핵심) ###]
        if (isHost && hostStatusDisconnectRef) {
            try {
                hostStatusDisconnectRef.cancel();
                hostStatusDisconnectRef = null;
                console.log("Host onDisconnect.cancel() 호출됨.");
            } catch (e) { console.warn("Host onDisconnect.cancel() 실패:", e); }
        }

        // [### 2. 리스너 끄기 ###]
        // [수정] 정확한 리스너 참조로 끄기
        if (roomRef) roomRef.off('value', roomValueListener); 
        if (chatListenerRef) chatListenerRef.off();
        if (rematchRef) rematchRef.off(); // '다시하기' 리스너도 종료

        // [### 3. URL 버그 수정 (newRoomId -> roomRef.key) ###]
        // 🚨 hostCleanupAndCreateNewRoom 함수에서 newRoomId를 참조하던 버그 수정
        window.location.replace(`게임방.html?roomId=${roomRef.key}`);

    } catch (error) {
        console.error("방 상태 변경 실패:", error);
        cleanupAndExit(); // 실패 시 일반 나가기
    }
}

// [수정] 게스트가 "대기실로"를 누를 때 실행되는 함수 (인원수 무관하게 대기실로 이동)
async function guestHandleReturn(playersData) {
    console.log("게스트가 방을 나갑니다. (대기실.html로 이동)");

    isExiting = true;
    stopSound('bgm');
    if (timerId) clearInterval(timerId);
    if (feverTimerId) clearTimeout(feverTimerId);

    // onDisconnect 핸들러 취소 (중요: 방을 나가는 것이므로 서버가 강제 퇴장 처리하지 않도록)
    if (playerRef) {
        try { 
            playerRef.onDisconnect().cancel(); 
            console.log("Guest onDisconnect canceled.");
        } catch(e) { 
            console.warn("Guest onDisconnect cancel failed:", e); 
        }
    }

    let removePromise = Promise.resolve();

    if (roomRef && playerUid) {
        // 1. 리스너 정리
        if (roomRef) roomRef.off('value', roomValueListener);
        if (chatListenerRef) chatListenerRef.off();
        if (rematchRef) rematchRef.off();

        // 2. DB 정리: 내 정보(players)와 재대결 요청(rematchRequests)을 모두 삭제
        console.log("Removing self from players and rematchRequests...");
        const updates = {};
        updates['players/' + playerUid] = null;
        updates['rematchRequests/' + playerUid] = null; // [핵심] 이걸 지워야 남은 사람들이 대기 상태에서 풀림

        removePromise = roomRef.update(updates);
    }

    // 3. Firebase 정리 후 대기실로 이동
    removePromise
        .catch(e => console.error("Firebase 데이터 정리 실패:", e))
        .finally(() => {
            console.log("Redirecting to 대기실.html");
            window.location.replace('대기실.html');
        });
}


// 레인보우 타일과 일반 타일 교환 (해당 색상 전체 제거)
async function handleRainbowSwap(rainbowRow, rainbowCol, targetColor) {
   // [⚡ 하이브리드 콤보 수정]
    if (comboTimerId) {
        // 2초 타이머 활성 중 -> 스피드 콤보 성공
        clearTimeout(comboTimerId);
        comboTimerId = null;
        console.log(`⚡ SPEED COMBO! (현재 ${currentCombo}x)`);
    } else {
        // 2초 타이머 만료 -> 새 콤보 시작
        currentCombo = 0; // 0으로 리셋 (아래 currentCombo++가 1로 만듦)
    }
    currentCombo++; // [중요] 특수 타일 발동 시 콤보 1 증가
    playExplosionVFX(); // [신규] 스크린 쉐이크 + 플래시
    const matchingTiles = new Set();
    
    // 보드에서 targetColor와 같은 색상의 모든 타일 찾기
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c] === targetColor) {
                matchingTiles.add(`${r}-${c}`);
            }
        }
    }
    
    // 레인보우 타일도 제거
    matchingTiles.add(`${rainbowRow}-${rainbowCol}`);
    
    const scoreMultiplier = isFeverMode ? 1.5 : 1.0;
    const baseScore = matchingTiles.size * 50;
    const comboBonus = currentCombo * 20;
    const turnScore = Math.round((baseScore + comboBonus + RAINBOW_BONUS) * scoreMultiplier);
    
    score += turnScore;
    
    showRainbowExplosion(rainbowRow, rainbowCol, targetColor);
    showComboText(currentCombo, matchingTiles);
    showComboScore(turnScore);
    
    // [수정] 이 부분은 그대로 유지됩니다.
    if (!isFeverMode) {
        const gaugeGain = matchingTiles.size * 1.5;
        feverGauge = Math.min(MAX_FEVER_GAUGE, feverGauge + gaugeGain);
        updateFeverGaugeUI();
        if (feverGauge >= MAX_FEVER_GAUGE) {
            startFeverMode();
        }
    }
    
    updateScoreUI();
    if (playerRef) { playerRef.child('score').set(score); }
    playComboSound(currentCombo);
    
    await animatePop(matchingTiles);
    removeMatches(matchingTiles);
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();
    
    // [핵심 수정] 이 부분이 피버모드/일반모드로 분기됩니다.
    if (isFeverMode) {
        // 피버 모드: 애니메이션/콤보를 '시작'만 시킴 (await 안함)
        animateDrops(droppedTilesMap, newTilesMap); // [수정] await 제거
        
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) {
            runCascade(newMatchData); // [수정] await 제거, 래퍼 함수 사용
        } else {
            currentCombo = 0;
            if (!checkForPossibleMoves()) {
                handleNoMoreMoves(); // (await 없음)
            }
        }
    } else {
        // 일반 모드: (기존 로직)
        await animateDrops(droppedTilesMap, newTilesMap);
        
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) {
            await new Promise(resolve => setTimeout(resolve, 100));
            await runCascade(newMatchData); // [수정] 래퍼 함수 사용
        } else {
            currentCombo = 0;
            if (!checkForPossibleMoves()) {
                await handleNoMoreMoves();
            }
        }
    }
}

// 레인보우 타일 생성 시 효과
function showRainbowEffect(rainbowTiles) {
    rainbowTiles.forEach(({ row, col }) => {
        if (!tileElements[row] || !tileElements[row][col]) return;
        
        const tile = tileElements[row][col];
        const rect = tile.getBoundingClientRect();
        const boardRect = gameBoard.getBoundingClientRect();
        const wrapperRect = gameWrapper.getBoundingClientRect();
        
        const centerTop = (rect.top - boardRect.top) + (rect.height / 2) + boardRect.top - wrapperRect.top;
        const centerLeft = (rect.left - boardRect.left) + (rect.width / 2) + boardRect.left - wrapperRect.left;
        
        // 무지개 빛 효과
        const rainbow = document.createElement('div');
        rainbow.style.position = 'absolute';
        rainbow.style.top = `${centerTop}px`;
        rainbow.style.left = `${centerLeft}px`;
        rainbow.style.width = '60px';
        rainbow.style.height = '60px';
        rainbow.style.borderRadius = '50%';
        rainbow.style.background = 'conic-gradient(from 0deg, red, orange, yellow, green, blue, indigo, violet, red)';
        rainbow.style.transform = 'translate(-50%, -50%) scale(0)';
        rainbow.style.pointerEvents = 'none';
        rainbow.style.zIndex = '150';
        rainbow.style.animation = 'rainbow-burst 0.6s ease-out forwards';
        rainbow.style.boxShadow = '0 0 30px rgba(255,255,255,0.8)';
        
        gameWrapper.appendChild(rainbow);
        setTimeout(() => rainbow.remove(), 600);
        
        const rainbowText = document.createElement('div');
        rainbowText.className = 'combo-text';
        rainbowText.textContent = '레인보우🌈 ';
        rainbowText.style.top = `${centerTop}px`;
        rainbowText.style.left = `${centerLeft}px`;
        rainbowText.style.transform = 'translate(-50%, -50%)';
        rainbowText.style.fontSize = '2.5em';
        rainbowText.style.background = 'linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet)';
        rainbowText.style.webkitBackgroundClip = 'text';
        rainbowText.style.webkitTextFillColor = 'transparent';
        
        gameWrapper.appendChild(rainbowText);
        setTimeout(() => rainbowText.remove(), 800);
    });
}

// 레인보우 타일 사용 시 색상 제거 효과
function showRainbowExplosion(rainbowRow, rainbowCol, targetColor) {
    const tile = tileElements[rainbowRow][rainbowCol];
    if (!tile) return;
    
    const rect = tile.getBoundingClientRect();
    const boardRect = gameBoard.getBoundingClientRect();
    const wrapperRect = gameWrapper.getBoundingClientRect();
    
    const centerTop = (rect.top - boardRect.top) + (rect.height / 2) + boardRect.top - wrapperRect.top;
    const centerLeft = (rect.left - boardRect.left) + (rect.width / 2) + boardRect.left - wrapperRect.left;
    
    // 무지개에서 퍼져나가는 효과
    for (let i = 0; i < 20; i++) {
        setTimeout(() => {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.top = `${centerTop}px`;
            particle.style.left = `${centerLeft}px`;
            particle.style.fontSize = '2em';
            particle.textContent = targetColor;
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '150';
            
            const angle = (Math.PI * 2 * i) / 20;
            const distance = 200;
            const targetX = Math.cos(angle) * distance;
            const targetY = Math.sin(angle) * distance;
            
            particle.style.animation = `particle-explode-${i} 0.8s ease-out forwards`;
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes particle-explode-${i} {
                    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
                    100% { transform: translate(calc(-50% + ${targetX}px), calc(-50% + ${targetY}px)) scale(0); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
            
            gameWrapper.appendChild(particle);
            setTimeout(() => {
                particle.remove();
                style.remove();
            }, 800);
        }, i * 20);
    }
}
// [신규] 💣 팡이(폭탄) 2개 스왑 처리 함수
async function handleDoublePangiExplosion(r1, c1, r2, c2) {
    // [신규] 미션: 더블 팡 1회
    checkMissionClear('doublePang');

    // [⚡ 하이브리드 콤보 수정]
    if (comboTimerId) {
        // 2초 타이머 활성 중 -> 스피드 콤보 성공
        clearTimeout(comboTimerId);
        comboTimerId = null;
        console.log(`⚡ SPEED COMBO! (현재 ${currentCombo}x)`);
    } else {
        // 2초 타이머 만료 -> 새 콤보 시작
        currentCombo = 0; // 0으로 리셋 (아래 currentCombo++가 1로 만듦)
    }
    currentCombo++; // [중요] 특수 타일 발동 시 콤보 1 증가
    playExplosionVFX();
    playSound('bomb-explode-sound'); // 팡이 폭발 효과음

    const matchingTiles = new Set();
    
    // 1. 스왑된 두 팡이의 2x2 영역 계산 (r_min, r_max, c_min, c_max)
    const r_min = Math.min(r1, r2);
    const r_max = Math.max(r1, r2);
    const c_min = Math.min(c1, c2);
    const c_max = Math.max(c1, c2);

    // 2. 가로 2줄 모두 추가 (r_min 행, r_max 행)
    for (let c = 0; c < COLS; c++) {
        if (board[r_min][c]) matchingTiles.add(`${r_min}-${c}`);
        if (board[r_max][c]) matchingTiles.add(`${r_max}-${c}`);
    }

    // 3. 세로 2줄 모두 추가 (c_min 열, c_max 열)
    for (let r = 0; r < ROWS; r++) {
        if (board[r][c_min]) matchingTiles.add(`${r}-${c_min}`);
        if (board[r][c_max]) matchingTiles.add(`${r}-${c_max}`);
    }
    
    // 4. [신규] 보너스 점수 계산
    const DOUBLE_PANGI_BONUS = 3000;
    const scoreMultiplier = 1.0;
    const baseScore = matchingTiles.size * 50;
    const comboBonus = currentCombo * 20;
    const turnScore = Math.round((baseScore + comboBonus + DOUBLE_PANGI_BONUS) * scoreMultiplier);
    
    score += turnScore;
    
    showCrossExplosion([{ row: r1, col: c1 }, { row: r2, col: c2 }]); // 이펙트 재활용
    showComboText(currentCombo, matchingTiles);
    showComboScore(turnScore);
    
    updateScoreUI();
    if (playerRef) { playerRef.child('score').set(score); }
    playComboSound(currentCombo);
    
    await animatePop(matchingTiles);
    removeMatches(matchingTiles);
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();

    // 5. 후처리 로직 (피버/일반 모드 분기)
    if (isFeverMode) {
        animateDrops(droppedTilesMap, newTilesMap);
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) { runCascade(newMatchData); }
        else {
            const gracePeriod = getComboGracePeriod(currentCombo);
            if (comboTimerId) clearTimeout(comboTimerId);
            comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod); 
            startHintTimer(); 
            if (!checkForPossibleMoves()) { handleNoMoreMoves(); }
        }
    } else {
        await animateDrops(droppedTilesMap, newTilesMap);
        const newMatchData = findAllMatches();
        if (newMatchData.matches.size > 0) {
            await new Promise(resolve => setTimeout(resolve, 100));
            await runCascade(newMatchData);
        } else {
            const gracePeriod = getComboGracePeriod(currentCombo);
            if (comboTimerId) clearTimeout(comboTimerId);
            comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod); 
            startHintTimer(); 
            if (!checkForPossibleMoves()) { await handleNoMoreMoves(); }
        }
    }
}

// [신규] ⭐️ 별 팡이 (3x3) 폭발 처리 함수
// [신규] ⭐️ 별 팡이 (5x5) 폭발 처리 함수 (연쇄 폭발 기능 추가됨)
async function handleStarPangiExplosion(row, col) {
    // [⚡ 하이브리드 콤보 수정]
    if (comboTimerId) {
        // 2초 타이머 활성 중 -> 스피드 콤보 성공
        clearTimeout(comboTimerId);
        comboTimerId = null;
        console.log(`⚡ SPEED COMBO! (현재 ${currentCombo}x)`);
    } else {
        // 2초 타이머 만료 -> 새 콤보 시작
        currentCombo = 0; // 0으로 리셋 (아래 currentCombo++가 1로 만듦)
    }
    currentCombo++; // [중요] 특수 타일 발동 시 콤보 1 증가
    playSound('bomb-explode-sound'); // [신규] 별 팡이 폭발 효과음 (동일)
    
    // [핵심 수정] 1. 폭발 대상과 연쇄 대상을 분리
    const matchingTiles = new Set(); // 1차로 터질 타일 (일반, 폭탄, 무지개 등)
    const chainedStars = []; // 2차로 연쇄 폭발할 별팡

    // 1. (row, col)을 중심으로 5x5 대형 폭발
    for (let r = row - 2; r <= row + 2; r++) {
        for (let c = col - 2; c <= col + 2; c++) {
            // 보드 범위 체크
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                const tileData = board[r][c];
                if (tileData) { // null이 아닌 타일만
                    
                    // [핵심 수정] 
                    // 다른 '별팡'을 발견했고, 그것이 폭발의 진원지가 아니라면
                    if (tileData === 'star' && (r !== row || c !== col)) {
                        // 연쇄 폭발 대기열에 추가
                        chainedStars.push({ r, c });
                        // 1차 폭발 대상(matchingTiles)에는 추가하지 않음!
                    } else {
                        // 일반 타일, 폭탄, 무지개, 또는 폭발 진원지(별 자신)
                        matchingTiles.add(`${r}-${c}`);
                    }
                }
            }
        }
    }
    
    const scoreMultiplier = 1.0; // 피버와 무관
    // [수정] 점수 계산은 1차 폭발(matchingTiles)만 기준으로 함
    const baseScore = matchingTiles.size * 50; 
    const comboBonus = currentCombo * 20;
    const turnScore = Math.round((baseScore + comboBonus + 1500) * scoreMultiplier); // 별 팡이 보너스 1500점
    
    score += turnScore;
    
    // 이펙트 (별 팡이 전용 충격파 이펙트로 변경)
    showStarExplosionVFX(row, col); // [수정] 십자가 -> 별 팡이 전용 이펙트
    showComboText(currentCombo, matchingTiles);
    showComboScore(turnScore);
    
    updateScoreUI();
    if (playerRef) { playerRef.child('score').set(score); }
    playComboSound(currentCombo);
    
    // [수정] 1차 폭발 타일만 제거
    await animatePop(matchingTiles);
    removeMatches(matchingTiles);
    
    const { droppedTilesMap } = dropTiles();
    const newTilesMap = fillTopTiles();
    
    // [수정] 1차 폭발에 대한 리필/애니메이션
    await animateDrops(droppedTilesMap, newTilesMap);
    
    // 1차 리필 후 자연 콤보 체크
    const newMatchData = findAllMatches();
    if (newMatchData.matches.size > 0) {
        await new Promise(resolve => setTimeout(resolve, 100));
        await runCascade(newMatchData);
    }

    // [핵심 수정] 2. 연쇄 폭발(chainedStars) 실행
    if (chainedStars.length > 0) {
        console.log(`⭐️ ${chainedStars.length}개의 별팡 연쇄 폭발 시작!`);
        // (주의: isProcessing = true 상태가 유지됨)
        for (const star of chainedStars) {
            // 1차 폭발/낙하 후에도 해당 위치에 'star'가 있는지 다시 확인
            if (board[star.r][star.c] === 'star') {
                await handleStarPangiExplosion(star.r, star.c); // 재귀 호출
            }
        }
    }

    // [수정] 피버/일반 모드 분기 (팡이 로직과 동일)
    // [수정] 콤보 타이머 로직을 연쇄 폭발(if)과 일반(else)으로 분리
    if (isFeverMode) {
        // 피버모드에서는 콤보 타이머 로직이 runCascade에서 처리되므로
        // 연쇄 폭발이 없을 때만 콤보 타이머/힌트 로직을 실행
        if (chainedStars.length === 0) {
            animateDrops(droppedTilesMap, newTilesMap);
            const newMatchData = findAllMatches();
            if (newMatchData.matches.size > 0) {
                runCascade(newMatchData);
            } else {
                const gracePeriod = getComboGracePeriod(currentCombo);
                if (comboTimerId) clearTimeout(comboTimerId);
                comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod);
                startHintTimer();
                if (!checkForPossibleMoves()) { handleNoMoreMoves(); }
            }
        }
    } else {
        // 일반 모드에서는 모든 폭발(연쇄 포함)이 끝난 후 콤보 타이머/힌트 로직 실행
        // (연쇄 폭발이 있었다면 이미 await으로 모두 처리됨)
        if (chainedStars.length === 0) {
            // (1차 폭발만 있었던 경우) -> newMatchData가 이미 위에서 처리됨
            const newMatchDataAfterFill = findAllMatches();
            if (newMatchDataAfterFill.matches.size > 0) {
                 await new Promise(resolve => setTimeout(resolve, 100));
                 await runCascade(newMatchDataAfterFill);
            }
        }
        
        // (연쇄 폭발이 있었든 없었든) 최종 콤보 타이머 시작
        const gracePeriod = getComboGracePeriod(currentCombo);
        if (comboTimerId) clearTimeout(comboTimerId);
        comboTimerId = setTimeout(() => { currentCombo = 0; comboTimerId = null; }, gracePeriod);
        startHintTimer();
        if (!checkForPossibleMoves()) { await handleNoMoreMoves(); }
    }
}

            function swapData(r1, c1, r2, c2) {
                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }
            // [수정] "고스트 터치" 해결의 핵심 함수
            // [수정] "고스트 터치" 및 "잘못된 스왑" 버그 최종 수정
            function swapDOMElements(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1]; // (예: El_A)
                const tile2 = tileElements[r2][c2]; // (예: El_B)

                // 1. [핵심 수정] 두 타일의 "동물 클래스"를 직접 교환합니다.
                // setTileAppearance를 사용하면 안 됩니다.
                
                // (1-1) tile1(El_A)에서 모든 동물 클래스를 찾아 tile2(El_B)에 줍니다.
                const tile1Classes = [];
                tile1.classList.forEach(c => {
                    // [버그 수정] 'star', JUNK_TILE(junk) 클래스도 교환 대상에 포함
                    if (TILE_EMOJIS.includes(c) || c === 'rainbow' || c === 'bomb' || c === 'star' || c === JUNK_TILE) {
                        tile1Classes.push(c);
                    }
                });
                
                // (1-2) tile2(El_B)에서 모든 동물 클래스를 찾아 tile1(El_A)에 줍니다.
                const tile2Classes = [];
                tile2.classList.forEach(c => {
                    // [버그 수정] 'star', JUNK_TILE(junk) 클래스도 교환 대상에 포함
                    if (TILE_EMOJIS.includes(c) || c === 'rainbow' || c === 'bomb' || c === 'star' || c === JUNK_TILE) {
                        tile2Classes.push(c);
                    }
                });

                // (1-3) 클래스 리스트를 서로 교체합니다.
                tile1.classList.remove(...tile1Classes);
                tile1.classList.add(...tile2Classes);
                
                tile2.classList.remove(...tile2Classes);
                tile2.classList.add(...tile1Classes);

                // 2. [핵심 수정] DOM dataset 스왑 (이전 수정안 유지)
                // tile1(El_A)은 (r2,c2)로 이동했으므로 dataset을 (r2,c2)로 설정
                tile1.dataset.row = r2;
                tile1.dataset.col = c2;
                // tile2(El_B)는 (r1,c1)로 이동했으므로 dataset을 (r1,c1)로 설정
                tile2.dataset.row = r1;
                tile2.dataset.col = c1;

                // 3. JS 배열 스왑 (타일 참조 스왑)
                tileElements[r1][c1] = tile2;
                tileElements[r2][c2] = tile1;
            }
            function animateSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];
                tile1.classList.add('swap');
                tile2.classList.add('swap');
                const rect1 = tile1.getBoundingClientRect();
                const rect2 = tile2.getBoundingClientRect();
                const deltaX = rect1.left - rect2.left;
                const deltaY = rect1.top - rect2.top;
                tile1.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`;
                tile2.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                return new Promise(resolve => {
                    setTimeout(() => {

    for (let c = 0; c < COLS; c++) {

        for (let r = 1; r < ROWS; r++) {
            if (board[r][c] && board[r][c] === board[matchStart][c] && board[matchStart][c] !== RAINBOW_TILE) {

    crossExplosions.forEach(({ row, col }) => {
        for (let c = 0; c < COLS; c++) {
            if (board[row][c]) matches.add(`${row}-${c}`);

    starTiles.forEach(key => starPangiTiles.add(key));

}

// [신규] 콤보 수에 따라 콤보 유지 시간(ms)을 반환하는 함수

                // 2. 일반 콤보 사운드 번호 계산 (요청하신 규칙 적용)

                    soundNum = combo - 6;
                }
                else if (combo >= 26) {

                    soundNum = combo - 7;

                } catch(e) {

                }
           }

            function addJunkTilesToBoard(count) {
                if (isProcessing) return; // 셔플 중이거나 하면 방지

                const availableTiles = [];
                // 1. 일반 동물 타일만 수집

                // 2. 타일을 섞어서 count 만큼 얼음으로 변경
                availableTiles.sort(() => 0.5 - Math.random());
                const tilesToFreeze = availableTiles.slice(0, count);

                tilesToFreeze.forEach(({ r, c }) => {

            /**
             * 3. (공격 판정) 플레이어의 스왑이 4/5매치인지 확인합니다.
             */
            function checkPlayerAttack(r1, c1, r2, c2) {
                let attackCount = 0;
                // 스왑한 두 위치 (r1,c1), (r2,c2)만 검사
                const coordsToTest = [[r1, c1], [r2, c2]];
                const checkedTiles = new Set(); // 중복 검사 방지

                coordsToTest.forEach(([r, c]) => {
                    const tile = board[r][c];
                    if (!tile || !TILE_EMOJIS.includes(tile) || checkedTiles.has(`${r}-${c}`)) return;

                    // 가로 검사
                    let hCount = 1;
                    let cLeft = c - 1;
                    while (cLeft >= 0 && board[r][cLeft] === tile) { hCount++; checkedTiles.add(`${r}-${cLeft--}`); }
                    let cRight = c + 1;
                    while (cRight < COLS && board[r][cRight] === tile) { hCount++; checkedTiles.add(`${r}-${cRight++}`); }
                    
                    if (hCount === 5) attackCount += 3;
                    else if (hCount === 4) attackCount += 1;

                    // 세로 검사
                    let vCount = 1;
                    let rUp = r - 1;
                    while (rUp >= 0 && board[rUp][c] === tile) { vCount++; checkedTiles.add(`${rUp--}-${c}`); }
                    let rDown = r + 1;
                    while (rDown < ROWS && board[rDown][c] === tile) { vCount++; checkedTiles.add(`${rDown++}-${c}`); }
                    
                    if (vCount === 5) attackCount += 3;
                    else if (vCount === 4) attackCount += 1;
                });

return attackCount;
            }

            /**
             * 4. (멀티-매치 판정) 플레이어의 스왑이 2개 이상의 매치를 '동시에' 만들었는지 확인
             */
            function checkMultiMatch(r1, c1, r2, c2) {
                // 스왑한 두 타일이 각자의 '새 위치'에서 3매치 이상을 만드는지 검사
                const match1 = isTileCreatingMatch(r1, c1);
                const match2 = isTileCreatingMatch(r2, c2);
                
                // 두 타일 모두 3매치 이상을 만들었다면 '멀티-매치'
                return match1 && match2;
            }
            
            // checkMultiMatch의 헬퍼: 특정 타일이 3매치 이상을 만드는지 확인
            function isTileCreatingMatch(r, c) {
                const tile = board[r][c];
                if (!tile || !TILE_EMOJIS.includes(tile)) return false;

                // 가로 검사
                let hCount = 1;
                let cLeft = c - 1;
                while (cLeft >= 0 && board[r][cLeft] === tile) { hCount++; cLeft--; }
                let cRight = c + 1;
                while (cRight < COLS && board[r][cRight] === tile) { hCount++; cRight++; }
                if (hCount >= 3) return true;

                // 세로 검사
                let vCount = 1;
                let rUp = r - 1;
                while (rUp >= 0 && board[rUp][c] === tile) { vCount++; rUp--; }
                let rDown = r + 1;
                while (rDown < ROWS && board[rDown][c] === tile) { vCount++; rDown++; }
                if (vCount >= 3) return true;
                
                return false;
            }

            span.style.color = '#28a745'; 
            span.style.textShadow = '0 0 5px rgba(40, 167, 69, 0.5)';
        } else {
            span.textContent = '';
            span.classList.remove('ready');
            span.style.color = '#ccc';
            span.style.textShadow = 'none';
        }
    });

    // 2. 내 버튼 상태 동기화
    amIReadyForRematch = !!requests[playerUid];
    const myRematchBtn = document.getElementById('rematch-btn');
    if (myRematchBtn) {
        myRematchBtn.disabled = false;
        myRematchBtn.textContent = amIReadyForRematch ? '준비완료! ✓' : '다시하기';
    }

    // 3. [핵심] 인원 변동 시 자동 처리 (방장 전용)
    if (isHost && gameOverOverlay.classList.contains('active')) {
        const playerCount = playersInRoom.length;
        const validReadyCount = Object.keys(requests).filter(uid => playersInRoom.includes(uid)).length;
        
        // [케이스 A] 2명 이상 남았고, 남은 전원이 준비했다면 -> 게임 시작
        // [케이스 A] 2명 이상 남았고, 남은 전원이 준비했다면 -> 게임 시작
        if (playerCount >= 2 && validReadyCount === playerCount) {
            console.log("[System] 남은 인원 전원 준비 -> 리매치 자동 시작!");

            // [신규] 리매치 미션 할당 (이 부분이 8단계의 내용입니다)
            const updates = {};
            updates['status'] = 'waiting';
            updates['attacks'] = null;
            updates['rematchRequests'] = null;
            updates['gameStarted'] = false;
            updates['readyPlayers'] = null;

            const assignedMissions = {};
            // [수정] playerIds -> playersInRoom (이 스코프의 올바른 변수명)
            playersInRoom.forEach(uid => { 
                const missionIndex = Math.floor(Math.random() * MISSIONS.length);
                const mission = { ...MISSIONS[missionIndex] }; // Deep copy
                if (mission.id === 'animal80') {
                    mission.animal = TILE_EMOJIS[Math.floor(Math.random() * TILE_EMOJIS.length)];
                }
                assignedMissions[uid] = mission;
            });
            updates['missions'] = assignedMissions; // [신규] 미션 데이터 쓰기
            
            roomRef.update(updates); // [수정] updates 객체로 전송
        }
        // [케이스 B] 다 나가고 나 혼자 남았다면 -> 방 삭제 후 대기실로 강제 이동
        else if (playerCount === 1) {
            // 중복 실행 방지
            if (!isExiting) {
                console.log("[System] 혼자 남음 -> 방 폭파 및 대기실 복귀");
                
                isExiting = true; // [중요] 이동 중 다른 리스너가 작동하지 않도록 차단
                
                showToast("모든 참가자가 퇴장하여 대기실로 이동합니다.");

                // 1.5초 뒤에 방을 삭제하고 이동 (사용자가 메시지를 볼 시간 확보)
                setTimeout(() => {
                    // 내가 방장이므로 방을 삭제
                    if (isHost) {
                        roomRef.remove(); 
                    }
                    // 대기실로 이동
                    window.location.replace('대기실.html');
                }, 1500);
            }
        }
    }
}

            // [신규] 토스트 알림 (초대/쪽지/친구) 리스너 설정 함수
            let globalListenersAttached = false; // 중복 실행 방지 플래그
            function setupGlobalNotificationListeners(userId) {
                if (globalListenersAttached || !userId || !db) return;
                globalListenersAttached = true;
                
                console.log("[알림] 전역 알림 리스너 설정 (ID:", userId, ")");
                
                // 지금 이 순간 이후의 데이터만 받도록 설정 (페이지 로드 시 과거 알림 방지)
                const now = Date.now(); // [버그 수정] TIMESTAMP -> Date.now()

                // 1. 방 초대 알림
                const invitesRef = db.ref(`invitations/${userId}`);
                invitesRef.on('child_added', snapshot => {
                    const invite = snapshot.val();
                    if (invite && invite.from_name) {
                        showToast(`🔔 [방 초대] ${escapeHTML(invite.from_name)}님이 '${escapeHTML(invite.game_name)}' 방에 초대했습니다.`);
                        playSound('swap'); // 간단한 알림음
                    }
                    snapshot.ref.remove(); // 알림 확인 후 즉시 제거
                });

                // 2. 친구 요청 알림
                const friendReqRef = db.ref(`friend_requests/${userId}`); // [수정] 경로 변경
                friendReqRef.on('child_added', snapshot => {
                    const req = snapshot.val();
                    if (req && req.from_name) {
                         showToast(`💌 [친구 요청] ${escapeHTML(req.from_name)}님이 친구를 신청했습니다.`);
                         playSound('swap');
                    }
                    snapshot.ref.remove(); // 알림 확인 후 즉시 제거
                });

                // 3. 쪽지(귓속말) 알림
                const whisperRef = db.ref(`user_inboxes/${userId}`); // [수정] 경로 변경
                whisperRef.on('child_added', async (snapshot) => { // [수정] async 추가
                    const msg = snapshot.val();
                    const senderUid = snapshot.key; // [수정] 키가 UID임

                    // [수정] 데이터 구조 변경 (lastMessage)
                    if (msg && msg.lastMessage && senderUid) { 
                        try {
                            // [신규] 보낸 사람의 프로필을 가져옴
                            const profileSnap = await db.ref(`users/${senderUid}/profile`).once('value');
                            if (profileSnap.exists()) {
                                const nickname = profileSnap.val().nickname || '...';
                                showToast(`💬 [쪽지] ${escapeHTML(nickname)}: ${escapeHTML(msg.lastMessage)}`);
                                playSound('swap');
                            }
                        } catch (e) {
                            console.error("쪽지 알림 닉네임 로드 실패:", e);
                        }
                    }
                    snapshot.ref.remove(); // 알림 확인 후 즉시 제거
                });
            }
        }); // DOMContentLoaded End
    </script>
