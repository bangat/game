<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>틀린그림찾기</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    
    <script src="아바타.js"></script>
    <script src="레벨업.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --bg-color: #222; --text-color: #fff; --primary-color: #FF6B6B; --secondary-color: #4ECDC4;
            --font-main: 'GmarketSans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body { 
            margin: 0; background: var(--bg-color); color: var(--text-color); 
            overflow: hidden; display: flex; flex-direction: column; 
            height: 100%; width: 100%; position: absolute; font-family: var(--font-main); 
        }
        
        /* [수정] 헤더 모바일 최적화 (짤림 방지) */
        #header { 
            flex-shrink: 0; height: 50px; width: 100%; 
            background: rgba(0,0,0,0.9); border-bottom: 1px solid #444; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 10px; z-index: 20; gap: 8px;
        }
        
        #timer-box { 
            width: 45px; text-align: center; font-size: 1.2em; 
            font-weight: bold; color: #fab1a0; background: #333; 
            border-radius: 8px; padding: 4px 0; border: 1px solid #555;
            flex-shrink: 0; /* 크기 줄어듦 방지 */
        }
        #timer-box.danger { color: #ff4757; animation: pulse 0.5s infinite; }
        
        /* 점수판 (닉네임 영역) - 유동적 크기 */
        #score-board { 
            flex: 1; display: flex; justify-content: flex-start; align-items: center; 
            overflow: hidden; min-width: 0; /* 텍스트 말줄임 필수 설정 */
        }
        .score-pill {
            background: #333; padding: 4px 8px; border-radius: 15px;
            font-size: 0.8em; border: 1px solid #555; 
            display: flex; align-items: center; gap: 5px;
            max-width: 100%; /* 부모 넘침 방지 */
        }
        .score-pill span {
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
        }
        .score-pill.my-score { border-color: var(--primary-color); background: #442222; }
        .score-pill img { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
        
        /* 하트 영역 - 너무 길면 줄바꿈 대신 크기 축소 */
        #lives-container { 
            font-size: 1.0em; letter-spacing: 1px; 
            flex-shrink: 0; text-align: right; white-space: nowrap;
        }

        /* 게임 영역 */
        #game-container { 
            flex: 1; width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            padding: 10px; gap: 10px; 
            justify-content: center; align-items: center; background: #111; 
        }
        .canvas-wrapper { 
            position: relative; 
            border: 2px solid #555; 
            border-radius: 8px; 
            overflow: hidden;
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 100%; 
            flex: 1;
            min-height: 0;
        }

        canvas { 
            display: block; 
            margin: 0 auto; 
            /* width, height는 JS에서 제어 */
        }

        @media (min-aspect-ratio: 1/1) { #game-container { flex-direction: row; } }

        /* 오버레이 */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 100; display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            backdrop-filter: blur(5px); 
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: #fff; color: #333; 
            width: 85%; max-width: 380px; border-radius: 20px; 
            border: 4px solid #574141; overflow: hidden; 
        }
        .modal-header { 
            background: var(--primary-color); color: white; padding: 12px; 
            font-size: 1.2em; font-weight: bold; text-align: center; position: relative;
        }
        .modal-body { padding: 15px; text-align: center; position: relative; }
        .modal-footer { 
            padding: 12px; background: #FFFAE0; display: flex; gap: 8px; 
            border-top: 3px solid #F0EAD2; 
        }
        .menu-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; color: white; 
            font-family: var(--font-main); font-size: 1.0em; 
            border-bottom: 4px solid rgba(0,0,0,0.2); 
        }
        .menu-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-primary { background: var(--primary-color); }
        .btn-secondary { background: var(--secondary-color); }

        /* [수정] 마커 크기 축소 (50px -> 30px) 및 좌표 정확도 개선 */
        .mark { 
            position: absolute; 
            width: 30px; height: 30px; /* 크기 축소 */
            border: 3px solid #ff0000; /* 두께 조정 */
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 8px #ff0000, inset 0 0 5px #ff0000; 
            pointer-events: none; 
            animation: pop 0.2s; 
            z-index: 10; 
        }
        .wrong-mark { 
            position: absolute; 
            width: 30px; height: 30px; /* 크기 축소 */
            pointer-events: none; 
            transform: translate(-50%, -50%); 
            animation: fadeOut 0.5s forwards; 
            z-index: 50; 
        }
        .wrong-mark::before, .wrong-mark::after { content: ''; position: absolute; width: 100%; height: 3px; background: #ff4757; top: 50%; left: 0; border-radius: 2px; }
        .wrong-mark::before { transform: rotate(45deg); } .wrong-mark::after { transform: rotate(-45deg); }

        @keyframes pop { from { transform: translate(-50%, -50%) scale(0); } to { transform: translate(-50%, -50%) scale(1); } }
        @keyframes fadeOut { from { opacity: 1; transform: translate(-50%, -50%) scale(1); } to { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #rematch-status-list { text-align: left; background: #FFFAE0; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .rematch-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9em; }
        .rematch-row.me { color: var(--primary-color); }
        
        #countdown-text { font-size: 5em; font-weight: 900; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.8); }

        /* [신규] 결과창 채팅 스타일 */
        #rematch-chat-messages {
            height: 100px; overflow-y: scroll; background: #FFF; 
            border: 2px solid #F0EAD2; border-radius: 10px; padding: 10px; 
            margin-top: 10px; text-align: left; font-size: 0.85em; line-height: 1.4;
        }
        .chat-msg { margin-bottom: 4px; word-wrap: break-word; }
        .chat-msg strong { color: var(--primary-color); margin-right: 4px; }
        .chat-msg.my-message strong { color: var(--secondary-color); }
        
        /* 채팅 입력 모달 */
        #rematch-chat-input-modal { background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: flex-end; }
        #rematch-chat-input-modal .modal-content {
            width: 100%; max-width: 100%; border-radius: 15px 15px 0 0; 
            margin: 0; border: none; box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
            background: #fff; padding: 10px;
        }
        #rematch-tts-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.1); color: white; border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 0.8em;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="timer-box">60</div>
        <div id="score-board"></div>
        <div id="lives-container">❤️❤️❤️❤️❤️</div>
    </div>

    <div id="game-container">
        <div class="canvas-wrapper" id="wrap-l"><canvas id="cvs-l"></canvas></div>
        <div class="canvas-wrapper" id="wrap-r"><canvas id="cvs-r"></canvas></div>
    </div>

    <div id="loading-overlay" class="overlay active">
        <div class="spinner"></div>
        <div id="loading-text" style="font-size: 1.1em; color: white; font-weight: bold;">접속 중...</div>
    </div>

    <div id="info-overlay" class="overlay">
        <div id="countdown-text"></div>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="modal-content">
            <div class="modal-header">
                🏆 최종 결과 🏆
                <button id="rematch-tts-btn">🔊</button>
            </div>
            <div class="modal-body">
                <h2 id="winner-text" style="color: var(--primary-color); margin-bottom: 10px;">승리!</h2>
                <div id="rematch-status-list"></div>
                
                <div id="rematch-chat-messages"></div>
                <button id="rematch-chat-open-btn" class="menu-btn btn-secondary" style="position: absolute; right: 15px; bottom: 15px; width: 45px; height: 45px; border-radius: 50%; padding: 0; font-size: 1.3em; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 10;">💬</button>
            </div>
            <div class="modal-footer">
                <button id="rematch-btn" class="menu-btn btn-primary">다시하기</button>
                <button id="lobby-btn" class="menu-btn btn-secondary">대기실로</button>
            </div>
        </div>
    </div>

    <div id="rematch-chat-input-modal" class="overlay">
        <div class="modal-content">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="rematch-chat-input" placeholder="메시지 입력..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em;">
                <button id="rematch-chat-send-btn" class="menu-btn btn-primary" style="width: 60px; flex: none; padding: 0;">전송</button>
            </div>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 999; width: 80%; text-align: center;"></div>

    <audio id="snd-correct" src="./봄버맨사운드/버튼클릭.mp3"></audio>
    <audio id="snd-wrong" src="./캐치마인드효과음/캐치마인드오답.MP3"></audio>
    <audio id="snd-win" src="./봄버맨사운드/win.mp3"></audio>
    <audio id="snd-lose" src="./봄버맨사운드/패배사운드.mp3"></audio>
    <audio id="snd-start" src="https://raw.githubusercontent.com/bangat/game/main/sound/start.mp3"></audio>
    
<script>
    // --------------------------------------------------------
    // 1. 게임 설정
    // --------------------------------------------------------
    const TOTAL_IMAGE_COUNT = 12; // 1~12번 이미지
    const GAME_TIME = 60;
    const MAX_LIVES = 5;
    
    const firebaseConfig = {
        apiKey: "AIzaSyCmNAKmgF_L3o0QyOGh_oFAq_rMRtUyklw",
        authDomain: "goodluck-7c14b.firebaseapp.com",
        databaseURL: "https://goodluck-7c14b-default-rtdb.firebaseio.com",
        projectId: "goodluck-7c14b",
        storageBucket: "goodluck-7c14b.appspot.com",
        messagingSenderId: "858281658455",
        appId: "1:858281658455:web:9131280a459be983933b12"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let roomRef, playerRef, statusRef;
    let currentUser, myUid, myNick, myAvatar;
    let isHost = false;
    let currentRoomId = null;
    let currentRoomData = null;
    let roomValueListener = null;
    
    // 채팅 관련
    let chatListenerRef = null;
    let isExiting = false;
    const TTS_ENABLED_KEY = 'gameLobbyTTSOn';
    let isTTSOn = localStorage.getItem(TTS_ENABLED_KEY) !== 'false';
    const synthesis = window.speechSynthesis;

    // 게임 상태
    let lives = MAX_LIVES;
    let foundCount = 0;
    let timerInterval = null;
    let isProcessingClick = false;
    let isGameRunning = false;
    let loadedImageNum = -1;

    const cvsL = document.getElementById('cvs-l');
    const ctxL = cvsL.getContext('2d', { willReadFrequently: true });
    const cvsR = document.getElementById('cvs-r');
    const ctxR = cvsR.getContext('2d', { willReadFrequently: true });
    
    let imgL = new Image(); imgL.crossOrigin = "Anonymous";
    let imgR = new Image(); imgR.crossOrigin = "Anonymous";
    let imagesLoadedCount = 0;

    // --------------------------------------------------------
    // 2. 초기화 및 방 접속
    // --------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user; myUid = user.uid;
                myNick = localStorage.getItem('userNickname') || 'Guest';
                myAvatar = localStorage.getItem('userAvatar') || '😀';
                
                const params = new URLSearchParams(location.search);
                currentRoomId = params.get('roomId');
                
                if (currentRoomId) joinGameRoom(currentRoomId);
                else { alert("방 정보가 없습니다."); window.location.href = '대기실.html'; }
            } else { window.location.href = 'index.html'; }
        });

        // [수정] touchstart와 mousedown 분리하여 중복 터치 방지 및 좌표 정확도 향상
        cvsL.addEventListener('pointerdown', handleCanvasClick);
        cvsR.addEventListener('pointerdown', handleCanvasClick);
        
        document.getElementById('rematch-btn').addEventListener('click', toggleRematchReady);
        document.getElementById('lobby-btn').addEventListener('click', handleExitButton);
        // 변경 코드
let resizeTimeout;
window.addEventListener('resize', () => {
    // ✅ 디바운싱 적용 (성능 최적화)
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        resizeCanvas();
        
        // ✅ 마커 위치 재조정
        document.querySelectorAll('.mark, .wrong-mark').forEach(el => {
            // 마커가 너무 많으면 제거 (성능 고려)
            if (document.querySelectorAll('.mark').length > 10) {
                el.remove();
            }
        });
    }, 300);
});
        
        setupResultScreenUI();
    });

    function joinGameRoom(roomId) {
        roomRef = db.ref(`rooms/${roomId}`);
        playerRef = roomRef.child(`players/${myUid}`);
        statusRef = roomRef.child('status');

        playerRef.update({ nickname: myNick, avatar: myAvatar, score: 0, isReady: false });
        playerRef.onDisconnect().remove();

        roomRef.child('hostId').once('value', snap => {
            isHost = (snap.val() === myUid);
            if (isHost) {
                statusRef.onDisconnect().set('finished');
            }
        });

        if (roomValueListener) roomRef.off('value', roomValueListener);
        roomValueListener = roomRef.on('value', snapshot => {
            if (isExiting) return;
            
            if (!snapshot.exists()) {
                if (currentRoomData && currentRoomData.nextRoomId) {
                    window.location.replace(`틀린그림찾기.html?roomId=${currentRoomData.nextRoomId}`);
                } else {
                    alert("방이 종료되었습니다."); window.location.href = '대기실.html'; 
                }
                return;
            }
            
            currentRoomData = snapshot.val();
            
            // 새 방 이동 감지
            if (currentRoomData.nextRoomId) {
                window.location.replace(`틀린그림찾기.html?roomId=${currentRoomData.nextRoomId}`);
                return;
            }
            
            updateUnifiedState();
        });
        
        setupChatListener();
    }

    function updateUnifiedState() {
        if (!currentRoomData) return;

        updateScoreBoardUI(currentRoomData.players || {});

        // 호스트 승계
        // 변경 코드
const playerIds = Object.keys(currentRoomData.players || {}).sort();
if (playerIds.length > 0 && (!currentRoomData.hostId || !currentRoomData.players[currentRoomData.hostId])) {
    if (playerIds[0] === myUid) {
        const wasNotHost = !isHost;
        isHost = true;
        roomRef.update({ hostId: myUid });
        
        // ✅ 새로운 호스트가 되었을 때 타이머 인계
        if (wasNotHost && status === 'playing' && gData.timer > 0) {
            console.log("호스트 승계: 타이머 시작");
            runHostTimer();
        }
    }
}

        const status = currentRoomData.status;
        const gData = currentRoomData.gameData || {};

        if (status === 'waiting') {
            document.getElementById('game-over-overlay').classList.remove('active');
            document.getElementById('info-overlay').classList.remove('active');
            updateRematchUI();

            if (playerIds.length >= 2) {
                if (currentRoomData.starting && !isGameRunning) {
                    document.getElementById('loading-overlay').classList.remove('active');
                    startCountdown();
                } else if (!currentRoomData.starting && isHost) {
                     setTimeout(() => roomRef.update({ starting: true }), 1000);
                } else if (!currentRoomData.starting) {
                    document.getElementById('loading-text').innerText = "게임 시작 대기 중...";
                }
            } else {
                document.getElementById('loading-overlay').classList.add('active');
                document.getElementById('loading-text').innerText = "플레이어 대기 중...";
                isGameRunning = false;
                if (isHost) roomRef.update({ starting: false });
            }
        } 
        // 변경 코드
else if (status === 'playing') {
    document.getElementById('loading-overlay').classList.remove('active');
    document.getElementById('game-over-overlay').classList.remove('active');
    
    const serverImgNum = gData.imageNum || 1;
    
            if (loadedImageNum !== serverImgNum) {
            foundCount = 0;
            lives = MAX_LIVES;
            updateLivesUI();
        }
        
    if (loadedImageNum !== serverImgNum || imagesLoadedCount < 2) {
        loadGameImage(serverImgNum);
    }

    if (gData.timer !== undefined) {
        const tBox = document.getElementById('timer-box');
        tBox.innerText = gData.timer;
        if (gData.timer <= 10) tBox.classList.add('danger');
        else tBox.classList.remove('danger');
    }

    // 변경 코드
// ✅ playing 상태일 때만 타이머 시작
if (status === 'playing' && isHost && !timerInterval) {
    if (gData.timer > 0 && imagesLoadedCount === 2) {
        runHostTimer();
    } else if (gData.timer === 0) {
        handleRoundEnd();
    }
}
}
        else if (status === 'finished') {
            showGameOver();
        }
    }

    // --------------------------------------------------------
    // 3. 게임 로직
    // --------------------------------------------------------
    
    function startCountdown() {
        if (isGameRunning) return;
        isGameRunning = true;
        
        const info = document.getElementById('info-overlay');
        const text = document.getElementById('countdown-text');
        info.classList.add('active');
        
        let count = 3;
        playSound('snd-start');
        text.innerText = count;

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                text.innerText = count;
                playSound('snd-start');
            } else {
                clearInterval(interval);
                text.innerText = "GO!";
                playSound('snd-start');
                
                if (isHost) {
                    // [중요] 호스트만 초기화 실행
                    setTimeout(initializeRound, 500);
                }
                setTimeout(() => info.classList.remove('active'), 1000);
            }
        }, 1000);
    }

   // 변경 코드
function initializeRound() {
    const allImages = [];
    for(let i=1; i<=TOTAL_IMAGE_COUNT; i++) allImages.push(i);
    
    // ✅ 피셔-예이츠 셔플 (완전 랜덤)
    for (let i = allImages.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allImages[i], allImages[j]] = [allImages[j], allImages[i]];
    }
    
    // ✅ 셔플된 배열에서 앞 5개 선택 (이제 랜덤)
    const roundImages = allImages.slice(0, 5);
    console.log("🎲 랜덤 라운드 순서:", roundImages);
    
    const updates = {};
    const players = currentRoomData.players;
    
    Object.keys(players).forEach(uid => {
        updates[`players/${uid}/roundWins`] = 0; 
    });
    
    updates['gameData'] = { 
        imageNum: roundImages[0],   // ✅ 랜덤 첫 이미지
        roundOrder: roundImages,    
        currentRoundIdx: 0,
        timer: GAME_TIME            
    };
    updates['status'] = 'playing';
    updates['starting'] = null; 

    roomRef.update(updates);
}

    // 변경 코드
function loadGameImage(num) {
    // ✅ 이미 로딩 중이면 무시
    if (loadedImageNum === num && imagesLoadedCount > 0) {
        console.log("이미지 로딩 중 또는 이미 로드됨");
        return;
    }
    
    loadedImageNum = num;
    imagesLoadedCount = 0;
    
    document.getElementById('loading-overlay').classList.add('active');
    document.getElementById('loading-text').innerText = "이미지 불러오는 중...";

    // ✅ 이전 이미지 로드 이벤트 제거
    imgL.onload = null;
    imgR.onload = null;
    imgL.onerror = null;
    imgR.onerror = null;
    
    const folderName = "틀린그림찾기이미지"; 
    
    imgL = new Image();
    imgR = new Image();

    const pathOrig = `./${encodeURIComponent(folderName)}/${num}.png`;
    const pathDiff = `./${encodeURIComponent(folderName)}/${num}-1.png`;

    document.querySelectorAll('.mark, .wrong-mark').forEach(el => el.remove());

    imgL.onload = onImageLoaded;
    imgR.onload = onImageLoaded;
    
    imgL.onerror = () => { 
        alert(`이미지 오류: ${num}.png`); 
        imagesLoadedCount = 2; // ✅ 오류 시에도 진행
        document.getElementById('loading-overlay').classList.remove('active');
    };
    imgR.onerror = () => { 
        alert(`이미지 오류: ${num}-1.png`); 
        imagesLoadedCount = 2;
        document.getElementById('loading-overlay').classList.remove('active');
    };

    imgL.src = pathOrig;
    imgR.src = pathDiff;

    hasReportedWin = false;  // ✅ 플래그 리셋
    lives = MAX_LIVES;
    foundCount = 0;
    updateLivesUI();
}

    function onImageLoaded() {
        imagesLoadedCount++;
        if (imagesLoadedCount === 2) {
            resizeCanvas();
            document.getElementById('loading-overlay').classList.remove('active');
        }
    }

    function resizeCanvas() {
        if (!imgL.width) return;
        
        const wrapL = document.getElementById('wrap-l');
        
        const wrapWidth = wrapL.clientWidth;
        const wrapHeight = wrapL.clientHeight;
        
        const imgAspect = imgL.width / imgL.height;
        const wrapAspect = wrapWidth / wrapHeight;
        
        let drawWidth, drawHeight;
        
        if (imgAspect > wrapAspect) {
            drawWidth = wrapWidth;
            drawHeight = wrapWidth / imgAspect;
        } else {
            drawHeight = wrapHeight;
            drawWidth = wrapHeight * imgAspect;
        }
        
        cvsL.width = drawWidth;
        cvsL.height = drawHeight;
        cvsR.width = drawWidth;
        cvsR.height = drawHeight;
        
        ctxL.drawImage(imgL, 0, 0, drawWidth, drawHeight);
        ctxR.drawImage(imgR, 0, 0, drawWidth, drawHeight);
    }

    // 변경 코드
function runHostTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (currentRoomData.status !== 'playing') {
            clearInterval(timerInterval); 
            timerInterval = null; 
            return;
        }
        
        roomRef.child('gameData/timer').transaction(timer => {
            if (timer > 0) {
                return timer - 1;
            } else {
                return 0; // ✅ 0에서 멈춤
            }
        }, (err, committed, snap) => {
            if (committed && snap.val() === 0) {
                // ✅ 타이머 종료 시 라운드 종료 처리
                clearInterval(timerInterval);
                timerInterval = null;
                handleRoundEnd();
            }
        });
    }, 1000);
}
    
    // [신규] 다음 라운드 데이터 계산 헬퍼
    function moveToNextRoundData(gData) {
        const nextIdx = (gData.currentRoundIdx || 0) + 1;
        if (gData.roundOrder && nextIdx < gData.roundOrder.length) {
            gData.currentRoundIdx = nextIdx;
            gData.imageNum = gData.roundOrder[nextIdx];
            gData.timer = GAME_TIME;
        } else {
            gData.timer = -1; // 게임 종료
        }
        return gData;
    }

// 변경 코드
function handleCanvasClick(e) {
    // ✅ 이미지 로딩 상태 체크 추가
    if (currentRoomData.status !== 'playing' || 
        lives <= 0 || 
        isProcessingClick || 
        imagesLoadedCount < 2 ||  // 이미지 로딩 중
        !imgL.width || !imgR.width) {  // 이미지 데이터 없음
        return;
    }
    e.preventDefault();
        
        // [수정] 좌표 정확도 향상 (e.target 사용, pointer event)
        const targetCanvas = e.target; // 클릭한 캔버스 요소
        const rect = targetCanvas.getBoundingClientRect();
        
        // 캔버스 실제 크기 대 화면 크기 비율
        const scaleX = targetCanvas.width / rect.width;
        const scaleY = targetCanvas.height / rect.height;
        
        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
        
        // [수정] 정확한 클릭 좌표 계산
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        if (x < 0 || x >= targetCanvas.width || y < 0 || y >= targetCanvas.height) return;

        isProcessingClick = true;
        
       // 변경 코드
try {
    // ✅ 캔버스 크기에 비례하는 반경 사용
    const canvasSize = Math.min(cvsL.width, cvsL.height);
    const r = Math.max(15, Math.floor(canvasSize * 0.03)); // 최소 15px, 최대 캔버스의 3%
    
    const sx = Math.max(0, Math.floor(x - r)); 
    const sy = Math.max(0, Math.floor(y - r));
    const sw = Math.min(cvsL.width - sx, r * 2); 
    const sh = Math.min(cvsL.height - sy, r * 2);
    
    // ✅ 범위 검증
    if (sw <= 0 || sh <= 0) {
        handleWrong(x, y, targetCanvas);
        return;
    }
    
    const dataL = ctxL.getImageData(sx, sy, sw, sh).data;
    const dataR = ctxR.getImageData(sx, sy, sw, sh).data;
    
    let diffPixels = 0;
    const totalPixels = (sw * sh);
    
    for (let i = 0; i < dataL.length; i += 4) {
        const diff = Math.abs(dataL[i] - dataR[i]) + 
                     Math.abs(dataL[i+1] - dataR[i+1]) + 
                     Math.abs(dataL[i+2] - dataR[i+2]);
        if (diff > 50) diffPixels++;
    }

    // ✅ 비율 기반 판정 (최소 5% 차이 필요)
    const diffRatio = diffPixels / totalPixels;
    if (diffRatio > 0.05) {
        handleCorrect(x, y);
    } else {
        handleWrong(x, y, targetCanvas);
    }

} catch (err) {
    console.error("픽셀 비교 오류:", err);
    handleWrong(x, y, targetCanvas); // ✅ 오류 시 오답 처리
}
        
        setTimeout(() => isProcessingClick = false, 300);
    }

   let hasReportedWin = false;  // ✅ 전역 변수 추가 (상단에)

function handleCorrect(x, y) {
    createMark(x, y, 'wrap-l'); createMark(x, y, 'wrap-r');
    playSound('snd-correct');
    foundCount++;

    if (foundCount >= 5 && !hasReportedWin) {  // ✅ 중복 방지
        hasReportedWin = true;
        foundCount = 999; // 클릭 차단
        
        showToast("라운드 승리! 다음 라운드로 이동합니다.");
        
        playerRef.child('roundWins').transaction(w => (w || 0) + 1);
        
        if (isHost) {
            setTimeout(() => {
                handleRoundEnd();
            }, 500);
        }
    }
}

// ✅ 새로운 함수 추가: 라운드 종료 처리
function handleRoundEnd() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    
    roomRef.child('gameData').transaction(gData => {
        if (!gData) return gData;
        
        const nextIdx = (gData.currentRoundIdx || 0) + 1;
        
        if (gData.roundOrder && nextIdx < gData.roundOrder.length) {
            // 다음 라운드로
            gData.currentRoundIdx = nextIdx;
            gData.imageNum = gData.roundOrder[nextIdx];
            gData.timer = GAME_TIME;
            
            // ✅ 모든 플레이어의 상태 초기화 신호
            return gData;
        } else {
            // 게임 종료
            gData.timer = -1;
            return gData;
        }
    }, (err, committed, snap) => {
        if (err) {
            console.error("라운드 종료 트랜잭션 실패:", err);
            return;
        }
        
        if (committed && snap.val()) {
            const newData = snap.val();
            
            if (newData.timer === -1) {
                // 게임 종료
                roomRef.update({ status: 'finished' });
            } else {
                // 다음 라운드 시작 - 클라이언트 상태 초기화
                foundCount = 0;
                lives = MAX_LIVES;
                updateLivesUI();
                document.querySelectorAll('.mark, .wrong-mark').forEach(el => el.remove());
            }
        }
    });
}

    // 변경 코드
function handleWrong(x, y, targetCanvas) {
    createWrongMark(x, y, targetCanvas.parentNode);
    playSound('snd-wrong');
    lives--;
    updateLivesUI();
    
    // ✅ 하트 소진 시 라운드 패배 처리
    if (lives <= 0) {
        showToast("하트 소진! 라운드 패배");
        
        // 클릭 차단
        foundCount = 999; // 더 이상 클릭 못하게
        
        // 호스트만 다음 라운드 진행 (3초 후)
        if (isHost) {
            setTimeout(() => {
                handleRoundEnd();
            }, 3000);
        }
    }
}

    // --------------------------------------------------------
    // 4. UI & 유틸리티
    // --------------------------------------------------------
    function updateScoreBoardUI(players) {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        const sorted = Object.keys(players).sort((a,b) => players[b].score - players[a].score);
        sorted.forEach(uid => {
            const p = players[uid];
            const div = document.createElement('div');
            div.className = `score-pill ${uid === myUid ? 'my-score' : ''}`;
            
            // [수정] 아바타 처리 로직 (경로 인식 강화)
            let avatarHtml = '';
            
            // 1. 아바타 세트(AVATAR_SETS)에 정의된 키값인 경우
            if (typeof AVATAR_SETS !== 'undefined' && AVATAR_SETS[p.avatar]) {
                avatarHtml = `<img src="${AVATAR_SETS[p.avatar].front}">`;
            } 
            // 2. 이미지 경로(http, .png, /, ./ 등)인 경우 -> 확실하게 img 태그로 변환
            else if (p.avatar && (
                p.avatar.startsWith('http') || 
                p.avatar.includes('/') ||  // 슬래시(/)가 있으면 경로로 인식
                p.avatar.includes('.') || 
                p.avatar.startsWith('data:')
            )) {
                // 에러 발생 시(이미지 못 찾을 때) 숨김 처리하는 코드 추가
                avatarHtml = `<img src="${p.avatar}" onerror="this.style.display='none'">`;
            } 
            // 3. 그 외엔 텍스트(이모지 등)로 표시
            else {
                avatarHtml = `<span style="font-size:1.2em;">${p.avatar || '😀'}</span>`;
            }
            
            div.innerHTML = `${avatarHtml} <span>${p.nickname}: ${p.roundWins || 0}승</span>`;
            board.appendChild(div);
        });
    }

    function updateLivesUI() {
        const container = document.getElementById('lives-container');
        // [수정] 좁은 화면 대응: 하트가 5개면 텍스트가 짤리므로 숫자 표기 고려
        if (window.innerWidth < 360) {
            container.innerText = `❤️x${lives}`;
        } else {
            let str = ''; for(let i=0; i<lives; i++) str += '❤️';
            container.innerText = str;
        }
    }

    // 변경 코드
function createMark(x, y, wrapId) {
    const wrap = document.getElementById(wrapId);
    const cvs = wrap.querySelector('canvas');
    if(!cvs) return;
    
    const rect = cvs.getBoundingClientRect(); 
    
    // ✅ 해당 캔버스의 실제 크기 사용
    const cssX = (x / cvs.width) * rect.width;
    const cssY = (y / cvs.height) * rect.height;

    const el = document.createElement('div');
    el.className = 'mark'; 
    el.style.left = cssX + 'px'; 
    el.style.top = cssY + 'px';
    wrap.appendChild(el);
}

    // 변경 코드
function createWrongMark(x, y, wrap) {
    const cvs = wrap.querySelector('canvas');
    const rect = cvs.getBoundingClientRect();
    
    // ✅ 해당 캔버스의 실제 크기 사용
    const cssX = (x / cvs.width) * rect.width;
    const cssY = (y / cvs.height) * rect.height;

    const el = document.createElement('div');
    el.className = 'wrong-mark'; 
    el.style.left = cssX + 'px'; 
    el.style.top = cssY + 'px';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 500);
}

    function showToast(msg) {
        const t = document.createElement('div');
        t.style.background = 'rgba(0,0,0,0.8)'; t.style.color = 'white';
        t.style.padding = '8px 16px'; t.style.borderRadius = '20px';
        t.innerText = msg; t.style.marginTop = '5px'; t.style.display='inline-block';
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function playSound(id) {
        const audio = document.getElementById(id);
        if (audio) { audio.currentTime = 0; audio.play().catch(()=>{}); }
    }

    // --------------------------------------------------------
    // 5. 종료 및 채팅
    // --------------------------------------------------------
    function showGameOver() {
        if (document.getElementById('game-over-overlay').classList.contains('active')) return;
        isGameRunning = false;
        document.getElementById('snd-bgm').pause();
        document.getElementById('game-over-overlay').classList.add('active');
        
        const players = currentRoomData.players;
        const sorted = Object.entries(players).sort(([,a], [,b]) => (b.roundWins || 0) - (a.roundWins || 0));
        const myRank = sorted.findIndex(([uid]) => uid === myUid) + 1;
        const winnerText = document.getElementById('winner-text');
        
        if (myRank === 1) {
            winnerText.innerText = "🏆 승리! 축하합니다!";
            winnerText.style.color = "var(--primary-color)";
            playSound('snd-win');
            applyExpAndPoints(db, myUid, 100, 50);
        } else {
            winnerText.innerText = `${myRank}위... 수고하셨습니다!`;
            winnerText.style.color = "#555";
            playSound('snd-lose');
            applyExpAndPoints(db, myUid, 30, 10);
        }
        updateRematchUI();
        setupResultScreenUI(); 
    }

    function updateRematchUI() {
        const list = document.getElementById('rematch-status-list');
        list.innerHTML = '';
        const players = currentRoomData.players || {};
        const requests = currentRoomData.rematchRequests || {};
        const sorted = Object.entries(players).sort(([,a], [,b]) => (b.roundWins || 0) - (a.roundWins || 0));

        sorted.forEach(([uid, p], idx) => {
            const isReady = !!requests[uid];
            const div = document.createElement('div');
            div.className = `rematch-row ${uid === myUid ? 'me' : ''}`;
            div.innerHTML = `<div>${idx+1}위. ${p.nickname} (${p.roundWins || 0}승)</div><div style="color:${isReady?'#28a745':'#ccc'}">${isReady ? '준비됨' : '대기'}</div>`;
            list.appendChild(div);
        });

        const btn = document.getElementById('rematch-btn');
        if (requests[myUid]) {
            btn.innerText = "취소"; btn.classList.remove('btn-primary'); btn.classList.add('btn-secondary');
        } else {
            btn.innerText = "다시 하기"; btn.classList.add('btn-primary'); btn.classList.remove('btn-secondary');
        }

        if (isHost && Object.keys(players).length >= 2) {
            const allReady = Object.keys(players).every(uid => requests[uid]);
            if (allReady && !currentRoomData.starting) {
                setTimeout(() => { roomRef.update({ starting: true }); }, 1000);
            }
        }
    }

    function toggleRematchReady() {
        const isReady = currentRoomData.rematchRequests && currentRoomData.rematchRequests[myUid];
        if (isReady) roomRef.child(`rematchRequests/${myUid}`).remove();
        else roomRef.child(`rematchRequests/${myUid}`).set(true);
    }

    // 변경 코드
async function handleExitButton() {
    isExiting = true;
    
    // ✅ 모든 리스너 정리
    cleanupListeners();
    
    if (isHost) {
        const newRoomRef = db.ref('rooms').push();
        const newRoomId = newRoomRef.key;
        const newRoomData = {
            roomName: `${myNick}의 방`, 
            hostId: myUid, 
            gameType: 'diffSpot', 
            status: 'waiting',
            players: { 
                [myUid]: { 
                    nickname: myNick, 
                    avatar: myAvatar, 
                    isHost: true 
                } 
            }
        };
        try {
            await newRoomRef.set(newRoomData);
            await roomRef.update({ nextRoomId: newRoomId, status: 'finished' });
            await roomRef.remove(); 
            window.location.replace(`틀린그림찾기.html?roomId=${newRoomId}`);
        } catch(e) { 
            location.href = '대기실.html'; 
        }
    } else {
        if(roomRef) await roomRef.child(`players/${myUid}`).remove();
        location.href = '대기실.html';
    }
}

// ✅ 새로운 함수: 리스너 정리
function cleanupListeners() {
    if (roomValueListener && roomRef) {
        roomRef.off('value', roomValueListener);
        roomValueListener = null;
    }
    
    if (chatListenerRef) {
        chatListenerRef.off();
        chatListenerRef = null;
    }
    
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

    // 채팅 관련 함수들
    function setupChatListener() {
        if (chatListenerRef) chatListenerRef.off();
        chatListenerRef = roomRef.child('chat');
        chatListenerRef.on('child_added', snap => {
            const val = snap.val();
            if (!val) return;
            renderChatMessage(val);
            if (isTTSOn && val.sender !== myNick && synthesis) {
                const ut = new SpeechSynthesisUtterance(val.msg);
                ut.lang = 'ko-KR'; synthesis.speak(ut);
            }
        });
    }

    function renderChatMessage(data) {
        const container = document.getElementById('rematch-chat-messages');
        if (!container) return;
        const div = document.createElement('div');
        div.className = `chat-msg ${data.sender === myNick ? 'my-message' : ''}`;
        div.innerHTML = `<strong>${data.sender}:</strong> ${data.msg}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function setupResultScreenUI() {
        const openBtn = document.getElementById('rematch-chat-open-btn');
        if(openBtn) {
             openBtn.onclick = () => {
                document.getElementById('rematch-chat-input-modal').classList.add('active');
                document.getElementById('rematch-chat-input').focus();
            };
        }
        
        const modal = document.getElementById('rematch-chat-input-modal');
        if(modal) {
            modal.onclick = (e) => {
                if(e.target === modal) modal.classList.remove('active');
            };
        }

        const sendBtn = document.getElementById('rematch-chat-send-btn');
        if(sendBtn) sendBtn.onclick = sendChatMessageModal;
        
        const ttsBtn = document.getElementById('rematch-tts-btn');
        if(ttsBtn) {
            ttsBtn.innerText = isTTSOn ? '🔊' : '🔇';
            ttsBtn.onclick = () => {
                isTTSOn = !isTTSOn;
                localStorage.setItem(TTS_ENABLED_KEY, isTTSOn);
                ttsBtn.innerText = isTTSOn ? '🔊' : '🔇';
                if(!isTTSOn) synthesis.cancel();
            };
        }
    }

    function sendChatMessageModal() {
        const input = document.getElementById('rematch-chat-input');
        const msg = input.value.trim();
        if (msg) {
            roomRef.child('chat').push({ sender: myNick, msg: msg });
            input.value = '';
            document.getElementById('rematch-chat-input-modal').classList.remove('active');
        }
    }
</script>
