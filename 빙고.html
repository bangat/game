<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>빙고</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    <style>
        :root {
            --bg: #fff7e6;
            --panel: #ffffff;
            --ink: #3f3430;
            --muted: #7b6962;
            --line: #efd8b7;
            --primary: #f25f5c;
            --primary-dark: #b84340;
            --mint: #37b8a9;
            --mint-dark: #23877c;
            --yellow: #ffd166;
            --yellow-dark: #d4a73f;
            --blue: #2f80ed;
            --shadow: #e4caa1;
            --danger: #df4759;
            --ok: #27ae60;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--font-main);
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        button {
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        #app {
            width: 100%;
            max-width: 520px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at top left, rgba(255, 209, 102, 0.38), transparent 34%),
                linear-gradient(180deg, #fffaf0 0%, #fff1d0 100%);
            position: relative;
            overflow: hidden;
        }

        .topbar {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 46px 1fr 78px;
            align-items: center;
            gap: 8px;
            padding: calc(8px + env(safe-area-inset-top)) 12px 8px;
            background: rgba(255, 250, 224, 0.94);
            border-bottom: 3px solid var(--line);
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border: 3px solid var(--ink);
            border-radius: 12px;
            background: var(--panel);
            color: var(--ink);
            font-size: 1.6rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0 var(--shadow);
        }

        .icon-btn:active,
        .action-btn:active,
        .cell-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--shadow);
        }

        .title-box {
            min-width: 0;
            text-align: center;
        }

        .title-box h1 {
            font-size: 1.25rem;
            line-height: 1.1;
        }

        .title-box p {
            margin-top: 3px;
            font-size: 0.74rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .line-badge {
            min-height: 42px;
            border: 3px solid var(--ink);
            border-radius: 12px;
            background: var(--yellow);
            box-shadow: 3px 3px 0 var(--yellow-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .line-badge strong {
            font-size: 1.1rem;
            line-height: 1;
        }

        .line-badge span {
            font-size: 0.68rem;
        }

        .turn-banner {
            flex-shrink: 0;
            margin: 8px 12px 0;
            min-height: 48px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border: 3px solid var(--ink);
            border-radius: 14px;
            background: var(--panel);
            box-shadow: 4px 4px 0 var(--shadow);
        }

        #turn-text {
            font-size: 0.95rem;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #last-call {
            min-width: 58px;
            height: 34px;
            border-radius: 10px;
            border: 2px solid var(--line);
            background: #fff6df;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 900;
            color: var(--primary);
        }

        .players-strip {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            padding: 8px 12px 0;
        }

        .player-chip {
            min-width: 0;
            border: 2px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            padding: 6px 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 2px 2px 0 rgba(228, 202, 161, 0.75);
        }

        .player-chip.active {
            border-color: var(--primary);
            background: #fff0ec;
        }

        .player-chip.me {
            border-color: var(--mint);
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 9px;
            border: 2px solid var(--ink);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .chip-text {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .chip-name {
            font-size: 0.68rem;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chip-lines {
            font-size: 0.66rem;
            color: var(--muted);
            font-weight: 900;
        }

        .board-wrap {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 8px 12px;
            gap: 8px;
        }

        .center-notice {
            flex-shrink: 0;
            min-height: 40px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border: 3px solid var(--ink);
            border-radius: 14px;
            background: #ffffff;
            color: var(--primary-dark);
            box-shadow: 4px 4px 0 var(--shadow);
            font-size: 1rem;
            font-weight: 900;
            text-align: center;
        }

        .my-board {
            width: 100%;
            max-width: min(94vw, 420px);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: grid;
            position: relative;
            gap: 6px;
            padding: 8px;
            border: 4px solid var(--ink);
            border-radius: 18px;
            background: #fffaf0;
            box-shadow: 6px 6px 0 var(--shadow);
        }

        .my-board.size-3 { gap: 8px; }
        .my-board.size-4 { gap: 7px; }
        .my-board.size-5 { gap: 5px; }
        .my-board.size-6 { gap: 4px; }

        .my-board.my-turn-board {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(242, 95, 92, 0.22), 6px 6px 0 var(--shadow);
            animation: board-turn-pulse 0.9s ease-in-out infinite alternate;
        }

        @keyframes board-turn-pulse {
            from { filter: brightness(1); }
            to { filter: brightness(1.08); }
        }

        .cell-btn {
            border: 3px solid var(--ink);
            border-radius: 12px;
            background: var(--panel);
            color: var(--ink);
            box-shadow: 3px 3px 0 var(--shadow);
            font-size: clamp(1rem, 7.6vw, 1.7rem);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            text-align: center;
            line-height: 1.12;
            word-break: keep-all;
            transition: transform 0.08s, box-shadow 0.08s, background 0.12s;
        }

        .my-board.size-3 .cell-btn { font-size: clamp(1rem, 7vw, 1.45rem); }
        .my-board.size-4 .cell-btn { font-size: clamp(0.82rem, 5vw, 1.1rem); }
        .my-board.size-5 .cell-btn { font-size: clamp(0.68rem, 3.8vw, 0.92rem); }
        .my-board.size-6 .cell-btn { font-size: clamp(0.52rem, 2.8vw, 0.72rem); }

        .cell-label {
            display: block;
            padding: 0 2px;
        }

        .cell-btn.called {
            color: #ffffff;
            background: linear-gradient(160deg, var(--mint), var(--blue));
            border-color: #1f655f;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.24);
        }

        .cell-btn.win-line {
            background: linear-gradient(160deg, var(--primary), #ff9f1c);
            border-color: var(--primary-dark);
        }

        .cell-btn.disabled {
            pointer-events: none;
            opacity: 0.72;
        }

        .cell-btn .call-mark {
            position: absolute;
            inset: 0;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 11vw, 4.6rem);
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 2px 0 rgba(0, 0, 0, 0.28);
            line-height: 1;
            pointer-events: none;
        }

        .bingo-line {
            position: absolute;
            z-index: 5;
            height: 7px;
            width: 86%;
            left: 7%;
            top: 50%;
            border-radius: 999px;
            background: #ff2f54;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.18), 0 0 0 2px rgba(255, 255, 255, 0.72);
            pointer-events: none;
            transform-origin: center;
        }

        .opponent-section {
            flex-shrink: 0;
            border: 3px solid var(--ink);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.86);
            padding: 8px;
            box-shadow: 4px 4px 0 var(--shadow);
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 7px;
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 900;
        }

        .section-title span:last-child {
            color: var(--muted);
            font-size: 0.72rem;
        }

        .mini-viewers {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 7px;
        }

        .mini-card {
            min-width: 0;
            border: 2px solid var(--line);
            border-radius: 12px;
            background: #fffaf4;
            padding: 6px;
        }

        .mini-head {
            display: grid;
            grid-template-columns: 22px minmax(0, 1fr);
            align-items: center;
            gap: 4px;
            margin-bottom: 5px;
        }

        .mini-head .avatar {
            width: 22px;
            height: 22px;
            border-width: 1px;
            border-radius: 7px;
            font-size: 0.78rem;
        }

        .mini-name {
            min-width: 0;
            font-size: 0.63rem;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-board {
            display: grid;
            gap: 2px;
            aspect-ratio: 1 / 1;
        }

        .mini-cell {
            border-radius: 3px;
            background: #eadcc4;
        }

        .mini-cell.called {
            background: var(--mint);
        }

        .mini-cell.win-line {
            background: var(--primary);
        }

        .mini-lines {
            margin-top: 5px;
            border-radius: 8px;
            background: #fff0d1;
            color: var(--primary-dark);
            text-align: center;
            font-size: 0.72rem;
            font-weight: 900;
            padding: 3px 2px;
        }

        .called-panel {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 0 12px 10px;
        }

        #called-list {
            min-width: 0;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .called-pill {
            flex: 0 0 auto;
            min-width: 38px;
            height: 30px;
            padding: 0 8px;
            border-radius: 9px;
            background: var(--ink);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            font-weight: 900;
        }

        .setup-group {
            text-align: left;
            margin-top: 12px;
        }

        .setup-label {
            display: block;
            margin-bottom: 7px;
            color: var(--ink);
            font-size: 0.86rem;
            font-weight: 900;
        }

        .setup-choice-row {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 7px;
        }

        .topic-choice-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 7px;
        }

        .choice-btn {
            min-height: 42px;
            border: 3px solid var(--line);
            border-radius: 12px;
            background: #fffaf0;
            color: var(--ink);
            font-size: 0.88rem;
            font-weight: 900;
            box-shadow: 2px 2px 0 var(--shadow);
        }

        .choice-btn.active {
            border-color: var(--primary);
            background: #fff0ec;
            color: var(--primary-dark);
        }

        .selection-modal {
            max-height: min(92vh, 760px);
            display: flex;
            flex-direction: column;
        }

        .selection-modal .modal-body {
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .selected-preview {
            display: grid;
            flex: 0 0 auto;
            width: min(100%, 236px);
            aspect-ratio: 1 / 1;
            gap: 5px;
            margin: 10px auto 12px;
            padding: 8px;
            border: 4px solid var(--ink);
            border-radius: 16px;
            background: #fffaf0;
            box-shadow: 5px 5px 0 var(--shadow);
        }

        .selected-slot {
            min-width: 0;
            min-height: 0;
            border: 2px dashed #d8bd92;
            border-radius: 9px;
            background: #f6ead7;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 900;
            text-align: center;
            line-height: 1.12;
            padding: 2px;
            word-break: keep-all;
            transition: transform 0.16s ease, background-color 0.16s ease, border-color 0.16s ease;
        }

        .selected-slot.filled {
            background: #fff0ec;
            border-style: solid;
            border-color: var(--primary);
            color: var(--primary-dark);
        }

        .selected-slot.just-filled {
            animation: slot-pop 0.28s ease-out;
        }

        .selected-preview.size-3 .selected-slot { font-size: clamp(0.88rem, 4.8vw, 1.18rem); }
        .selected-preview.size-4 .selected-slot { font-size: clamp(0.74rem, 3.8vw, 0.98rem); }
        .selected-preview.size-5 .selected-slot { font-size: clamp(0.58rem, 3vw, 0.76rem); }
        .selected-preview.size-6 {
            width: min(100%, 210px);
            gap: 3px;
            padding: 6px;
        }
        .selected-preview.size-6 .selected-slot { font-size: clamp(0.48rem, 2.4vw, 0.62rem); }

        @keyframes slot-pop {
            0% { transform: scale(0.78); }
            70% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .word-choice-list {
            min-height: 0;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 7px;
            padding-right: 2px;
        }

        .word-btn {
            min-height: 38px;
            border: 2px solid var(--line);
            border-radius: 10px;
            background: #fffaf4;
            color: var(--ink);
            font-size: 0.76rem;
            font-weight: 900;
            line-height: 1.1;
            padding: 4px 2px;
        }

        .word-btn.active {
            border-color: var(--mint);
            background: #e8fbf8;
            color: #17675f;
        }

        .word-btn:disabled {
            opacity: 0.45;
        }

        .flying-word {
            position: fixed;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--mint);
            border-radius: 10px;
            background: #e8fbf8;
            color: #17675f;
            font-size: 0.76rem;
            font-weight: 900;
            pointer-events: none;
            box-shadow: 3px 3px 0 rgba(55, 184, 169, 0.25);
            transform-origin: center;
        }

        .action-btn {
            min-width: 74px;
            height: 38px;
            border: 0;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            border-bottom: 4px solid var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 900;
            box-shadow: 2px 2px 0 var(--shadow);
        }

        .action-btn.secondary {
            background: var(--mint);
            border-bottom-color: var(--mint-dark);
        }

        .action-btn:disabled {
            background: #b9b3aa;
            border-bottom-color: #8f877d;
            color: #fff;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(30, 24, 20, 0.58);
        }

        .overlay.active {
            display: flex;
        }

        .turn-flash {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 80;
            display: none;
            min-width: min(82vw, 340px);
            transform: translate(-50%, -50%);
            padding: 18px 20px;
            border: 4px solid var(--ink);
            border-radius: 18px;
            background: var(--yellow);
            color: var(--primary-dark);
            text-align: center;
            font-size: 1.35rem;
            font-weight: 900;
            box-shadow: 7px 7px 0 rgba(63, 52, 48, 0.26);
            pointer-events: none;
        }

        .turn-flash.active {
            display: block;
            animation: turn-flash-pop 1.05s ease-out forwards;
        }

        @keyframes turn-flash-pop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
            18% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
            72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
        }

        .modal {
            width: min(92vw, 420px);
            border: 4px solid var(--ink);
            border-radius: 18px;
            background: var(--panel);
            box-shadow: 8px 8px 0 rgba(63, 52, 48, 0.28);
            overflow: hidden;
        }

        .result-modal {
            max-height: min(92vh, 760px);
            overflow-y: auto;
        }

        .modal-head {
            padding: 16px 14px;
            text-align: center;
            background: #fff2c9;
            border-bottom: 3px solid var(--line);
        }

        .modal-head h2 {
            font-size: 1.4rem;
        }

        .modal-body {
            padding: 16px;
            text-align: center;
        }

        .modal-body p {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .rematch-status {
            margin-top: 12px;
            padding: 10px;
            border: 2px solid var(--line);
            border-radius: 12px;
            background: #fffaf4;
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 900;
        }

        .rematch-ready-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            margin-top: 8px;
            text-align: left;
        }

        .rematch-ready-item {
            min-width: 0;
            padding: 7px 8px;
            border-radius: 10px;
            background: #f6ead7;
            color: var(--muted);
            font-size: 0.72rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rematch-ready-item.ready {
            background: #e8fbf8;
            color: #17675f;
        }

        .result-setup-panel {
            margin-top: 12px;
            padding: 10px;
            border: 2px solid var(--line);
            border-radius: 12px;
            background: #fffaf4;
            text-align: left;
        }

        .result-setup-title {
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 900;
            text-align: center;
        }

        .result-setup-sub {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.35;
        }

        .result-setup-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin-top: 8px;
        }

        .result-topic-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .result-setup-btn {
            min-height: 34px;
            border: 2px solid var(--line);
            border-radius: 10px;
            background: #fffaf0;
            color: var(--ink);
            font-size: 0.72rem;
            font-weight: 900;
            box-shadow: 2px 2px 0 var(--shadow);
        }

        .result-setup-btn.active {
            border-color: var(--primary);
            background: #fff0ec;
            color: var(--primary-dark);
        }

        .result-setup-btn:disabled {
            opacity: 0.58;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 16px 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            margin: 18px auto 0;
            border: 5px solid rgba(242, 95, 92, 0.18);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-height: 720px) {
            .topbar {
                padding-bottom: 6px;
            }

            .turn-banner {
                min-height: 42px;
                margin-top: 6px;
            }

            .players-strip {
                padding-top: 6px;
            }

            .board-wrap {
                padding-top: 6px;
                gap: 6px;
            }

            .my-board {
                gap: 5px;
                padding: 7px;
                max-width: min(88vw, 360px);
            }

            .opponent-section {

            function joinRoom(id) {
                roomRef = roomsRef.child(id);
                roomRef.once('value').then(snapshot => {
                    if (!snapshot.exists()) {
                        alert('방을 찾을 수 없습니다.');
                        window.location.replace('대기실.html');
                        return;
                    }

                    currentRoomData = snapshot.val() || {};
                    if (!currentRoomData.players || !currentRoomData.players[myPlayerId]) {
                        alert('방 참가 정보가 없습니다.');
                        window.location.replace('대기실.html');
                        return;
                    }

                    isHost = currentRoomData.hostId === myPlayerId;
                    roomRef.child(`players/${myPlayerId}`).update({
                        nickname: myNickname,
                        avatar: myAvatar,
                        isHost
                    });

                    if (isHost) {
                        roomRef.onDisconnect().remove();
                    } else {
                        roomRef.child(`players/${myPlayerId}`).onDisconnect().remove();
                    }

                    listenToRoom();
                }).catch(error => {
                    console.error('빙고 방 입장 실패:', error);
                    alert('방 입장에 실패했습니다.');
                    window.location.replace('대기실.html');
                });
            }

            function listenToRoom() {
                roomRef.on('value', snapshot => {
                    if (isLeaving) return;

                    if (!snapshot.exists()) {
                        alert('방이 사라졌습니다.');
                        window.location.replace('대기실.html');
                        return;
                    }

                    currentRoomData = snapshot.val() || {};
                    isHost = currentRoomData.hostId === myPlayerId;

                        alert('방에서 퇴장되었습니다.');

                        return;
                    }

                    if (currentRoomData.status !== 'playing') {
                        window.location.replace(`게임방.html?roomId=${roomId}`);
                        return;
                    }

                    if (!currentRoomData.gameData) {
                        showSetupState();
                        return;

                    if (currentRoomData.gameData.phase === 'selecting') {
                        if (startPlayingIfReady()) {

                    if (currentRoomData.gameData.phase === 'finished' && restartIfAllRematchReady()) {

                    if (repairTurnIfNeeded()) {
                        return;
                    }

                    renderGame();
                });
