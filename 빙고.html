<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>빙고</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    <style>
        :root {
            --bg: #fff7e6;
            --panel: #ffffff;
            --ink: #3f3430;
            --muted: #7b6962;
            --line: #efd8b7;
            --primary: #f25f5c;
            --primary-dark: #b84340;
            --mint: #37b8a9;
            --mint-dark: #23877c;
            --yellow: #ffd166;
            --yellow-dark: #d4a73f;
            --blue: #2f80ed;
            --shadow: #e4caa1;
            --danger: #df4759;
            --ok: #27ae60;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--font-main);
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        button {
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        #app {
            width: 100%;
            max-width: 520px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at top left, rgba(255, 209, 102, 0.38), transparent 34%),
                linear-gradient(180deg, #fffaf0 0%, #fff1d0 100%);
            position: relative;
            overflow: hidden;
        }

        .topbar {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 46px 1fr 78px;
            align-items: center;
            gap: 8px;
            padding: calc(8px + env(safe-area-inset-top)) 12px 8px;
            background: rgba(255, 250, 224, 0.94);
            border-bottom: 3px solid var(--line);
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border: 3px solid var(--ink);
            border-radius: 12px;
            background: var(--panel);
            color: var(--ink);
            font-size: 1.6rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0 var(--shadow);
        }

        .icon-btn:active,
        .action-btn:active,
        .cell-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--shadow);
        }

        .title-box {
            min-width: 0;
            text-align: center;
        }

        .title-box h1 {
            font-size: 1.25rem;
            line-height: 1.1;
        }

        .title-box p {
            margin-top: 3px;
            font-size: 0.74rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .line-badge {
            min-height: 42px;
            border: 3px solid var(--ink);
            border-radius: 12px;
            background: var(--yellow);
            box-shadow: 3px 3px 0 var(--yellow-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .line-badge strong {
            font-size: 1.1rem;
            line-height: 1;
        }

        .line-badge span {
            font-size: 0.68rem;
        }

        .turn-banner {
            flex-shrink: 0;
            margin: 8px 12px 0;
            min-height: 48px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border: 3px solid var(--ink);
            border-radius: 14px;
            background: var(--panel);
            box-shadow: 4px 4px 0 var(--shadow);
        }

        #turn-text {
            font-size: 0.95rem;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #last-call {
            min-width: 58px;
            height: 34px;
            border-radius: 10px;
            border: 2px solid var(--line);
            background: #fff6df;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 900;
            color: var(--primary);
        }

        .players-strip {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            padding: 8px 12px 0;
        }

        .player-chip {
            min-width: 0;
            border: 2px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            padding: 6px 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 2px 2px 0 rgba(228, 202, 161, 0.75);
        }

        .player-chip.active {
            border-color: var(--primary);
            background: #fff0ec;
        }

        .player-chip.me {
            border-color: var(--mint);
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 9px;
            border: 2px solid var(--ink);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .chip-text {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .chip-name {
            font-size: 0.68rem;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chip-lines {
            font-size: 0.66rem;
            color: var(--muted);
            font-weight: 900;
        }

        .board-wrap {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 8px 12px;
            gap: 8px;
        }

        .my-board {
            width: 100%;
            max-width: min(94vw, 420px);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
            padding: 8px;
            border: 4px solid var(--ink);
            border-radius: 18px;
            background: #fffaf0;
            box-shadow: 6px 6px 0 var(--shadow);
        }

        .cell-btn {
            border: 3px solid var(--ink);
            border-radius: 12px;
            background: var(--panel);
            color: var(--ink);
            box-shadow: 3px 3px 0 var(--shadow);
            font-size: clamp(1rem, 7.6vw, 1.7rem);
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.08s, box-shadow 0.08s, background 0.12s;
        }

        .cell-btn.called {
            color: #ffffff;
            background: linear-gradient(160deg, var(--mint), var(--blue));
            border-color: #1f655f;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.24);
        }

        .cell-btn.win-line {
            background: linear-gradient(160deg, var(--primary), #ff9f1c);
            border-color: var(--primary-dark);
        }

        .cell-btn.disabled {
            pointer-events: none;
            opacity: 0.72;
        }

        .cell-btn .call-mark {
            position: absolute;
            right: 5px;
            bottom: 3px;
            font-size: 0.8rem;
            line-height: 1;
        }

        .opponent-section {
            flex-shrink: 0;
            border: 3px solid var(--ink);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.86);
            padding: 8px;
            box-shadow: 4px 4px 0 var(--shadow);
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 7px;
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 900;
        }

        .section-title span:last-child {
            color: var(--muted);
            font-size: 0.72rem;
        }

        .mini-viewers {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 7px;
        }

        .mini-card {
            min-width: 0;
            border: 2px solid var(--line);
            border-radius: 12px;
            background: #fffaf4;
            padding: 6px;
        }

        .mini-head {
            display: grid;
            grid-template-columns: 22px minmax(0, 1fr);
            align-items: center;
            gap: 4px;
            margin-bottom: 5px;
        }

        .mini-head .avatar {
            width: 22px;
            height: 22px;
            border-width: 1px;
            border-radius: 7px;
            font-size: 0.78rem;
        }

        .mini-name {
            min-width: 0;
            font-size: 0.63rem;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            aspect-ratio: 1 / 1;
        }

        .mini-cell {
            border-radius: 3px;
            background: #eadcc4;
        }

        .mini-cell.called {
            background: var(--mint);
        }

        .mini-cell.win-line {
            background: var(--primary);
        }

        .mini-lines {
            margin-top: 5px;
            border-radius: 8px;
            background: #fff0d1;
            color: var(--primary-dark);
            text-align: center;
            font-size: 0.72rem;
            font-weight: 900;
            padding: 3px 2px;
        }

        .called-panel {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 0 12px 10px;
        }

        #called-list {
            min-width: 0;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .called-pill {
            flex: 0 0 auto;
            min-width: 30px;
            height: 30px;
            border-radius: 9px;
            background: var(--ink);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            font-weight: 900;
        }

        .action-btn {
            min-width: 74px;
            height: 38px;
            border: 0;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            border-bottom: 4px solid var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 900;
            box-shadow: 2px 2px 0 var(--shadow);
        }

        .action-btn.secondary {
            background: var(--mint);
            border-bottom-color: var(--mint-dark);
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(30, 24, 20, 0.58);
        }

        .overlay.active {
            display: flex;
        }

        .modal {
            width: min(92vw, 420px);
            border: 4px solid var(--ink);
            border-radius: 18px;
            background: var(--panel);
            box-shadow: 8px 8px 0 rgba(63, 52, 48, 0.28);
            overflow: hidden;
        }

        .modal-head {
            padding: 16px 14px;
            text-align: center;
            background: #fff2c9;
            border-bottom: 3px solid var(--line);
        }

        .modal-head h2 {
            font-size: 1.4rem;
        }

        .modal-body {
            padding: 16px;
            text-align: center;
        }

        .modal-body p {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 16px 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            margin: 18px auto 0;
            border: 5px solid rgba(242, 95, 92, 0.18);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-height: 720px) {
            .topbar {
                padding-bottom: 6px;
            }

            .turn-banner {
                min-height: 42px;
                margin-top: 6px;
            }

            .players-strip {
                padding-top: 6px;
            }

            .board-wrap {
                padding-top: 6px;
                gap: 6px;
            }

            .my-board {
                gap: 5px;
                padding: 7px;
                max-width: min(88vw, 360px);
            }

            .opponent-section {
                padding: 7px;
            }

            .called-panel {
                padding-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <main id="app">
        <header class="topbar">
            <button id="back-btn" class="icon-btn" aria-label="나가기">‹</button>
            <div class="title-box">
                <h1>빙고</h1>
                <p id="room-name">게임방에 입장 중</p>
            </div>
            <div class="line-badge">
                <strong id="my-lines">0</strong>
                <span>빙고줄</span>
            </div>
        </header>

        <section class="turn-banner">
            <div id="turn-text">게임을 준비하고 있습니다.</div>
            <div id="last-call">-</div>
        </section>

        <section id="players-strip" class="players-strip"></section>

        <section class="board-wrap">
            <div id="my-board" class="my-board"></div>

            <div class="opponent-section">
                <div class="section-title">
                    <span>상대 미니뷰어</span>
                    <span id="target-lines">5줄 먼저</span>
                </div>
                <div id="mini-viewers" class="mini-viewers"></div>
            </div>
        </section>

        <section class="called-panel">
            <div id="called-list"></div>
            <button id="room-btn" class="action-btn secondary">나가기</button>
        </section>
    </main>

    <div id="loading-overlay" class="overlay active">
        <div class="modal">
            <div class="modal-head"><h2>빙고 준비중</h2></div>
            <div class="modal-body">
                <p>참가자 보드를 만들고 있습니다.</p>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div id="result-overlay" class="overlay"></div>

    <div id="exit-overlay" class="overlay">
        <div class="modal">
            <div class="modal-head"><h2>나가기</h2></div>
            <div class="modal-body">
                <p>게임에서 나가시겠습니까?<br>진행 중인 방에서는 빠져나갑니다.</p>
            </div>
            <div class="modal-actions">
                <button id="exit-cancel-btn" class="action-btn secondary">취소</button>
                <button id="exit-confirm-btn" class="action-btn">나가기</button>
            </div>
        </div>
    </div>

    <script src="아바타.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        function escapeHTML(value) {
            if (typeof value !== 'string') return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return value.replace(/[&<>"']/g, ch => map[ch]);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyCmNAKmgF_L3o0QyOGh_oFAq_rMRtUyklw",
                authDomain: "goodluck-7c14b.firebaseapp.com",
                databaseURL: "https://goodluck-7c14b-default-rtdb.firebaseio.com",
                projectId: "goodluck-7c14b",
                storageBucket: "goodluck-7c14b.appspot.com",
                messagingSenderId: "858281658455",
                appId: "1:858281658455:web:9131280a459be983933b12"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const auth = firebase.auth();
            const roomsRef = db.ref('rooms');
            const usersRef = db.ref('users');

            const BOARD_SIZE = 5;
            const TARGET_LINES = 5;

            const app = document.getElementById('app');
            const roomNameEl = document.getElementById('room-name');
            const turnTextEl = document.getElementById('turn-text');
            const lastCallEl = document.getElementById('last-call');
            const myLinesEl = document.getElementById('my-lines');
            const targetLinesEl = document.getElementById('target-lines');
            const playersStripEl = document.getElementById('players-strip');
            const myBoardEl = document.getElementById('my-board');
            const miniViewersEl = document.getElementById('mini-viewers');
            const calledListEl = document.getElementById('called-list');
            const loadingOverlay = document.getElementById('loading-overlay');
            const resultOverlay = document.getElementById('result-overlay');
            const exitOverlay = document.getElementById('exit-overlay');
            const backBtn = document.getElementById('back-btn');
            const roomBtn = document.getElementById('room-btn');
            const exitCancelBtn = document.getElementById('exit-cancel-btn');
            const exitConfirmBtn = document.getElementById('exit-confirm-btn');

            let currentUser = null;
            let myPlayerId = null;
            let myNickname = '';
            let myAvatar = '';
            let roomRef = null;
            let roomId = null;
            let currentRoomData = null;
            let isHost = false;
            let isLeaving = false;
            let resultShown = false;

            function setScreenHeight() {
                app.style.height = `${window.innerHeight}px`;
            }

            setScreenHeight();
            window.addEventListener('resize', setScreenHeight);

            auth.onAuthStateChanged(user => {
                if (!user) {
                    window.location.replace('index.html');
                    return;
                }

                currentUser = user;
                myPlayerId = user.uid;
                myNickname = localStorage.getItem('userNickname') || '플레이어';
                myAvatar = localStorage.getItem('userAvatar') || '🙂';

                const params = new URLSearchParams(window.location.search);
                roomId = params.get('roomId');
                if (!roomId) {
                    alert('잘못된 접근입니다.');
                    window.location.replace('대기실.html');
                    return;
                }

                history.pushState(null, '', location.href);
                window.addEventListener('popstate', () => {
                    history.pushState(null, '', location.href);
                    openExitConfirm();
                });

                joinRoom(roomId);
            });

            function joinRoom(id) {
                roomRef = roomsRef.child(id);
                roomRef.once('value').then(snapshot => {
                    if (!snapshot.exists()) {
                        alert('방을 찾을 수 없습니다.');
                        window.location.replace('대기실.html');
                        return;
                    }

                    currentRoomData = snapshot.val() || {};
                    if (!currentRoomData.players || !currentRoomData.players[myPlayerId]) {
                        alert('방 참가 정보가 없습니다.');
                        window.location.replace('대기실.html');
                        return;
                    }

                    isHost = currentRoomData.hostId === myPlayerId;
                    roomRef.child(`players/${myPlayerId}`).update({
                        nickname: myNickname,
                        avatar: myAvatar,
                        isHost
                    });

                    if (isHost) {
                        roomRef.onDisconnect().remove();
                    } else {
                        roomRef.child(`players/${myPlayerId}`).onDisconnect().remove();
                    }

                    listenToRoom();
                }).catch(error => {
                    console.error('빙고 방 입장 실패:', error);
                    alert('방 입장에 실패했습니다.');
                    window.location.replace('대기실.html');
                });
            }

            function listenToRoom() {
                roomRef.on('value', snapshot => {
                    if (isLeaving) return;

                    if (!snapshot.exists()) {
                        alert('방이 사라졌습니다.');
                        window.location.replace('대기실.html');
                        return;
                    }

                    currentRoomData = snapshot.val() || {};
                    isHost = currentRoomData.hostId === myPlayerId;

                    if (!currentRoomData.players || !currentRoomData.players[myPlayerId]) {
                        alert('방에서 퇴장되었습니다.');
                        window.location.replace('대기실.html');
                        return;
                    }

                    if (currentRoomData.status !== 'playing') {
                        window.location.replace(`게임방.html?roomId=${roomId}`);
                        return;
                    }

                    if (!currentRoomData.gameData && isHost) {
                        initializeGameData();
                        return;
                    }

                    if (repairTurnIfNeeded()) {
                        return;
                    }

                    renderGame();
                });
            }

            function initializeGameData() {
                const playerIds = Object.keys(currentRoomData.players || {}).slice(0, 4);
                const turnOrder = shuffle(playerIds);
                const playerStates = {};

                playerIds.forEach(id => {
                    playerStates[id] = {
                        board: shuffle(Array.from({ length: 25 }, (_, index) => index + 1)),
                        lines: 0,
                        finished: false
                    };
                });

                roomRef.child('gameData').set({
                    gameId: 'bingo',
                    boardSize: BOARD_SIZE,
                    targetLines: TARGET_LINES,
                    phase: 'playing',
                    turnOrder,
                    currentTurn: turnOrder[0] || null,
                    calledNumbers: [],
                    calledMap: {},
                    lastCalled: null,
                    winnerId: null,
                    players: playerStates,
                    createdAt: Date.now()
                }).catch(error => {
                    console.error('빙고 데이터 생성 실패:', error);
                    alert('빙고 데이터를 만들지 못했습니다.');
                });
            }

            function renderGame() {
                const gameData = currentRoomData.gameData;
                if (!gameData || !gameData.players || !gameData.players[myPlayerId]) {
                    loadingOverlay.classList.add('active');
                    return;
                }

                loadingOverlay.classList.remove('active');

                const players = currentRoomData.players || {};
                const turnOrder = getTurnOrder(gameData);
                const calledNumbers = normalizeCalledNumbers(gameData.calledNumbers);
                const calledSet = new Set(calledNumbers.map(Number));
                const myState = gameData.players[myPlayerId] || {};
                const myLineInfo = getLineInfo(myState.board || [], calledSet);
                const target = Number(gameData.targetLines || TARGET_LINES);

                roomNameEl.textContent = currentRoomData.roomName || '빙고방';
                targetLinesEl.textContent = `${target}줄 먼저`;
                myLinesEl.textContent = myLineInfo.count;
                lastCallEl.textContent = gameData.lastCalled ? gameData.lastCalled.number : '-';

                renderPlayersStrip(turnOrder, players, gameData, calledSet);
                renderBoard(myState.board || [], calledSet, myLineInfo.winCells, gameData);
                renderMiniViewers(turnOrder, players, gameData, calledSet);
                renderCalledNumbers(calledNumbers);
                updateTurnText(gameData, players);

                if (gameData.phase === 'finished' && !resultShown) {
                    showResult(gameData, players, calledSet);
                }
            }

            function renderPlayersStrip(turnOrder, players, gameData, calledSet) {
                playersStripEl.innerHTML = '';

                turnOrder.forEach(id => {
                    const player = players[id];
                    if (!player) return;

                    const state = gameData.players[id] || {};
                    const lineInfo = getLineInfo(state.board || [], calledSet);
                    const chip = document.createElement('div');
                    chip.className = 'player-chip';
                    if (id === myPlayerId) chip.classList.add('me');
                    if (id === gameData.currentTurn && gameData.phase === 'playing') chip.classList.add('active');

                    chip.innerHTML = `
                        <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                        <div class="chip-text">
                            <div class="chip-name">${escapeHTML(player.nickname || '플레이어')}</div>
                            <div class="chip-lines">${lineInfo.count}줄</div>
                        </div>
                    `;
                    playersStripEl.appendChild(chip);
                });

                for (let i = turnOrder.length; i < 4; i++) {
                    const chip = document.createElement('div');
                    chip.className = 'player-chip';
                    chip.innerHTML = `
                        <div class="avatar">+</div>
                        <div class="chip-text">
                            <div class="chip-name">빈자리</div>
                            <div class="chip-lines">대기</div>
                        </div>
                    `;
                    playersStripEl.appendChild(chip);
                }
            }

            function renderBoard(board, calledSet, winCells, gameData) {
                myBoardEl.innerHTML = '';
                const canCall = gameData.phase === 'playing' && gameData.currentTurn === myPlayerId;
                const winCellSet = new Set(winCells);

                board.forEach((number, index) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'cell-btn';
                    button.textContent = number;

                    if (calledSet.has(Number(number))) {
                        button.classList.add('called');
                        const mark = document.createElement('span');
                        mark.className = 'call-mark';
                        mark.textContent = '✓';
                        button.appendChild(mark);
                    }

                    if (winCellSet.has(index)) {
                        button.classList.add('win-line');
                    }

                    if (!canCall || calledSet.has(Number(number))) {
                        button.classList.add('disabled');
                    } else {
                        button.addEventListener('click', () => callNumber(Number(number)));
                    }

                    myBoardEl.appendChild(button);
                });
            }

            function renderMiniViewers(turnOrder, players, gameData, calledSet) {
                miniViewersEl.innerHTML = '';
                const opponents = turnOrder.filter(id => id !== myPlayerId && players[id]);

                if (opponents.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'mini-card';
                    empty.style.gridColumn = '1 / -1';
                    empty.innerHTML = `
                        <div class="mini-lines" style="margin-top:0;">상대가 들어오면 여기에 표시됩니다.</div>
                    `;
                    miniViewersEl.appendChild(empty);
                    return;
                }

                opponents.forEach(id => {
                    const player = players[id];
                    const state = gameData.players[id] || {};
                    const lineInfo = getLineInfo(state.board || [], calledSet);
                    const winCellSet = new Set(lineInfo.winCells);
                    const card = document.createElement('div');
                    card.className = 'mini-card';

                    const cells = (state.board || []).map((number, index) => {
                        const classes = ['mini-cell'];
                        if (calledSet.has(Number(number))) classes.push('called');
                        if (winCellSet.has(index)) classes.push('win-line');
                        return `<span class="${classes.join(' ')}"></span>`;
                    }).join('');

                    card.innerHTML = `
                        <div class="mini-head">
                            <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                            <div class="mini-name">${escapeHTML(player.nickname || '플레이어')}</div>
                        </div>
                        <div class="mini-board">${cells}</div>
                        <div class="mini-lines">빙고 ${lineInfo.count}줄</div>
                    `;
                    miniViewersEl.appendChild(card);
                });
            }

            function renderCalledNumbers(calledNumbers) {
                calledListEl.innerHTML = '';
                const recent = calledNumbers.slice(-18);

                if (recent.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'called-pill';
                    empty.textContent = '-';
                    calledListEl.appendChild(empty);
                    return;
                }

                recent.forEach(number => {
                    const pill = document.createElement('div');
                    pill.className = 'called-pill';
                    pill.textContent = number;
                    calledListEl.appendChild(pill);
                });

                calledListEl.scrollLeft = calledListEl.scrollWidth;
            }

            function updateTurnText(gameData, players) {
                if (gameData.phase === 'finished') {
                    const winner = players[gameData.winnerId];
                    turnTextEl.textContent = winner ? `${winner.nickname || '플레이어'} 승리` : '게임 종료';
                    return;
                }

                const currentTurn = gameData.currentTurn;
                if (currentTurn === myPlayerId) {
                    turnTextEl.textContent = '내 차례입니다. 숫자를 눌러주세요.';
                    return;
                }

                const player = players[currentTurn];
                turnTextEl.textContent = player ? `${player.nickname || '플레이어'} 차례입니다.` : '차례를 확인하고 있습니다.';
            }

            function callNumber(number) {
                if (!roomRef || !currentRoomData || !currentRoomData.gameData) return;

                roomRef.child('gameData').transaction(gameData => {
                    if (!gameData || gameData.phase !== 'playing') return;
                    if (gameData.currentTurn !== myPlayerId) return;

                    const calledNumbers = normalizeCalledNumbers(gameData.calledNumbers);
                    const calledMap = gameData.calledMap || {};
                    const numberKey = String(number);
                    if (calledMap[numberKey] || calledNumbers.map(Number).includes(number)) return;

                    const nextCalledNumbers = calledNumbers.concat(number);
                    const calledSet = new Set(nextCalledNumbers.map(Number));
                    const target = Number(gameData.targetLines || TARGET_LINES);
                    const nextPlayers = { ...(gameData.players || {}) };
                    let winnerId = null;
                    let bestLines = -1;

                    Object.keys(nextPlayers).forEach(id => {
                        const state = nextPlayers[id] || {};
                        const lineInfo = getLineInfo(state.board || [], calledSet);
                        nextPlayers[id] = {
                            ...state,
                            lines: lineInfo.count,
                            finished: lineInfo.count >= target
                        };

                        if (lineInfo.count >= target && lineInfo.count > bestLines) {
                            bestLines = lineInfo.count;
                            winnerId = id;
                        }
                    });

                    const turnOrder = getTurnOrderFromGameData(gameData);
                    const nextTurn = winnerId ? gameData.currentTurn : getNextTurn(turnOrder, myPlayerId);

                    return {
                        ...gameData,
                        calledNumbers: nextCalledNumbers,
                        calledMap: { ...calledMap, [numberKey]: true },
                        players: nextPlayers,
                        currentTurn: nextTurn,
                        lastCalled: {
                            number,
                            playerId: myPlayerId,
                            nickname: myNickname,
                            at: Date.now()
                        },
                        phase: winnerId ? 'finished' : 'playing',
                        winnerId: winnerId || null,
                        finishedAt: winnerId ? Date.now() : null
                    };
                }, error => {
                    if (error) {
                        console.error('빙고 숫자 호출 실패:', error);
                        alert('숫자를 호출하지 못했습니다.');
                    }
                });
            }

            function repairTurnIfNeeded() {
                if (!isHost || !roomRef || !currentRoomData?.gameData) return false;

                const gameData = currentRoomData.gameData;
                if (gameData.phase !== 'playing') return false;

                const roomPlayers = currentRoomData.players || {};
                const activeOrder = getTurnOrderFromGameData(gameData).filter(id => roomPlayers[id]);
                if (activeOrder.length === 0) return false;

                if (activeOrder.length === 1) {
                    roomRef.child('gameData').update({
                        turnOrder: activeOrder,
                        currentTurn: activeOrder[0],
                        phase: 'finished',
                        winnerId: activeOrder[0],
                        finishedAt: Date.now()
                    });
                    return true;
                }

                if (!activeOrder.includes(gameData.currentTurn)) {
                    roomRef.child('gameData').update({
                        turnOrder: activeOrder,
                        currentTurn: activeOrder[0]
                    });
                    return true;
                }

                return false;
            }

            function showResult(gameData, players, calledSet) {
                resultShown = true;
                const winner = players[gameData.winnerId];
                const didIWin = gameData.winnerId === myPlayerId;
                const title = didIWin ? '승리!' : '게임 종료';
                const message = winner
                    ? `${winner.nickname || '플레이어'}님이 ${gameData.players[gameData.winnerId]?.lines || 0}줄을 완성했습니다.`
                    : '빙고가 끝났습니다.';

                const scoreRows = getTurnOrder(gameData).map(id => {
                    const player = players[id];
                    if (!player) return '';
                    const state = gameData.players[id] || {};
                    const lineInfo = getLineInfo(state.board || [], calledSet);
                    const badge = id === gameData.winnerId ? '승리' : `${lineInfo.count}줄`;
                    return `
                        <div class="player-chip ${id === gameData.winnerId ? 'active' : ''}" style="margin-bottom:6px;">
                            <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                            <div class="chip-text">
                                <div class="chip-name">${escapeHTML(player.nickname || '플레이어')}</div>
                                <div class="chip-lines">${badge}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                resultOverlay.innerHTML = `
                    <div class="modal">
                        <div class="modal-head"><h2>${title}</h2></div>
                        <div class="modal-body">
                            <p>${escapeHTML(message)}</p>
                            <div style="margin-top:12px;">${scoreRows}</div>
                        </div>
                        <div class="modal-actions">
                            <button id="result-lobby-btn" class="action-btn">대기실</button>
                            <button id="result-room-btn" class="action-btn secondary">게임방</button>
                        </div>
                    </div>
                `;
                resultOverlay.classList.add('active');

                document.getElementById('result-room-btn')?.addEventListener('click', returnToGameRoom);
                document.getElementById('result-lobby-btn')?.addEventListener('click', leaveToLobby);
            }

            function returnToGameRoom() {
                if (!roomRef) {
                    window.location.replace('대기실.html');
                    return;
                }

                roomRef.update({
                    status: 'lobby',
                    gameData: null,
                    gameStarted: false,
                    readyPlayers: null,
                    rematchRequests: null
                }).finally(() => {
                    window.location.replace(`게임방.html?roomId=${roomId}`);
                });
            }

            function openExitConfirm() {
                exitOverlay.classList.add('active');
            }

            function closeExitConfirm() {
                exitOverlay.classList.remove('active');
            }

            function leaveToLobby() {
                isLeaving = true;
                if (!roomRef || !myPlayerId) {
                    window.location.replace('대기실.html');
                    return;
                }

                const leavePromise = isHost
                    ? roomRef.remove()
                    : roomRef.child(`players/${myPlayerId}`).remove();

                leavePromise.finally(() => {
                    window.location.replace('대기실.html');
                });
            }

            function getTurnOrder(gameData) {
                const order = getTurnOrderFromGameData(gameData);
                const roomPlayers = currentRoomData?.players || {};
                return order.filter(id => roomPlayers[id]);
            }

            function getTurnOrderFromGameData(gameData) {
                if (Array.isArray(gameData.turnOrder)) return gameData.turnOrder.slice();
                return Object.keys(gameData.players || {});
            }

            function getNextTurn(turnOrder, currentId) {
                if (!turnOrder.length) return currentId;
                const index = turnOrder.indexOf(currentId);
                if (index === -1) return turnOrder[0];
                return turnOrder[(index + 1) % turnOrder.length];
            }

            function normalizeCalledNumbers(value) {
                if (Array.isArray(value)) {
                    return value.filter(number => Number.isFinite(Number(number))).map(Number);
                }

                if (value && typeof value === 'object') {
                    return Object.values(value).filter(number => Number.isFinite(Number(number))).map(Number);
                }

                return [];
            }

            function getLineInfo(board, calledSet) {
                const winCells = new Set();
                let count = 0;

                for (let row = 0; row < BOARD_SIZE; row++) {
                    const cells = [];
                    for (let col = 0; col < BOARD_SIZE; col++) {
                        cells.push(row * BOARD_SIZE + col);
                    }
                    if (cells.every(index => calledSet.has(Number(board[index])))) {
                        count++;
                        cells.forEach(index => winCells.add(index));
                    }
                }

                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cells = [];
                    for (let row = 0; row < BOARD_SIZE; row++) {
                        cells.push(row * BOARD_SIZE + col);
                    }
                    if (cells.every(index => calledSet.has(Number(board[index])))) {
                        count++;
                        cells.forEach(index => winCells.add(index));
                    }
                }

                const diagonalA = [0, 6, 12, 18, 24];
                const diagonalB = [4, 8, 12, 16, 20];
                if (diagonalA.every(index => calledSet.has(Number(board[index])))) {
                    count++;
                    diagonalA.forEach(index => winCells.add(index));
                }
                if (diagonalB.every(index => calledSet.has(Number(board[index])))) {
                    count++;
                    diagonalB.forEach(index => winCells.add(index));
                }

                return { count, winCells: Array.from(winCells) };
            }

            function shuffle(items) {
                const result = items.slice();
                for (let i = result.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }

            function getAvatarHTML(avatar) {
                if (window.AVATAR_SETS && AVATAR_SETS[avatar]) {
                    return `<img src="${AVATAR_SETS[avatar].front}" alt="">`;
                }

                if (avatar && typeof avatar === 'string' && (avatar.startsWith('http') || avatar.includes('.'))) {
                    return `<img src="${escapeHTML(avatar)}" alt="">`;
                }

                return escapeHTML(avatar || '🙂');
            }

            backBtn.addEventListener('click', openExitConfirm);
            roomBtn.addEventListener('click', openExitConfirm);
            exitCancelBtn.addEventListener('click', closeExitConfirm);
            exitConfirmBtn.addEventListener('click', leaveToLobby);
        });
    </script>
</body>
