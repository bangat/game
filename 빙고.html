                resultShown = false;
                resultSoundPlayed = false;
                resultOverlay.classList.remove('active');
                selectOverlay.classList.remove('active');
                myBoardEl.innerHTML = '';
                miniViewersEl.innerHTML = '';
                calledListEl.innerHTML = '';
                playersStripEl.innerHTML = '';
                myLinesEl.textContent = '0';
                lastCallEl.textContent = '-';
                targetLinesEl.textContent = '설정 대기';
                roomNameEl.textContent = currentRoomData.roomName || '빙고방';
                centerNoticeEl.style.display = 'none';

                if (isHost) {
                    loadingOverlay.classList.remove('active');
                    setupOverlay.classList.add('active');
                    turnTextEl.textContent = '판 크기와 주제를 골라주세요.';
                    return;
                }

                setupOverlay.classList.remove('active');
                showLoading('빙고 설정중', '방장이 판 크기와 주제를 고르고 있습니다.');
                turnTextEl.textContent = '방장 설정을 기다리는 중입니다.';
            }

            function renderSetupControls() {
                topicChoiceListEl.innerHTML = '';
                BINGO_TOPICS.forEach(topic => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'choice-btn topic-choice';
                    button.dataset.topic = topic.id;
                    button.textContent = topic.name;
                    if (topic.id === selectedSetupTopic) button.classList.add('active');
                    button.addEventListener('click', () => {
                        selectedSetupTopic = topic.id;
                        document.querySelectorAll('.topic-choice').forEach(btn => {
                            btn.classList.toggle('active', btn.dataset.topic === selectedSetupTopic);
                        });
                    });
                    topicChoiceListEl.appendChild(button);
                });

                document.querySelectorAll('.size-choice').forEach(button => {
                    button.addEventListener('click', () => {
                        selectedSetupSize = Number(button.dataset.size || DEFAULT_BOARD_SIZE);
                        document.querySelectorAll('.size-choice').forEach(btn => {
                            btn.classList.toggle('active', Number(btn.dataset.size) === selectedSetupSize);
                        });
                    });
                });
            }

            function renderSelectionState(gameData) {
                resultShown = false;
                resultSoundPlayed = false;
                lastSeenCallKey = null;
                lastMyLineCount = 0;
                lastTurnId = null;
                myBoardEl.classList.remove('my-turn-board');

                setupOverlay.classList.remove('active');
                loadingOverlay.classList.remove('active');
                resultOverlay.classList.remove('active');

                const boardSize = getBoardSize(gameData);
                const needed = boardSize * boardSize;
                const players = currentRoomData.players || {};
                const turnOrder = getTurnOrder(gameData);
                const myState = gameData.players?.[myPlayerId] || {};

                roomNameEl.textContent = currentRoomData.roomName || '빙고방';
                targetLinesEl.textContent = `${gameData.topicName || '주제'} · ${boardSize}x${boardSize}`;
                myLinesEl.textContent = '0';
                lastCallEl.textContent = '-';
                centerNoticeEl.style.display = 'none';
                calledListEl.innerHTML = '';
                renderPlayersStripForSelection(turnOrder, players, gameData);
                renderSelectionBoard(boardSize, myState.selectedWords || []);
                renderSelectionMiniViewers(turnOrder, players, gameData);

                if (myState.ready) {
                    selectOverlay.classList.remove('active');
                    const readyCount = getReadyCount(gameData);
                    showLoading('선택 완료', `다른 참가자를 기다리고 있습니다. (${readyCount}/${turnOrder.length})`);
                    turnTextEl.textContent = `단어 선택 완료 (${readyCount}/${turnOrder.length})`;
                    return;
                }

                selectedWords = Array.isArray(myState.selectedWords) ? myState.selectedWords.slice() : [];
                renderWordSelection(gameData);
                selectOverlay.classList.add('active');
                turnTextEl.textContent = `${needed}개를 골라 빙고판을 채워주세요.`;
            }

            function renderPlayersStripForSelection(turnOrder, players, gameData) {
                playersStripEl.innerHTML = '';
                turnOrder.forEach(id => {
                    const player = players[id];
                    if (!player) return;
                    const ready = !!gameData.players?.[id]?.ready;
                    const chip = document.createElement('div');
                    chip.className = 'player-chip';
                    if (id === myPlayerId) chip.classList.add('me');
                    if (ready) chip.classList.add('active');
                    chip.innerHTML = `
                        <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                        <div class="chip-text">
                            <div class="chip-name">${escapeHTML(player.nickname || '플레이어')}</div>
                            <div class="chip-lines">${ready ? '완료' : '선택중'}</div>
                        </div>
                    `;
                    playersStripEl.appendChild(chip);
                });
            }

            function renderSelectionBoard(boardSize, words) {
                myBoardEl.innerHTML = '';
                setBoardGrid(myBoardEl, boardSize);
                const needed = boardSize * boardSize;

                for (let index = 0; index < needed; index++) {
                    const cell = document.createElement('button');
                    cell.type = 'button';
                    cell.className = 'cell-btn disabled';
                    cell.innerHTML = `<span class="cell-label">${escapeHTML(words[index] || '')}</span>`;
                    myBoardEl.appendChild(cell);
                }
            }

            function renderSelectionMiniViewers(turnOrder, players, gameData) {
                miniViewersEl.innerHTML = '';
                const boardSize = getBoardSize(gameData);
                const opponents = turnOrder.filter(id => id !== myPlayerId && players[id]);

                if (opponents.length === 0) {
                    miniViewersEl.innerHTML = '<div class="mini-card" style="grid-column:1 / -1;"><div class="mini-lines" style="margin-top:0;">상대가 들어오면 여기에 표시됩니다.</div></div>';
                    return;
                }

                opponents.forEach(id => {
                    const player = players[id];
                    const state = gameData.players[id] || {};
                    const selected = state.selectedWords || [];
                    const needed = boardSize * boardSize;
                    const cells = Array.from({ length: needed }, (_, index) => {
                        return `<span class="mini-cell ${selected[index] ? 'called' : ''}"></span>`;
                    }).join('');
                    const card = document.createElement('div');
                    card.className = 'mini-card';
                    card.innerHTML = `
                        <div class="mini-head">
                            <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                            <div class="mini-name">${escapeHTML(player.nickname || '플레이어')}</div>
                        </div>
                        <div class="mini-board" style="grid-template-columns: repeat(${boardSize}, 1fr);">${cells}</div>
                        <div class="mini-lines">${state.ready ? '선택 완료' : `${selected.length}/${needed}`}</div>
                    `;
                    miniViewersEl.appendChild(card);
                });
            }

            function renderWordSelection(gameData, justFilledIndex = -1) {
                const boardSize = getBoardSize(gameData);
                const needed = boardSize * boardSize;
                const wordPool = getSelectionWordPool(gameData, boardSize);

                selectInfoEl.textContent = `${gameData.topicName || '주제'} 단어 ${wordPool.length}개 중 ${needed}개를 선택하세요.`;
                selectDoneBtn.disabled = selectedWords.length !== needed;
                selectedPreviewEl.classList.remove('size-3', 'size-4', 'size-5', 'size-6');
                selectedPreviewEl.classList.add(`size-${boardSize}`);
                selectedPreviewEl.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
                selectedPreviewEl.style.gridTemplateRows = `repeat(${boardSize}, 1fr)`;
                selectedPreviewEl.innerHTML = Array.from({ length: needed }, (_, index) => {
                    const word = selectedWords[index];
                    const classes = ['selected-slot'];
                    if (word) classes.push('filled');
                    if (index === justFilledIndex) classes.push('just-filled');
                    return `<span class="${classes.join(' ')}" data-slot-index="${index}">${escapeHTML(word || '')}</span>`;
                }).join('');

                wordChoiceListEl.innerHTML = '';
                wordPool.forEach(word => {
                    const active = selectedWords.includes(word);
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'word-btn';
                    if (active) button.classList.add('active');
                    button.textContent = word;
                    button.disabled = !active && selectedWords.length >= needed;
                    button.addEventListener('click', event => toggleSelectedWord(word, gameData, event.currentTarget));
                    wordChoiceListEl.appendChild(button);
                });
            }

            function toggleSelectedWord(word, gameData, sourceButton = null) {
                const index = selectedWords.indexOf(word);
                let justFilledIndex = -1;
                let fromRect = null;
                if (index >= 0) {
                    selectedWords.splice(index, 1);
                    playRemoveSound();
                } else {
                    const boardSize = getBoardSize(gameData);
                    const needed = boardSize * boardSize;
                    if (selectedWords.length >= needed) return;
                    justFilledIndex = selectedWords.length;
                    fromRect = sourceButton ? sourceButton.getBoundingClientRect() : null;
                    selectedWords.push(word);
                    playPickSound();
                    startBgm();
                }

                roomRef.child(`gameData/players/${myPlayerId}/selectedWords`).set(selectedWords);
                renderWordSelection(gameData, justFilledIndex);
                renderSelectionBoard(getBoardSize(gameData), selectedWords);
                if (justFilledIndex >= 0 && fromRect) {
                    animateWordToSlot(word, fromRect, justFilledIndex);
                }
            }

            function animateWordToSlot(word, fromRect, slotIndex) {
                requestAnimationFrame(() => {
                    const targetSlot = selectedPreviewEl.querySelector(`[data-slot-index="${slotIndex}"]`);
                    if (!targetSlot) return;

                    const toRect = targetSlot.getBoundingClientRect();
                    const moving = document.createElement('div');
                    moving.className = 'flying-word';
                    moving.textContent = word;
                    moving.style.left = `${fromRect.left}px`;
                    moving.style.top = `${fromRect.top}px`;
                    moving.style.width = `${fromRect.width}px`;
                    moving.style.height = `${fromRect.height}px`;
                    document.body.appendChild(moving);

                    const scaleX = toRect.width / fromRect.width;
                    const scaleY = toRect.height / fromRect.height;
                    const deltaX = toRect.left - fromRect.left;
                    const deltaY = toRect.top - fromRect.top;
                    playFlySound();

                    moving.animate([
                        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                        { transform: `translate(${deltaX}px, ${deltaY}px) scale(${scaleX}, ${scaleY})`, opacity: 0.95 }
                    ], {
                        duration: 320,
                        easing: 'cubic-bezier(0.2, 0.85, 0.25, 1)'
                    }).onfinish = () => moving.remove();
                });
            }

            function confirmSelectedWords() {
                const gameData = currentRoomData?.gameData;
                if (!gameData || gameData.phase !== 'selecting') return;

                const boardSize = getBoardSize(gameData);
                const needed = boardSize * boardSize;
                if (selectedWords.length !== needed) {
                    alert(`${needed}개를 모두 골라주세요.`);
                    return;
                }

                roomRef.child(`gameData/players/${myPlayerId}`).update({
                    selectedWords,
                    board: selectedWords,
                    ready: true,
                    lines: 0,
                    finished: false
                });
            }

            function startPlayingIfReady() {
                if (!isHost || !roomRef || !currentRoomData?.gameData) return false;

                const gameData = currentRoomData.gameData;
                if (gameData.phase !== 'selecting') return false;

                const boardSize = getBoardSize(gameData);
                const needed = boardSize * boardSize;
                const activeOrder = getTurnOrderFromGameData(gameData).filter(id => currentRoomData.players?.[id]);
                if (activeOrder.length === 0) return false;

                const allReady = activeOrder.every(id => {
                    const state = gameData.players?.[id];
                    return state?.ready && Array.isArray(state.board) && state.board.length === needed;
                });

                if (!allReady) return false;

                const turnOrder = shuffle(activeOrder);
                roomRef.child('gameData').update({
                    phase: 'playing',
                    turnOrder,
                    currentTurn: turnOrder[0] || null,
                    calledNumbers: [],
                    calledMap: {},
                    lastCalled: null,
                    winnerId: null,
                    startedAt: Date.now()
                });
                return true;
            }

            function getReadyCount(gameData) {
                return getTurnOrder(gameData).filter(id => gameData.players?.[id]?.ready).length;
            }

            function renderGame() {
                const gameData = currentRoomData.gameData;
                if (!gameData || !gameData.players || !gameData.players[myPlayerId]) {
                    loadingOverlay.classList.add('active');
                    return;
                }

                loadingOverlay.classList.remove('active');
                setupOverlay.classList.remove('active');
                selectOverlay.classList.remove('active');

                const players = currentRoomData.players || {};
                const turnOrder = getTurnOrder(gameData);
                const boardSize = getBoardSize(gameData);
                const calledNumbers = normalizeCalledNumbers(gameData.calledNumbers);
                const calledSet = new Set(calledNumbers.map(String));
                const myState = gameData.players[myPlayerId] || {};
                const myLineInfo = getLineInfo(myState.board || [], calledSet, boardSize);
                const target = Number(gameData.targetLines || getTargetLines(boardSize));

                roomNameEl.textContent = currentRoomData.roomName || '빙고방';
                targetLinesEl.textContent = `${gameData.topicName || '주제'} · ${target}줄 먼저`;
                myLinesEl.textContent = myLineInfo.count;
                lastCallEl.textContent = gameData.lastCalled ? getCalledValue(gameData.lastCalled) : '-';

                renderPlayersStrip(turnOrder, players, gameData, calledSet, boardSize);
                renderBoard(myState.board || [], calledSet, myLineInfo, gameData, boardSize);
                renderMiniViewers(turnOrder, players, gameData, calledSet, boardSize);
                renderCalledNumbers(calledNumbers);
                updateTurnText(gameData, players);
                handleTurnCue(gameData, players);
                handleCallSound(gameData, myLineInfo);

                if (gameData.phase === 'finished') {
                    if (!resultShown) {
                        showResult(gameData, players, calledSet);
                    } else {
                        updateResultRematchStatus(gameData);
                    }
                }
            }

            function renderPlayersStrip(turnOrder, players, gameData, calledSet, boardSize) {
                playersStripEl.innerHTML = '';

                turnOrder.forEach(id => {
                    const player = players[id];
                    if (!player) return;

                    const state = gameData.players[id] || {};
                    const lineInfo = getLineInfo(state.board || [], calledSet, boardSize);
                    const chip = document.createElement('div');
                    chip.className = 'player-chip';
                    if (id === myPlayerId) chip.classList.add('me');
                    if (id === gameData.currentTurn && gameData.phase === 'playing') chip.classList.add('active');

                    chip.innerHTML = `
                        <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                        <div class="chip-text">
                            <div class="chip-name">${escapeHTML(player.nickname || '플레이어')}</div>
                            <div class="chip-lines">${lineInfo.count}줄</div>
                        </div>
                    `;
                    playersStripEl.appendChild(chip);
                });

                for (let i = turnOrder.length; i < 4; i++) {
                    const chip = document.createElement('div');
                    chip.className = 'player-chip';
                    chip.innerHTML = `
                        <div class="avatar">+</div>
                        <div class="chip-text">
                            <div class="chip-name">빈자리</div>
                            <div class="chip-lines">대기</div>
                        </div>
                    `;
                    playersStripEl.appendChild(chip);
                }
            }

            function renderBoard(board, calledSet, lineInfo, gameData, boardSize) {
                myBoardEl.innerHTML = '';
                setBoardGrid(myBoardEl, boardSize);
                const canCall = gameData.phase === 'playing' && gameData.currentTurn === myPlayerId;
                const winCellSet = new Set(lineInfo.winCells || []);

                board.forEach((word, index) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'cell-btn';
                    button.innerHTML = `<span class="cell-label">${escapeHTML(String(word))}</span>`;

                    if (calledSet.has(String(word))) {
                        button.classList.add('called');
                        const mark = document.createElement('span');
                        mark.className = 'call-mark';
                        mark.textContent = '×';
                        button.appendChild(mark);
                    }

                    if (winCellSet.has(index)) {
                        button.classList.add('win-line');
                    }

                    if (!canCall || calledSet.has(String(word))) {
                        button.classList.add('disabled');
                    } else {
                        button.addEventListener('click', () => callNumber(String(word)));
                    }

                    myBoardEl.appendChild(button);
                });

                renderBingoLines(boardSize, lineInfo.lines || []);
            }

            function renderBingoLines(boardSize, lines) {
                lines.forEach(line => {
                    const lineEl = document.createElement('div');
                    lineEl.className = 'bingo-line';

                    if (line.type === 'row') {
                        lineEl.style.top = `${((line.index + 0.5) / boardSize) * 100}%`;
                    } else if (line.type === 'col') {
                        lineEl.style.left = `${((line.index + 0.5) / boardSize) * 100}%`;
                        lineEl.style.top = '7%';
                        lineEl.style.width = '7px';
                        lineEl.style.height = '86%';
                    } else if (line.type === 'diag-a') {
                        lineEl.style.left = '-10%';
                        lineEl.style.top = '50%';
                        lineEl.style.width = '120%';
                        lineEl.style.transform = 'rotate(45deg)';
                    } else if (line.type === 'diag-b') {
                        lineEl.style.left = '-10%';
                        lineEl.style.top = '50%';
                        lineEl.style.width = '120%';
                        lineEl.style.transform = 'rotate(-45deg)';
                    }

                    myBoardEl.appendChild(lineEl);
                });
            }


            function renderMiniViewers(turnOrder, players, gameData, calledSet, boardSize) {
                miniViewersEl.innerHTML = '';
                const opponents = turnOrder.filter(id => id !== myPlayerId && players[id]);

                if (opponents.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'mini-card';
                    empty.style.gridColumn = '1 / -1';
                    empty.innerHTML = `
                        <div class="mini-lines" style="margin-top:0;">상대가 들어오면 여기에 표시됩니다.</div>
                    `;
                    miniViewersEl.appendChild(empty);
                    return;
                }

                opponents.forEach(id => {
                    const player = players[id];
                    const state = gameData.players[id] || {};
                    const lineInfo = getLineInfo(state.board || [], calledSet, boardSize);
                    const winCellSet = new Set(lineInfo.winCells);
                    const card = document.createElement('div');
                    card.className = 'mini-card';

                    const cells = (state.board || []).map((word, index) => {
                        const classes = ['mini-cell'];
                        if (calledSet.has(String(word))) classes.push('called');
                        if (winCellSet.has(index)) classes.push('win-line');
                        return `<span class="${classes.join(' ')}"></span>`;
                    }).join('');

                    card.innerHTML = `
                        <div class="mini-head">
                            <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                            <div class="mini-name">${escapeHTML(player.nickname || '플레이어')}</div>
                        </div>
                        <div class="mini-board" style="grid-template-columns: repeat(${boardSize}, 1fr);">${cells}</div>
                        <div class="mini-lines">빙고 ${lineInfo.count}줄</div>
                    `;
                    miniViewersEl.appendChild(card);
                });
            }

            function renderCalledNumbers(calledNumbers) {
                calledListEl.innerHTML = '';
                const recent = calledNumbers.slice(-18);

                if (recent.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'called-pill';
                    empty.textContent = '-';
                    calledListEl.appendChild(empty);
                    return;
                }

                recent.forEach(number => {
                    const pill = document.createElement('div');
                    pill.className = 'called-pill';
                    pill.textContent = number;
                    calledListEl.appendChild(pill);
                });

                calledListEl.scrollLeft = calledListEl.scrollWidth;
            }

            function updateTurnText(gameData, players) {
                centerNoticeEl.style.display = 'flex';
                if (gameData.phase === 'finished') {
                    const winner = players[gameData.winnerId];
                    turnTextEl.textContent = winner ? `${winner.nickname || '플레이어'} 승리` : '게임 종료';
                    centerNoticeEl.textContent = '빙고 완료!';
                    return;
                }

                const currentTurn = gameData.currentTurn;
                if (currentTurn === myPlayerId) {
                    turnTextEl.textContent = '내 차례입니다. 단어를 눌러주세요.';
                    centerNoticeEl.textContent = '단어를 선택해주세요!';
                    return;
                }

                const player = players[currentTurn];
                turnTextEl.textContent = player ? `${player.nickname || '플레이어'} 차례입니다.` : '차례를 확인하고 있습니다.';
                centerNoticeEl.textContent = player ? `${player.nickname || '플레이어'}님이 단어를 고르는 중입니다.` : '차례를 확인하고 있습니다.';
            }

            function handleTurnCue(gameData, players) {
                const isPlaying = gameData.phase === 'playing';
                const isMyTurn = isPlaying && gameData.currentTurn === myPlayerId;
                myBoardEl.classList.toggle('my-turn-board', isMyTurn);

                if (!isPlaying) {
                    lastTurnId = null;
                    return;
                }

                if (lastTurnId === gameData.currentTurn) return;
                lastTurnId = gameData.currentTurn;

                if (isMyTurn) {
                    showTurnFlash('내 차례입니다!');
                    playTurnSound();
                    return;
                }

                const player = players[gameData.currentTurn];
                if (player) showTurnFlash(`${player.nickname || '플레이어'} 차례`);
            }

            function showTurnFlash(text) {
                turnFlashEl.textContent = text;
                turnFlashEl.classList.remove('active');
                window.clearTimeout(turnFlashTimer);
                requestAnimationFrame(() => {
                    turnFlashEl.classList.add('active');
                    turnFlashTimer = window.setTimeout(() => turnFlashEl.classList.remove('active'), 1100);
                });
            }

            function callNumber(word) {
                if (!roomRef || !currentRoomData || !currentRoomData.gameData) return;
                startBgm();
                const calledWord = String(word);

                roomRef.child('gameData').transaction(gameData => {
                    if (!gameData || gameData.phase !== 'playing') return;
                    if (gameData.currentTurn !== myPlayerId) return;

                    const calledNumbers = normalizeCalledNumbers(gameData.calledNumbers);
                    const calledMap = gameData.calledMap || {};
                    const wordKey = encodeKey(calledWord);
                    if (calledMap[wordKey] || calledNumbers.includes(calledWord)) return;

                    const nextCalledNumbers = calledNumbers.concat(calledWord);
                    const calledSet = new Set(nextCalledNumbers.map(String));
                    const boardSize = getBoardSize(gameData);
                    const target = Number(gameData.targetLines || getTargetLines(boardSize));
                    const nextPlayers = { ...(gameData.players || {}) };
                    let winnerId = null;
                    let bestLines = -1;

                    Object.keys(nextPlayers).forEach(id => {
                        const state = nextPlayers[id] || {};
                        const lineInfo = getLineInfo(state.board || [], calledSet, boardSize);
                        nextPlayers[id] = {
                            ...state,
                            lines: lineInfo.count,
                            finished: lineInfo.count >= target
                        };

                        if (lineInfo.count >= target && lineInfo.count > bestLines) {
                            bestLines = lineInfo.count;
                            winnerId = id;
                        }
                    });

                    const turnOrder = getTurnOrderFromGameData(gameData);
                    const nextTurn = winnerId ? gameData.currentTurn : getNextTurn(turnOrder, myPlayerId);

                    return {
                        ...gameData,
                        calledNumbers: nextCalledNumbers,
                        calledMap: { ...calledMap, [wordKey]: true },
                        players: nextPlayers,
                        currentTurn: nextTurn,
                        lastCalled: {
                            value: calledWord,
                            word: calledWord,
                            playerId: myPlayerId,
                            nickname: myNickname,
                            at: Date.now()
                        },
                        phase: winnerId ? 'finished' : 'playing',
                        winnerId: winnerId || null,
                        finishedAt: winnerId ? Date.now() : null
                    };
                }, (error, committed, snapshot) => {
                    if (error) {
                        console.error('빙고 단어 호출 실패:', error);
                        alert('단어를 호출하지 못했습니다.');
                        return;
                    }

                    if (!committed || !snapshot || !snapshot.exists()) return;

                    const nextData = snapshot.val();
                    const nextMyLines = Number(nextData?.players?.[myPlayerId]?.lines || 0);
                    const prevMyLines = Number(currentRoomData?.gameData?.players?.[myPlayerId]?.lines || 0);

                    if (nextData?.phase === 'finished') {
                        playFinishSound(nextData.winnerId === myPlayerId);
                        resultSoundPlayed = true;
                    } else if (nextMyLines > prevMyLines) {
                        playLineSound();
                    } else {
                        playMarkSound();
                    }
                });
            }

            function repairTurnIfNeeded() {
                if (!isHost || !roomRef || !currentRoomData?.gameData) return false;

                const gameData = currentRoomData.gameData;
                if (gameData.phase !== 'playing') return false;

                const roomPlayers = currentRoomData.players || {};
                const activeOrder = getTurnOrderFromGameData(gameData).filter(id => roomPlayers[id]);
                if (activeOrder.length === 0) return false;

                if (activeOrder.length === 1) {
                    roomRef.child('gameData').update({
                        turnOrder: activeOrder,
                        currentTurn: activeOrder[0],
                        phase: 'finished',
                        winnerId: activeOrder[0],
                        finishedAt: Date.now()
                    });
                    return true;
                }

                if (!activeOrder.includes(gameData.currentTurn)) {
                    roomRef.child('gameData').update({
                        turnOrder: activeOrder,
                        currentTurn: activeOrder[0]
                    });
                    return true;
                }

                return false;
            }

            function showResult(gameData, players, calledSet) {
                resultShown = true;
                const boardSize = getBoardSize(gameData);
                const winner = players[gameData.winnerId];
                const didIWin = gameData.winnerId === myPlayerId;
                const title = didIWin ? '승리!' : '게임 종료';
                const message = winner
                    ? `${winner.nickname || '플레이어'}님이 ${gameData.players[gameData.winnerId]?.lines || 0}줄을 완성했습니다.`
                    : '빙고가 끝났습니다.';

                if (!resultSoundPlayed) {
                    playFinishSound(didIWin);
                    resultSoundPlayed = true;
                }

                const scoreRows = getTurnOrder(gameData).map(id => {
                    const player = players[id];
                    if (!player) return '';
                    const state = gameData.players[id] || {};
                    const lineInfo = getLineInfo(state.board || [], calledSet, boardSize);
                    const badge = id === gameData.winnerId ? '승리' : `${lineInfo.count}줄`;
                    return `
                        <div class="player-chip ${id === gameData.winnerId ? 'active' : ''}" style="margin-bottom:6px;">
                            <div class="avatar">${getAvatarHTML(player.avatar)}</div>
                            <div class="chip-text">
                                <div class="chip-name">${escapeHTML(player.nickname || '플레이어')}</div>
                                <div class="chip-lines">${badge}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                resultOverlay.innerHTML = `
                    <div class="modal result-modal">
                        <div class="modal-head"><h2>${title}</h2></div>
                        <div class="modal-body">
                            <p>${escapeHTML(message)}</p>
                            <div style="margin-top:12px;">${scoreRows}</div>
                            <div id="result-next-setup"></div>
                            <div id="result-rematch-status" class="rematch-status"></div>
                        </div>
                        <div class="modal-actions">
                            <button id="result-rematch-btn" class="action-btn">다시하기</button>
                            <button id="result-room-btn" class="action-btn secondary">게임방</button>
                        </div>
                    </div>
                `;
                resultOverlay.classList.add('active');

                document.getElementById('result-room-btn')?.addEventListener('click', returnToGameRoom);
                document.getElementById('result-rematch-btn')?.addEventListener('click', requestRematch);
                renderResultNextSetup(gameData);
                updateResultRematchStatus(gameData);
            }

            function requestRematch() {
                if (!roomRef || !currentRoomData?.gameData || currentRoomData.gameData.phase !== 'finished') return;
                playReadySound();
                roomRef.child(`gameData/rematchRequests/${myPlayerId}`).set(true);
            }

            function updateResultRematchStatus(gameData) {
                const statusEl = document.getElementById('result-rematch-status');
                if (!statusEl) return;

                const players = currentRoomData?.players || {};
                const turnOrder = getTurnOrder(gameData);
                const requests = gameData.rematchRequests || {};
                const readyCount = turnOrder.filter(id => requests[id]).length;
                const totalCount = turnOrder.length;
                const allReady = totalCount > 0 && readyCount === totalCount;

                const readyRows = turnOrder.map(id => {
                    const ready = !!requests[id];
                    const nickname = players[id]?.nickname || '플레이어';
                    return `<div class="rematch-ready-item ${ready ? 'ready' : ''}">${ready ? '준비완료' : '대기중'} · ${escapeHTML(nickname)}</div>`;
                }).join('');

                statusEl.innerHTML = `
                    <div>${allReady ? '모두 준비완료, 다시 시작합니다.' : `다시하기 준비 ${readyCount}/${totalCount}`}</div>
                    <div class="rematch-ready-list">${readyRows}</div>
                `;

                const rematchBtn = document.getElementById('result-rematch-btn');
                if (rematchBtn) {
                    const ready = !!requests[myPlayerId];
                    rematchBtn.textContent = ready ? '준비완료' : '다시하기';
                    rematchBtn.disabled = ready;
                }

                renderResultNextSetup(gameData);
            }

            function renderResultNextSetup(gameData) {
                const setupEl = document.getElementById('result-next-setup');
                if (!setupEl) return;

                const players = currentRoomData?.players || {};
                const chooserId = getNextSetupChooser(gameData);
                const chooser = players[chooserId];
                const nextSetup = getNextSetup(gameData);
                const myReady = !!gameData.rematchRequests?.[myPlayerId];
                const canEdit = chooserId === myPlayerId && !myReady;

                const sizeButtons = [3, 4, 5, 6].map(size => {
                    return `<button type="button" class="result-setup-btn next-size-btn ${Number(nextSetup.boardSize) === size ? 'active' : ''}" data-size="${size}" ${canEdit ? '' : 'disabled'}>${size}x${size}</button>`;
                }).join('');

                const topicButtons = BINGO_TOPICS.map(topic => {
                    return `<button type="button" class="result-setup-btn next-topic-btn ${nextSetup.topicId === topic.id ? 'active' : ''}" data-topic="${topic.id}" ${canEdit ? '' : 'disabled'}>${topic.name}</button>`;
                }).join('');

                setupEl.innerHTML = `
                    <div class="result-setup-panel">
                        <div class="result-setup-title">다음 판: ${nextSetup.boardSize}x${nextSetup.boardSize} · ${escapeHTML(nextSetup.topicName)}</div>
                        <div class="result-setup-sub">${canEdit ? '이번 판에서 줄이 가장 적은 사람이 다음 보드와 주제를 고릅니다.' : `${escapeHTML(chooser?.nickname || '플레이어')}님이 다음 판을 고릅니다.`}</div>
                        <div class="result-setup-grid">${sizeButtons}</div>
                        <div class="result-setup-grid result-topic-grid">${topicButtons}</div>
                    </div>
                `;

                if (!canEdit) return;

                setupEl.querySelectorAll('.next-size-btn').forEach(button => {
                    button.addEventListener('click', () => updateNextSetup({ boardSize: Number(button.dataset.size) }));
                });

                setupEl.querySelectorAll('.next-topic-btn').forEach(button => {
                    button.addEventListener('click', () => updateNextSetup({ topicId: button.dataset.topic }));
                });
            }

            function updateNextSetup(patch) {
                const gameData = currentRoomData?.gameData;
                if (!roomRef || !gameData || gameData.phase !== 'finished') return;
                if (getNextSetupChooser(gameData) !== myPlayerId) return;
                if (gameData.rematchRequests?.[myPlayerId]) return;

                const current = getNextSetup(gameData);
                const boardSize = getValidBoardSize(patch.boardSize || current.boardSize);
                const topic = getTopic(patch.topicId || current.topicId);

                playPickSound();
                roomRef.child('gameData/nextSetup').set({
                    chooserId: myPlayerId,
                    boardSize,
                    topicId: topic.id,
                    topicName: topic.name,
                    updatedAt: Date.now()
                });
            }

            function restartIfAllRematchReady() {
                if (!isHost || !roomRef || !currentRoomData?.gameData) return false;

                const gameData = currentRoomData.gameData;
                if (gameData.phase !== 'finished') return false;

                const activeOrder = getTurnOrderFromGameData(gameData).filter(id => currentRoomData.players?.[id]);
                if (activeOrder.length === 0) return false;

                const requests = gameData.rematchRequests || {};
                const allReady = activeOrder.every(id => requests[id]);
                if (!allReady) return false;

                const nextSetup = getNextSetup(gameData);
                const boardSize = getValidBoardSize(nextSetup.boardSize);
                const topic = getTopic(nextSetup.topicId);
                const targetLines = getTargetLines(boardSize);
                const playerStates = {};

                activeOrder.forEach(id => {
                    playerStates[id] = {
                        selectedWords: [],
                        board: [],
                        lines: 0,
                        ready: false,
                        finished: false
                    };
                });

                roomRef.child('gameData').set({
                    gameId: 'bingo',
                    boardSize,
                    targetLines,
                    topicId: topic.id,
                    topicName: topic.name,
                    wordPool: getWordPoolForBoard(topic, boardSize, true),
                    phase: 'selecting',
                    turnOrder: activeOrder,
                    currentTurn: null,
                    calledNumbers: [],
                    calledMap: {},
                    lastCalled: null,
                    winnerId: null,
                    players: playerStates,
                    rematchRound: Number(gameData.rematchRound || 0) + 1,
                    createdAt: Date.now()
                });
                return true;
            }

            function returnToGameRoom() {
                stopBgm();
                if (!roomRef) {
                    window.location.replace('대기실.html');
                    return;
                }

                roomRef.update({
                    status: 'lobby',
                    gameData: null,
                    gameStarted: false,
                    readyPlayers: null,
                    rematchRequests: null
                }).finally(() => {
                    window.location.replace(`게임방.html?roomId=${roomId}`);
                });
            }

            function openExitConfirm() {
                exitOverlay.classList.add('active');
            }

            function closeExitConfirm() {
                exitOverlay.classList.remove('active');
            }

            function showLoading(title, text) {
                loadingTitleEl.textContent = title;
                loadingTextEl.textContent = text;
                loadingOverlay.classList.add('active');
            }

            function ensureAudio() {
                if (!audioContext) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContextClass) return null;
                    audioContext = new AudioContextClass();
                }

                if (audioContext.state === 'suspended') {
                    audioContext.resume().catch(() => {});
                }

                return audioContext;
            }

            function playTone(frequency, duration = 0.1, type = 'sine', volume = 0.04, delay = 0) {
                const context = ensureAudio();
                if (!context) return;

                const start = context.currentTime + delay;
                const oscillator = context.createOscillator();
                const gain = context.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, start);
                gain.gain.setValueAtTime(0.0001, start);
                gain.gain.exponentialRampToValueAtTime(volume, start + 0.015);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
                oscillator.connect(gain);
                gain.connect(context.destination);
                oscillator.start(start);
                oscillator.stop(start + duration + 0.02);
            }

            function playPickSound() {
                playTone(660, 0.07, 'triangle', 0.06);
                playTone(880, 0.08, 'triangle', 0.048, 0.06);
            }

            function playRemoveSound() {
                playTone(520, 0.06, 'sine', 0.044);
                playTone(392, 0.08, 'sine', 0.038, 0.05);
            }

            function playReadySound() {
                [659, 784, 1046].forEach((note, index) => {
                    playTone(note, 0.09, 'triangle', 0.064, index * 0.06);
                });
            }

            function playFlySound() {
                const context = ensureAudio();
                if (!context) return;

                const start = context.currentTime;
                const oscillator = context.createOscillator();
                const gain = context.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(360, start);
                oscillator.frequency.exponentialRampToValueAtTime(1320, start + 0.18);
                gain.gain.setValueAtTime(0.0001, start);
                gain.gain.exponentialRampToValueAtTime(0.072, start + 0.018);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.2);
                oscillator.connect(gain);
                gain.connect(context.destination);
                oscillator.start(start);
                oscillator.stop(start + 0.22);
            }

            function playMarkSound() {
                playTone(520, 0.08, 'square', 0.052);
                playTone(780, 0.1, 'triangle', 0.066, 0.06);
            }

            function playLineSound() {
                [523, 659, 784, 1046].forEach((note, index) => {
                    playTone(note, 0.1, 'triangle', 0.078, index * 0.055);
                });
            }

            function playFinishSound(didWin) {
                const resultSound = didWin ? bingoWinSound : bingoLossSound;
                if (resultSound) {
                    resultSound.volume = 1;
                    resultSound.currentTime = 0;
                    resultSound.play().catch(() => {});
                }

                const notes = didWin ? [784, 988, 1175, 1568] : [392, 330, 294];
                notes.forEach((note, index) => {
                    playTone(note, 0.14, didWin ? 'triangle' : 'sine', 0.082, index * 0.08);
                });
            }

            function playTurnSound() {
                playTone(880, 0.08, 'square', 0.06);
                playTone(1175, 0.1, 'triangle', 0.076, 0.08);
            }

            function startBgm() {
                const context = ensureAudio();
                if (!context || bgmTimer) return;

                const notes = [523, 659, 784, 659, 587, 698, 880, 698];
                bgmTimer = setInterval(() => {
                    playTone(notes[bgmStep % notes.length], 0.12, 'sine', 0.016);
                    bgmStep++;
                }, 420);
            }

            function stopBgm() {
                if (!bgmTimer) return;
                clearInterval(bgmTimer);
                bgmTimer = null;
            }

            function handleCallSound(gameData, myLineInfo) {
                const calledValue = gameData.lastCalled ? getCalledValue(gameData.lastCalled) : null;
                if (!calledValue || calledValue === '-') {
                    lastMyLineCount = myLineInfo.count;
                    return;
                }

                const callKey = `${calledValue}:${gameData.lastCalled?.at || ''}`;
                const isFirstSeen = lastSeenCallKey === null;
                const previousLineCount = lastMyLineCount;
                lastSeenCallKey = callKey;
                lastMyLineCount = myLineInfo.count;

                if (isFirstSeen) return;
                if (gameData.lastCalled?.playerId === myPlayerId) return;

                const myBoard = gameData.players?.[myPlayerId]?.board || [];
                if (!myBoard.includes(calledValue)) return;

                if (myLineInfo.count > previousLineCount) {
                    playLineSound();
                } else {
                    playMarkSound();
                }
            }

            function leaveToLobby() {
                stopBgm();
                isLeaving = true;
                if (!roomRef || !myPlayerId) {
                    window.location.replace('대기실.html');
                    return;
                }

                const leavePromise = isHost
                    ? roomRef.remove()
                    : roomRef.child(`players/${myPlayerId}`).remove();

                leavePromise.finally(() => {
                    window.location.replace('대기실.html');
                });
            }

            function getTurnOrder(gameData) {
                const order = getTurnOrderFromGameData(gameData);
                const roomPlayers = currentRoomData?.players || {};
                return order.filter(id => roomPlayers[id]);
            }

            function getTurnOrderFromGameData(gameData) {
                if (Array.isArray(gameData.turnOrder)) return gameData.turnOrder.slice();
                return Object.keys(gameData.players || {});
            }

            function getNextTurn(turnOrder, currentId) {
                if (!turnOrder.length) return currentId;
                const index = turnOrder.indexOf(currentId);
                if (index === -1) return turnOrder[0];
                return turnOrder[(index + 1) % turnOrder.length];
            }

            function normalizeCalledNumbers(value) {
                if (Array.isArray(value)) {
                    return value.filter(item => item !== null && item !== undefined && String(item).length > 0).map(String);
                }

                if (value && typeof value === 'object') {
                    return Object.values(value).filter(item => item !== null && item !== undefined && String(item).length > 0).map(String);
                }

                return [];
            }

            function getLineInfo(board, calledSet, boardSize = DEFAULT_BOARD_SIZE) {
                const size = Number(boardSize || DEFAULT_BOARD_SIZE);
                const winCells = new Set();
                const lines = [];
                let count = 0;

                for (let row = 0; row < size; row++) {
                    const cells = [];
                    for (let col = 0; col < size; col++) {
                        cells.push(row * size + col);
                    }
                    if (cells.every(index => calledSet.has(String(board[index])))) {
                        count++;
                        lines.push({ type: 'row', index: row });
                        cells.forEach(index => winCells.add(index));
                    }
                }

                for (let col = 0; col < size; col++) {
                    const cells = [];
                    for (let row = 0; row < size; row++) {
                        cells.push(row * size + col);
                    }
                    if (cells.every(index => calledSet.has(String(board[index])))) {
                        count++;
                        lines.push({ type: 'col', index: col });
                        cells.forEach(index => winCells.add(index));
                    }
                }

                const diagonalA = Array.from({ length: size }, (_, index) => index * size + index);
                const diagonalB = Array.from({ length: size }, (_, index) => index * size + (size - 1 - index));
                if (diagonalA.every(index => calledSet.has(String(board[index])))) {
                    count++;
                    lines.push({ type: 'diag-a', index: 0 });
                    diagonalA.forEach(index => winCells.add(index));
                }
                if (diagonalB.every(index => calledSet.has(String(board[index])))) {
                    count++;
                    lines.push({ type: 'diag-b', index: 0 });
                    diagonalB.forEach(index => winCells.add(index));
                }

                return { count, winCells: Array.from(winCells), lines };
            }

            function getTopic(topicId) {
                return BINGO_TOPICS.find(topic => topic.id === topicId) || BINGO_TOPICS[0];
            }

            function getValidBoardSize(boardSize, fallback = DEFAULT_BOARD_SIZE) {
                const size = Number(boardSize);
                return [3, 4, 5, 6].includes(size) ? size : fallback;
            }

            function getNextSetup(gameData) {
                const stored = gameData?.nextSetup || {};
                const boardSize = getValidBoardSize(stored.boardSize, getBoardSize(gameData));
                const topic = getTopic(stored.topicId || gameData?.topicId);

                return {
                    boardSize,
                    topicId: topic.id,
                    topicName: topic.name
                };
            }

            function getNextSetupChooser(gameData) {
                const turnOrder = getTurnOrder(gameData);
                if (!turnOrder.length) return myPlayerId;

                const losers = turnOrder.filter(id => id !== gameData.winnerId);
                const candidates = losers.length ? losers : turnOrder;

                return candidates.slice().sort((a, b) => {
                    const aLines = Number(gameData.players?.[a]?.lines || 0);
                    const bLines = Number(gameData.players?.[b]?.lines || 0);
                    if (aLines !== bLines) return aLines - bLines;
                    return turnOrder.indexOf(a) - turnOrder.indexOf(b);
                })[0];
            }

            function getTopicWords(topic) {
                return [...topic.words, ...(TOPIC_EXTRA_WORDS[topic.id] || [])];
            }

            function getWordPoolTarget(boardSize) {
                return WORD_POOL_TARGETS[Number(boardSize)] || Math.max(Number(boardSize || DEFAULT_BOARD_SIZE) ** 2, 25);
            }

            function getWordPoolForBoard(topic, boardSize, randomize = false) {
                const target = getWordPoolTarget(boardSize);
                const words = getTopicWords(topic);
                const source = randomize ? shuffle(words) : words;
                return source.slice(0, Math.min(target, source.length));
            }

            function getSelectionWordPool(gameData, boardSize) {
                const target = getWordPoolTarget(boardSize);
                const topicPool = getWordPoolForBoard(getTopic(gameData.topicId), boardSize);
                const storedPool = Array.isArray(gameData.wordPool) ? gameData.wordPool : [];
                const merged = [];

                storedPool.concat(topicPool).forEach(word => {
                    if (word && !merged.includes(word)) merged.push(word);
                });

                return merged.slice(0, Math.min(target, merged.length));
            }

            function getBoardSize(gameData) {
                const stored = Number(gameData?.boardSize || DEFAULT_BOARD_SIZE);
                if ([3, 4, 5, 6].includes(stored)) return stored;

                const firstState = Object.values(gameData?.players || {})[0];
                const boardLength = Array.isArray(firstState?.board) ? firstState.board.length : 25;
                const inferred = Math.sqrt(boardLength);
                return [3, 4, 5, 6].includes(inferred) ? inferred : DEFAULT_BOARD_SIZE;
            }

            function getTargetLines(boardSize) {
                return Number(boardSize || DEFAULT_BOARD_SIZE);
            }

            function setBoardGrid(element, boardSize) {
                element.classList.remove('size-3', 'size-4', 'size-5', 'size-6');
                element.classList.add(`size-${boardSize}`);
                element.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
                element.style.gridTemplateRows = `repeat(${boardSize}, 1fr)`;
            }

            function getCalledValue(lastCalled) {
                return lastCalled?.value || lastCalled?.word || lastCalled?.number || '-';
            }

            function encodeKey(value) {
                return encodeURIComponent(String(value)).replace(/\./g, '%2E');
            }

            function shuffle(items) {
                const result = items.slice();
                for (let i = result.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }

            function getAvatarHTML(avatar) {
                if (window.AVATAR_SETS && AVATAR_SETS[avatar]) {
                    return `<img src="${AVATAR_SETS[avatar].front}" alt="">`;
                }

                if (avatar && typeof avatar === 'string' && (avatar.startsWith('http') || avatar.includes('.'))) {
                    return `<img src="${escapeHTML(avatar)}" alt="">`;
                }

                return escapeHTML(avatar || '🙂');
            }

            backBtn.addEventListener('click', openExitConfirm);
            roomBtn.addEventListener('click', openExitConfirm);
            setupExitBtn.addEventListener('click', openExitConfirm);
            setupStartBtn.addEventListener('click', () => {
                startBgm();
                initializeGameData(selectedSetupSize, selectedSetupTopic);
            });
            selectClearBtn.addEventListener('click', () => {
                selectedWords = [];
                const gameData = currentRoomData?.gameData;
                if (gameData) {
                    roomRef.child(`gameData/players/${myPlayerId}/selectedWords`).set([]);
                    renderWordSelection(gameData);
                    renderSelectionBoard(getBoardSize(gameData), selectedWords);
                }
            });
            selectDoneBtn.addEventListener('click', () => {
                playReadySound();
                confirmSelectedWords();
            });
            exitCancelBtn.addEventListener('click', closeExitConfirm);
            exitConfirmBtn.addEventListener('click', leaveToLobby);
        });
    </script>
