<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>캐치마인드</title>
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    
    <script src="레벨업.js"></script>
    <script src="아바타.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --bg-color: #FFFBEB; --primary-color: #FF6B6B; --secondary-color: #4ECDC4;
            --accent-color: #FFD93D; --text-color-dark: #574141; --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2; --panel-shadow: #E4DCCF; --danger-color: #F76363;
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; /* 중요: 스크롤 방지 */ }
        html, body {
            width: 100%; height: 100%; overflow: hidden; font-family: var(--font-main);
            background-color: var(--bg-color); color: var(--text-color-dark);
            display: flex; flex-direction: column;
            position: fixed; /* 화면 고정 */
        }

        #game-wrapper {
            width: 100%; flex-grow: 1; display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
            position: relative;
        }

        /* 1. 상단 플레이어 바 */
        #player-bar {
            flex-shrink: 0; height: 90px; background: #FFFAE0;
            border-bottom: 3px solid var(--panel-border);
            display: flex; gap: 10px; overflow-x: auto; padding: 10px;
            align-items: center;
        }
        
        .player-slot {
            display: flex; flex-direction: column; align-items: center; width: 60px; flex-shrink: 0; position: relative;
        }
        .player-avatar {
            width: 45px; height: 45px; border-radius: 12px; background: #fff;
            border: 2px solid var(--panel-border); overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .player-avatar img { width: 100%; height: 100%; object-fit: contain; }
        .player-name { 
            font-size: 0.7em; margin-top: 4px; font-weight: bold; 
            width: 100%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .player-score { font-size: 0.8em; color: var(--primary-color); font-weight: 900; }
        
        .player-slot.drawer .player-avatar { border-color: var(--accent-color); box-shadow: 0 0 0 3px var(--accent-color); }
        .player-slot.drawer::after { content: '🎨'; position: absolute; top: -5px; right: -5px; font-size: 1.2em; }

        /* 2. 캔버스 및 정보바 */
        #canvas-wrapper {
            flex-grow: 1; position: relative; margin: 10px;
            background: white; border-radius: 15px;
            border: 4px solid var(--text-color-dark);
            box-shadow: 5px 5px 0 var(--panel-shadow);
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column;
        }
        
        #game-info-bar {
            position: absolute; top: 10px; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            pointer-events: none; z-index: 10;
        }
        
        .info-badge {
            background: rgba(0,0,0,0.7); color: white;
            padding: 6px 12px; border-radius: 20px;
            font-size: 1.0em; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        #timer-badge {
            position: absolute; top: 10px; right: 10px;
            background: white; border: 3px solid var(--text-color-dark);
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 1.1em; color: var(--primary-color);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2); z-index: 10;
        }
        #timer-badge.urgent { color: var(--danger-color); animation: pulse 0.5s infinite; }

        /* [수정] 캔버스 래퍼에도 터치 액션 차단 적용 */
        #canvas-wrapper {
            flex-grow: 1; position: relative; margin: 10px;
            background: white; border-radius: 15px;
            border: 4px solid var(--text-color-dark);
            box-shadow: 5px 5px 0 var(--panel-shadow);
            overflow: hidden; 
            touch-action: none !important; /* [수정] 중요: 스크롤 방지 */
            display: flex; flex-direction: column;
        }

        /* [수정] 캔버스 터치 액션 강력 차단 및 Flex 레이아웃 적용 */
        canvas { 
            width: 100%; 
            /* height: 100% 대신 flex-grow를 사용하여 부모 컨테이너의 남은 공간을 정확히 채움 */
            height: 0; 
            flex-grow: 1;
            display: block; cursor: crosshair; 
            touch-action: none !important; /* [수정] 중요: 브라우저 기본 동작 차단 */
            -webkit-user-select: none; /* 텍스트 선택 방지 */
            user-select: none;
        }

 /* 3. 그리기 도구 */
        #drawing-tools {
            flex-shrink: 0;
            display: none; /* JS에서 제어 */
            justify-content: center; 
            gap: 5px; /* [수정] 12px -> 5px (더 많은 버튼을 넣기 위해 간격 축소) */
            padding: 8px 4px; /* 좌우 여백도 살짝 줄임 */
            flex-wrap: wrap; /* [추가] 화면이 너무 좁으면 안전하게 줄바꿈 */
            background: #f0f0f0; border-top: 2px solid #ddd;
        }
        .tool-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 2px solid #ccc; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 1.2em;
            background: white; transition: transform 0.1s;
        }
        .tool-btn.active { transform: scale(1.1); border-color: var(--text-color-dark); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .tool-btn.color-btn { padding: 0; }

        /* 4. 채팅 영역 */
        #chat-area {
            height: 200px; display: flex; flex-direction: column;
            background: var(--bg-color); border-top: 3px solid var(--panel-border);
        }
        #chat-list {
            flex-grow: 1; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chat-bubble {
            max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 0.9em;
            position: relative; word-break: break-word;
        }
        .chat-bubble.mine { align-self: flex-end; background: var(--secondary-color); color: white; border-bottom-right-radius: 2px; }
        .chat-bubble.other { align-self: flex-start; background: white; border: 1px solid #eee; border-bottom-left-radius: 2px; }
        .chat-bubble.system { align-self: center; background: rgba(0,0,0,0.1); font-size: 0.8em; border-radius: 20px; padding: 4px 10px; color: #555; }
        .chat-bubble.correct { align-self: center; background: var(--accent-color); color: var(--text-color-dark); font-weight: bold; width: 90%; text-align: center; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chat-name { font-size: 0.7em; margin-bottom: 2px; opacity: 0.8; font-weight: bold; display: block; }

        /* 5. 입력 버튼 */
        #input-bar { padding: 10px; background: white; border-top: 1px solid #eee; flex-shrink: 0; }
        #open-input-btn {
            width: 100%; padding: 14px; background: var(--primary-color);
            color: white; font-size: 1.2em; font-weight: 900; border: none;
            border-radius: 12px; cursor: pointer; border-bottom: 4px solid #C04A4A;
        }
        #open-input-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        #open-input-btn:disabled { background: #ccc; border-color: #999; cursor: not-allowed; transform: none; }

        /* 오버레이 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            display: none; justify-content: center; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        
        .input-modal {
            width: 100%; background: white; padding: 20px; padding-bottom: 40px;
            border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .input-group { display: flex; gap: 10px; }
        #answer-input {
            flex-grow: 1; padding: 12px; font-size: 1.1em; border: 2px solid var(--text-color-dark);
            border-radius: 10px; font-family: var(--font-main);
        }
        #send-btn {
            padding: 0 20px; background: var(--secondary-color); color: white;
            border: none; border-radius: 10px; font-weight: bold; border-bottom: 4px solid #379A93;
        }

        .fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white;
        }
        .fullscreen-overlay.active { display: flex; }
        
        .result-card {
            background: var(--panel-bg); width: 90%; max-width: 350px;
            border-radius: 20px; border: 4px solid var(--text-color-dark);
            overflow: hidden; color: var(--text-color-dark);
        }
        .result-header { background: var(--primary-color); padding: 15px; text-align: center; color: white; font-size: 1.5em; font-weight: bold; border-bottom: 4px solid #C04A4A; }
        .result-body { padding: 20px; max-height: 50vh; overflow-y: auto; }
        .result-item { display: flex; justify-content: space-between; padding: 10px; background: #f5f5f5; border-radius: 10px; margin-bottom: 5px; font-weight: bold; align-items: center; }
        .result-item.winner { background: #FFF9C4; border: 2px solid var(--accent-color); }
        .result-footer { padding: 15px; display: flex; gap: 10px; background: #FFFAE0; border-top: 2px solid #eee; }
        .footer-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .btn-retry { background: var(--primary-color); border-bottom: 4px solid #C04A4A; }
        .btn-exit { background: var(--secondary-color); border-bottom: 4px solid #379A93; }
        .btn-retry:disabled { background: #ccc; border-color: #999; transform: none; }

        #countdown-text { font-size: 6em; font-weight: 900; text-shadow: 0 0 20px rgba(255,255,255,0.5); animation: pop 0.5s infinite alternate; }
        .status-ready { color: #28a745; font-size: 0.8em; margin-left: 5px; }
        
        @keyframes pop { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* [신규] 정답자 아바타 하이라이트 효과 */
        .player-slot.winner-highlight { z-index: 100; }
        .player-slot.winner-highlight .player-avatar {
            border-color: #FFD700 !important; /* 금색 테두리 */
            box-shadow: 0 0 20px #FFD700, 0 0 40px orange; /* 번쩍이는 효과 */
            transform: scale(1.3) translateY(10px); /* 확 커짐 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 오버레이 등장 애니메이션 */
        #correct-answer-overlay.active {
            display: flex;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }
        /* [신규] 퀵 팔레트 (확장 색상) 스타일 */
        #quick-palette {
            position: absolute;
            bottom: 60px; /* 툴바 바로 위에 위치 */
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 3px solid var(--text-color-dark);
            border-radius: 12px;
            padding: 10px;
            display: none; /* 평소엔 숨김 */
            grid-template-columns: repeat(4, 1fr); /* 4열 배치 */
            gap: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 50;
        }
        #quick-palette.active { display: grid; animation: popUp 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 팔레트 화살표 (말풍선 꼬리) */
        #quick-palette::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; margin-left: -8px;
            border-width: 8px 8px 0; border-style: solid;
            border-color: var(--text-color-dark) transparent transparent transparent;
        }

        @keyframes popUp { from { transform: translateX(-50%) scale(0.5); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }
    </style>
</head>

// HTML 이스케이프 함수
function escapeHTML(str) {
    if (typeof str !== 'string') return '';
    const map = {'&': '&amp;','<': '&lt;','>': '&gt;','"': '&quot;',"'": '&#039;'};
    return str.replace(/[&<>"']/g, m => map[m]);
}

function initGame(id) {
    roomRef = db.ref(`rooms/${id}`);
    myRef = roomRef.child(`players/${myUid}`);

    myRef.update({
        nickname: myNick,
        avatar: myAvatar,
        score: 0,
        online: true,
        isReady: false
    });
    myRef.onDisconnect().remove();

    // [수정] resize 이벤트 리스너 제거 (그림 사라짐 방지)
    window.removeEventListener('resize', resizeCanvas);

    // 채팅 리스너 설정
    let isInitialLoad = true;
    roomRef.child('chat').on('child_added', snap => {
        const chatData = snap.val();
        if (!chatData) return;
        
        if (isInitialLoad) {
            const msgTime = chatData.timestamp || 0;
            const now = Date.now();
            if (now - msgTime < 60000) {
                addChatBubble(chatData);
            }
        } else {
            addChatBubble(chatData);
            
            // [신규] 정답 발생 시 화면 중앙에 크게 표시 & 아바타 강조
            if (chatData.type === 'correct') {
                showCorrectEffect(chatData);
            }

            // [수정] 호스트가 'correct' 메시지를 감지하면 턴을 넘김
            if (isHost && chatData.type === 'correct' && gameState?.status === 'playing') {
                // 오버레이 감상 시간(2초)을 고려해 턴 넘김 대기 시간을 1.5초 -> 2.5초로 늘림
                setTimeout(() => nextTurn("정답!"), 2500);
            }
        }
    });
    
    roomRef.child('chat').once('value', () => {
        isInitialLoad = false;
    });

    // [수정] 캔버스 초기화 리스너 개선: 최초 접속 시점의 데이터는 무시하고, 이후 변경사항만 반영
    let isFirstClearCheck = true;
    roomRef.child('clearCanvas').on('value', snap => {
        if (isFirstClearCheck) {
            isFirstClearCheck = false;
            return; // 접속하자마자 캔버스가 지워지는 문제 방지
        }
        const timestamp = snap.val();
        if (timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    });

   // [여기서부터 복사] initGame 내부의 roomRef.on 부분
    // [여기서부터 복사하세요] initGame 내부 roomRef.on 전체 교체
    let lastPlayersJson = ''; 

    roomRef.on('value', snap => {
        if (isExiting) return;
        
        if (!snap.exists()) { 
            alert('방이 사라졌습니다.'); 
            location.href = '대기실.html'; 
            return; 
        }

        const data = snap.val();
        gameState = data;
        isHost = (data.hostId === myUid);


        // 1. 리매치 로직 (방장 전용)
        if (isHost && data.status === 'gameOver') {
            const players = data.players || {};
            const reqs = data.rematchRequests || {};
            const playerIds = Object.keys(players);
            
            const allReady = playerIds.length > 0 && playerIds.every(uid => reqs[uid] === true);

            if (allReady) {
                const updates = {};
                updates['status'] = 'waiting';
                updates['starting'] = true; 
                updates['gameData'] = {
                    round: 1,
                    drawer: playerIds[0],
                    word: '',
                    timer: TURN_TIME
                };
                updates['chat'] = null; 
                updates['drawLines'] = null;
                updates['rematchRequests'] = null;
                updates['clearCanvas'] = Date.now();
                playerIds.forEach(pid => { updates[`players/${pid}/score`] = 0; });

                roomRef.update(updates);
            }
        }

        // 2. 초기화 안전장치
        if (isHost && !data.gameData && data.status !== 'gameOver') {
            roomRef.update({
                status: 'waiting',
                gameData: { round: 1, timer: TURN_TIME, drawer: '', word: '' }
            });
        }

        // 3. 렌더링 최적화
        const currentPlayersJson = JSON.stringify(data.players) + (data.gameData?.drawer || '');
        if (lastPlayersJson !== currentPlayersJson) {
            renderPlayers(data.players, data.gameData?.drawer);
            lastPlayersJson = currentPlayersJson;
        }

        // 4. UI 상태 처리 (오버레이 제어는 여기서 다 합니다)
        handleGameState(data);

        // ⚠️ 주의: 여기에 loadingOverlay.style.display = 'none'; 코드가 있으면 절대 안 됩니다!
        // handleGameState가 알아서 오버레이를 켰다 껐다 합니다.
    });
    // [여기까지 복사하세요]

    roomRef.child('drawLines').on('child_added', snap => drawLineRemote(snap.val()));

    // [치트키] E키를 누르면 강제 종료 (방장 전용)
    window.addEventListener('keydown', (e) => {
        // 채팅창 입력 중일 때는 치트키 동작 안 함
        if (document.activeElement === document.getElementById('answer-input')) return;

        if (e.key.toLowerCase() === 'e') {
            if (isHost && roomRef) {
                console.log("🛑 치트키: 강제 게임 종료 실행");
                // 서버 상태를 gameOver로 바꾸면 -> handleGameState가 감지하고 -> showResult 호출함
                roomRef.update({ 
                    status: 'gameOver',
                    // (선택사항) 강제 종료임을 알리고 싶다면 아래 주석 해제
                    // gameData: { ...gameState.gameData, word: '강제 종료' } 
                });
            } else if (!isHost) {
                console.log("방장만 강제 종료할 수 있습니다.");
            }
        }
    });
}

function handleGameState(data) {
    const status = data.status;
    const gData = data.gameData || {};

    if (status === 'waiting') {
        loadingOverlay.classList.add('active');
        resultOverlay.classList.remove('active'); // 결과창 닫기

        // [추가] 대기 상태로 돌아오면 로컬 채팅창과 점수도 깨끗하게 비움
        if (data.starting) {
            document.getElementById('chat-list').innerHTML = ''; // 채팅 내역 삭제
        }

        if (!data.starting) {
            // 대기 중 (준비 전)
            document.getElementById('loading-text').style.display = 'block';
            document.getElementById('loading-text').innerText = `대기중 (${Object.keys(data.players||{}).length}명)...`;
            document.getElementById('countdown-text').innerText = "";
            
            isCountdownInProgress = false;
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        } else {
        // 카운트다운 시작 (starting: true)
        // [수정] 카운트다운 중에는 오버레이를 확실하게 보여줌
        loadingOverlay.classList.add('active'); 
        document.getElementById('loading-text').style.display = 'none';
        
        if (!isCountdownInProgress) {
            startCountdown(); // 여기서 3, 2, 1 카운트다운 시작
        }
    }
        // (기존 코드 유지)
        if (isHost && Object.keys(data.players).length >= 2 && !data.starting) {
            roomRef.update({ starting: true });
        }
    }
    else if (status === 'playing') {
        // ... (이하 기존 playing 로직 유지)
        loadingOverlay.classList.remove('active');
        resultOverlay.classList.remove('active');
        
        // 카운트다운 정리
        isCountdownInProgress = false;
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

        playRandomBgm(); // BGM 재생

        roundDisplay.innerText = `${gData.round || 1}/${MAX_ROUNDS}`;
        timerBadge.innerText = gData.timer || 0;
        
        if ((gData.timer || 0) <= 10) timerBadge.classList.add('urgent');
        else timerBadge.classList.remove('urgent');

        // 그리는 사람 UI 설정 (기존 코드와 동일)
        if (gData.drawer !== lastDrawerUid) {
            lastDrawerUid = gData.drawer;
            // ... (UI 갱신 로직) ...
            const isDrawer = (gData.drawer === myUid);
            if (isDrawer) {
                drawingTools.style.display = 'flex';
                wordDisplay.innerText = `제시어: ${gData.word}`;
                openInputBtn.innerText = "🎨 당신이 그릴 차례입니다!";
                openInputBtn.disabled = true;
                openInputBtn.style.background = "#ccc";
            } else {
                drawingTools.style.display = 'none';
                const wordLen = gData.word ? gData.word.length : 0;
                const hint = "O ".repeat(wordLen);
                wordDisplay.innerText = `힌트: ${hint}`;
                openInputBtn.innerText = "💬 정답 / 채팅 입력";
                openInputBtn.disabled = false;
                openInputBtn.style.background = "var(--primary-color)";
            }
        }

        if (isHost && !timerInterval && gData.timer > 0) {
            runTimer();
        }
    }
    else if (status === 'gameOver') {
        showResult(data.players, data.rematchRequests);
    }
}

function startCountdown() {
    if (isCountdownInProgress) return;
    isCountdownInProgress = true;
    resultSoundPlayed = false;
    
    const winSound = document.getElementById('snd-win');
    const loseSound = document.getElementById('snd-lose');
    if (winSound) { winSound.pause(); winSound.currentTime = 0; }
    if (loseSound) { loseSound.pause(); loseSound.currentTime = 0; }

    document.getElementById('loading-text').style.display = 'none';
    
    let count = 3;
    const countText = document.getElementById('countdown-text');
    countText.innerText = count;
    playSound('snd-start'); // 카운트다운 소리

    countdownTimer = setInterval(() => {
        count--;
        if (count > 0) {
            countText.innerText = count;
            playSound('snd-start');
        } else {
            clearInterval(countdownTimer);
            countdownTimer = null;
            
            // "GO!" 표시
            countText.innerText = "GO!";
            playSound('snd-start'); // GO 소리
            
            // [중요] 방장만 1초 뒤에 게임을 실제로 시작시킴 (싱크 맞춤)
            if (isHost) {
                setTimeout(() => {
                    const pIds = Object.keys(gameState.players);
                    roomRef.update({
                        status: 'playing',
                        starting: false,
                        gameData: {
                            round: 1,
                            drawer: pIds[0],
                            word: getRandomWord(),
                            timer: TURN_TIME
                        },
                        drawLines: null,
                        clearCanvas: Date.now()
                    }).then(() => {
                        // 게임 시작 후 타이머 가동
                        runTimer();
                    });
                }, 1000);
            }
        }
    }, 1000);
}

// [수정] 중복 선언된 runTimer 함수 통합 및 안정화 수정
function runTimer() {
    if (!isHost) return;
    
    // 1. 기존 타이머가 돌고 있다면 확실하게 정지 및 초기화 (메모리 누수 및 중복 실행 방지)
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    // 2. 타이머 시작
    timerInterval = setInterval(() => {
        // 방장이 나가거나 연결이 끊기면 타이머 중지 방어 코드
        if (!roomRef) {
            clearInterval(timerInterval);
            return;
        }

        roomRef.child('gameData/timer').transaction(t => {
            // 값이 없으면 기본값 설정
            if (t === null || t === undefined) return TURN_TIME;
            // 0보다 크면 1 감소, 아니면 0 유지
            return t > 0 ? t - 1 : 0;
        }, (err, committed, snap) => {
            if (err) {
                console.warn("타이머 업데이트 실패 (네트워크 불안정 가능성):", err);
                return;
            }
            // 3. 시간이 0이 되면 턴 넘기기
            if (committed && snap.val() === 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                nextTurn("⏰ 시간 초과!");
            }
        });
    }, 1000);
}

function nextTurn(reasonMsg) {
    if (!isHost) return;
    
    // 타이머가 실행 중이면 정지
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    
    if (reasonMsg && gameState && gameState.gameData) {
        const word = gameState.gameData.word || '';
        sendSysMsg(`${reasonMsg} 정답: ${word}`);
    }
    
    if (!gameState || !gameState.gameData || !gameState.players) {
        console.error("게임 상태가 유효하지 않습니다.");
        return;
    }
    
    const gData = gameState.gameData;
    const pIds = Object.keys(gameState.players);
    const currIdx = pIds.indexOf(gData.drawer);
    let nextIdx = currIdx + 1;
    let nextRound = gData.round;

    if (nextIdx >= pIds.length) {
        nextIdx = 0;
        nextRound++;
    }

    if (nextRound > MAX_ROUNDS) {
        roomRef.update({ status: 'gameOver' }).catch(err => {
            console.error("게임 종료 업데이트 실패:", err);
        });
    } else {
        roomRef.update({
            gameData: {
                round: nextRound,
                drawer: pIds[nextIdx],
                word: getRandomWord(),
                timer: TURN_TIME
            },
            drawLines: null,
            clearCanvas: Date.now()
        }).then(() => {
            setTimeout(() => runTimer(), 100);
        }).catch(err => {
            console.error("다음 턴 업데이트 실패:", err);
        });
    }
}

function getRandomWord() { 
    return WORDS[Math.floor(Math.random() * WORDS.length)]; 
}

function resizeCanvas() {
    const wrapper = document.getElementById('canvas-wrapper');
    canvas.width = wrapper.clientWidth;
    canvas.height = wrapper.clientHeight; 
}

function getPos(e) {
    const r = canvas.getBoundingClientRect();
    let clientX, clientY;

    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }

    return { 
        x: (clientX - r.left) / r.width, 
        y: (clientY - r.top) / r.height 
    };
}

const startDraw = (e) => {
    if (e.cancelable) e.preventDefault(); 

    if (gameState?.gameData?.drawer !== myUid) return;
    
    isDrawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
};

const draw = (e) => {
    if (e.cancelable) e.preventDefault();

    if (!isDrawing) return;
    
    const p = getPos(e);
    
    drawLineRemote({ lx: lastX, ly: lastY, x: p.x, y: p.y, c: currentColor, w: currentWidth });

    roomRef.child('drawLines').push({
        lx: lastX, ly: lastY, x: p.x, y: p.y, c: currentColor, w: currentWidth
    });
    lastX = p.x; lastY = p.y;
};
const endDraw = () => { isDrawing = false; };

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('touchmove', draw, {passive:false});
window.addEventListener('mouseup', endDraw);
window.addEventListener('touchend', endDraw);

function drawLineRemote(l) {
    const w = canvas.width; 
    const h = canvas.height;
    ctx.beginPath();
    ctx.moveTo(l.lx*w, l.ly*h);
    ctx.lineTo(l.x*w, l.y*h);
    ctx.strokeStyle = l.c; 
    ctx.lineWidth = l.w;
    ctx.lineCap = 'round'; 
    ctx.stroke();
}

window.setColor = (color, btn, width = 3) => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = color; 
    currentWidth = width;
};

window.clearCanvas = () => {
    if (gameState?.gameData?.drawer === myUid) roomRef.child('clearCanvas').set(Date.now());
};

function sendAnswer() {
    const txt = inputField.value.trim();
    if (!txt) return;
    
    // 입력창 닫기 및 초기화
    inputModal.classList.remove('active');
    inputField.value = '';

    if (!gameState || !gameState.gameData) return;

    const answer = gameState.gameData.word || "";
    const isDrawer = gameState.gameData.drawer === myUid;
    
    if (isDrawer) {
        // 출제자는 채팅만 가능
        roomRef.child('chat').push({
            senderId: myUid,
            senderNickname: myNick,
            content: txt,
            type: 'chat',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        return;
    }

    // [핵심] 정답 비교 강화 (모든 공백 제거)
    // "사 과"라고 입력해도 "사과" 정답 처리됨
    const normalizedAnswer = answer.replace(/\s+/g, '').trim();
    const normalizedInput = txt.replace(/\s+/g, '').trim();
    
    if (normalizedInput === normalizedAnswer) {
        // 정답 처리
        playSound('snd-correct');
        
        // [신규] 시간 비례 점수 계산
        // 남은 시간이 많을수록 고득점!
        const remainingTime = gameState.gameData.timer || 0;
        const guesserScore = 50 + (remainingTime * 2); // 맞힌 사람 점수
        const drawerScore = 50 + remainingTime;        // 그린 사람 점수 (잘 그려서 빨리 맞히게 한 보상)

        // 1. 맞힌 사람(나) 점수 획득
        roomRef.child(`players/${myUid}/score`).transaction(s => (s||0) + guesserScore);
        
        // 2. 출제자도 점수 획득 (그림 그린 보상)
        const drawerId = gameState.gameData.drawer;
        if (drawerId) {
             roomRef.child(`players/${drawerId}/score`).transaction(s => (s||0) + drawerScore);
        }

        // 채팅창에 획득 점수 표시
        roomRef.child('chat').push({
            senderId: myUid,
            senderNickname: myNick,
            content: `🎉 정답! (+${guesserScore}점)`, // 점수까지 보여줌
            type: 'correct',
            answer: answer, // 아까 추가한 정답 표시용 필드
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
    } else {
        // 오답
        playSound('snd-wrong');
        roomRef.child('chat').push({
            senderId: myUid,
            senderNickname: myNick,
            content: txt,
            type: 'chat',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
    }
}

function sendSysMsg(msg) {
    if (!roomRef) return;
    roomRef.child('chat').push({
        content: msg,
        type: 'system',
        timestamp: firebase.database.ServerValue.TIMESTAMP
    }).catch(err => {
        console.error("시스템 메시지 전송 실패:", err);
    });
}

function addChatBubble(data) {
    if (!data) return;
    
    const div = document.createElement('div');
    
    if (data.type === 'system') {
        div.className = 'chat-bubble system';
        div.textContent = data.content || data.msg || '';
    } else if (data.type === 'correct') {
        div.className = 'chat-bubble correct';
        div.textContent = data.content || data.msg || '';
    } else {
        const isMine = data.senderId === myUid;
        div.className = `chat-bubble ${isMine ? 'mine' : 'other'}`;
        
        const senderName = data.senderNickname || data.name || 'Unknown';
        const messageContent = data.content || data.msg || '';
        
        if (!isMine) {
            div.innerHTML = `<span class="chat-name">${escapeHTML(senderName)}</span>${escapeHTML(messageContent)}`;
        } else {
            div.textContent = messageContent;
        }
    }
    
    chatList.appendChild(div);
    chatList.scrollTop = chatList.scrollHeight;
}

function renderPlayers(players, drawerUid) {
    playerBar.innerHTML = '';
    if (!players) return;
    Object.keys(players).forEach(uid => {
        const p = players[uid];
        const div = document.createElement('div');
        div.className = `player-slot ${uid === drawerUid ? 'drawer' : ''}`;
        
        const avatarSet = AVATAR_SETS[p.avatar];
        let imgHtml = '';
        if(avatarSet) imgHtml = `<img src="${avatarSet.front}">`;
        else if(p.avatar?.includes('.')) imgHtml = `<img src="${p.avatar}">`;
        else imgHtml = `<span style="font-size:2em">${p.avatar}</span>`;

        div.innerHTML = `
            <div class="player-avatar">${imgHtml}</div>
            <div class="player-name">${escapeHTML(p.nickname)}</div>
            <div class="player-score">${p.score}점</div>
        `;
        playerBar.appendChild(div);
    });
}

function showResult(players, reqs={}) {
    // ▼▼▼ [핵심 수정 1] 게임 상태가 gameOver가 아니면(이미 재시작됐으면) 즉시 종료 ▼▼▼
    // 이 부분이 있어야 '다시하기' 카운트다운 때 승리/패배 소리가 또 나는 것을 막습니다.
    if (gameState && gameState.status !== 'gameOver') {
        if(resultOverlay) resultOverlay.classList.remove('active');
        return;
    }

    // ▼▼▼ [핵심 수정 2] 결과창이 이미 떠 있다면(데이터 갱신 시) 소리 재생 없이 버튼만 갱신 ▼▼▼
    if (resultOverlay.classList.contains('active')) {
        updateRetryBtnState(reqs); 
        return; 
    }

    // 1. 배경음악 정지
    stopBgm();

    // 2. 결과 모달 표시
    if (resultOverlay) {
        resultOverlay.classList.add('active');
    }

    // 3. 순위 목록 요소 가져오기
    const resultList = document.getElementById('result-list');
    if (!resultList) return;
    
    resultList.innerHTML = ''; // 목록 초기화
    
    // 4. 점수 내림차순 정렬
    const sorted = Object.entries(players).sort((a, b) => (b[1].score || 0) - (a[1].score || 0));
    
    // 5. 순위 목록 렌더링
    sorted.forEach(([uid, p], i) => {
        const rank = i + 1;
        const isMe = uid === myUid;
        const scoreVal = p.score || 0;
        
        // 리매치 요청 상태 확인
        const isReady = reqs && reqs[uid] === true;
        
        // 준비 완료 뱃지
        const readyBadge = isReady ? '<span style="font-size:0.8em; color:#28a745; margin-left:5px; font-weight:bold;">(준비완료)</span>' : '';

        const row = document.createElement('div');
        row.className = 'result-item';
        if (i === 0) row.classList.add('winner'); 
        if (isMe) row.style.border = "2px solid var(--primary-color)"; 

        row.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-size:1.2em; margin-right:5px;">${rank === 1 ? '🥇' : rank + '위'}</span>
                <span>${escapeHTML(p.nickname)}</span>
                ${readyBadge} 
            </div>
            <div style="color:var(--primary-color);">${scoreVal}점</div>
        `;
        
        resultList.appendChild(row);
        
        // 사운드 재생 (플래그 체크)
        if(isMe && !resultSoundPlayed) {
            if(rank === 1) {
                playSound('snd-win');
                if(typeof applyExpAndPoints === 'function') applyExpAndPoints(db, myUid, 150, 100);
            } else {
                playSound('snd-lose');
                if(typeof applyExpAndPoints === 'function') applyExpAndPoints(db, myUid, 50, 30);
            }
        }
    });
    
    // 사운드 재생 완료 처리
    resultSoundPlayed = true;

    // 6. 버튼 상태 업데이트 (최초 로드 시)
    updateRetryBtnState(reqs);
}

// 버튼 상태 갱신용 헬퍼 함수
function updateRetryBtnState(reqs) {
    const retryBtn = document.getElementById('retry-btn');
    if (retryBtn) {
        if (reqs && reqs[myUid]) {
            retryBtn.disabled = true;
            retryBtn.innerText = "준비완료";
        } else {
            retryBtn.disabled = false;
            retryBtn.innerText = "다시하기";
        }
    }
}

function sendRematchRequest() {
    const retryBtn = document.getElementById('retry-btn');
    if(retryBtn) {
        retryBtn.disabled = true;
        retryBtn.innerText = "신호 보내는 중...";
    }
    
    // [수정] 토글 없이 무조건 true로 설정 (준비 완료)
    roomRef.child(`rematchRequests/${myUid}`).set(true);
}

function exitGame() {
    isExiting = true;
    roomRef.off();
    roomRef.child(`players/${myUid}`).remove();
    location.href = '대기실.html';
}

// [신규] 정답자 강조 및 오버레이 표시 함수
function showCorrectEffect(data) {
    // 1. 오버레이 텍스트 설정 및 표시
    const overlay = document.getElementById('correct-answer-overlay');
    const winnerText = document.getElementById('winner-name-display');
    const answerText = document.getElementById('answer-text-display');
    
    // 데이터에 answer 필드가 없으면 내용에서 추출 (구버전 호환)
    let rawAnswer = data.answer;
    if (!rawAnswer && data.content) {
        const match = data.content.match(/\[(.*?)\]/);
        rawAnswer = match ? match[1] : '정답';
    }

    winnerText.textContent = data.senderNickname;
    answerText.textContent = rawAnswer;
    
    overlay.classList.add('active'); // 오버레이 켜기
    
    // 2. 상단 플레이어 바에서 정답자 아바타 강조
    // (player-bar를 다시 그리면 클래스가 날아가므로, DOM에서 직접 찾음)
    const playerSlots = document.querySelectorAll('.player-slot');
    const players = gameState.players || {};
    const playerIds = Object.keys(players);
    
    // 순서를 찾아야 함 (renderPlayers 로직에 따라 playerIds 순서대로 렌더링됨)
    // 하지만 renderPlayers가 닉네임 등을 기준으로 하지 않으므로, 
    // 확실한 방법은 렌더링 시 data-id를 심는 것이지만, 여기서는 순서로 추정하거나 닉네임으로 찾습니다.
    
    playerSlots.forEach(slot => {
        // 이름으로 찾기 (가장 간단)
        if (slot.querySelector('.player-name').textContent === data.senderNickname) {
            slot.classList.add('winner-highlight');
        }
    });

    // 3. 2.5초 뒤에 효과 끄기
    setTimeout(() => {
        overlay.classList.remove('active');
        playerSlots.forEach(slot => slot.classList.remove('winner-highlight'));
    }, 2500);
}

// [신규] 퀵 팔레트 열고 닫기 (토글)
function togglePalette() {
    const palette = document.getElementById('quick-palette');
    if (palette) {
        palette.classList.toggle('active'); // 클래스를 넣었다 뺐다 하며 보이기/숨기기
    }
}

// [신규] 팔레트에서 색상 선택 시 실행
function selectPaletteColor(color) {
    const paletteBtn = document.getElementById('palette-toggle-btn');
    
    // 1. 다른 색상 버튼들의 active 표시 제거
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    
    // 2. [🎨] 버튼을 활성화하고, 선택한 색상으로 배경 변경 (직관적 피드백)
    if (paletteBtn) {
        paletteBtn.classList.add('active');
        paletteBtn.style.background = color;
        // 배경색 밝기에 따라 글자색(🎨)을 검정/흰색으로 자동 조절
        paletteBtn.style.color = isLightColor(color) ? 'black' : 'white';
    }
    
    // 3. 실제 그리기 색상 변경 (전역 변수 업데이트)
    if (typeof setColor === 'function') {
        // 기존 setColor 로직을 활용하되, UI 처리는 위에서 했으므로 색상만 변경
        currentColor = color;
        currentWidth = 3; 
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
    }

    // 4. 팔레트 닫기
    const palette = document.getElementById('quick-palette');
    if (palette) palette.classList.remove('active');
}

// (보너스) 배경색이 밝은지 어두운지 판별하는 함수 (글자색 조절용)
function isLightColor(color) {
    // hex 코드(#RRGGBB)를 rgb로 변환하여 밝기 계산
    if(!color) return true;
    const hex = color.replace('#', '');
    if (hex.length !== 6) return true;
    
    const r = parseInt(hex.substr(0, 2), 16);
    const g = parseInt(hex.substr(2, 2), 16);
    const b = parseInt(hex.substr(4, 2), 16);
    // 밝기 공식
    const brightness = ((r * 299) + (g * 587) + (b * 114)) / 1000;
    return brightness > 155; // 155보다 크면 밝은 색
}

// [편의성] 화면의 빈 곳을 누르면 팔레트 닫기
document.addEventListener('click', function(e) {
    const palette = document.getElementById('quick-palette');
    const toggleBtn = document.getElementById('palette-toggle-btn');
    
    // 팔레트가 존재하고 열려있을 때
    if (palette && palette.classList.contains('active')) {
        // 클릭한 곳이 팔레트 내부도 아니고, 토글 버튼도 아니면 닫기
        if (!palette.contains(e.target) && !toggleBtn.contains(e.target)) {
            palette.classList.remove('active');
        }
    }
});
