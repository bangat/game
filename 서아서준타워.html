<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>서아서준타워</title>
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    <script src="아바타.js"></script>
    <script src="레벨업.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: 'GmarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-top: #eff6ff;
            --bg-bottom: #d6ebff;
            --panel-bg: rgba(255, 255, 255, 0.92);
            --panel-border: rgba(65, 95, 143, 0.16);
            --panel-shadow: rgba(18, 46, 82, 0.18);
            --text-main: #24415f;
            --text-sub: #6f88a3;
            --primary: #ff7f61;
            --secondary: #49c5c1;
            --accent: #ffd24d;
            --danger: #ff5f7f;
            --font-main: 'GmarketSans', sans-serif;
            --ctrl-size: clamp(84px, 18vw, 112px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
            font-family: var(--font-main);
            color: var(--text-main);
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        }

        #app {
            position: fixed;
            inset: 0;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #hud {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding:
                calc(env(safe-area-inset-top, 0px) + 10px)
                calc(env(safe-area-inset-right, 0px) + 10px)
                calc(env(safe-area-inset-bottom, 0px) + 10px)
                calc(env(safe-area-inset-left, 0px) + 10px);
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            box-shadow: 0 12px 30px var(--panel-shadow);
            backdrop-filter: blur(10px);
        }

        #top-bar {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 10px;
        }

        .hud-btn {
            pointer-events: auto;
            border: none;
            border-radius: 14px;
            min-height: 44px;
            padding: 10px 14px;
            font-family: var(--font-main);
            font-size: 0.92rem;
            font-weight: 700;
            color: #fff;
            background: rgba(36, 65, 95, 0.88);
        }

        .hud-btn.accent {
            background: linear-gradient(135deg, #ffa160, #ff7f61);
        }

        #title-card {
            border-radius: 18px;
            padding: 10px 14px;
            text-align: center;
        }

        #game-title {
            font-size: clamp(1.05rem, 4vw, 1.35rem);
            font-weight: 700;
            line-height: 1.1;
        }

        #game-subtitle {
            margin-top: 3px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        #stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .stat-pill {
            min-width: 110px;
            padding: 10px 12px;
            border-radius: 999px;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .stat-pill strong {
            display: block;
            margin-top: 4px;
            font-size: 1rem;
        }

        #player-board {
            display: none;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .player-card {
            display: grid;
            grid-template-columns: 38px 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border-radius: 16px;
        }

        .player-card.me {
            outline: 2px solid rgba(255, 127, 97, 0.72);
        }

        .player-avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.86);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-name {
            min-width: 0;
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-stage {
            margin-top: 2px;
            font-size: 0.72rem;
            color: var(--text-sub);
        }

        .player-rank {
            min-width: 52px;
            text-align: right;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--primary);
        }

        #mobile-controls {
            position: fixed;
            left: calc(env(safe-area-inset-left, 0px) + 10px);
            right: calc(env(safe-area-inset-right, 0px) + 10px);
            bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 25;
        }

        #stick-zone {
            width: calc(var(--ctrl-size) * 1.34);
            height: calc(var(--ctrl-size) * 1.34);
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #stick-base {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.72);
            background: rgba(24, 36, 55, 0.28);
            box-shadow: inset 0 0 0 8px rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
        }

        #stick-knob {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 44%;
            height: 44%;
            border-radius: 50%;
            background: rgba(24, 36, 55, 0.86);
            border: 2px solid rgba(255, 255, 255, 0.56);
            transform: translate(-50%, -50%);
        }

        #jump-btn {
            width: var(--ctrl-size);
            height: var(--ctrl-size);
            pointer-events: auto;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 161, 96, 0.95), rgba(255, 95, 127, 0.95));
            color: #fff;
            font-family: var(--font-main);
            font-size: clamp(1.1rem, 5vw, 1.5rem);
            font-weight: 700;
            box-shadow: 0 18px 28px rgba(56, 31, 57, 0.22);
        }

        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding:
                calc(env(safe-area-inset-top, 0px) + 14px)
                calc(env(safe-area-inset-right, 0px) + 14px)
                calc(env(safe-area-inset-bottom, 0px) + 14px)
                calc(env(safe-area-inset-left, 0px) + 14px);
            background: rgba(20, 31, 49, 0.52);
            backdrop-filter: blur(10px);
            z-index: 40;
        }

        .overlay.active {
            display: flex;
        }

        .modal-card {
            width: min(540px, 100%);
            border-radius: 28px;
            padding: 18px;
            box-shadow: 0 24px 50px rgba(13, 32, 54, 0.24);
        }

        .modal-title {
            text-align: center;
            font-size: clamp(1.15rem, 4.4vw, 1.5rem);
            font-weight: 700;
        }

        .modal-desc {
            margin-top: 8px;
            text-align: center;
            color: var(--text-sub);
            font-size: 0.88rem;
            line-height: 1.5;
        }

        #tower-grid,
        #result-list {
            margin-top: 16px;
            display: grid;
            gap: 10px;
        }

        .tower-card,
        .result-row {
            border-radius: 20px;
            background: rgba(247, 250, 255, 0.94);
            border: 1px solid rgba(65, 95, 143, 0.12);
        }

        .tower-card {
            border: none;
            padding: 14px;
            text-align: left;
            cursor: pointer;
        }

        .tower-card[disabled] {
            opacity: 0.58;
            cursor: default;
        }

        .tower-head {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tower-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ffca69, #ff8d66);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }

        .tower-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .tower-tags {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            background: rgba(73, 197, 193, 0.12);
            color: #137d79;
        }

        .tag.warn {
            background: rgba(255, 210, 77, 0.18);
            color: #8d6600;
        }

        .tower-desc {
            margin-top: 10px;
            color: var(--text-sub);
            font-size: 0.84rem;
            line-height: 1.55;
        }

        #selection-status {
            margin-top: 12px;
            min-height: 1.2em;
            text-align: center;
            color: var(--text-sub);
            font-size: 0.83rem;
        }

        #countdown-number {
            margin-top: 8px;
            text-align: center;
            font-size: clamp(3rem, 17vw, 6rem);
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .result-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
        }

        .result-row.me {
            outline: 2px solid rgba(255, 127, 97, 0.62);
        }

        .result-rank {
            min-width: 32px;
            font-weight: 700;
        }

        .result-name {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .result-sub {
            margin-top: 4px;
            font-size: 0.76rem;
            color: var(--text-sub);
        }

        .result-time {
            font-weight: 700;
            color: var(--primary);
        }

        .modal-actions {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .action-btn {
            border: none;
            border-radius: 16px;
            min-height: 46px;
            padding: 11px;
            font-family: var(--font-main);
            font-size: 0.92rem;
            font-weight: 700;
            color: #fff;
            background: var(--primary);
        }

        .action-btn.secondary {
            background: rgba(36, 65, 95, 0.88);
        }

        #toast {
            position: fixed;
            left: 50%;
            top: calc(env(safe-area-inset-top, 0px) + 88px);
            transform: translateX(-50%);
            z-index: 32;
            display: none;
            max-width: calc(100vw - 28px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(24, 36, 55, 0.86);
            color: #fff;
            font-size: 0.82rem;
            font-weight: 700;
        }

        @media (max-width: 640px) {
            #player-board {
                grid-template-columns: 1fr;
            }

            .modal-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="hud">
        <div id="top-bar">
            <button id="exit-btn" class="hud-btn" type="button">나가기</button>
            <div id="title-card" class="panel">
                <div id="game-title">서아서준타워</div>
                <div id="game-subtitle">초보용 스테이지형 타워</div>
            </div>
            <button id="checkpoint-btn" class="hud-btn accent" type="button">체크포인트</button>
        </div>
        <div id="stats-bar">
            <div class="stat-pill panel">모드<strong id="mode-label">싱글</strong></div>
            <div class="stat-pill panel">스테이지<strong id="stage-label">1 / 150</strong></div>
            <div class="stat-pill panel">시간<strong id="time-label">00:00</strong></div>
            <div class="stat-pill panel">순위<strong id="rank-label">-</strong></div>
        </div>
        <div id="player-board"></div>
    </div>

    <div id="mobile-controls">
        <div id="stick-zone">
            <div id="stick-base">
                <div id="stick-knob"></div>
            </div>
        </div>
        <button id="jump-btn" type="button">점프</button>
    </div>

    <div id="toast"></div>

    <div id="selection-overlay" class="overlay active">
        <div class="modal-card panel">
            <div class="modal-title">타워 선택</div>
            <div id="selection-mode-desc" class="modal-desc">서아서준타워를 먼저 넣어 두고, 나중에 여기서 타워를 계속 추가할 수 있게 만들겠습니다.</div>
            <div id="tower-grid"></div>
            <div id="selection-status"></div>
            <div class="modal-actions">
                <button id="selection-close-btn" class="action-btn secondary" type="button">대기실로</button>
                <button id="selection-refresh-btn" class="action-btn" type="button">다시 불러오기</button>
            </div>
        </div>
    </div>

    <div id="countdown-overlay" class="overlay">
        <div class="modal-card panel">
            <div id="countdown-title" class="modal-title">타워 준비 중</div>
            <div id="countdown-desc" class="modal-desc">잠시만 기다려 주세요.</div>
            <div id="countdown-number">3</div>
        </div>
    </div>

    <div id="result-overlay" class="overlay">
        <div class="modal-card panel">
            <div id="result-title" class="modal-title">타워 클리어</div>
            <div id="result-desc" class="modal-desc">끝까지 잘 올라왔어요.</div>
            <div id="result-list"></div>
            <div class="modal-actions">
                <button id="retry-btn" class="action-btn" type="button">다시하기</button>
                <button id="result-exit-btn" class="action-btn secondary" type="button">대기실로</button>
            </div>
        </div>
    </div>

    <div id="confirm-exit-overlay" class="overlay">
        <div class="modal-card panel">
            <div class="modal-title">게임을 나갈까요?</div>
            <div class="modal-desc">현재 진행 중인 타워는 다시 선택해야 합니다.</div>
            <div class="modal-actions">
                <button id="confirm-exit-btn" class="action-btn secondary" type="button">나가기</button>
                <button id="cancel-exit-btn" class="action-btn" type="button">계속하기</button>
            </div>
        </div>
    </div>

    <script>
        const GAME_KEY = 'seoaTower';
        const SOLO_PROGRESS_KEY = 'seoaseojunTowerProgressV1';
        const STAGE_COUNT = 150;
        const FINISH_DEADLINE_MS = 45000;
        const PLAYER_HEIGHT = 1.72;
        const PLAYER_RADIUS = 0.42;
        const HALF_HEIGHT = PLAYER_HEIGHT * 0.5;

        const TOWER_CATALOG = [
            {
                id: 'seoa_beginner_150',
                name: '서아서준타워',
                icon: '🗼',
                difficulty: '초보',
                stageCount: STAGE_COUNT,
                desc: '처음 타워를 하는 아이들도 무리 없이 올라갈 수 있는 150스테이지 타워입니다.',
                themeColor: 0xff8f6b
            }
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyCmNAKmgF_L3o0QyOGh_oFAq_rMRtUyklw",
            authDomain: "goodluck-7c14b.firebaseapp.com",
            databaseURL: "https://goodluck-7c14b-default-rtdb.firebaseio.com",
            projectId: "goodluck-7c14b",
            storageBucket: "goodluck-7c14b.appspot.com",
            messagingSenderId: "858281658455",
            appId: "1:858281658455:web:9131280a459be983933b12"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();
        const auth = firebase.auth();

        // DOM refs
        const app = document.getElementById('app');
        const modeLabel = document.getElementById('mode-label');
        const stageLabel = document.getElementById('stage-label');
        const timeLabel = document.getElementById('time-label');
        const rankLabel = document.getElementById('rank-label');
        const gameTitle = document.getElementById('game-title');
        const gameSubtitle = document.getElementById('game-subtitle');
        const playerBoard = document.getElementById('player-board');
        const toastEl = document.getElementById('toast');
        const selectionOverlay = document.getElementById('selection-overlay');
        const selectionModeDesc = document.getElementById('selection-mode-desc');
        const selectionStatus = document.getElementById('selection-status');
        const towerGrid = document.getElementById('tower-grid');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownTitle = document.getElementById('countdown-title');
        const countdownDesc = document.getElementById('countdown-desc');
        const countdownNumber = document.getElementById('countdown-number');
        const resultOverlay = document.getElementById('result-overlay');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');
        const resultList = document.getElementById('result-list');
        const confirmExitOverlay = document.getElementById('confirm-exit-overlay');
        const stickZone = document.getElementById('stick-zone');
        const stickBase = document.getElementById('stick-base');
        const stickKnob = document.getElementById('stick-knob');
        const jumpBtn = document.getElementById('jump-btn');

        const state = {
            mode: 'solo',
            roomId: '',
            roomRef: null,
            towerRef: null,
            roomPlayers: {},
            towerData: null,
            currentTower: TOWER_CATALOG[0],
            currentTowerId: TOWER_CATALOG[0].id,
            isHost: false,
            myUid: '',
            myNick: '플레이어',
            myAvatar: '🙂',
            exiting: false,
            phase: 'selecting',
            checkpointIndex: 0,
            checkpointPos: new THREE.Vector3(0, HALF_HEIGHT + 2.2, 0),
            startedAt: 0,
            finishedAt: 0,
            finishRank: null,
            rewardIssued: false,
            resultsShown: false,
            localBest: loadSoloProgress(),
            lastSyncAt: 0,
            roomListeners: [],
            remotePlayers: new Map()
        };

        const input = {
            keys: { up: false, down: false, left: false, right: false },
            stick: { x: 0, y: 0 },
            jumpBuffer: 0,
            stickPointerId: -1
        };

        const physics = {
            groundAccel: 34,
            airAccel: 14,
            groundFriction: 18,
            airFriction: 1.2,
            moveSpeed: 7.8,
            airSpeed: 6.8,
            gravity: 30,
            jumpVelocity: 10.2,
            maxFallSpeed: -32,
            coyoteTime: 0.12,
            jumpBufferTime: 0.16
        };

        const world = {
            renderer: null,
            scene: null,
            camera: null,
            textureLoader: null,
            towerGroup: null,
            decoGroup: null,
            platformRecords: [],
            checkpointRecords: [],
            activeRing: null,
            localAvatar: null,
            lastFrame: 0,
            cam: {
                yaw: Math.PI,
                pitch: -0.36,
                dist: 7.5,
                dragId: -1,
                lastX: 0,
                lastY: 0
            },
            player: {
                pos: new THREE.Vector3(0, HALF_HEIGHT + 2.2, 0),
                vel: new THREE.Vector3(),
                grounded: false,
                coyote: 0,
                onPlatform: null,
                facing: Math.PI,
                finished: false
            }
        };

        function loadSoloProgress() {
            try {
                const raw = localStorage.getItem(SOLO_PROGRESS_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (error) {
                return {};
            }
        }

        function saveSoloProgress() {
            try {
                localStorage.setItem(SOLO_PROGRESS_KEY, JSON.stringify(state.localBest));
            } catch (error) {
                console.warn('진행 저장 실패:', error);
            }
        }

        function escapeHTML(str) {
            return String(str || '').replace(/[&<>"']/g, function(ch) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
            });
        }

        function setOverlay(el, active) {
            if (!el) return;
            el.classList.toggle('active', !!active);
        }

        function showToast(message, duration) {
            toastEl.textContent = message;
            toastEl.style.display = 'block';
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(function() {
                toastEl.style.display = 'none';
            }, duration || 1500);
        }

        function formatTime(ms) {
            const total = Math.max(0, Math.floor(ms / 1000));
            const min = Math.floor(total / 60);
            const sec = total % 60;
            return String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
        }

        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                roomId: params.get('roomId') || '',
                mode: params.get('mode') || ''
            };
        }

        function getCurrentElapsedMs() {
            if (!state.startedAt) return 0;
            return state.finishedAt ? (state.finishedAt - state.startedAt) : (Date.now() - state.startedAt);
        }

        function round2(num) {
            return Math.round(num * 100) / 100;
        }

        function approach(current, target, delta) {
            if (current < target) return Math.min(target, current + delta);
            if (current > target) return Math.max(target, current - delta);
            return current;
        }

        function getAvatarMarkup(avatarValue) {
            const avatarSet = typeof AVATAR_SETS !== 'undefined' ? AVATAR_SETS[avatarValue] : null;
            if (avatarSet && avatarSet.front) {
                return '<img src="' + escapeHTML(avatarSet.front) + '" alt="avatar">';
            }
            if (typeof avatarValue === 'string' && (avatarValue.startsWith('http') || /\.(png|jpg|jpeg|gif|webp)$/i.test(avatarValue))) {
                return '<img src="' + escapeHTML(avatarValue) + '" alt="avatar">';

        function updateStick(clientX, clientY) {
            const rect = stickBase.getBoundingClientRect();
            const cx = rect.left + rect.width * 0.5;
            const cy = rect.top + rect.height * 0.5;
            let dx = clientX - cx;
            let dy = clientY - cy;
            const max = rect.width * 0.32;
            const len = Math.hypot(dx, dy);
            if (len > max) {
                dx = (dx / len) * max;
                dy = (dy / len) * max;
            }
            input.stick.x = dx / max;
            input.stick.y = dy / max;
            stickKnob.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
        }

        function queueJump() {
            input.jumpBuffer = physics.jumpBufferTime;
        }

        function getMoveInput() {
            let x = 0;
            let z = 0;
            if (input.keys.left) x -= 1;
            if (input.keys.right) x += 1;
            if (input.keys.up) z += 1;
            if (input.keys.down) z -= 1;
            x += input.stick.x;
            z += -input.stick.y;
            const len = Math.hypot(x, z);
            if (len > 1) {
                x /= len;
                z /= len;
            }
            return { x: x, z: z };
        }

        function makeStudTexture(baseColor, studColor, lineColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 256, 256);
            for (let y = 0; y < 256; y += 32) {
                for (let x = 0; x < 256; x += 32) {
                    ctx.strokeStyle = lineColor;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, 32, 32);
                    ctx.fillStyle = studColor;
                    ctx.beginPath();
                    ctx.roundRect(x + 8, y + 8, 16, 16, 4);
                    ctx.fill();
                    ctx.strokeRect(x + 8, y + 8, 16, 16);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function getDirVector(index) {
            return [
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(0, 0, -1),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1)
            ][index % 4].clone();
        }

        function createEmojiTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 320;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = 'rgba(36, 65, 95, 0.18)';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.roundRect(28, 32, 200, 250, 36);
            ctx.fill();
            ctx.stroke();
            ctx.font = '128px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#263238';
            ctx.fillText(text || '🙂', 128, 160);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function resolveAvatarTextures(avatarValue) {
            const fallback = createEmojiTexture(avatarValue || '🙂');
            const result = { front: fallback, back: fallback, left: fallback, right: fallback };
            try {
                const avatarSet = typeof AVATAR_SETS !== 'undefined' ? AVATAR_SETS[avatarValue] : null;
                if (avatarSet) {
                    ['front', 'back', 'left', 'right'].forEach(function(dir) {
                        if (!avatarSet[dir]) return;
                        const texture = world.textureLoader.load(avatarSet[dir]);
                        texture.colorSpace = THREE.SRGBColorSpace;
                        result[dir] = texture;
                    });
                    return result;
                }
                if (typeof avatarValue === 'string' && (avatarValue.startsWith('http') || /\.(png|jpg|jpeg|gif|webp)$/i.test(avatarValue))) {
                    const texture = world.textureLoader.load(avatarValue);
                    texture.colorSpace = THREE.SRGBColorSpace;
                    result.front = texture;
                    result.back = texture;
                    result.left = texture;
                    result.right = texture;
                }
            } catch (error) {
                console.warn('아바타 텍스처 로드 실패:', error);
            }
            return result;
        }

        function getFacingDirection(yaw) {
            const wrapped = ((yaw % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            if (wrapped > Math.PI * 0.25 && wrapped <= Math.PI * 0.75) return 'right';
            if (wrapped > Math.PI * 0.75 && wrapped <= Math.PI * 1.25) return 'back';
            if (wrapped > Math.PI * 1.25 && wrapped <= Math.PI * 1.75) return 'left';
            return 'front';
        }

        function createAvatarEntity(avatarValue) {
            const shadow = new THREE.Mesh(
                new THREE.CircleGeometry(0.5, 18),
                new THREE.MeshBasicMaterial({ color: 0x000000, opacity: 0.18, transparent: true })
            );
            shadow.rotation.x = -Math.PI / 2;
            shadow.position.y = 0.03;

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ transparent: true }));
            sprite.scale.set(1.62, 2.12, 1);
            sprite.center.set(0.5, 0);
            sprite.position.y = 0.04;

            const group = new THREE.Group();
            group.add(shadow);
            group.add(sprite);

            return {
                group: group,
                sprite: sprite,
                shadow: shadow,
                textures: resolveAvatarTextures(avatarValue),
                currentDir: '',
                targetPos: new THREE.Vector3()
            };
        }

        function applyAvatarDir(entity, dir) {
            if (!entity || entity.currentDir === dir) return;
            entity.currentDir = dir;
            entity.sprite.material.map = entity.textures[dir] || entity.textures.front;
            entity.sprite.material.needsUpdate = true;
        }

            world.renderer.domElement.addEventListener('pointerdown', function(e) {
                if (e.clientX < window.innerWidth * 0.42) return;
                world.cam.dragId = e.pointerId;
                world.cam.lastX = e.clientX;
                world.cam.lastY = e.clientY;
                world.renderer.domElement.setPointerCapture(e.pointerId);
            });
            world.renderer.domElement.addEventListener('pointermove', function(e) {
                if (e.pointerId !== world.cam.dragId) return;
                const dx = e.clientX - world.cam.lastX;
                const dy = e.clientY - world.cam.lastY;
                world.cam.lastX = e.clientX;
                world.cam.lastY = e.clientY;
                world.cam.yaw -= dx * 0.0052;
                world.cam.pitch -= dy * 0.0038;
                world.cam.pitch = Math.max(-1.04, Math.min(0.2, world.cam.pitch));
            });
            const endDrag = function(e) {
                if (e.pointerId === world.cam.dragId) {
                    world.cam.dragId = -1;
                }
            };
            world.renderer.domElement.addEventListener('pointerup', endDrag);
            world.renderer.domElement.addEventListener('pointercancel', endDrag);

            window.addEventListener('resize', function() {

                world.camera.updateProjectionMatrix();

        function addPlatform(record) {
            const geometry = new THREE.BoxGeometry(record.sizeX, record.sizeY, record.sizeZ);
            const mesh = new THREE.Mesh(geometry, record.material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.set(record.x, record.y, record.z);
            record.mesh = mesh;
            world.platformRecords.push(record);
            world.towerGroup.add(mesh);
            return record;
        }

        function buildTower(tower) {
            while (world.towerGroup.children.length) {
                const child = world.towerGroup.children[world.towerGroup.children.length - 1];
                world.towerGroup.remove(child);
                if (child.geometry) child.geometry.dispose();
                if (Array.isArray(child.material)) {
                    child.material.forEach(function(material) {
                        if (material && material.dispose) material.dispose();
                    });
                } else if (child.material && child.material.dispose) {
                    child.material.dispose();
                }
            }
            world.platformRecords = [];
            world.checkpointRecords = [];
            state.currentTower = tower;
            state.currentTowerId = tower.id;
            gameTitle.textContent = tower.name;
            gameSubtitle.textContent = tower.difficulty + ' · ' + tower.stageCount + ' 스테이지';

            const spawnMat = new THREE.MeshStandardMaterial({ color: tower.themeColor, roughness: 0.48, metalness: 0.08 });
            const baseTexture = makeStudTexture('#ffffff', '#ededed', '#cacaca');
            baseTexture.repeat.set(2, 2);
            const platformMat = new THREE.MeshStandardMaterial({ map: baseTexture, roughness: 0.68, metalness: 0.03 });

            addPlatform({ x: 0, y: 1.2, z: 0, sizeX: 7.6, sizeY: 1.2, sizeZ: 7.6, material: spawnMat, checkpointIndex: 0 });
            world.checkpointRecords[0] = { x: 0, y: HALF_HEIGHT + 2.2, z: 0 };

            let cursor = new THREE.Vector3(0, 1.2, 0);
            let dirIndex = 0;
            for (let stage = 1; stage <= tower.stageCount; stage++) {
                if ((stage - 1) % 12 === 0 && stage > 1) {
                    dirIndex = (dirIndex + 1) % 4;
                }
                const heading = getDirVector(dirIndex);
                const side = getDirVector((dirIndex + 1) % 4);
                const rise = 3.75 + ((stage % 5 === 0) ? 0.28 : 0);
                const gap = 2.35 + (stage / tower.stageCount) * 0.35;
                const offset = 2 + ((stage % 3) * 0.42);
                const pattern = stage % 5;
                const steps = pattern === 0
                    ? [ [gap * 1.0, 0.95, 0], [gap * 2.25, 1.95, 0], [gap * 3.6, rise, 0] ]
                    : pattern === 1
                    ? [ [gap * 1.0, 0.9, offset], [gap * 2.1, 1.9, -offset * 0.82], [gap * 3.45, rise, 0] ]
                    : pattern === 2
                    ? [ [gap * 1.0, 0.82, offset * 0.8], [gap * 2.0, 1.66, 0], [gap * 3.0, 2.52, -offset * 0.7], [gap * 4.0, rise, 0] ]
                    : pattern === 3
                    ? [ [gap * 1.05, 0.8, 0], [gap * 2.5, 1.85, 0], [gap * 4.1, rise, 0] ]
                    : [ [gap * 1.0, 0.85, offset * 0.72], [gap * 2.0, 1.72, offset * 0.72], [gap * 3.15, 2.58, -offset * 0.52], [gap * 4.35, rise, 0] ];

                steps.forEach(function(step, idx) {
                    const pos = cursor.clone()
                        .add(heading.clone().multiplyScalar(step[0]))
                        .add(side.clone().multiplyScalar(step[2]));
                    pos.y = cursor.y + step[1];
                    const isCheckpoint = idx === steps.length - 1;
                    const size = isCheckpoint ? 4 : (pattern === 3 && idx < steps.length - 1 ? 4.8 : 2.4);
                    const sizeZ = pattern === 3 && idx < steps.length - 1 ? 1.2 : size;
                    addPlatform({
                        x: pos.x,
                        y: pos.y,
                        z: pos.z,
                        sizeX: Math.abs(heading.x) > 0 ? size : sizeZ,
                        sizeY: isCheckpoint ? 0.96 : 0.76,
                        sizeZ: Math.abs(heading.x) > 0 ? sizeZ : size,
                        material: isCheckpoint ? spawnMat.clone() : platformMat.clone(),
                        checkpointIndex: isCheckpoint ? stage : null
                    });
                    if (isCheckpoint) {
                        world.checkpointRecords[stage] = { x: pos.x, y: pos.y + HALF_HEIGHT + 0.58, z: pos.z };
                        cursor = new THREE.Vector3(pos.x, pos.y, pos.z);
                    }
                });
            }

            setCheckpoint(0, false);
            respawnToCheckpoint(false);
            syncHud();
        }
        function renderPlayerBoard() {
            if (state.mode !== 'multi') {
                playerBoard.style.display = 'none';
                return;
            }
            const progress = (state.towerData && state.towerData.progress) || {};
            const finishOrder = (state.towerData && state.towerData.finishOrder) || {};
            const rows = Object.keys(state.roomPlayers).map(function(uid) {
                const player = state.roomPlayers[uid] || {};
                const prog = progress[uid] || {};
                const finish = finishOrder[uid] || {};
                return {
                    uid: uid,
                    nickname: player.nickname || prog.nickname || '플레이어',
                    avatar: player.avatar || prog.avatar || '🙂',
                    checkpointIndex: Number(prog.checkpointIndex || 0),
                    rank: finish.rank || null,
                    totalMs: finish.totalMs || null
                };
            }).sort(function(a, b) {
                if (a.rank && b.rank) return a.rank - b.rank;
                if (a.rank) return -1;
                if (b.rank) return 1;
                return b.checkpointIndex - a.checkpointIndex;
            });

            playerBoard.innerHTML = '';
            rows.forEach(function(row) {
                const card = document.createElement('div');
                card.className = 'player-card panel';
                if (row.uid === state.myUid) card.classList.add('me');
                const rankText = row.rank ? row.rank + '등' : '-';
                const stageText = row.totalMs ? ('완주 ' + formatTime(row.totalMs)) : ('스테이지 ' + Math.max(1, row.checkpointIndex) + ' / ' + STAGE_COUNT);
                card.innerHTML = ''
                    + '<div class="player-avatar">' + getAvatarMarkup(row.avatar) + '</div>'
                    + '<div><div class="player-name">' + escapeHTML(row.nickname) + '</div><div class="player-stage">' + escapeHTML(stageText) + '</div></div>'
                    + '<div class="player-rank">' + escapeHTML(rankText) + '</div>';
                playerBoard.appendChild(card);
            });
            playerBoard.style.display = rows.length ? 'grid' : 'none';
        }

        function syncLocalProgress(force) {
            if (state.mode !== 'multi' || !state.towerRef || state.phase !== 'playing' || world.player.finished) return;
            const now = Date.now();
            if (!force && now - state.lastSyncAt < 140) return;
            state.lastSyncAt = now;
            state.towerRef.child('progress/' + state.myUid).update({
                nickname: state.myNick,
                avatar: state.myAvatar,
                checkpointIndex: state.checkpointIndex,
                x: round2(world.player.pos.x),
                y: round2(world.player.pos.y),
                z: round2(world.player.pos.z),
                facing: round2(world.player.facing),
                updatedAt: now,
                finishedAt: null
            });
        }

        function updateRemotePlayers() {
            if (state.mode !== 'multi') return;
            const progress = (state.towerData && state.towerData.progress) || {};
            const livingIds = new Set();
            Object.keys(state.roomPlayers).forEach(function(uid) {
                if (uid === state.myUid) return;
                livingIds.add(uid);
                const player = state.roomPlayers[uid] || {};
                const prog = progress[uid] || {};
                let remote = state.remotePlayers.get(uid);
                if (!remote) {
                    remote = createAvatarEntity(player.avatar || prog.avatar || '🙂');
                    state.remotePlayers.set(uid, remote);
                    world.scene.add(remote.group);
                    applyAvatarDir(remote, 'front');
                }
                remote.targetPos.set(Number(prog.x || 0), Number(prog.y || (HALF_HEIGHT + 2.2)), Number(prog.z || 0));
                remote.group.position.lerp(remote.targetPos.clone().add(new THREE.Vector3(0, -HALF_HEIGHT, 0)), 0.24);
                applyAvatarDir(remote, getFacingDirection(Number(prog.facing || Math.PI)));
            });
            Array.from(state.remotePlayers.keys()).forEach(function(uid) {
                if (livingIds.has(uid)) return;
                const remote = state.remotePlayers.get(uid);
                world.scene.remove(remote.group);
                state.remotePlayers.delete(uid);
            });
        }

        function updateCamera(dt) {
            const portrait = window.innerHeight >= window.innerWidth;
            const desiredDist = portrait ? 7.2 : 8.2;
            world.cam.dist = approach(world.cam.dist, desiredDist, dt * 4.8);
            const x = world.player.pos.x + Math.sin(world.cam.yaw) * Math.cos(world.cam.pitch) * world.cam.dist;
            const y = world.player.pos.y + 1.45 + Math.sin(world.cam.pitch) * world.cam.dist;
            const z = world.player.pos.z + Math.cos(world.cam.yaw) * Math.cos(world.cam.pitch) * world.cam.dist;
            world.camera.position.lerp(new THREE.Vector3(x, y, z), 0.14);
            world.camera.lookAt(world.player.pos.x, world.player.pos.y + 0.78, world.player.pos.z);
        }

        function updateLocalPlayer(dt) {
            if (state.phase !== 'playing' || world.player.finished) return;

            input.jumpBuffer = Math.max(0, input.jumpBuffer - dt);
            world.player.coyote = Math.max(0, world.player.coyote - dt);
            const move = getMoveInput();
            const forwardX = -Math.sin(world.cam.yaw);
            const forwardZ = -Math.cos(world.cam.yaw);
            const rightX = Math.cos(world.cam.yaw);
            const rightZ = -Math.sin(world.cam.yaw);
            const desiredX = rightX * move.x + forwardX * move.z;
            const desiredZ = rightZ * move.x + forwardZ * move.z;
            const desiredLen = Math.hypot(desiredX, desiredZ);
            const nx = desiredLen > 0.001 ? desiredX / desiredLen : 0;
            const nz = desiredLen > 0.001 ? desiredZ / desiredLen : 0;

            if (desiredLen > 0.001) {
                const accel = world.player.grounded ? physics.groundAccel : physics.airAccel;
                const maxSpeed = world.player.grounded ? physics.moveSpeed : physics.airSpeed;
                world.player.vel.x = approach(world.player.vel.x, nx * maxSpeed, accel * dt);
                world.player.vel.z = approach(world.player.vel.z, nz * maxSpeed, accel * dt);
                world.player.facing = Math.atan2(world.player.vel.x, world.player.vel.z);
            } else {
                const friction = world.player.grounded ? physics.groundFriction : physics.airFriction;
                world.player.vel.x = approach(world.player.vel.x, 0, friction * dt);
                world.player.vel.z = approach(world.player.vel.z, 0, friction * dt);
            }

            if (input.jumpBuffer > 0 && (world.player.grounded || world.player.coyote > 0)) {
                world.player.vel.y = physics.jumpVelocity;
                world.player.grounded = false;
                world.player.coyote = 0;
                input.jumpBuffer = 0;
            }

            world.player.vel.y = Math.max(physics.maxFallSpeed, world.player.vel.y - physics.gravity * dt);
            const prevY = world.player.pos.y;
            world.player.pos.addScaledVector(world.player.vel, dt);
            world.player.grounded = false;

            const footPrev = prevY - HALF_HEIGHT;
            const footNow = world.player.pos.y - HALF_HEIGHT;
            for (let i = 0; i < world.platformRecords.length; i++) {
                const record = world.platformRecords[i];
                const halfX = record.sizeX * 0.5 + PLAYER_RADIUS * 0.76;
                const halfZ = record.sizeZ * 0.5 + PLAYER_RADIUS * 0.76;
                if (Math.abs(world.player.pos.x - record.x) > halfX || Math.abs(world.player.pos.z - record.z) > halfZ) continue;
                const top = record.y + record.sizeY * 0.5;
                if (footPrev >= top - 0.3 && footNow <= top + 0.18 && world.player.vel.y <= 0) {
                    world.player.pos.y = top + HALF_HEIGHT;
                    world.player.vel.y = 0;
                    world.player.grounded = true;
                    world.player.coyote = physics.coyoteTime;
                    if (typeof record.checkpointIndex === 'number' && record.checkpointIndex > state.checkpointIndex) {
                        setCheckpoint(record.checkpointIndex, true);
                        if (record.checkpointIndex >= STAGE_COUNT) {
                            finishRun();
                        }
                    }
                    break;
                }
            }

            if (!world.player.grounded && footNow < state.checkpointPos.y - 15) {
                respawnToCheckpoint(false);
            }

            world.localAvatar.group.position.set(world.player.pos.x, world.player.pos.y - HALF_HEIGHT, world.player.pos.z);
            applyAvatarDir(world.localAvatar, getFacingDirection(world.player.facing));
            world.localAvatar.shadow.scale.setScalar(world.player.grounded ? 1 : 0.82);
            syncLocalProgress(false);
        }

        function startCountdown(endAt, title, desc, onFinish) {
            state.phase = 'countdown';
            countdownTitle.textContent = title;
            countdownDesc.textContent = desc;
            setOverlay(countdownOverlay, true);
            clearTimeout(startCountdown.timer);
            (function tick() {
                const remain = Math.max(0, endAt - Date.now());
                if (remain <= 0) {
                    countdownNumber.textContent = 'GO!';
                    startCountdown.timer = setTimeout(function() {
                        setOverlay(countdownOverlay, false);
                        onFinish();
                    }, 420);
                    return;
                }
                countdownNumber.textContent = String(Math.ceil(remain / 1000));
                startCountdown.timer = setTimeout(tick, 120);
            }());
        }

        function beginSoloTower(towerId) {
            const tower = TOWER_CATALOG.find(function(item) { return item.id === towerId; }) || TOWER_CATALOG[0];
            buildTower(tower);
            resetRunState(true);
            closeSelectionModal();
            startCountdown(Date.now() + 3500, tower.name, '초보도 쉽게 오를 수 있는 타워를 시작합니다.', function() {
                state.phase = 'playing';
                state.startedAt = Date.now();
                syncHud();
            });
        }

        async function chooseTowerForRoom(towerId) {
            if (!state.isHost || !state.towerRef) return;
            const tower = TOWER_CATALOG.find(function(item) { return item.id === towerId; }) || TOWER_CATALOG[0];
            await state.towerRef.update({
                selectedTowerId: tower.id,
                towerName: tower.name,
                status: 'countdown',
                countdownEndsAt: Date.now() + 3500,
                startedAt: null,
                finishedAt: null,
                finishOrder: null,
                progress: null
            });
        }

        function finishRun() {
            if (world.player.finished) return;
            world.player.finished = true;
            state.finishedAt = Date.now();
            if (state.mode === 'solo') {
                state.phase = 'finished';
                const prev = state.localBest[state.currentTowerId];
                const elapsed = getCurrentElapsedMs();
                if (!prev || !prev.bestTime || elapsed < prev.bestTime) {
                    state.localBest[state.currentTowerId] = { bestTime: elapsed, clearedAt: Date.now() };
                    saveSoloProgress();
                }
                if (!state.rewardIssued && typeof applyExpAndPoints === 'function') {
                    state.rewardIssued = true;
                    applyExpAndPoints(db, state.myUid, 120, 80);
                }
                showResults();
                return;
            }

            state.towerRef.child('finishOrder').transaction(function(current) {
                const next = current || {};
                if (next[state.myUid]) return next;
                next[state.myUid] = {
                    rank: Object.keys(next).length + 1,
                    totalMs: getCurrentElapsedMs(),
                    finishedAt: Date.now(),
                    nickname: state.myNick,
                    avatar: state.myAvatar
                };
                return next;
            });

            state.towerRef.child('progress/' + state.myUid).update({
                nickname: state.myNick,
                avatar: state.myAvatar,
                checkpointIndex: STAGE_COUNT,
                x: round2(world.player.pos.x),
                y: round2(world.player.pos.y),
                z: round2(world.player.pos.z),
                facing: round2(world.player.facing),
                updatedAt: Date.now(),
                finishedAt: Date.now()
            });
            showToast('도착! 결과를 기다리는 중이에요.', 1400);
        }

        function showResults() {
            const rows = [];
            if (state.mode === 'solo') {
                rows.push({ uid: state.myUid, nickname: state.myNick, rank: 1, totalMs: getCurrentElapsedMs(), checkpointIndex: STAGE_COUNT });
            } else {
                const progress = (state.towerData && state.towerData.progress) || {};
                const finishOrder = (state.towerData && state.towerData.finishOrder) || {};
                Object.keys(state.roomPlayers).forEach(function(uid) {
                    const player = state.roomPlayers[uid] || {};
                    const prog = progress[uid] || {};
                    const finish = finishOrder[uid] || {};
                    rows.push({
                        uid: uid,
                        nickname: player.nickname || prog.nickname || '플레이어',
                        rank: finish.rank || null,
                        totalMs: finish.totalMs || null,
                        checkpointIndex: Number(prog.checkpointIndex || 0)
                    });
                });
                rows.sort(function(a, b) {
                    if (a.rank && b.rank) return a.rank - b.rank;
                    if (a.rank) return -1;
                    if (b.rank) return 1;
                    return b.checkpointIndex - a.checkpointIndex;
                });
            }

            resultTitle.textContent = state.mode === 'solo' ? '타워 클리어' : '레이스 결과';
            resultDesc.textContent = state.mode === 'solo' ? '서아서준타워를 끝까지 올랐어요.' : '친구들과 함께 오른 결과입니다.';
            resultList.innerHTML = '';
            rows.forEach(function(row, index) {
                const div = document.createElement('div');
                div.className = 'result-row';
                if (row.uid === state.myUid) div.classList.add('me');
                div.innerHTML = ''
                    + '<div class="result-rank">' + escapeHTML(row.rank ? (row.rank + '등') : ((index + 1) + '위')) + '</div>'
                    + '<div><div class="result-name">' + escapeHTML(row.nickname) + '</div><div class="result-sub">' + (row.totalMs ? '완주 시간' : '도달 스테이지') + '</div></div>'
                    + '<div class="result-time">' + escapeHTML(row.totalMs ? formatTime(row.totalMs) : (Math.max(1, row.checkpointIndex) + ' / ' + STAGE_COUNT)) + '</div>';
                resultList.appendChild(div);
            });
            setOverlay(resultOverlay, true);
            if (state.mode === 'multi' && !state.rewardIssued) {
                const finishOrder = (state.towerData && state.towerData.finishOrder) || {};
                const mine = finishOrder[state.myUid];
                if (mine && typeof applyExpAndPoints === 'function') {
                    state.rewardIssued = true;
                    if (mine.rank === 1) applyExpAndPoints(db, state.myUid, 150, 100);
                    else if (mine.rank === 2) applyExpAndPoints(db, state.myUid, 120, 80);
                    else applyExpAndPoints(db, state.myUid, 90, 55);
                }
            }
        }

        function maybeFinishMultiplayer() {
            if (state.mode !== 'multi' || !state.isHost || !state.towerData || state.towerData.status !== 'playing') return;
            const ids = Object.keys(state.roomPlayers);
            if (!ids.length) return;
            const finishOrder = state.towerData.finishOrder || {};
            if (!Object.keys(finishOrder).length) return;
            if (Object.keys(finishOrder).length === ids.length) {
                state.towerRef.update({ status: 'finished', finishedAt: Date.now() });
            } else if (!state.towerData.finishedAt) {
                const first = Object.keys(finishOrder).sort(function(a, b) {
                    return finishOrder[a].rank - finishOrder[b].rank;
                })[0];
                if (first && Date.now() - finishOrder[first].finishedAt > FINISH_DEADLINE_MS) {
                    state.towerRef.update({ status: 'finished', finishedAt: Date.now() });
                }
            }
        }

        async function initMultiplayer() {
            state.roomRef = db.ref('rooms/' + state.roomId);
            state.towerRef = state.roomRef.child('gameData/' + GAME_KEY);
            const roomSnap = await state.roomRef.once('value');
            if (!roomSnap.exists()) {
                alert('방을 찾을 수 없습니다.');
                window.location.replace('대기실.html');
                return;
            }
            const roomData = roomSnap.val() || {};
            state.roomPlayers = roomData.players || {};
            state.isHost = roomData.hostId === state.myUid;
            await state.roomRef.child('players/' + state.myUid).update({
                nickname: state.myNick,
                avatar: state.myAvatar,
                isHost: state.isHost
            });
            state.roomRef.child('players/' + state.myUid).onDisconnect().remove();
            state.towerRef.child('progress/' + state.myUid).onDisconnect().remove();

            const onPlayers = function(snapshot) {
                state.roomPlayers = snapshot.val() || {};
                if (!state.roomPlayers[state.myUid]) {
                    window.location.replace('대기실.html');
                    return;
                }
                renderPlayerBoard();
                maybeFinishMultiplayer();
            };
            const onHost = function(snapshot) {
                state.isHost = snapshot.val() === state.myUid;
                updateSelectionText();
                renderTowerCards();
            };
            const onTower = function(snapshot) {
                state.towerData = snapshot.val() || null;
                if (!state.towerData) {
                    if (state.isHost) {
                        state.towerRef.set({ selectedTowerId: '', towerName: '', status: 'selecting', countdownEndsAt: 0, startedAt: null, finishedAt: null, finishOrder: null, progress: null });
                    }
                    return;
                }

                if (state.towerData.selectedTowerId) {
                    const tower = TOWER_CATALOG.find(function(item) { return item.id === state.towerData.selectedTowerId; }) || TOWER_CATALOG[0];
                    if (state.currentTowerId !== tower.id || !world.platformRecords.length) {
                        buildTower(tower);
                        resetRunState(true);
                    }
                }

                if (state.towerData.status === 'selecting') {
                    openSelectionModal();
                } else if (state.towerData.status === 'countdown') {
                    closeSelectionModal();
                    state.startedAt = 0;
                    state.finishedAt = 0;
                    state.finishRank = null;
                    resetRunState(true);
                    const countdownEndsAt = Number(state.towerData.countdownEndsAt || (Date.now() + 2000));
                    startCountdown(countdownEndsAt, state.currentTower.name, state.isHost ? '친구들과 같이 시작합니다.' : '방장이 시작 신호를 보내고 있어요.', function() {
                        if (state.isHost) {
                            state.towerRef.update({ status: 'playing', startedAt: Date.now(), finishedAt: null, finishOrder: null, progress: null });
                        }
                    });
                } else if (state.towerData.status === 'playing') {
                    state.phase = 'playing';
                    closeSelectionModal();
                    setOverlay(countdownOverlay, false);
                    state.startedAt = Number(state.towerData.startedAt || Date.now());
                    syncLocalProgress(true);
                    maybeFinishMultiplayer();
                } else if (state.towerData.status === 'finished') {
                    state.phase = 'finished';
                    const finishOrder = state.towerData.finishOrder || {};
                    state.finishRank = finishOrder[state.myUid] ? finishOrder[state.myUid].rank : null;
                    showResults();
                }
                renderPlayerBoard();
            };
            state.roomRef.child('players').on('value', onPlayers);
            state.roomRef.child('hostId').on('value', onHost);
            state.towerRef.on('value', onTower);
            state.roomListeners.push({ ref: state.roomRef.child('players'), event: 'value', callback: onPlayers });
            state.roomListeners.push({ ref: state.roomRef.child('hostId'), event: 'value', callback: onHost });
            state.roomListeners.push({ ref: state.towerRef, event: 'value', callback: onTower });
            openSelectionModal();
        }

        function leaveGame() {
            state.exiting = true;
            setOverlay(confirmExitOverlay, false);
            if (state.mode !== 'multi' || !state.roomRef) {
                window.location.replace('대기실.html');
                return;
            }
            cancelRoomListeners();
            state.roomRef.child('players/' + state.myUid).onDisconnect().cancel();
            state.towerRef.child('progress/' + state.myUid).onDisconnect().cancel();
            state.roomRef.child('players').once('value').then(function(snapshot) {
                const players = snapshot.val() || {};
                const remaining = Object.keys(players).filter(function(uid) { return uid !== state.myUid; });
                if (!remaining.length) {
                    return state.roomRef.remove();
                }
                const updates = {};
                updates['players/' + state.myUid] = null;
                updates['gameData/' + GAME_KEY + '/progress/' + state.myUid] = null;
                updates['gameData/' + GAME_KEY + '/finishOrder/' + state.myUid] = null;
                if (state.isHost) {
                    updates['hostId'] = remaining[0];
                    updates['players/' + remaining[0] + '/isHost'] = true;
                }
                return state.roomRef.update(updates);
            }).catch(function(error) {
                console.warn('게임 종료 정리 실패:', error);
            }).finally(function() {
                window.location.replace('대기실.html');
            });
        }

        function updateWorld(now) {
            const dt = Math.min((now - (world.lastFrame || now)) / 1000, 0.033);
            world.lastFrame = now;
            updateLocalPlayer(dt);
            updateRemotePlayers();
            updateCamera(dt);
            if (world.activeRing) {
                world.activeRing.rotation.y += dt * 1.8;
            }
            world.renderer.render(world.scene, world.camera);
            syncHud();
            requestAnimationFrame(updateWorld);
        }

        function bindControls() {
            document.addEventListener('keydown', function(e) {
                if (e.code === 'KeyW' || e.code === 'ArrowUp') input.keys.up = true;
                if (e.code === 'KeyS' || e.code === 'ArrowDown') input.keys.down = true;
                if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.keys.left = true;
                if (e.code === 'KeyD' || e.code === 'ArrowRight') input.keys.right = true;
                if (e.code === 'Space') {
                    queueJump();
                    e.preventDefault();
                }
            }, { passive: false });
            document.addEventListener('keyup', function(e) {
                if (e.code === 'KeyW' || e.code === 'ArrowUp') input.keys.up = false;
                if (e.code === 'KeyS' || e.code === 'ArrowDown') input.keys.down = false;
                if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.keys.left = false;
                if (e.code === 'KeyD' || e.code === 'ArrowRight') input.keys.right = false;
            });
            stickZone.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                input.stickPointerId = e.pointerId;
                stickZone.setPointerCapture(e.pointerId);
                updateStick(e.clientX, e.clientY);
            }, { passive: false });
            stickZone.addEventListener('pointermove', function(e) {
                if (e.pointerId !== input.stickPointerId) return;
                e.preventDefault();
                updateStick(e.clientX, e.clientY);
            }, { passive: false });
            const stopStick = function(e) {
                if (e.pointerId !== input.stickPointerId) return;
                input.stickPointerId = -1;
                input.stick.x = 0;
                input.stick.y = 0;
                stickKnob.style.transform = 'translate(-50%, -50%)';
            };
            stickZone.addEventListener('pointerup', stopStick);
            stickZone.addEventListener('pointercancel', stopStick);
            jumpBtn.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                queueJump();
            }, { passive: false });

            document.getElementById('checkpoint-btn').addEventListener('click', function() { respawnToCheckpoint(true); });
            document.getElementById('exit-btn').addEventListener('click', function() { setOverlay(confirmExitOverlay, true); });
            document.getElementById('confirm-exit-btn').addEventListener('click', leaveGame);
            document.getElementById('cancel-exit-btn').addEventListener('click', function() { setOverlay(confirmExitOverlay, false); });
            document.getElementById('result-exit-btn').addEventListener('click', leaveGame);
            document.getElementById('retry-btn').addEventListener('click', function() {
                if (state.mode === 'solo') {
                    setOverlay(resultOverlay, false);
                    openSelectionModal();
                } else if (state.isHost && state.towerRef) {
                    state.startedAt = 0;
                    state.finishedAt = 0;
                    state.finishRank = null;
                    state.towerRef.update({ selectedTowerId: '', towerName: '', status: 'selecting', countdownEndsAt: 0, startedAt: null, finishedAt: null, finishOrder: null, progress: null });
                    setOverlay(resultOverlay, false);
                } else {
                    showToast('방장이 다시하기를 눌러야 해요.', 1400);
                }
            });
            document.getElementById('selection-close-btn').addEventListener('click', leaveGame);
            document.getElementById('selection-refresh-btn').addEventListener('click', function() {
                updateSelectionText();
                renderTowerCards();
            });
        }

        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.replace('index.html');
                return;
            }
            state.myUid = user.uid;
            state.myNick = localStorage.getItem('userNickname') || 'Player';
            state.myAvatar = localStorage.getItem('userAvatar') || '🙂';
            try {
                const profileSnap = await db.ref('users/' + state.myUid + '/profile').once('value');
                const profile = profileSnap.val() || {};
                if (profile.nickname) state.myNick = profile.nickname;
                if (profile.avatar) state.myAvatar = profile.avatar;
            } catch (error) {
                console.warn('프로필 읽기 실패:', error);
            }

            initThree();
            world.localAvatar.textures = resolveAvatarTextures(state.myAvatar);
            applyAvatarDir(world.localAvatar, 'front');
            bindControls();

            const params = getQueryParams();
            state.roomId = params.roomId;
            state.mode = state.roomId ? 'multi' : 'solo';
            if (state.mode === 'multi') {
                await initMultiplayer();
            } else {
                openSelectionModal();
            }
            requestAnimationFrame(updateWorld);
        });

    </script>
</body>
