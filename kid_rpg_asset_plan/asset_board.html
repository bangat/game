<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>잠룡/어나더던전 ARPG 에셋 검수판</title>
  <link rel="stylesheet" href="/asset_board.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Asset Review Board</p>
        <h1>잠룡/어나더던전 모바일 ARPG 에셋 검수판</h1>
        <p class="lead">
          기존 승인본은 유지하고, 이번 차수 새 숏리스트만 다시 검수하는 보드입니다.
          카드마다 상태와 메모를 정하고 <strong>저장</strong>을 누르면 바로 JSON에 기록됩니다.
        </p>
        <p class="hint">
          캐릭터는 4방향 스프라이트 시트, 맵은 허브/필드/던전, UI는 상단 HUD + 우측 메뉴 + 하단 스킬 패드 기준만 남깁니다.
        </p>
      </div>
      <div class="hero-actions">
        <button id="save-button" class="primary-button" type="button">저장</button>
        <div class="save-meta">
          <strong id="save-state">불러오는 중...</strong>
          <span id="save-time">저장 기록 없음</span>
        </div>
      </div>
    </header>

    <section class="summary" id="summary"></section>

    <section class="filters">
      <div class="filter-group">
        <span class="filter-label">보기</span>
        <div class="tab-row" id="source-tabs"></div>
      </div>
      <div class="filter-group" id="category-filter-group">
        <span class="filter-label">카테고리</span>
        <div class="tab-row" id="category-tabs"></div>
      </div>
    </section>

    <section class="notes-panel">
      <h2>기준 메모</h2>
      <ul id="catalog-notes"></ul>
    </section>

    <main class="asset-list" id="asset-list"></main>
  </div>

  <template id="asset-card-template">
    <article class="asset-card">
      <div class="thumb"></div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="number-row">
              <span class="number-pill"></span>
              <span class="category-pill"></span>
            </div>
            <h3 class="title"></h3>
          </div>
          <div class="meta-box">
            <span class="source-pill"></span>
            <span class="item-status"></span>
          </div>
        </div>
        <p class="use-for"></p>
        <p class="note"></p>
        <div class="price-row"></div>
        <div class="actions-row">
          <label>
            <span>선택 상태</span>
            <select class="status-select">
              <option value="pending">미정</option>
              <option value="approved">채택</option>
              <option value="hold">보류</option>
              <option value="rejected">제외</option>
            </select>
          </label>
          <a class="link-button" target="_blank" rel="noreferrer">원본 페이지</a>
        </div>
        <label class="note-field">
          <span>메모</span>
          <textarea class="note-input" rows="2" placeholder="예: 전사 메인 후보 / 허브 전용 / UI 프레임만 차용"></textarea>
        </label>
      </div>
    </article>
  </template>

  <script src="/asset_board_app.js"></script>
</body>
</html>
