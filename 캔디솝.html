<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>캔디솝 (혼자하기)</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff" as="font" type="font/woff" crossorigin>
    <style>
        /* ------------------------- */
        /* == 1. 앱 공통 테마 (대기실.html 기반) == */
        /* ------------------------- */
        :root {
            --bg-color: #FFFBEB; /* 따뜻한 크림색 배경 */
            --primary-color: #FF6B6B; /* 활기찬 코랄색 */
            --secondary-color: #4ECDC4; /* 상쾌한 틸(teal)색 */
            --accent-color: #FFD93D; /* 밝은 노란색 */
            --text-color-dark: #574141; /* 어두운 갈색 */
            --text-color-light: #ffffff;
            --danger-color: #F76363; /* [수정] 시간 부족 시 색상 */
            --panel-bg: #FFFFFF;
            --panel-border: #F0EAD2; /* 연한 베이지색 테두리 */
            --panel-shadow: #E4DCCF; /* 패널 그림자 */
            --font-main: 'GmarketSans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--bg-color); /* [테마] */
            color: var(--text-color-dark); /* [테마] */
            display: flex; flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }

        /* ------------------------- */
        /* == 2. 게임 레이아웃 (신규) == */
        /* ------------------------- */
        #game-wrapper { 
            width: 100%; height: 100%; 
            max-width: 450px; /* [수정] 세로 모드에 맞게 최대폭 살짝 줄임 */
            display: flex; flex-direction: column; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* [수정] 헤더 스타일 변경 (점수/시간 통합) */
        .page-header {
            width: 100%; padding: 12px; flex-shrink: 0;
            background: #FFFAE0;
            border-bottom: 3px solid var(--panel-border);
            display: flex; 
            justify-content: space-around; /* [수정] */
            align-items: center;
            gap: 8px;
        }
        /* [삭제] h1, back-btn 관련 스타일 (HTML에서 제거됨) */

        /* [삭제] #game-stats (헤더로 통합됨) */

        /* [수정] .stat-box는 헤더 바로 안으로 이동 */
        .stat-box {
            text-align: center;
            font-weight: 900;
            width: 100px; /* 고정 폭 */
        }
        .stat-box .label {
            font-size: 0.9em;
            color: #9A6A3A;
        }
        .stat-box .value {
            font-size: 1.6em;
            color: var(--primary-color);
            transition: color 0.3s ease; /* [신규] 색상 변경 트랜지션 */
        }

        /* [신규] 시간 부족 애니메이션 */
        .stat-box .value.danger-time {
            color: var(--danger-color);
            animation: throb 1.2s infinite ease-in-out;
        }
        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }


        /* 게임 메인 컨테이너 */
        #game-container {
            width: 100%; flex-grow: 1; 
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; 
            padding: 10px; /* [수정] 패딩 살짝 줄임 */
        }
        #game-board {
            position: relative; 
            background-color: var(--panel-bg); /* [테마] */
            border: 3px solid var(--text-color-dark); /* [테마] */
            box-shadow: 6px 6px 0px 0px var(--panel-shadow); /* [테마] */
            border-radius: 12px;
            display: grid; 
            gap: 2px; /* 타일 간격 */
            padding: 4px; /* 보드 내부 여백 */
            touch-action: none; /* [중요] 드래그를 위해 */
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ------------------------- */
        /* == 3. 타일 스타일 (입체감) == */
        /* ------------------------- */
        .tile {
            /* background-color: var(--bg-color); */ /* [Old] */
            background-color: #FFFEF5; /* [New] 살짝 밝은 배경 */
            border-radius: 10px; /* [New] 좀 더 둥글게 */
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5em; /* JS에서 조절 */
            cursor: pointer;
            /* border: 2px solid var(--panel-border); */ /* [Old] */
            border: 1px solid var(--panel-border); /* [New] 얇은 테두리 */
            
            /* [New] 입체감 효과 */
            box-shadow: inset 2px 2px 4px rgba(87, 65, 65, 0.15), 
                        inset -2px -2px 4px rgba(255, 255, 255, 0.7);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1); /* 이모지 그림자 */

            aspect-ratio: 1 / 1;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.2s ease,
                        box-shadow 0.2s ease; /* [New] 그림자 애니메이션 */
        }
        
        /* [New] 터치 시 눌림 효과 */
        .tile:active {
            box-shadow: inset 1px 1px 2px rgba(87, 65, 65, 0.2), 
                        inset -1px -1px 2px rgba(255, 255, 255, 0.7);
            transform: scale(0.95);
        }

        /* [신규] 타일 애니메이션 */
        .tile.pop { /* 터질 때 */
            animation: pop 0.3s ease-out forwards;
        }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(0.1); opacity: 0; }
        }

        .tile.fall { /* 떨어질 때 */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile.new { /* 새로 생길 때 */
            animation: new-tile 0.3s ease-out;
        }
        @keyframes new-tile {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .tile.swap { /* 스왑될 때 */
            transition: transform 0.2s ease-in-out;
            z-index: 10;
        }

        .tile.invalid { /* 잘못된 스왑 (흔들) */
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* ------------------------- */
        /* == 4. 모달 (대기실.html 기반) == */
        /* ------------------------- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; text-align: center; 
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .overlay.active { display: flex; }

        .modal-content { 
            background: var(--panel-bg); 
            color: var(--text-color-dark); 
            padding: 0; 
            border-radius: 24px;
            width: 90%; max-width: 400px; 
            box-shadow: 8px 8px 0px 0px var(--text-color-dark);
            overflow: hidden; 
            border: 4px solid var(--text-color-dark);
        }
        .modal-header { 
            background-color: var(--primary-color);
            color: white; 
            padding: 15px; 
            border-bottom: 4px solid #C04A4A; 
        }
        .modal-header h2 { font-size: 1.6em; text-shadow: 1px 1px 1px rgba(0,0,0,0.2); }
        .modal-body { padding: 25px; }
        .modal-footer {
            display: flex; gap: 10px;
            padding: 20px;
            border-top: 3px solid var(--panel-border);
            background-color: #FFFAE0;
        }

        /* 스피너/카운트다운 (유지) */
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 4px solid var(--primary-color); width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #countdown-number { font-size: 7em; font-weight: 700; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.7); animation: countdown-pop 1s; }
        @keyframes countdown-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 점수판 (테마 적용) */
        #final-score {
            font-size: 2.5em;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        #high-score {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text-color-dark);
        }

        /* ------------------------- */
        /* == 5. 아케이드 버튼 (대기실.html) == */
        /* ------------------------- */
        .menu-btn { 
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: 900; 
            font-family: var(--font-main);
            border-radius: 16px; border: none; cursor: pointer; 
            transition: all 0.1s ease-out;
            border-bottom: 5px solid; /* 3D 효과 */
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            margin: 5px 0; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .menu-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .menu-btn.primary { 
            background-color: var(--primary-color);
            color: white; 
            border-bottom-color: #C04A4A;
        }
        .menu-btn.secondary { 
            background-color: var(--secondary-color);
            color: white; 
            border-bottom-color: #379A93;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div class="page-header" id="solo-header">
            <div class="stat-box">
                <div class="label">점수</div>
                <div class="value" id="score-value">0</div>
            </div>
            <div class="stat-box">
                <div class="label">시간</div>
                <div class="value" id="timer-value">60</div>
            </div>
        </div>

        <div id="game-container">
            <div id="game-board">
                </div>
        </div>
    </div>

    <div id="info-overlay" class="overlay active"> <div id="countdown-number">3</div>
    </div>

    <div id="game-over-overlay" class="overlay">
         <div class="modal-content">
             <div class="modal-header">
                 <h2>게임 종료!</h2>
             </div>
             <div class="modal-body">
                 <p id="final-score">0</p>
                 <p id="high-score">최고기록: 0</p>
             </div>
             <div class="modal-footer">
                 <button id="restart-btn" class="menu-btn secondary">다시하기</button>
                 <a href="대기실.html" class="menu-btn primary">대기실로</a>
             </div>
         </div>
    </div>

    <audio id="swap-sound" src="./sounds/move.wav" preload="auto"></audio>
    <audio id="match-sound" src="./봄버맨사운드/사천성맞춤.mp3" preload="auto"></audio>
    <audio id="gameover-sound" src="./봄버맨사운드/패배.mp3" preload="auto"></audio>
    <audio id="combo1-sound" src="./sounds/combo1.mp3" preload="auto"></audio>
    <audio id="combo2-sound" src="./sounds/combo2.mp3" preload="auto"></audio>
    <audio id="combo3-sound" src="./sounds/combo3.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // F12/개발자 도구 허용
            document.addEventListener('contextmenu', event => event.preventDefault());

            // ------------------------------------
            // 1. DOM 요소 및 기본 설정
            // ------------------------------------

            // DOM
            const gameBoard = document.getElementById('game-board');
            const scoreValue = document.getElementById('score-value');
            const timerValue = document.getElementById('timer-value');
            const infoOverlay = document.getElementById('info-overlay');
            const countdownNumber = document.getElementById('countdown-number');
            const gameOverOverlay = document.getElementById('game-over-overlay');
            const finalScoreEl = document.getElementById('final-score');
            const highScoreEl = document.getElementById('high-score');
            const restartBtn = document.getElementById('restart-btn');
            const gameContainer = document.getElementById('game-container'); // [추가]

            // 사운드
            const sounds = {
                swap: document.getElementById('swap-sound'),
                match: document.getElementById('match-sound'),
                gameOver: document.getElementById('gameover-sound'),
                combo: [
                    document.getElementById('combo1-sound'),
                    document.getElementById('combo2-sound'),
                    document.getElementById('combo3-sound')
                ]
            };

            // [수정] 게임 설정
            const ROWS = 10;
            const COLS = 6;
            const TILE_EMOJIS = ['🍓', '🍊', '🍋', '🍉', '🍇', '🍒']; // 6종류
            const GAME_TIME = 60; // 60초

            // 게임 상태 변수
            let board = []; // 2D 배열 (데이터)
            let tileElements = []; // 2D 배열 (DOM 요소)
            let score = 0;
            let timer = GAME_TIME;
            let timerId = null;
            let isProcessing = false; // 애니메이션/처리 중 클릭 방지
            let currentCombo = 0;
            let highScore = parseInt(localStorage.getItem('candysoap-highscore') || '0');

            // 드래그 상태 변수
            let dragStartTile = null;
            let dragStartX = 0;
            let dragStartY = 0;

            // ------------------------------------
            // 2. Firebase (솔로 모드용 - 점수 저장)
            // ------------------------------------

            /* // [로컬 테스트용 주석]
            const firebaseConfig = {
                apiKey: "AIzaSyCmNAKmgF_L3o0QyOGh_oFAq_rMRtUyklw",
                authDomain: "goodluck-7c14b.firebaseapp.com",
                databaseURL: "https://goodluck-7c14b-default-rtdb.firebaseio.com",
                projectId: "goodluck-7c14b",
                storageBucket: "goodluck-7c14b.appspot.com",
                messagingSenderId: "858281658455",
                appId: "1:858281658455:web:9131280a459be983933b12"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const auth = firebase.auth();
            const usersRef = db.ref('users');
            
            let currentUser = null;
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                }
            });
            */ // [로컬 테스트용 주석]
            let currentUser = null; // [로컬 테스트용] 임시 변수

            // ------------------------------------
            // 3. 게임 초기화
            // ------------------------------------

            function initGame() {
                // 상태 초기화
                score = 0;
                timer = GAME_TIME;
                currentCombo = 0;
                isProcessing = true; 

                // UI 초기화
                scoreValue.textContent = '0';
                timerValue.textContent = GAME_TIME;
                timerValue.classList.remove('danger-time'); // [수정] 타이머 애니메이션 리셋
                gameOverOverlay.classList.remove('active');

                // 보드 생성
                createBoardData();
                renderBoard();
            }

            function createBoardData() {
                board = [];
                for (let r = 0; r < ROWS; r++) {
                    const row = [];
                    for (let c = 0; c < COLS; c++) {
                        // 초기 3매치 방지
                        let newEmoji;
                        do {
                            newEmoji = getRandomEmoji();
                        } while (
                            (c >= 2 && newEmoji === row[c - 1] && newEmoji === row[c - 2]) || // 가로
                            (r >= 2 && newEmoji === board[r - 1][c] && newEmoji === board[r - 2][c]) // 세로
                        );
                        row.push(newEmoji);
                    }
                    board.push(row);
                }

                // 초기 매치 모두 제거
                const initialMatches = findAllMatches();
                if (initialMatches.size > 0) {
                    console.log("초기 매치 발견! 보드 재생성...");
                    createBoardData(); // 재귀 호출로 다시 생성
                }
            }

            function getRandomEmoji() {
                return TILE_EMOJIS[Math.floor(Math.random() * TILE_EMOJIS.length)];
            }

            // [수정] 10x6 비율에 맞게 보드 크기 계산 로직 전체 변경
            function renderBoard() {
                gameBoard.innerHTML = '';
                tileElements = [];

                // 보드 크기 맞춤
                const containerW = gameContainer.clientWidth;
                const containerH = gameContainer.clientHeight;

                if (containerW === 0 || containerH === 0) {
                    console.warn("컨테이너 크기 0. 렌더링 스킵.");
                    return; 
                }

                // CSS에서 가져온 값
                const gap = 2; // grid-gap
                const boardPadding = 4; // #game-board padding
                const containerPadding = 10; // #game-container padding

                // 타일 크기 계산을 위한 실제 사용 가능 영역
                const availableW = containerW - (containerPadding * 2);
                const availableH = containerH - (containerPadding * 2);

                // 너비 기준 타일 크기
                const tileW_calc = (availableW - (boardPadding * 2) - (COLS - 1) * gap) / COLS;
                // 높이 기준 타일 크기
                const tileH_calc = (availableH - (boardPadding * 2) - (ROWS - 1) * gap) / ROWS;

                // 타일은 1:1 비율이므로, 더 작은 쪽을 기준으로 최종 크기 결정
                const tileSize = Math.floor(Math.min(tileW_calc, tileH_calc));

                if (tileSize <= 0) {
                    console.error("타일 크기 계산 실패. 컨테이너가 너무 작습니다.");
                    return;
                }

                // 계산된 타일 크기에 맞는 최종 보드 너비 설정
                const finalBoardW = (tileSize * COLS) + (COLS - 1) * gap + (boardPadding * 2);
                
                gameBoard.style.width = `${finalBoardW}px`;
                gameBoard.style.height = 'auto'; // 높이는 aspect-ratio에 의해 자동 조절
                gameBoard.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

                // 타일 폰트(이모지) 크기
                const iconSize = tileSize * 0.7; // 70%

                for (let r = 0; r < ROWS; r++) {
                    const rowElements = [];
                    for (let c = 0; c < COLS; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.dataset.row = r;
                        tile.dataset.col = c;
                        tile.textContent = board[r][c];
                        tile.style.fontSize = `${iconSize}px`; // 계산된 폰트 크기 적용

                        gameBoard.appendChild(tile);
                        rowElements.push(tile);

                        // 이벤트 리스너 (드래그 시작)
                        tile.addEventListener('pointerdown', handleDragStart);
                    }
                    tileElements.push(rowElements);
                }
            }

            // ------------------------------------
            // 4. 게임 시작/종료
            // ------------------------------------

            function startCountdown() {
                infoOverlay.classList.add('active');
                let count = 3;
                countdownNumber.textContent = count;

                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownNumber.textContent = count;
                    } else if (count === 0) {
                        countdownNumber.textContent = 'GO!';
                                                           } else {
                        clearInterval(interval);
                        infoOverlay.classList.remove('active');

                        setTimeout(() => {
                            initGame();
                            startGame(); 
                        }, 0); 
                    }
                }, 1000);
            }


            function startGame() {
                // [수정] 렌더링 재시도 로직 (이전 수정사항 유지)
                if (tileElements.length === 0) {
                    console.log("보드가 렌더링되지 않았습니다. startGame에서 재시도합니다.");
                    renderBoard();
                }
                if (tileElements.length === 0) {
                    console.error("보드 렌더링에 최종 실패했습니다. 게임을 시작할 수 없습니다.");
                    return; 
                }

                isProcessing = false; 
                timerId = setInterval(() => {
                    timer--;
                    timerValue.textContent = timer;
                    
                    // [수정] 10초 남았을 때 애니메이션 클래스 추가
                    if (timer <= 10) {
                        timerValue.classList.add('danger-time');
                    }
                    
                    if (timer <= 0) {
                        gameOver();
                    }
                }, 1000);
            }

            function gameOver() {
                isProcessing = true; 
                clearInterval(timerId);
                timerValue.classList.remove('danger-time'); // [수정] 애니메이션 중지
                timerValue.textContent = '0';
                playSound('gameOver');

                // 최고 기록 갱신
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('candysoap-highscore', highScore);
                    highScoreEl.innerHTML = `🎉 최고기록 갱신! 🎉<br>${highScore.toLocaleString()}`;
                } else {
                    highScoreEl.innerHTML = `최고기록: ${highScore.toLocaleString()}`;
                }
                finalScoreEl.textContent = `${score.toLocaleString()} 점`;
                gameOverOverlay.classList.add('active');

                // Firebase에 점수 저장 (주석 처리됨)
                /* if (currentUser) {
                    // ...
                }
                */ 
            }

            restartBtn.addEventListener('click', () => {
                gameOverOverlay.classList.remove('active');
                startCountdown();
            });

            // ------------------------------------
            // 5. 컨트롤 (드래그 앤 스왑)
            // ------------------------------------

            function handleDragStart(e) {
                if (isProcessing) return;
                const tile = e.currentTarget;

                dragStartTile = {
                    row: parseInt(tile.dataset.row, 10),
                    col: parseInt(tile.dataset.col, 10),
                    el: tile
                };

                // 터치/클릭 시작 좌표 저장
                dragStartX = e.clientX || (e.touches && e.touches[0].clientX);
                dragStartY = e.clientY || (e.touches && e.touches[0].clientY);

                window.addEventListener('pointerup', handleDragEnd, { once: true });
                window.addEventListener('pointercancel', handleDragEnd, { once: true });
            }

            function handleDragEnd(e) {
                if (!dragStartTile) return;

                const dragEndX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const dragEndY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);

                const deltaX = dragEndX - dragStartX;
                const deltaY = dragEndY - dragStartY;
                const threshold = dragStartTile.el.clientWidth / 3; // 타일 크기의 1/3만큼

                let targetRow = dragStartTile.row;
                let targetCol = dragStartTile.col;

                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > threshold) {
                    // 가로 스와이프
                    targetCol += (deltaX > 0) ? 1 : -1;
                } else if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > threshold) {
                    // 세로 스와이프
                    targetRow += (deltaY > 0) ? 1 : -1;
                } else {
                    dragStartTile = null;
                    return;
                }

                // 보드 밖으로 스와이프했는지 확인
                if (targetRow < 0 || targetRow >= ROWS || targetCol < 0 || targetCol >= COLS) {
                    dragStartTile = null;
                    return;
                }

                // 스왑 시도
                attemptSwap(dragStartTile.row, dragStartTile.col, targetRow, targetCol);

                dragStartTile = null;
            }

            // ------------------------------------
            // 6. 게임 로직 (매치, 스왑, 폭포)
            // ------------------------------------

            async function attemptSwap(r1, c1, r2, c2) {
                if (isProcessing) return;
                isProcessing = true; 

                playSound('swap');

                // 1. 데이터 스왑
                swapData(r1, c1, r2, c2);

                // 2. DOM 스왑 (애니메이션)
                await animateSwap(r1, c1, r2, c2);

                // 3. 매치 확인
                const matches = findAllMatches();

                if (matches.size > 0) {
                    // 4a. 매치 성공 -> 폭포 시작
                    currentCombo = 0; 
                    await processMatchesAndCascade(matches);
                } else {
                    // 4b. 매치 실패 -> 원위치
                    await animateInvalidSwap(r1, c1, r2, c2);
                }

                isProcessing = false;
            }

            function swapData(r1, c1, r2, c2) {
                const temp = board[r1][c1];
                board[r1][c1] = board[r2][c2];
                board[r2][c2] = temp;
            }

            function swapDOMElements(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];

                const tempEmoji = tile1.textContent;
                tile1.textContent = tile2.textContent;
                tile2.textContent = tempEmoji;

                tile1.className = 'tile';
                tile2.className = 'tile';
            }

            function animateSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1];
                const tile2 = tileElements[r2][c2];

                tile1.classList.add('swap');
                tile2.classList.add('swap');

                const rect1 = tile1.getBoundingClientRect();
                const rect2 = tile2.getBoundingClientRect();

                const deltaX = rect1.left - rect2.left;
                const deltaY = rect1.top - rect2.top;

                tile1.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`;
                tile2.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                return new Promise(resolve => {
                    setTimeout(() => {
                        tile1.style.transform = '';
                        tile2.style.transform = '';
                        swapDOMElements(r1, c1, r2, c2); 
                        resolve();
                    }, 200); 
                });
            }

            async function animateInvalidSwap(r1, c1, r2, c2) {
                const tile1 = tileElements[r1][c1]; 
                const tile2 = tileElements[r2][c2]; 

                tile1.classList.add('invalid');
                tile2.classList.add('invalid');

                await new Promise(resolve => setTimeout(resolve, 400)); 

                swapData(r1, c1, r2, c2);
                await animateSwap(r1, c1, r2, c2);
            }

            function findAllMatches() {
                const matches = new Set();
                // 가로
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS - 2; c++) {
                        if (board[r][c] && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r}-${c+1}`);
                            matches.add(`${r}-${c+2}`);
                        }
                    }
                }
                // 세로
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS - 2; r++) {
                        if (board[r][c] && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c]) {
                            matches.add(`${r}-${c}`);
                            matches.add(`${r+1}-${c}`);
                            matches.add(`${r+2}-${c}`);
                        }
                    }
                }
                return matches;
            }

            async function processMatchesAndCascade(matches) {
                if (isProcessing === false) isProcessing = true; 

                currentCombo++;

                // 1. 점수 갱신 및 사운드
                updateScore(matches.size, currentCombo);
                playComboSound(currentCombo);

                // 2. 매치된 타일 DOM에서 제거 (애니메이션)
                await animatePop(matches);

                // 3. 데이터에서 제거 (null)
                removeMatches(matches);

                // 4. 타일 아래로 내리기 (데이터)
                const { droppedTilesMap, maxDrop } = dropTiles();

                // 5. 빈 칸 채우기 (데이터)
                const newTilesMap = fillTopTiles();

                // 6. DOM 렌더링 (낙하 및 생성)
                await animateDrops(droppedTilesMap, newTilesMap, maxDrop);

                // 7. 연쇄 폭포 확인
                const newMatches = findAllMatches();
                if (newMatches.size > 0) {
                    await new Promise(resolve => setTimeout(resolve, 100)); 
                    await processMatchesAndCascade(newMatches); // 재귀 호출
                } else {
                    // 8. 콤보 종료, 가능한 수 확인
                    currentCombo = 0;
                    if (!checkForPossibleMoves()) {
                        await handleNoMoreMoves();
                    }
                }
            }

            function updateScore(matchCount, combo) {
                const baseScore = matchCount * 10;
                const comboBonus = combo * 20;
                score += baseScore + comboBonus;
                scoreValue.textContent = score.toLocaleString();
            }

            function playSound(id) {
                try {
                    const sound = sounds[id];
                    if(sound) {
                        sound.currentTime = 0;
                        sound.play().catch(e => {});
                    }
                } catch(e) {}
            }

            function playComboSound(combo) {
                playSound('match');
                if (combo >= 1) {
                    const comboSound = sounds.combo[Math.min(combo - 1, sounds.combo.length - 1)];
                    if (comboSound) {
                        comboSound.currentTime = 0;
                        comboSound.play().catch(e => {});
                    }
                }
            }

            function animatePop(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (tileElements[r] && tileElements[r][c]) {
                        tileElements[r][c].classList.add('pop');
                    }
                });
                return new Promise(resolve => setTimeout(resolve, 300)); 
            }

            function removeMatches(matches) {
                matches.forEach(key => {
                    const [r, c] = key.split('-').map(Number);
                    if (board[r]) {
                        board[r][c] = null; 
                    }
                });
            }

            function dropTiles() {
                const droppedTilesMap = new Map(); 
                let maxDrop = 0;

                for (let c = 0; c < COLS; c++) {
                    let emptyRow = ROWS - 1; 
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (board[r][c] !== null) {
                            if (r !== emptyRow) {
                                board[emptyRow][c] = board[r][c];
                                board[r][c] = null;

                                droppedTilesMap.set(`${emptyRow}-${c}`, r); 
                                maxDrop = Math.max(maxDrop, emptyRow - r);
                            }
                            emptyRow--;
                        }
                    }
                }
                return { droppedTilesMap, maxDrop };
            }

            function fillTopTiles() {
                const newTilesMap = new Map(); 
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] === null) {
                            const newEmoji = getRandomEmoji();
                            board[r][c] = newEmoji;
                            newTilesMap.set(`${r}-${c}`, newEmoji);
                        }
                    }
                }
                return newTilesMap;
            }

            async function animateDrops(droppedTilesMap, newTilesMap, maxDrop) {
                // 1. 떨어진 타일 (Fall)
                droppedTilesMap.forEach((startRow, endKey) => {
                    const [endRow, col] = endKey.split('-').map(Number);

                    if (!tileElements[startRow] || !tileElements[startRow][col]) {
                        console.error(`AnimateDrops: Fall [${startRow}][${col}] DOM 요소를 찾을 수 없습니다.`);
                        return;
                    }
                    const tile = tileElements[startRow][col]; 
                    tileElements[endRow][col] = tile;
                    tile.dataset.row = endRow;
                    const dropDistance = (endRow - startRow) * tile.clientHeight;
                    tile.className = 'tile fall'; 
                    tile.style.transform = `translateY(${dropDistance}px)`;
                });

                // 2. 새로 생긴 타일 (New)
                newTilesMap.forEach((emoji, key) => {
                    const [row, col] = key.split('-').map(Number);
                    if (!tileElements[row] || !tileElements[row][col]) {
                         console.error(`AnimateDrops: New [${row}][${col}] DOM 요소를 찾을 수 없습니다.`);
                         const tile = gameBoard.querySelector(`.tile[data-row="${row}"][data-col="${col}"]`);
                         if (tile) {
                            tile.textContent = emoji;
                            tile.className = 'tile new';
                            tile.style.transform = '';
                         }
                         return;
                    }
                    const tile = tileElements[row][col]; 
                    tile.textContent = emoji;
                    tile.className = 'tile new'; 
                    tile.style.transform = ''; 
                });

                // 3. 애니메이션 완료 대기
                const duration = Math.min(300 + maxDrop * 50, 600);
                await new Promise(resolve => setTimeout(resolve, duration));

                // 4. 모든 타일 클래스 초기화
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (tileElements[r] && tileElements[r][c]) {
                            tileElements[r][c].className = 'tile';
                            tileElements[r][c].style.transform = '';
                        }
                    }
                }

                // 5. DOM 요소 2D 배열 재정렬 (매우 중요 - 이전 수정사항 유지)
                tileElements = [];
                const allTileElements = gameBoard.querySelectorAll('.tile');
                for (let r = 0; r < ROWS; r++) {
                    const rowElements = [];
                    for (let c = 0; c < COLS; c++) {
                        const index = r * COLS + c;
                        const el = allTileElements[index];
                        el.dataset.row = r;
                        el.dataset.col = c;
                        el.textContent = board[r][c];
                        rowElements.push(el);
                    }
                    tileElements.push(rowElements);
                }
            }

            // ------------------------------------
            // 7. 셔플 로직 (더 이상 진행 불가)
            // ------------------------------------

            function checkForPossibleMoves() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        // 가로 스왑 체크
                        if (c < COLS - 1) {
                            if (checkMove(r, c, r, c + 1)) return true;
                        }
                        // 세로 스왑 체크
                        if (r < ROWS - 1) {
                            if (checkMove(r, c, r + 1, c)) return true;
                        }
                    }
                }
                return false; 
            }

            function checkMove(r1, c1, r2, c2) {
                swapData(r1, c1, r2, c2);
                const matches = findAllMatches();
                swapData(r1, c1, r2, c2); // 원위치
                return matches.size > 0;
            }

            async function handleNoMoreMoves() {
                console.log("더 이상 움직일 수 없음! 셔플합니다.");
                isProcessing = true; 

                // (TODO: 셔플 알림 UI)

                shuffleBoard();

                // DOM 렌더링
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        tileElements[r][c].textContent = board[r][c];
                        tileElements[r][c].className = 'tile new'; 
                    }
                }
                await new Promise(resolve => setTimeout(resolve, 300));

                const matches = findAllMatches();
                if (matches.size > 0) {
                    await processMatchesAndCascade(matches);
                }

                isProcessing = false;
            }

            function shuffleBoard() {
                console.log("보드 데이터 셔플 중...");
                createBoardData(); 
            }

            // ------------------------------------
            // 8. 게임 시작
            // ------------------------------------
            startCountdown();
        });
    </script>
